:"Java","topic":"Concurrency Core","icon":"🧵","questions":[{"id":"java-concurrency-core-001","question":"What problem does synchronized solve?","answer":"`synchronized` provides mutual exclusion and memory visibility. Only one thread at a time can execute a synchronized block guarded by the same monitor.\n\n```java\nprivate final Object lock = new Object();\nprivate int count;\n\nvoid increment() {\n    synchronized (lock) {\n        count++;\n    }\n}\n```\n\nEntering and exiting a monitor also creates happens-before relationships, so changes made by one thread inside a synchronized block become visible to another thread that later acquires the same monitor.","difficulty":"easy","tags":["synchronized","monitor","mutual-exclusion","visibility"]},{"id":"java-concurrency-core-002","question":"What is the difference between synchronizing an instance method and a static method?","answer":"A synchronized instance method locks on `this`. A synchronized static method locks on the `Class` object.\n\n```java\nsynchronized void instanceWork() { }\n\nstatic synchronized void staticWork() { }\n```\n\nThese are different monitors. Two threads can execute one instance-synchronized method on different object instances at the same time. Static synchronization coordinates across the class object, not across each instance.","difficulty":"easy","tags":["synchronized","static","monitor","class-lock"]},{"id":"java-concurrency-core-003","question":"Why should you avoid synchronizing on public or shared objects?","answer":"If external code can access the lock object, it can accidentally or deliberately block your internals.\n\n```java\nprivate final Object lock = new Object();\n\nvoid update() {\n    synchronized (lock) {\n        // protected state\n    }\n}\n```\n\nAvoid locking on public objects, string literals, boxed primitives, or `this` when callers can also lock on it. A private final lock object keeps ownership clear.","difficulty":"medium","tags":["synchronized","lock-object","encapsulation","deadlock"]},{"id":"java-concurrency-core-004","question":"What does volatile guarantee?","answer":"`volatile` guarantees visibility and ordering for reads and writes of that variable. A write to a volatile variable is visible to later reads of the same variable by other threads.\n\n```java\nprivate volatile boolean running = true;\n\nvoid stop() {\n    running = false;\n}\n```\n\n`volatile` is useful for status flags and safely publishing simple state. It does not make compound actions such as `count++` atomic.","difficulty":"easy","tags":["volatile","visibility","happens-before","memory-model"]},{"id":"java-concurrency-core-005","question":"Why is volatile not enough for incrementing a counter?","answer":"`count++` is a read-modify-write sequence. `volatile` makes reads and writes visible, but it does not make the whole sequence atomic.\n\n```java\nprivate volatile int count;\n\nvoid increment() {\n    count++; // not atomic\n}\n```\n\nUse `synchronized`, `AtomicInteger`, `LongAdder`, or another coordination mechanism when multiple threads update the same counter.","difficulty":"medium","tags":["volatile","atomicity","race-condition","counter"]},{"id":"java-concurrency-core-006","question":"What is safe publication?","answer":"Safe publication means making an object visible to other threads in a way that guarantees they see its properly initialized state.\n\nCommon safe-publication mechanisms include:\n\n- Storing the reference in a `volatile` field.\n- Publishing through a synchronized block.\n- Publishing through a thread-safe collection.\n- Initializing through a static initializer.\n- Using final fields correctly during construction.\n\nWithout safe publication, another thread may observe stale or partially initialized state.","difficulty":"hard","tags":["safe-publication","visibility","final","memory-model"]},{"id":"java-concurrency-core-007","question":"How does ReentrantLock differ from synchronized?","answer":"`ReentrantLock` provides explicit lock and unlock operations plus features not available with basic `synchronized` blocks.\n\n```java\nLock lock = new ReentrantLock();\nlock.lock();\ntry {\n    updateState();\n} finally {\n    lock.unlock();\n}\n```\n\nUseful features include `tryLock`, interruptible lock acquisition, optional fairness, and multiple `Condition` objects. The cost is more verbose code and the need to reliably unlock in `finally`.","difficulty":"medium","tags":["reentrantlock","synchronized","trylock","condition"]},{"id":"java-concurrency-core-008","question":"Why must unlock() be called in a finally block?","answer":"If code throws an exception while holding an explicit lock, failing to unlock can permanently block other threads.\n\n```java\nlock.lock();\ntry {\n    riskyOperation();\n} finally {\n    lock.unlock();\n}\n```\n\n`synchronized` releases its monitor automatically when the block exits. Explicit locks require explicit cleanup.","difficulty":"easy","tags":["lock","finally","reentrantlock","exception-safety"]},{"id":"java-concurrency-core-009","question":"What is a Condition, and how does it relate to wait/notify?","answer":"A `Condition` is associated with a `Lock` and provides waiting and signaling operations similar to `Object.wait()` and `notify()`.\n\n```java\nCondition notEmpty = lock.newCondition();\n\nlock.lock();\ntry {\n    while (queue.isEmpty()) {\n        notEmpty.await();\n    }\n} finally {\n    lock.unlock();\n}\n```\n\nConditions allow multiple wait sets per lock, which can make producer-consumer designs clearer than one monitor wait set.","difficulty":"medium","tags":["condition","wait-notify","lock","producer-consumer"]},{"id":"java-concurrency-core-010","question":"Why should wait() normally be used inside a while loop?","answer":"A waiting thread can wake up without the condition being true, and notifications can be consumed by other threads first. Always re-check the condition after waking.\n\n```java\nsynchronized (lock) {\n    while (!ready) {\n        lock.wait();\n    }\n    useData();\n}\n```\n\nThe loop protects against spurious wakeups, missed assumptions, and races between notification and reacquiring the monitor.","difficulty":"medium","tags":["wait","notify","spurious-wakeup","monitor"]},{"id":"java-concurrency-core-011","question":"What is a deadlock?","answer":"A deadlock occurs when threads wait forever for locks held by each other.\n\n```java\n// Thread 1: lock A, then lock B\n// Thread 2: lock B, then lock A\n```\n\nCommon conditions include mutual exclusion, holding while waiting, no preemption, and circular wait. Deadlocks are often caused by inconsistent lock ordering or blocking while holding locks.","difficulty":"easy","tags":["deadlock","locks","circular-wait","concurrency"]},{"id":"java-concurrency-core-012","question":"How can deadlocks be prevented?","answer":"Typical strategies include:\n\n- Acquire locks in a consistent global order.\n- Avoid calling external code while holding locks.\n- Keep critical sections small.\n- Use `tryLock` with timeout and rollback.\n- Prefer higher-level concurrency utilities when possible.\n\n```java\nif (first.tryLock(100, TimeUnit.MILLISECONDS)) {\n    try { /* acquire second carefully */ }\n    finally { first.unlock(); }\n}\n```\n\nDesigning lock ownership clearly is usually better than trying to recover from deadlocks later.","difficulty":"medium","tags":["deadlock","trylock","lock-ordering","prevention"]},{"id":"java-concurrency-core-013","question":"What is livelock, and how is it different from deadlock?","answer":"In a deadlock, threads are blocked and make no progress. In a livelock, threads keep running and reacting to each other, but still make no useful progress.\n\nExample: two workers repeatedly step aside for each other and never enter the critical section.\n\nLivelock prevention often involves randomized backoff, clearer ownership rules, or reducing over-eager retry behavior.","difficulty":"medium","tags":["livelock","deadlock","progress","concurrency"]},{"id":"java-concurrency-core-014","question":"What is lock contention?","answer":"Lock contention happens when multiple threads frequently compete for the same lock. It can reduce throughput because threads spend time blocked or context-switching instead of doing useful work.\n\nWays to reduce contention include:\n\n- Narrowing synchronized sections.\n- Splitting independent state across different locks.\n- Using concurrent data structures.\n- Avoiding shared mutable state.\n- Using atomic variables or adders for simple counters.\n\nMeasure before replacing clear locking with complicated lock-free code.","difficulty":"medium","tags":["lock-contention","performance","synchronized","concurrency"]},{"id":"java-concurrency-core-015","question":"What is the difference between atomicity, visibility, and ordering?","answer":"**Atomicity** means an operation is indivisible from other threads' perspective. **Visibility** means one thread can see another thread's writes. **Ordering** means operations are observed in a constrained order.\n\n`synchronized` can provide all three for protected state. `volatile` provides visibility and ordering for the volatile variable, but not compound-operation atomicity.\n\nGood concurrency answers usually separate these concepts instead of saying only \"thread-safe\".","difficulty":"hard","tags":["atomicity","visibility","ordering","memory-model"]}]},{"domain":"Java","topic":"ConcurrentHashMap Internals","icon":"🧩","questions":[{"id":"java-concurrenthashmap-001","question":"What problem does ConcurrentHashMap solve?","answer":"`ConcurrentHashMap` provides thread-safe key-value access with high concurrency. Reads generally do not block, while updates coordinate only where needed.\n\nIt is preferred over `Hashtable` or `Collections.synchronizedMap(...)` when many threads access a map concurrently.\n\nIt does not lock the whole table for normal access, and it provides atomic map operations such as `putIfAbsent`, `compute`, `computeIfAbsent`, `replace`, and `merge`.","difficulty":"easy","tags":["concurrenthashmap","concurrency","thread-safety","map"]},{"id":"java-concurrenthashmap-002","question":"How does ConcurrentHashMap differ from the old segmented implementation?","answer":"Older Java versions used separate segments, each acting like a smaller locked map. Modern `ConcurrentHashMap` uses a table of bins and coordinates updates at a finer level, commonly around individual bins and internal control fields.\n\nThe old `concurrencyLevel` constructor argument remains mostly as a sizing hint for compatibility, not as a fixed number of lock segments.\n\nInterview answer: avoid saying modern `ConcurrentHashMap` is simply segmented.","difficulty":"hard","tags":["concurrenthashmap","internals","segments","java8"]},{"id":"java-concurrenthashmap-003","question":"Why does ConcurrentHashMap reject null keys and values?","answer":"In concurrent code, `map.get(key) == null` must unambiguously mean that no mapping was observed. If null values were allowed, a caller could not distinguish absence from a present mapping to null without a race-prone second check.\n\nRejecting null also supports bulk operations where null can mean \"no result\" or \"filter this value out\".","difficulty":"medium","tags":["concurrenthashmap","null","get","concurrency"]},{"id":"java-concurrenthashmap-004","question":"What does weak consistency mean for ConcurrentHashMap iterators?","answer":"A weakly consistent iterator may reflect the map state at or after iterator creation. It does not throw `ConcurrentModificationException`, but it also does not promise a stable, atomic snapshot.\n\n```java\nfor (Map.Entry<String, Integer> entry : map.entrySet()) {\n    // Concurrent updates may or may not be observed here.\n}\n```\n\nThis is suitable for many concurrent traversals, but not for logic that requires an exact snapshot.","difficulty":"medium","tags":["concurrenthashmap","iterator","weakly-consistent"]},{"id":"java-concurrenthashmap-005","question":"Why are computeIfAbsent(), compute(), and merge() important?","answer":"They express compound updates as atomic operations for a key. A check-then-act sequence can race, even when each individual method call is thread-safe.\n\n```java\nmap.computeIfAbsent(key, k -> new LongAdder()).increment();\nmap.merge(\"errors\", 1, Integer::sum);\n```\n\nKeep remapping functions short and avoid unrelated blocking work. Returning `null` usually means no mapping should be stored, or an existing mapping should be removed.","difficulty":"medium","tags":["concurrenthashmap","computeifabsent","merge","atomicity"]},{"id":"java-concurrenthashmap-006","question":"What happens during resizing in ConcurrentHashMap?","answer":"The table expands when the number of mappings grows too large relative to the table size. Resizing is expensive compared with ordinary reads and updates, so providing a realistic initial capacity can help.\n\nModern implementations allow threads to cooperate with transfer work during resize. The important interview-level point is that resizing is coordinated internally while preserving safe concurrent access.\n\nDo not rely on implementation-specific fields in application code.","difficulty":"hard","tags":["concurrenthashmap","resizing","capacity","internals"]},{"id":"java-concurrenthashmap-007","question":"How does ConcurrentHashMap handle hash collisions?","answer":"Like hash tables generally, keys are placed into bins based on hash. If many distinct keys land in the same bin, lookup and update costs rise.\n\nModern implementations can transform heavily contended collision bins into tree-based structures when conditions are met, improving worst-case behavior. Comparable keys may help break ties.\n\nGood `hashCode()` distribution still matters. A poor key implementation can hurt performance even in a concurrent map.","difficulty":"hard","tags":["concurrenthashmap","hash-collision","tree-bin","hashcode"]},{"id":"java-concurrenthashmap-008","question":"When should LongAdder be used with ConcurrentHashMap?","answer":"`LongAdder` is useful for highly contended counters because it spreads updates internally and combines them when read.\n\n```java\nConcurrentHashMap<String, LongAdder> counts = new ConcurrentHashMap<>();\ncounts.computeIfAbsent(word, k -> new LongAdder()).increment();\n```\n\nThis pattern is excellent for frequency maps and histograms. Use `AtomicLong` or ordinary values when contention is low or when exact single-variable atomic semantics are more important than update throughput.","difficulty":"medium","tags":["concurrenthashmap","longadder","frequency-map","contention"]}]},{"domain":"Java","topic":"CopyOnWriteArrayList","icon":"📋","questions":[{"id":"java-copyonwritearraylist-001","question":"What is CopyOnWriteArrayList?","answer":"`CopyOnWriteArrayList` is a thread-safe `List` implementation where every mutating operation creates a fresh copy of the underlying array.\n\nReads are fast and do not need to lock the array being read. Writes are expensive because they copy the array.\n\nThis design is useful when reads greatly outnumber writes.","difficulty":"easy","tags":["copyonwritearraylist","thread-safety","list","copy-on-write"]},{"id":"java-copyonwritearraylist-002","question":"When is CopyOnWriteArrayList a good choice?","answer":"It is a good fit for mostly-read data where iteration safety and stable snapshots matter more than write performance.\n\nCommon examples:\n\n- Event listener lists.\n- Observer registries.\n- Rarely changing configuration values.\n- Small read-mostly collections shared between threads.\n\nIt is usually a bad fit for large lists or frequent writes.","difficulty":"easy","tags":["copyonwritearraylist","read-heavy","listeners","configuration"]},{"id":"java-copyonwritearraylist-003","question":"How do CopyOnWriteArrayList iterators work?","answer":"Iterators use a snapshot of the array that existed when the iterator was created. They do not see later changes and do not throw `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nThe iterator does not support mutating operations such as `remove`, `set`, or `add`.","difficulty":"medium","tags":["copyonwritearraylist","iterator","snapshot","concurrentmodificationexception"]},{"id":"java-copyonwritearraylist-004","question":"Why are writes expensive in CopyOnWriteArrayList?","answer":"Every structural change copies the underlying array and publishes the new array. This makes each write O(n) in the number of elements.\n\n```java\nlist.add(listener);    // copies the array\nlist.remove(listener); // copies the array again\n```\n\nThe tradeoff is that readers can traverse stable arrays safely. This is excellent for rare writes, but very costly for write-heavy workloads.","difficulty":"medium","tags":["copyonwritearraylist","performance","writes","allocation"]},{"id":"java-copyonwritearraylist-005","question":"Does CopyOnWriteArrayList make compound actions atomic?","answer":"No. Individual operations are thread-safe, but a sequence of calls is not automatically atomic as a business operation.\n\n```java\nif (!list.contains(x)) {\n    list.add(x); // another thread may add x between the calls\n}\n```\n\nUse provided atomic-style methods such as `addIfAbsent` or `addAllAbsent` when they match the needed operation. Otherwise coordinate externally.","difficulty":"medium","tags":["copyonwritearraylist","atomicity","addifabsent","race-condition"]},{"id":"java-copyonwritearraylist-006","question":"How does CopyOnWriteArrayList compare with Collections.synchronizedList()?","answer":"`Collections.synchronizedList` protects a normal list with a lock. Iteration still requires manually synchronizing on the wrapper.\n\n`CopyOnWriteArrayList` gives snapshot iterators that are safe without external locking, but writes copy the whole array.\n\nChoose synchronized wrappers for balanced or write-heavy synchronized access. Choose copy-on-write for read-heavy, iteration-heavy workloads.","difficulty":"medium","tags":["copyonwritearraylist","synchronizedlist","iteration","performance"]},{"id":"java-copyonwritearraylist-007","question":"Can CopyOnWriteArrayList contain null and duplicates?","answer":"Yes. `CopyOnWriteArrayList` follows list semantics: it permits duplicate elements and permits null elements.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nlist.add(null);\nlist.add(\"A\");\nlist.add(\"A\");\n```\n\nIf uniqueness is required, use `addIfAbsent`, or consider a set-like data structure.","difficulty":"easy","tags":["copyonwritearraylist","null","duplicates","list"]},{"id":"java-copyonwritearraylist-008","question":"What memory tradeoffs does CopyOnWriteArrayList have?","answer":"During writes, both the old and new arrays may exist at the same time. Old arrays can also remain alive while iterators still reference their snapshots.\n\nThis increases allocation pressure and memory retention for large lists or frequent mutations.\n\nThe class trades write cost and memory churn for simple, safe, lock-free-style read traversal.","difficulty":"hard","tags":["copyonwritearraylist","memory","snapshot","allocation"]}]},{"domain":"Java","topic":"Core 1","icon":"☕","questions":[{"id":"java-core-1-001","question":"What is the contract of Object.equals()?","answer":"For non-null references, `equals()` must be:\n\n- **Reflexive:** `x.equals(x)` is `true`.\n- **Symmetric:** `x.equals(y)` has the same result as `y.equals(x)`.\n- **Transitive:** if `x` equals `y` and `y` equals `z`, then `x` equals `z`.\n- **Consistent:** repeated calls return the same result while equality-relevant state is unchanged.\n- **Non-null:** `x.equals(null)` is `false`.\n\nThe default implementation in `Object` uses identity equality. A value-oriented class overrides it to compare the fields that define its logical value.","difficulty":"easy","tags":["equals","object-contract","value-semantics"]},{"id":"java-core-1-002","question":"What is the contract between equals() and hashCode()?","answer":"The essential rule is: **objects that are equal according to `equals()` must return the same hash code**.\n\nThe reverse is not required: two unequal objects may have the same hash code because collisions are valid.\n\nAlso, repeated `hashCode()` calls must return the same value while equality-relevant state is unchanged. Therefore, every field used by `equals()` should normally contribute to `hashCode()` as well.\n\n```java\n@Override\npublic int hashCode() {\n    return Objects.hash(firstName, lastName, birthDate);\n}\n```\n\nBreaking this contract makes hash-based collections behave incorrectly.","difficulty":"easy","tags":["equals","hashcode","object-contract"]},{"id":"java-core-1-003","question":"What can happen when equals() is overridden but hashCode() is not?","answer":"Equal objects can receive different identity-based hash codes. A `HashMap` or `HashSet` may then place them in different buckets and fail to find an object that is logically present.\n\n```java\nSet<Person> people = new HashSet<>();\npeople.add(new Person(\"Ada\"));\n\n// May be false when equals() is overridden but hashCode() is not.\nboolean present = people.contains(new Person(\"Ada\"));\n```\n\nAlways override `hashCode()` when overriding `equals()`.","difficulty":"easy","tags":["equals","hashcode","hashset","hashmap"]},{"id":"java-core-1-004","question":"Why are mutable keys dangerous in HashMap and HashSet?","answer":"A hash-based collection chooses a bucket using the key's hash code. If a field used by `equals()` and `hashCode()` changes after insertion, lookup uses the new hash and may search a different bucket.\n\n```java\nMap<User, String> roles = new HashMap<>();\nUser user = new User(\"alice\");\nroles.put(user, \"admin\");\n\nuser.setUsername(\"bob\");\nroles.get(user); // may return null\n```\n\nKeys should ideally be immutable. At minimum, equality-relevant fields must remain unchanged while the object is used as a key.","difficulty":"medium","tags":["hashcode","hashmap","immutability","collections"]},{"id":"java-core-1-005","question":"Why can using instanceof in equals() cause symmetry problems in an inheritance hierarchy?","answer":"A base class that accepts subclasses via `instanceof` may consider a subclass equal using only base fields, while the subclass considers its additional fields and returns `false` in the reverse comparison.\n\n```java\nclass Point {\n    int x, y;\n    public boolean equals(Object o) {\n        return o instanceof Point p && x == p.x && y == p.y;\n    }\n}\n\nclass ColoredPoint extends Point {\n    Color color; // equality may also compare color\n}\n```\n\nThere is no universally correct inheritance-based value equality. Common approaches are:\n\n- Make value classes final.\n- Use `getClass()` equality when different runtime types must not be equal.\n- Prefer composition over extending value classes.\n- Use a carefully designed protocol only when polymorphic equality is truly required.","difficulty":"hard","tags":["equals","inheritance","symmetry","instanceof"]},{"id":"java-core-1-006","question":"What is the difference between Comparable and Comparator?","answer":"`Comparable<T>` defines a type's **natural ordering** inside the class through `compareTo(T)`.\n\n```java\nclass Version implements Comparable<Version> {\n    public int compareTo(Version other) { /* ... */ }\n}\n```\n\n`Comparator<T>` is an external strategy that defines an ordering through `compare(T, T)`. A type can have many comparators.\n\n```java\nComparator<Employee> bySalary =\n    Comparator.comparing(Employee::salary);\n```\n\nUse `Comparable` when one ordering is intrinsic and broadly expected. Use `Comparator` for alternative orderings, third-party classes, or when ordering should remain separate from the model.","difficulty":"easy","tags":["comparable","comparator","sorting"]},{"id":"java-core-1-007","question":"What rules must compareTo() and Comparator.compare() follow?","answer":"Comparison must provide a consistent ordering:\n\n- The sign is antisymmetric: `sign(compare(x, y)) == -sign(compare(y, x))`.\n- It is transitive: if `x > y` and `y > z`, then `x > z`.\n- If `compare(x, y) == 0`, comparisons of `x` and `y` against any `z` must have the same sign.\n\nFor `Comparable`, it is strongly recommended, but not strictly required, that `x.compareTo(y) == 0` exactly when `x.equals(y)` is `true`. Violations should be documented because sorted sets and maps use comparison, not `equals()`, to determine duplicate keys.","difficulty":"medium","tags":["comparable","comparator","contract","ordering"]},{"id":"java-core-1-008","question":"Why should comparison code avoid subtracting numeric values?","answer":"Returning `a - b` can overflow and produce the wrong sign.\n\n```java\n// Incorrect for extreme values\nreturn left.age - right.age;\n\n// Correct\nreturn Integer.compare(left.age, right.age);\n```\n\nThe same applies to `long`, `double`, and other numeric types. Use methods such as `Integer.compare`, `Long.compare`, and comparator factories.","difficulty":"easy","tags":["comparator","overflow","sorting"]},{"id":"java-core-1-009","question":"How do you compose comparators and handle null values?","answer":"Comparator factory and default methods make ordering explicit and composable.\n\n```java\nComparator<Employee> ordering = Comparator\n    .comparing(Employee::department,\n        Comparator.nullsLast(String.CASE_INSENSITIVE_ORDER))\n    .thenComparing(Employee::lastName)\n    .thenComparing(Employee::firstName)\n    .thenComparingInt(Employee::id);\n```\n\nUseful methods include `comparing`, `comparingInt`, `thenComparing`, `reversed`, `nullsFirst`, and `nullsLast`. Primitive-specialized factories avoid boxing.","difficulty":"medium","tags":["comparator","null-handling","sorting","composition"]},{"id":"java-core-1-010","question":"What happens when a TreeSet comparator is inconsistent with equals()?","answer":"`TreeSet` and `TreeMap` use comparison to determine whether elements or keys are duplicates. If `compare(a, b) == 0`, the collection treats them as the same entry even when `a.equals(b)` is `false`.\n\nConversely, objects that are equal but compare as non-zero may both appear in a sorted set. The collection still follows its own ordering rules, but its behavior no longer matches the general `Set` or `Map` expectation based on `equals()`.\n\nA classic example is `BigDecimal`: `new BigDecimal(\"1.0\")` and `new BigDecimal(\"1.00\")` compare as zero, but are not equal because `equals()` also considers scale.","difficulty":"hard","tags":["comparator","treeset","treemap","equals"]},{"id":"java-core-1-011","question":"What makes a Java class immutable?","answer":"An immutable object's observable state cannot change after construction. Typical design rules are:\n\n- Keep fields `private` and `final`.\n- Fully initialize the object in its constructor or factory.\n- Provide no mutator methods.\n- Prevent subclass-based mutation, often by making the class `final`.\n- Do not expose mutable internal state.\n- Make defensive copies of mutable inputs and outputs.\n- Validate invariants during construction.\n\n`final` fields alone are insufficient because a final reference can still point to a mutable object.","difficulty":"easy","tags":["immutability","class-design","final"]},{"id":"java-core-1-012","question":"Why are defensive copies required for immutable classes?","answer":"Without defensive copies, callers can mutate the object's state through an aliased reference.\n\n```java\npublic final class Schedule {\n    private final List<Instant> times;\n\n    public Schedule(List<Instant> times) {\n        this.times = List.copyOf(times);\n    }\n\n    public List<Instant> times() {\n        return times; // safe: List.copyOf produced an unmodifiable list\n    }\n}\n```\n\nFor mutable element types, a shallow collection copy is not enough; each element may also require copying. Arrays should normally be cloned both when accepted and when returned.","difficulty":"medium","tags":["immutability","defensive-copy","collections"]},{"id":"java-core-1-013","question":"What benefits does immutability provide?","answer":"Immutable objects are easier to reason about because their state does not change after construction. Benefits include:\n\n- Natural thread safety for their own state.\n- Safe sharing and caching.\n- Stable behavior as map keys and set members.\n- Simpler invariants and fewer temporal bugs.\n- Easier testing and debugging.\n- Freedom to reuse instances or memoize derived values.\n\nImmutability does not automatically make referenced external resources or mutable collaborators thread-safe.","difficulty":"easy","tags":["immutability","thread-safety","design"]},{"id":"java-core-1-014","question":"Is an unmodifiable collection the same as an immutable collection?","answer":"No. An **unmodifiable view** prevents mutation through that reference but may still reflect changes to a mutable backing collection.\n\n```java\nList<String> source = new ArrayList<>();\nList<String> view = Collections.unmodifiableList(source);\nsource.add(\"new\"); // view now also contains \"new\"\n```\n\n`List.copyOf(source)` creates an unmodifiable snapshot of the element references. However, if the elements themselves are mutable, changes to those objects remain visible. Deep immutability requires immutable elements or defensive element copies.","difficulty":"medium","tags":["immutability","collections","defensive-copy"]},{"id":"java-core-1-015","question":"How can an immutable object support updates?","answer":"It returns a new object containing the changed value while leaving the original untouched. This is often called a **with-method** or functional update.\n\n```java\npublic final class Money {\n    private final BigDecimal amount;\n    private final Currency currency;\n\n    public Money withAmount(BigDecimal newAmount) {\n        return new Money(newAmount, currency);\n    }\n}\n```\n\nStructural sharing can make this efficient for larger persistent data structures. Builders are also useful when construction has many optional values, but the built object should not retain mutable builder state.","difficulty":"medium","tags":["immutability","with-method","builder","functional-style"]},{"id":"java-core-1-016","question":"What is a Java record, and what does the compiler generate for it?","answer":"A record is a concise declaration for a class whose primary purpose is to model a fixed set of data components.\n\n```java\nrecord Point(int x, int y) {}\n```\n\nThe compiler provides:\n\n- A `private final` field for each component.\n- A public accessor named exactly like each component, such as `x()`.\n- A canonical constructor.\n- Component-based `equals()` and `hashCode()`.\n- A component-based `toString()`.\n\nA record is implicitly final and extends `java.lang.Record`. It may implement interfaces, declare methods, and declare static members.","difficulty":"easy","tags":["records","data-modeling","compiler"]},{"id":"java-core-1-017","question":"Are Java records deeply immutable?","answer":"No. Record component fields are final, so their references cannot be reassigned after construction, but referenced objects may still be mutable.\n\n```java\nrecord Team(List<String> members) {\n    Team {\n        members = List.copyOf(members);\n    }\n}\n```\n\nThe compact constructor above prevents callers from mutating the record through the original list. Deep immutability still depends on the mutability of component values and on whether defensive copies are made.","difficulty":"medium","tags":["records","immutability","defensive-copy"]},{"id":"java-core-1-018","question":"What is a compact record constructor, and how is it used for validation?","answer":"A compact constructor omits the parameter list and explicit component assignments. Its body can validate or normalize constructor parameters before the compiler assigns them to fields.\n\n```java\nrecord Range(int start, int end) {\n    Range {\n        if (start > end) {\n            throw new IllegalArgumentException(\"start must not exceed end\");\n        }\n    }\n}\n```\n\nDo not assign directly to component fields in a compact constructor. Reassigning a parameter, for example `name = name.trim()`, changes the value that is later assigned automatically.","difficulty":"medium","tags":["records","constructor","validation"]},{"id":"java-core-1-019","question":"What restrictions distinguish records from ordinary classes?","answer":"Important restrictions include:\n\n- A record is implicitly final and cannot be extended.\n- It implicitly extends `java.lang.Record`, so it cannot extend another class.\n- Instance fields other than the declared record component fields are not allowed.\n- Component fields are final.\n- A record cannot be abstract.\n- Native methods cannot be declared in a record.\n\nRecords can still implement interfaces, define static fields, add methods and nested types, customize generated methods, and use annotations where applicable.","difficulty":"medium","tags":["records","inheritance","restrictions"]},{"id":"java-core-1-020","question":"When should you avoid using a record?","answer":"Avoid a record when the abstraction is not fundamentally defined by its complete state description, for example when:\n\n- Identity matters independently of component values.\n- The object requires mutable lifecycle state.\n- Framework constraints require a superclass or no-argument mutable bean.\n- You need hidden per-instance state outside the declared components.\n- The API must preserve freedom to change its state representation without changing its public component contract.\n\nRecords are excellent value carriers, but they are not merely shorter syntax for every class.","difficulty":"medium","tags":["records","api-design","value-semantics"]},{"id":"java-core-1-021","question":"What problem do sealed classes and interfaces solve?","answer":"A sealed type restricts which classes or interfaces may directly extend or implement it. This lets an API model a known, controlled set of alternatives.\n\n```java\nsealed interface Result permits Success, Failure {}\nrecord Success(String value) implements Result {}\nrecord Failure(String message) implements Result {}\n```\n\nBenefits include stronger domain modeling, controlled extension, and exhaustive pattern matching. They are useful for algebraic-style hierarchies such as commands, outcomes, syntax-tree nodes, and payment states.","difficulty":"easy","tags":["sealed-classes","inheritance","domain-modeling"]},{"id":"java-core-1-022","question":"What modifiers must a permitted direct subclass of a sealed class use?","answer":"A permitted direct subclass must explicitly declare one of:\n\n- `final`: no further subclasses are allowed.\n- `sealed`: it declares another controlled set of permitted subclasses.\n- `non-sealed`: it reopens that branch to unrestricted subclassing.\n\n```java\nsealed class Shape permits Circle, Polygon, CustomShape {}\nfinal class Circle extends Shape {}\nsealed class Polygon extends Shape permits Triangle {}\nnon-sealed class CustomShape extends Shape {}\nfinal class Triangle extends Polygon {}\n```\n\nThe rule applies to direct subclasses, not necessarily every descendant.","difficulty":"easy","tags":["sealed-classes","final","non-sealed","inheritance"]},{"id":"java-core-1-023","question":"What are the placement rules for permitted subclasses of a sealed type?","answer":"Permitted direct subclasses must be accessible to the sealed type and belong to the same module when the sealed type is in a named module. In an unnamed module, they must be in the same package.\n\nThe `permits` clause may be omitted when all direct subclasses are declared in the same source file; the compiler can infer them.\n\nThese restrictions let the compiler reliably know the closed set of direct alternatives.","difficulty":"medium","tags":["sealed-classes","modules","packages","permits"]},{"id":"java-core-1-024","question":"How do sealed hierarchies enable exhaustive switch expressions?","answer":"Because the compiler knows all permitted alternatives, a switch can cover every subtype without a `default` branch.\n\n```java\nstatic double area(Shape shape) {\n    return switch (shape) {\n        case Circle c -> Math.PI * c.radius() * c.radius();\n        case Rectangle r -> r.width() * r.height();\n    };\n}\n```\n\nIf `Shape` is sealed and those are all permitted alternatives, the switch is exhaustive. This is valuable because adding another permitted subtype can produce compile-time errors at switches that must be reconsidered.","difficulty":"medium","tags":["sealed-classes","switch","exhaustiveness","pattern-matching"]},{"id":"java-core-1-025","question":"What is the effect of a non-sealed subtype on a sealed hierarchy?","answer":"`non-sealed` reopens one branch of the hierarchy. Any class may extend that subtype, subject to normal Java access rules.\n\n```java\nsealed interface Event permits SystemEvent, UserEvent {}\nfinal class SystemEvent implements Event {}\nnon-sealed class UserEvent implements Event {}\n```\n\nThe direct alternatives of `Event` remain known, but `UserEvent` can have unknown descendants. Pattern matching can still cover that branch with a pattern for `UserEvent`; it cannot assume a closed list of its concrete descendants.","difficulty":"medium","tags":["sealed-classes","non-sealed","inheritance","exhaustiveness"]},{"id":"java-core-1-026","question":"How does pattern matching for instanceof improve traditional type checks and casts?","answer":"It combines the type test and cast into one operation by introducing a pattern variable.\n\n```java\n// Traditional form\nif (value instanceof String) {\n    String text = (String) value;\n    System.out.println(text.length());\n}\n\n// Pattern matching\nif (value instanceof String text) {\n    System.out.println(text.length());\n}\n```\n\nThe pattern variable is definitely assigned only where the match is known to have succeeded, reducing boilerplate and eliminating a potentially inconsistent explicit cast.","difficulty":"easy","tags":["instanceof","pattern-matching","casting"]},{"id":"java-core-1-027","question":"What is the scope of an instanceof pattern variable?","answer":"Its scope is flow-sensitive: the variable is available only where the compiler can prove that the pattern matched.\n\n```java\nif (value instanceof String text) {\n    use(text); // in scope\n}\n\nif (!(value instanceof String text)) {\n    return;\n}\nuse(text); // in scope because the non-match path returned\n```\n\nIt is not simply scoped to the nearest braces. Java's flow analysis accounts for branching and abrupt completion such as `return` or `throw`.","difficulty":"medium","tags":["instanceof","pattern-matching","scope","flow-analysis"]},{"id":"java-core-1-028","question":"How do && and || affect the scope of an instanceof pattern variable?","answer":"With `&&`, the right operand runs only when the match succeeded, so the variable is available there.\n\n```java\nif (value instanceof String text && !text.isBlank()) {\n    use(text);\n}\n```\n\nWith `||`, the right operand may run when the pattern did not match, so the variable is not available.\n\n```java\n// Does not compile: text may not exist on the right side.\nif (value instanceof String text || text.isBlank()) { }\n```\n\nThis follows short-circuit evaluation and definite-assignment analysis.","difficulty":"medium","tags":["instanceof","pattern-matching","short-circuit","scope"]},{"id":"java-core-1-029","question":"How does pattern matching for instanceof behave with null?","answer":"A type pattern does not match `null`, so the condition evaluates to `false` and the pattern variable is not introduced.\n\n```java\nObject value = null;\nif (value instanceof String text) {\n    // Not entered\n}\n```\n\nThis makes a separate null check unnecessary when the desired behavior is simply to execute code only for a non-null value of the target type.","difficulty":"easy","tags":["instanceof","pattern-matching","null"]},{"id":"java-core-1-030","question":"What is an unconditional instanceof pattern, and why can it be rejected?","answer":"A pattern is unconditional when the static type of the expression is already a subtype of the pattern type, making the test always succeed for non-null values.\n\n```java\nString text = \"hello\";\n// Compile-time error: expression is already a String.\nif (text instanceof String same) { }\n```\n\nSuch a test provides no useful type refinement and is rejected. This is analogous to Java rejecting some provably redundant or impossible type operations.","difficulty":"hard","tags":["instanceof","pattern-matching","compiler","type-system"]},{"id":"java-core-1-031","question":"What is the difference between a switch statement and a switch expression?","answer":"A traditional switch statement performs control flow and does not itself produce a value. A switch expression evaluates to a value and must be exhaustive.\n\n```java\nString label = switch (status) {\n    case NEW -> \"New\";\n    case RUNNING -> \"In progress\";\n    case DONE -> \"Complete\";\n};\n```\n\nArrow labels avoid accidental fall-through. Switch statements can also use arrow labels, while expression form is useful for direct assignment, return values, and expression composition.","difficulty":"easy","tags":["switch-expression","control-flow","exhaustiveness"]},{"id":"java-core-1-032","question":"When is yield used in a switch expression?","answer":"Use `yield` when a colon-style group or an arrow block needs multiple statements before producing its value.\n\n```java\nint score = switch (grade) {\n    case \"A\" -> 100;\n    case \"B\" -> {\n        audit(grade);\n        yield 80;\n    }\n    default -> 0;\n};\n```\n\n`yield` returns a value from the switch expression; it does not return from the enclosing method. A simple arrow expression supplies its value without `yield`.","difficulty":"easy","tags":["switch-expression","yield","control-flow"]},{"id":"java-core-1-033","question":"What does it mean for a switch expression to be exhaustive?","answer":"Every possible selector value must be handled so the expression always produces a result or completes abruptly by throwing an exception.\n\nExhaustiveness can be achieved with:\n\n- A `default` label.\n- All constants of an enum.\n- All relevant alternatives of a sealed hierarchy when using type patterns.\n- A total type pattern where applicable.\n\nEven when an exhaustive enum switch has no explicit `default`, the compiler protects against an incompatible enum evolution scenario by arranging for an exception if an unknown constant is encountered at runtime.","difficulty":"medium","tags":["switch-expression","exhaustiveness","enum","sealed-classes"]},{"id":"java-core-1-034","question":"How are null selector values handled by modern switch constructs?","answer":"Historically, switching on `null` throws `NullPointerException`. Pattern-matching switch supports an explicit `case null` when null is a meaningful input.\n\n```java\nString describe(Object value) {\n    return switch (value) {\n        case null -> \"missing\";\n        case String text -> \"text: \" + text;\n        default -> \"other\";\n    };\n}\n```\n\nA `default` label does not implicitly match null. Handle null explicitly or reject it before the switch.","difficulty":"medium","tags":["switch-expression","null","pattern-matching"]},{"id":"java-core-1-035","question":"What are guarded patterns and dominance rules in a pattern-matching switch?","answer":"A guarded case adds a boolean condition with `when` after a successful pattern match.\n\n```java\nreturn switch (value) {\n    case String text when text.isBlank() -> \"blank\";\n    case String text -> \"text\";\n    default -> \"other\";\n};\n```\n\nCase order matters. An earlier, broader pattern can **dominate** a later narrower or equivalent pattern, making the later case unreachable and causing a compile-time error.\n\n```java\n// Invalid ordering: Object matches every non-null String first.\ncase Object object -> \"object\";\ncase String text -> \"text\";\n```\n\nPlace specific patterns and guarded cases before broader unguarded patterns.","difficulty":"hard","tags":["switch-expression","pattern-matching","guards","dominance"]}]},{"domain":"Java","topic":"Futures & CompletableFuture","icon":"⏩","questions":[{"id":"java-futures-completablefuture-001","question":"What is a Future?","answer":"`Future<T>` represents the result of an asynchronous computation that may complete later.\n\n```java\nFuture<Integer> future = executor.submit(() -> calculate());\nInteger result = future.get();\n```\n\nIt supports waiting for completion, cancellation, and checking status. Its main limitation is that it does not provide rich composition methods.","difficulty":"easy","tags":["future","executorservice","async","concurrency"]},{"id":"java-futures-completablefuture-002","question":"What is the difference between Future.get() and CompletableFuture.join()?","answer":"`Future.get()` blocks and throws checked exceptions: `InterruptedException` and `ExecutionException`.\n\n`CompletableFuture.join()` also waits, but throws unchecked `CompletionException` when the computation failed.\n\n```java\nString a = future.get();\nString b = completableFuture.join();\n```\n\n`get()` fits APIs that expose checked exception handling. `join()` is often more convenient inside CompletableFuture pipelines.","difficulty":"medium","tags":["future","completablefuture","get","join","exceptions"]},{"id":"java-futures-completablefuture-003","question":"What is CompletableFuture?","answer":"`CompletableFuture<T>` is both a `Future<T>` and a `CompletionStage<T>`. It can be completed explicitly and can define dependent stages that run after completion.\n\n```java\nCompletableFuture<String> future = new CompletableFuture<>();\nfuture.complete(\"done\");\n```\n\nIt is useful for async pipelines, callbacks, fan-out/fan-in, error handling, and combining independent asynchronous computations.","difficulty":"easy","tags":["completablefuture","completionstage","future","async"]},{"id":"java-futures-completablefuture-004","question":"What is the difference between thenApply(), thenAccept(), and thenRun()?","answer":"`thenApply` transforms a result and produces a new value. `thenAccept` consumes the result and returns `CompletableFuture<Void>`. `thenRun` ignores the result and runs an action.\n\n```java\nfuture.thenApply(String::length);\nfuture.thenAccept(System.out::println);\nfuture.thenRun(() -> log.info(\"done\"));\n```\n\nChoose based on whether the next stage needs the previous result and whether it produces a new result.","difficulty":"easy","tags":["completablefuture","thenapply","thenaccept","thenrun"]},{"id":"java-futures-completablefuture-005","question":"What is the difference between thenApply() and thenCompose()?","answer":"`thenApply` maps a value to another value. If the mapping function itself returns a future, `thenApply` creates a nested future.\n\n`thenCompose` flattens asynchronous stages.\n\n```java\nCompletableFuture<Profile> profile = userIdFuture\n    .thenCompose(userService::fetchProfileAsync);\n```\n\nUse `thenCompose` for dependent async operations, similar to `flatMap`.","difficulty":"medium","tags":["completablefuture","thenapply","thencompose","composition"]},{"id":"java-futures-completablefuture-006","question":"What is the difference between thenCombine() and thenCompose()?","answer":"`thenCompose` chains dependent async work: the second operation needs the first result.\n\n`thenCombine` combines two independent stages when both complete normally.\n\n```java\nCompletableFuture<Order> order = fetchOrder(id);\nCompletableFuture<Customer> customer = fetchCustomer(id);\n\nCompletableFuture<View> view = order.thenCombine(customer, View::new);\n```\n\nUse `thenCombine` for fan-in of independent computations.","difficulty":"medium","tags":["completablefuture","thencombine","thencompose","fan-in"]},{"id":"java-futures-completablefuture-007","question":"What is the difference between non-async and async CompletableFuture methods?","answer":"Non-async dependent actions may run in the thread that completes the previous stage or another caller involved in completion.\n\nAsync methods without an explicit executor use the default asynchronous execution facility, commonly the `ForkJoinPool.commonPool()`.\n\n```java\nfuture.thenApply(this::transform);\nfuture.thenApplyAsync(this::transform, executor);\n```\n\nFor production code, pass an explicit executor when you need control over isolation, sizing, or blocking behavior.","difficulty":"hard","tags":["completablefuture","async","executor","commonpool"]},{"id":"java-futures-completablefuture-008","question":"Why can blocking inside CompletableFuture stages be dangerous?","answer":"Blocking ties up worker threads. If stages use the common pool and block on I/O or on other futures, throughput can collapse or deadlocks can appear.\n\n```java\nfuture.thenApplyAsync(value -> blockingHttpCall(value));\n```\n\nUse dedicated executors for blocking work, prefer non-blocking APIs when possible, and avoid calling `join()` inside stages unless you understand the dependency graph.","difficulty":"hard","tags":["completablefuture","blocking","commonpool","deadlock"]},{"id":"java-futures-completablefuture-009","question":"How do exceptionally(), handle(), and whenComplete() differ?","answer":"`exceptionally` recovers from failure by producing a replacement value.\n\n`handle` sees both success and failure and transforms either into a new result.\n\n`whenComplete` observes success or failure but normally passes through the original outcome.\n\n```java\nfuture.exceptionally(ex -> fallback);\nfuture.handle((value, ex) -> ex == null ? value : fallback);\nfuture.whenComplete((value, ex) -> log(value, ex));\n```","difficulty":"medium","tags":["completablefuture","exceptionally","handle","whencomplete"]},{"id":"java-futures-completablefuture-010","question":"How do allOf() and anyOf() work?","answer":"`CompletableFuture.allOf(...)` completes when all given futures complete. It returns `CompletableFuture<Void>`, so you usually collect results separately.\n\n`anyOf(...)` completes when any input future completes, with that result.\n\n```java\nCompletableFuture<Void> all = CompletableFuture.allOf(a, b, c);\nList<Result> results = Stream.of(a, b, c).map(CompletableFuture::join).toList();\n```\n\nUse `allOf` for fan-in and `anyOf` for race-style workflows.","difficulty":"medium","tags":["completablefuture","allof","anyof","fan-in"]},{"id":"java-futures-completablefuture-011","question":"How does cancellation work with CompletableFuture?","answer":"Cancelling a `CompletableFuture` completes it exceptionally with `CancellationException`. Unlike some task abstractions, `CompletableFuture` does not directly control the computation that may eventually complete it.\n\n```java\nfuture.cancel(true);\n```\n\nThe `mayInterruptIfRunning` argument has no special power over arbitrary async work. Cancellation must usually be designed cooperatively in the underlying task.","difficulty":"hard","tags":["completablefuture","cancellation","future","exceptional-completion"]},{"id":"java-futures-completablefuture-012","question":"How can CompletableFuture timeouts be handled?","answer":"Modern `CompletableFuture` provides timeout helpers.\n\n```java\nfuture.orTimeout(2, TimeUnit.SECONDS);\nfuture.completeOnTimeout(fallback, 2, TimeUnit.SECONDS);\n```\n\n`orTimeout` completes exceptionally if the timeout expires. `completeOnTimeout` completes with a fallback value. Timeouts affect the future's completion; they do not necessarily stop the underlying work unless that work observes cancellation or timeout signals.","difficulty":"medium","tags":["completablefuture","timeout","ortimeout","completeontimeout"]},{"id":"java-futures-completablefuture-013","question":"What is completedFuture() useful for?","answer":"`completedFuture(value)` creates an already completed `CompletableFuture`. It is useful for tests, fallback branches, and APIs that must return a future even when the result is already available.\n\n```java\nCompletableFuture<User> cached = CompletableFuture.completedFuture(user);\n```\n\nSimilarly, `failedFuture(ex)` creates an already failed future.","difficulty":"easy","tags":["completablefuture","completedfuture","failedfuture","testing"]},{"id":"java-futures-completablefuture-014","question":"How should exceptions be modeled in async composition?","answer":"Treat failures as part of the pipeline instead of hiding them in blocking calls. Attach recovery, logging, or translation stages close to the operation that can fail.\n\n```java\nCompletableFuture<Response> response = callService()\n    .exceptionally(ex -> fallbackResponse());\n```\n\nAt boundaries, unwrap `CompletionException` carefully so callers see meaningful domain errors. Avoid swallowing exceptions silently in `whenComplete`.","difficulty":"medium","tags":["completablefuture","exceptions","composition","error-handling"]},{"id":"java-futures-completablefuture-015","question":"What are common CompletableFuture design mistakes?","answer":"Common mistakes include:\n\n- Using the common pool for blocking I/O.\n- Calling `join()` too early and making async code synchronous.\n- Confusing `thenApply` with `thenCompose`.\n- Forgetting error handling.\n- Creating unbounded fan-out.\n- Ignoring executor lifecycle.\n\nGood async design controls executors, preserves composition, handles failures explicitly, and limits concurrency.","difficulty":"hard","tags":["completablefuture","async-design","commonpool","error-handling"]}]},{"domain":"Java","topic":"Generics","icon":"🏷️","questions":[{"id":"java-generics-001","question":"What problem do Java generics solve?","answer":"Generics let classes, interfaces, and methods operate on types while preserving compile-time type safety.\n\n```java\nList<String> names = new ArrayList<>();\nnames.add(\"Ada\");\nString first = names.get(0); // no cast needed\n```\n\nThey reduce casts, document API intent, and allow the compiler to catch many type errors before runtime.","difficulty":"easy","tags":["generics","type-safety","collections"]},{"id":"java-generics-002","question":"What is type erasure?","answer":"Java generics are implemented mostly by compile-time checks plus type erasure. The compiler replaces type parameters with their bounds, inserts casts when needed, and generates bridge methods in some inheritance cases.\n\nAt runtime, `List<String>` and `List<Integer>` are both just `List`.\n\n```java\nSystem.out.println(new ArrayList<String>().getClass()\n    == new ArrayList<Integer>().getClass()); // true\n```","difficulty":"medium","tags":["generics","type-erasure","runtime"]},{"id":"java-generics-003","question":"Why is List<String> not a subtype of List<Object>?","answer":"Generic types are invariant. If `List<String>` were assignable to `List<Object>`, code could add a non-string to a list of strings.\n\n```java\nList<String> strings = new ArrayList<>();\n// List<Object> objects = strings; // does not compile\n// objects.add(42);\n```\n\nUse wildcards when you need variance, such as `List<? extends Object>` for reading values as objects.","difficulty":"medium","tags":["generics","invariance","wildcards","type-safety"]},{"id":"java-generics-004","question":"What does PECS mean?","answer":"PECS means **Producer Extends, Consumer Super**.\n\nUse `? extends T` when a structure produces `T` values for you to read. Use `? super T` when a structure consumes `T` values that you write.\n\n```java\nvoid copy(List<? extends Number> source,\n          List<? super Number> target) {\n    for (Number n : source) {\n        target.add(n);\n    }\n}\n```","difficulty":"medium","tags":["generics","pecs","wildcards","extends","super"]},{"id":"java-generics-005","question":"What is the difference between an unbounded wildcard and a raw type?","answer":"`List<?>` means a list of some unknown type, with type safety preserved. You can read elements as `Object`, but you cannot add arbitrary values except `null`.\n\n`List` as a raw type disables generic checks and can lead to heap pollution.\n\n```java\nList<?> safe = List.of(\"a\");\nList raw = new ArrayList<String>();\nraw.add(123); // unchecked and dangerous\n```","difficulty":"medium","tags":["generics","wildcards","raw-types","heap-pollution"]},{"id":"java-generics-006","question":"What are bounded type parameters?","answer":"A bounded type parameter restricts which types may be used and allows the implementation to call methods from the bound.\n\n```java\nclass Box<T extends Number> {\n    private final T value;\n    double asDouble() {\n        return value.doubleValue();\n    }\n}\n```\n\nMultiple bounds are allowed, with at most one class bound first, followed by interfaces: `<T extends Base & Runnable & AutoCloseable>`.","difficulty":"medium","tags":["generics","bounds","type-parameter"]},{"id":"java-generics-007","question":"Why can't you create new T() or new T[] directly?","answer":"Because of type erasure, the runtime does not know the exact type argument for `T`. Java cannot safely instantiate `T` or create an array whose component type is an erased type variable.\n\n```java\nclass Factory<T> {\n    // T value = new T();      // does not compile\n    // T[] values = new T[10]; // does not compile\n}\n```\n\nCommon alternatives are passing a `Class<T>`, an `IntFunction<T[]>`, or a `Supplier<T>`.","difficulty":"hard","tags":["generics","type-erasure","arrays","instantiation"]},{"id":"java-generics-008","question":"What is heap pollution?","answer":"Heap pollution occurs when a variable of a parameterized type refers to an object that is not actually of that parameterized type. It often comes from raw types, unchecked casts, or unsafe varargs.\n\n```java\nList<String> strings = new ArrayList<>();\nList raw = strings;\nraw.add(42);\nString value = strings.get(0); // ClassCastException later\n```\n\nWarnings about unchecked operations are worth investigating because they may hide delayed runtime failures.","difficulty":"hard","tags":["generics","heap-pollution","raw-types","unchecked"]}]},{"domain":"Java","topic":"Fail-Fast vs Fail-Safe Iterators","icon":"🔁","questions":[{"id":"java-iterators-001","question":"What is a fail-fast iterator?","answer":"A fail-fast iterator attempts to detect structural modification of its backing collection outside the iterator and throws `ConcurrentModificationException`.\n\n```java\nfor (String value : list) {\n    list.add(\"new\"); // likely ConcurrentModificationException\n}\n```\n\nIt is a bug-detection mechanism, not a correctness guarantee. The detection is best-effort and should not be used for program control.","difficulty":"easy","tags":["iterator","fail-fast","concurrentmodificationexception"]},{"id":"java-iterators-002","question":"What does fail-safe iterator usually mean in interviews?","answer":"`Fail-safe` is not a formal Java Collections Framework contract. In interviews it usually means an iterator that does not throw `ConcurrentModificationException` when the collection is modified concurrently.\n\nExamples include:\n\n- Snapshot iterators, such as `CopyOnWriteArrayList` iterators.\n- Weakly consistent iterators, such as `ConcurrentHashMap` iterators.\n\nThe important follow-up is **what the iterator sees**: a stable snapshot, or a changing weakly consistent view.","difficulty":"medium","tags":["iterator","fail-safe","snapshot","weakly-consistent"]},{"id":"java-iterators-003","question":"What is the difference between snapshot and weakly consistent iterators?","answer":"A **snapshot iterator** sees the collection state as it was when the iterator was created. Later changes are not visible through that iterator.\n\nA **weakly consistent iterator** may reflect some changes made after iterator creation, but it does not promise a complete, atomic snapshot.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nConcurrentHashMap<String, Integer> map = new ConcurrentHashMap<>();\n```\n\n`CopyOnWriteArrayList` uses snapshot iteration. `ConcurrentHashMap` uses weakly consistent iteration.","difficulty":"medium","tags":["snapshot","weakly-consistent","copyonwritearraylist","concurrenthashmap"]},{"id":"java-iterators-004","question":"Why is ConcurrentModificationException not only about multiple threads?","answer":"`ConcurrentModificationException` can happen in a single thread. `Concurrent` here means the collection was modified while an iteration was in progress, not necessarily that another thread did it.\n\n```java\nIterator<String> it = list.iterator();\nwhile (it.hasNext()) {\n    String value = it.next();\n    list.remove(value); // wrong for most fail-fast iterators\n}\n```\n\nUse `Iterator.remove()` or collection-level helpers such as `removeIf()` when the collection supports them.","difficulty":"easy","tags":["concurrentmodificationexception","iterator","single-thread"]},{"id":"java-iterators-005","question":"How can elements be removed safely during iteration?","answer":"For most mutable collections, remove through the iterator itself or use a bulk operation.\n\n```java\nIterator<String> it = names.iterator();\nwhile (it.hasNext()) {\n    if (it.next().isBlank()) {\n        it.remove();\n    }\n}\n\nnames.removeIf(String::isBlank);\n```\n\nDo not call `collection.remove(...)` inside an enhanced `for` loop unless the collection's iterator semantics explicitly allow it.","difficulty":"easy","tags":["iterator","remove","removeif","iteration"]},{"id":"java-iterators-006","question":"Can fail-fast behavior guarantee thread safety?","answer":"No. Fail-fast iterators are not a synchronization mechanism. They may detect some illegal modifications and throw an exception, but they can also miss them.\n\nCorrect thread safety requires external synchronization, confinement, immutable snapshots, or concurrent collections designed for the access pattern.\n\nFail-fast behavior should be treated as an early warning for bugs, not as protection against races.","difficulty":"medium","tags":["fail-fast","thread-safety","concurrency","iterator"]},{"id":"java-iterators-007","question":"How do CopyOnWriteArrayList iterators behave when the list changes?","answer":"They iterate over an immutable snapshot of the array captured at iterator creation time. Later additions or removals are not visible to that iterator, and the iterator does not throw `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nThe iterator's mutating methods, such as `remove`, are not supported.","difficulty":"medium","tags":["copyonwritearraylist","snapshot","iterator","unsupportedoperationexception"]},{"id":"java-iterators-008","question":"How do ConcurrentHashMap iterators behave during concurrent modification?","answer":"`ConcurrentHashMap` iterators are weakly consistent. They do not throw `ConcurrentModificationException`; they may reflect some updates made after iterator creation, but they do not provide a stable snapshot of the whole map.\n\nThey are useful for monitoring, approximate traversal, and concurrent algorithms that do not require a frozen view. If you need a stable snapshot, copy the entries into another collection first.","difficulty":"hard","tags":["concurrenthashmap","weakly-consistent","iterator","snapshot"]}]},{"domain":"Java","topic":"JVM Memory, GC & Profiling","icon":"🧠","questions":[{"id":"java-jvm-memory-gc-001","question":"What are the main JVM runtime memory areas?","answer":"Important JVM memory areas include:\n\n- **Heap:** objects and arrays.\n- **Java stacks:** per-thread stack frames for method calls and local variables.\n- **Metaspace:** class metadata in HotSpot.\n- **Code cache:** JIT-compiled native code.\n- **Native memory:** JVM internals, direct buffers, threads, and native libraries.\n\nInterview answers should avoid saying everything is either heap or stack. Real JVM memory use includes important non-heap areas.","difficulty":"easy","tags":["jvm","heap","stack","metaspace","native-memory"]},{"id":"java-jvm-memory-gc-002","question":"What is stored on the Java heap?","answer":"The heap stores objects and arrays allocated by the application. It is the main area managed by garbage collectors.\n\n```java\nUser user = new User(\"Ada\"); // object is on the heap\n```\n\nReferences to objects may live in stack frames, fields, registers, or other places, but the object data itself is generally on the heap. Escape analysis may let the JIT optimize some allocations away, but that is an implementation optimization.","difficulty":"easy","tags":["jvm","heap","objects","gc"]},{"id":"java-jvm-memory-gc-003","question":"What is stored on a Java thread stack?","answer":"Each Java thread has a stack containing frames for active method calls. A frame contains local variables, operand stack data, and bookkeeping for method execution.\n\nDeep or infinite recursion can exhaust stack space and throw `StackOverflowError`.\n\n```java\nvoid recurse() {\n    recurse();\n}\n```\n\nStack memory is per-thread, so creating many threads also consumes native memory for stacks.","difficulty":"easy","tags":["jvm","stack","stackframe","stackoverflowerror"]},{"id":"java-jvm-memory-gc-004","question":"What is Metaspace?","answer":"In HotSpot, Metaspace stores class metadata such as class structures and method metadata. It replaced PermGen in Java 8 and uses native memory rather than being part of the Java heap.\n\nA classloader leak can cause Metaspace growth because classes usually cannot be unloaded while their defining classloader remains reachable.\n\nMetaspace can be limited with `-XX:MaxMetaspaceSize` when needed.","difficulty":"medium","tags":["jvm","metaspace","classloader","memory-leak"]},{"id":"java-jvm-memory-gc-005","question":"What makes an object eligible for garbage collection?","answer":"An object is eligible for garbage collection when it is no longer reachable from GC roots through strong references.\n\nGC roots include active thread stacks, static references, JNI references, and JVM internal roots.\n\nBeing eligible does not mean immediate collection. Garbage collection timing depends on the collector, heap pressure, allocation rate, and JVM decisions.","difficulty":"easy","tags":["gc","reachability","gc-roots","heap"]},{"id":"java-jvm-memory-gc-006","question":"What are young and old generations?","answer":"Many collectors use generational hypotheses: most objects die young, and older objects are more likely to survive longer.\n\nYoung generation collections reclaim short-lived objects. Objects that survive enough collections may be promoted to the old generation.\n\nGenerational design improves efficiency because collectors can focus frequent work on memory areas where reclaimable objects are most likely.","difficulty":"medium","tags":["gc","young-generation","old-generation","generational"]},{"id":"java-jvm-memory-gc-007","question":"What is a stop-the-world pause?","answer":"A stop-the-world pause is a period where application threads are stopped so the JVM can perform work that requires a stable view of memory.\n\nGarbage collectors try to minimize pause time, but many collectors still have some stop-the-world phases.\n\nPause time matters for latency-sensitive systems. Throughput-oriented systems may tolerate longer pauses if total work done per CPU is better.","difficulty":"easy","tags":["gc","stop-the-world","latency","throughput"]},{"id":"java-jvm-memory-gc-008","question":"What is G1 GC designed for?","answer":"G1 is the default HotSpot collector for many server-class JVMs. It is a generational, region-based collector that tries to balance throughput with predictable pause-time goals.\n\nG1 splits the heap into regions and prioritizes collecting regions with more reclaimable space. It performs some work concurrently, but still has stop-the-world pauses for evacuation and other phases.\n\nA common tuning knob is `-XX:MaxGCPauseMillis`, but it is a goal, not a hard guarantee.","difficulty":"medium","tags":["g1gc","gc","region-based","pause-time"]},{"id":"java-jvm-memory-gc-009","question":"What is ZGC designed for?","answer":"ZGC is a scalable low-latency garbage collector. It performs expensive work concurrently and is designed so pause times stay very small and largely independent of heap size.\n\n```text\n-XX:+UseZGC\n```\n\nZGC is appropriate for latency-sensitive applications with large heaps. The main tradeoff can be additional CPU and memory headroom for concurrent GC work.","difficulty":"medium","tags":["zgc","gc","low-latency","heap"]},{"id":"java-jvm-memory-gc-010","question":"How should you choose between G1 and ZGC?","answer":"Choose based on workload goals:\n\n- **G1:** good default balance of throughput and pause predictability.\n- **ZGC:** very low pause times, especially useful for latency-sensitive services and large heaps.\n\nDo not choose by folklore. Run representative load tests and compare throughput, p99 latency, allocation rate, CPU use, memory headroom, and GC logs.","difficulty":"medium","tags":["g1gc","zgc","gc-tuning","performance"]},{"id":"java-jvm-memory-gc-011","question":"What is a memory leak in a garbage-collected language?","answer":"A memory leak occurs when objects are still reachable but no longer useful. The GC cannot reclaim them because the application still holds references.\n\nCommon causes:\n\n- Unbounded caches.\n- Static collections.\n- Listener registrations not removed.\n- ThreadLocals not cleared.\n- Classloader leaks.\n\nGC solves manual deallocation, not incorrect object ownership.","difficulty":"medium","tags":["memory-leak","gc","reachability","heap"]},{"id":"java-jvm-memory-gc-012","question":"What information do GC logs provide?","answer":"GC logs show when collections happen, why they happen, how long they take, and how memory occupancy changes.\n\n```text\n-Xlog:gc*:file=gc.log:time,uptime,level,tags\n```\n\nThey help diagnose allocation pressure, long pauses, promotion failures, heap sizing problems, and whether tuning changes helped. Always correlate GC logs with application latency and throughput.","difficulty":"medium","tags":["gc-logs","xlog","profiling","diagnostics"]},{"id":"java-jvm-memory-gc-013","question":"Which JDK tools are useful for profiling and diagnostics?","answer":"Common JDK tools include:\n\n- `jcmd`: general diagnostics, heap dumps, JFR start/stop.\n- `jfr`: Java Flight Recorder files and events.\n- `jmap`: heap information and heap dumps.\n- `jstack`: thread dumps.\n- `jstat`: VM statistics.\n- JDK Mission Control: JFR analysis UI.\n\nStart with low-overhead tools such as JFR and GC logs before reaching for invasive profiling.","difficulty":"easy","tags":["profiling","jcmd","jfr","jstack","jmap"]},{"id":"java-jvm-memory-gc-014","question":"What is Java Flight Recorder useful for?","answer":"Java Flight Recorder (JFR) records low-overhead runtime events such as allocation, CPU sampling, GC activity, lock contention, exceptions, socket I/O, and thread behavior.\n\n```text\njcmd <pid> JFR.start name=profile settings=profile duration=60s filename=app.jfr\n```\n\nJFR is often the best first profiling tool in production-like environments because it gives broad visibility with relatively low overhead.","difficulty":"medium","tags":["jfr","profiling","diagnostics","performance"]},{"id":"java-jvm-memory-gc-015","question":"How do you investigate high memory usage in a Java application?","answer":"A practical workflow is:\n\n- Check heap settings, RSS, and container limits.\n- Review GC logs for pressure and collection behavior.\n- Use JFR or allocation profiling to find allocation hotspots.\n- Take a heap dump if needed and inspect dominators/retained size.\n- Check native memory with Native Memory Tracking when heap does not explain RSS.\n\nAvoid changing GC flags blindly before identifying whether the issue is heap, native memory, allocation rate, or retention.","difficulty":"hard","tags":["profiling","memory","heap-dump","native-memory","gc"]}]},{"domain":"Java","topic":"Reflection, Annotations & Modules","icon":"🪞","questions":[{"id":"java-reflection-modules-001","question":"What is reflection in Java?","answer":"Reflection lets code inspect and interact with classes, methods, fields, constructors, annotations, and modules at runtime.\n\n```java\nClass<?> type = Class.forName(\"com.example.User\");\nMethod method = type.getDeclaredMethod(\"name\");\n```\n\nIt is widely used by frameworks for dependency injection, serialization, testing, and runtime discovery. It should be used carefully because it bypasses some compile-time safety.","difficulty":"easy","tags":["reflection","class","method","runtime"]},{"id":"java-reflection-modules-002","question":"What is the difference between getMethod() and getDeclaredMethod()?","answer":"`getMethod()` finds public methods, including inherited public methods. `getDeclaredMethod()` finds methods declared directly on the class, regardless of visibility, but does not search superclasses.\n\n```java\nMethod publicMethod = type.getMethod(\"toString\");\nMethod privateMethod = type.getDeclaredMethod(\"secret\");\n```\n\nThe same pattern exists for fields and constructors.","difficulty":"easy","tags":["reflection","getmethod","getdeclaredmethod","method"]},{"id":"java-reflection-modules-003","question":"What does setAccessible(true) do?","answer":"`setAccessible(true)` attempts to suppress Java language access checks for a reflected member.\n\n```java\nField field = type.getDeclaredField(\"id\");\nfield.setAccessible(true);\n```\n\nIn the module system, this may still fail unless the package is opened to the caller's module. Modern Java strongly encapsulates module internals, so reflection is no longer only about `private` versus `public`.","difficulty":"medium","tags":["reflection","setaccessible","modules","encapsulation"]},{"id":"java-reflection-modules-004","question":"What are the downsides of reflection?","answer":"Reflection has tradeoffs:\n\n- Less compile-time safety.\n- More runtime failures.\n- Potential performance overhead.\n- Harder refactoring.\n- Possible security or encapsulation issues.\n- More complicated behavior under the module system.\n\nUse reflection when it buys real flexibility, such as framework integration, not as a replacement for normal method calls.","difficulty":"medium","tags":["reflection","performance","encapsulation","runtime"]},{"id":"java-reflection-modules-005","question":"What is an annotation?","answer":"An annotation is metadata attached to program elements such as classes, methods, fields, parameters, or modules.\n\n```java\n@Override\npublic String toString() {\n    return \"User\";\n}\n```\n\nAnnotations can be used by the compiler, build tools, annotation processors, frameworks, or runtime reflection depending on their retention policy.","difficulty":"easy","tags":["annotations","metadata","retention"]},{"id":"java-reflection-modules-006","question":"What are annotation retention policies?","answer":"Retention controls how long annotation metadata is kept:\n\n- `SOURCE`: available only in source code.\n- `CLASS`: recorded in the class file but not necessarily available at runtime.\n- `RUNTIME`: available through reflection at runtime.\n\n```java\n@Retention(RetentionPolicy.RUNTIME)\n@interface Audited { }\n```\n\nRuntime frameworks need `RUNTIME` retention to read annotations reflectively.","difficulty":"easy","tags":["annotations","retention","runtime","reflection"]},{"id":"java-reflection-modules-007","question":"What does @Target control?","answer":"`@Target` specifies where an annotation may be used.\n\n```java\n@Target({ElementType.TYPE, ElementType.METHOD})\n@interface Audited { }\n```\n\nWithout an appropriate target, an annotation may be usable in places the designer did not intend. Common targets include `TYPE`, `METHOD`, `FIELD`, `PARAMETER`, `CONSTRUCTOR`, and `MODULE`.","difficulty":"easy","tags":["annotations","target","elementtype"]},{"id":"java-reflection-modules-008","question":"What is the difference between reflection and annotation processing?","answer":"Reflection inspects metadata at runtime. Annotation processing runs at compile time and can validate code or generate new source files.\n\nExamples:\n\n- Runtime reflection: dependency injection scans classes at startup.\n- Annotation processing: generating mappers, builders, or metadata during compilation.\n\nAnnotation processing can move work from runtime to build time and improve startup or type safety.","difficulty":"medium","tags":["annotations","annotation-processing","reflection","compile-time"]},{"id":"java-reflection-modules-009","question":"What is a Java module?","answer":"A Java module is a named set of packages with explicit dependencies and exported APIs, declared in `module-info.java`.\n\n```java\nmodule com.example.app {\n    requires java.sql;\n    exports com.example.api;\n}\n```\n\nModules improve reliable configuration and strong encapsulation compared with the traditional classpath.","difficulty":"easy","tags":["modules","jpms","module-info","exports"]},{"id":"java-reflection-modules-010","question":"What is the difference between exports and opens?","answer":"`exports` makes a package's public types accessible at compile time and runtime to other modules.\n\n`opens` allows deep reflection into a package at runtime, including reflective access to non-public members when permitted.\n\n```java\nmodule com.example.app {\n    exports com.example.api;\n    opens com.example.model to com.fasterxml.jackson.databind;\n}\n```\n\nFramework-heavy applications often need `opens` for serialization, dependency injection, or ORM libraries.","difficulty":"medium","tags":["modules","exports","opens","reflection"]},{"id":"java-reflection-modules-011","question":"What is a qualified export or open?","answer":"A qualified directive grants access only to specific modules.\n\n```java\nmodule com.example.app {\n    exports com.example.internal.api to com.example.tests;\n    opens com.example.model to com.fasterxml.jackson.databind;\n}\n```\n\nThis is more restrictive than exporting or opening a package to everyone. It is useful when a framework or test module needs access but broad exposure would weaken encapsulation.","difficulty":"medium","tags":["modules","qualified-export","qualified-open","encapsulation"]},{"id":"java-reflection-modules-012","question":"What is the unnamed module?","answer":"Code on the traditional classpath belongs to the unnamed module. It can read named modules that export packages, but named modules do not automatically read arbitrary classpath code.\n\nThis matters during migration: classpath and module-path behavior differ.\n\nMany applications migrate gradually by keeping some code on the classpath while modularizing libraries or new components.","difficulty":"medium","tags":["modules","unnamed-module","classpath","migration"]},{"id":"java-reflection-modules-013","question":"What is an automatic module?","answer":"An automatic module is created when a regular JAR without `module-info.class` is placed on the module path. The module system derives a module name and treats its packages as exported.\n\nAutomatic modules help migration, but their derived names and broad exports can be brittle.\n\nFor stable libraries, an explicit module descriptor is better.","difficulty":"medium","tags":["modules","automatic-module","module-path","migration"]},{"id":"java-reflection-modules-014","question":"Why can reflection fail after moving to modules?","answer":"Strong encapsulat
