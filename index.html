iculty":"advanced","estimatedMinutes":35,"tags":["atomicinteger","cas","lock-free","contention"]},{"id":"practice-concurrency-2-009","title":"ReadWriteLock","summary":"Evaluate whether concurrent readers justify a more complex locking policy.","starterCode":"public final class ProductCatalog {\n    private final Map<ProductId, Product> products = new HashMap<>();\n\n    public Product find(ProductId id) {\n        return products.get(id);\n    }\n\n    public void update(Product product) {\n        products.put(product.id(), product);\n    }\n}","prompt":"An in-memory product catalog serves thousands of reads per second and changes every few minutes. Compare synchronized access with ReadWriteLock and design an appropriate implementation.","requirements":["Explain whether synchronized is a reasonable choice.","Explain how ReadWriteLock could help.","Show how multiple readers proceed simultaneously.","Identify cases where ReadWriteLock hurts performance."],"constraints":["Products should be immutable or safely copied before publication.","No mutable map view may escape the lock protocol.","Discuss starvation, fairness, and lock-upgrade hazards."],"evaluation":["Uses the read lock for reads and write lock for mutations with finally-based release.","Compares against immutable snapshots or ConcurrentHashMap, not only synchronized.","Recognizes overhead, short critical sections, writer starvation, and contention patterns."],"hints":["Read locks are shared; the write lock is exclusive against readers and writers.","A periodically replaced immutable snapshot may remove read locking entirely."],"solution":"A synchronized implementation is correct and may be fastest when operations are tiny and contention is low. A `ReentrantReadWriteLock` allows many readers to hold the read lock concurrently while writers acquire the exclusive write lock; always unlock in `finally` and avoid lock upgrading. It can hurt when critical sections are short, write frequency or contention is substantial, core count is low, or bookkeeping costs exceed saved serialization. Writer starvation and fairness also matter. For this catalog, a `volatile` reference to an immutable snapshot replaced on each rare update can make reads lock-free and simpler, while ConcurrentHashMap is another option when updates are incremental.","difficulty":"advanced","estimatedMinutes":40,"tags":["readwritelock","locking","immutable-snapshot","read-heavy"]},{"id":"practice-concurrency-2-010","title":"Synchronizers: Latch, Semaphore, and Barrier","summary":"Select a coordination primitive based on one-shot completion, permits, and reusable phases.","starterCode":"int workers = 20;\nExecutorService executor = Executors.newFixedThreadPool(workers);\n\nfor (int i = 0; i < workers; i++) {\n    executor.submit(() -> {\n        initialize();\n        // Signal completion.\n    });\n}\n\n// Processing may begin only after every worker initializes.","prompt":"Twenty workers initialize independently. Processing may begin only after every worker has completed initialization. Choose and implement the appropriate synchronizer, then compare the alternatives.","requirements":["Choose the synchronizer you would use and explain why.","Explain why a Semaphore is not the natural fit.","Explain whether CyclicBarrier could work.","Compare CountDownLatch with CyclicBarrier.","Handle initialization failure and interruption."],"constraints":["The gate is used once during startup.","Every worker must signal completion in a finally block or an equivalent completion path.","Failure must not leave the coordinator waiting forever."],"evaluation":["Selects CountDownLatch initialized to 20 for one-shot completion.","Describes Semaphore as permit-based concurrency control rather than completion tracking.","Explains reusable barrier phases, parties, and broken-barrier behavior."],"hints":["Workers call `countDown`; the coordinator calls `await`.","A latch cannot be reset, while a cyclic barrier can coordinate repeated rendezvous points."],"solution":"Use `CountDownLatch(20)`. Each worker records success or failure and calls `countDown()` in `finally`; the coordinator calls `await` with a startup deadline, then checks collected failures before enabling processing. A Semaphore models a number of permits and is suited to limiting concurrent access, not naturally to counting permanent task completion. A `CyclicBarrier` can work if all 20 workers themselves must rendezvous and then continue, but it is less natural when a separate coordinator is waiting. CountDownLatch is one-shot and asymmetric: any thread can decrement, and waiters do not count as parties. CyclicBarrier is reusable, requires a fixed set of parties to call `await`, can run a barrier action, and becomes broken when a party fails or is interrupted.","difficulty":"advanced","estimatedMinutes":40,"tags":["countdownlatch","semaphore","cyclicbarrier","coordination"]}]},{"domain":"Java","topic":"Concurrency","icon":"CX","exercises":[{"id":"practice-concurrency-001","title":"Build a bounded batch executor","summary":"Design a batch runner that cannot overwhelm its downstream dependency.","starterCode":"public final class BatchRunner<T, R> implements AutoCloseable {\n    public List<Result<R>> run(\n            List<T> items,\n            Function<T, R> operation) {\n        // Add bounded execution and cancellation.\n        throw new UnsupportedOperationException();\n    }\n}","prompt":"Implement `BatchRunner<T, R>` for a service that processes up to 50,000 items. It must cap active work, reject or slow producers when capacity is exhausted, preserve a result for every input, and stop promptly when the caller cancels.\n\nExplain your executor and queue choices and how shutdown behaves when some tasks ignore interruption.","constraints":["No unbounded executor queues.","Maximum downstream concurrency is configurable.","One failed item must not erase other results."],"deliverables":["The core implementation and lifecycle API.","Tests for saturation, cancellation, failure, and shutdown.","Metrics for queue depth, active work, latency, and rejection."],"evaluation":["Applies real backpressure or a deliberate rejection policy.","Handles interruption without losing its status.","Defines ownership of the executor and deterministic cleanup."],"hints":["A semaphore can limit in-flight work independently of task submission.","CallerRunsPolicy is not automatically safe in every request thread."],"solution":"Use a bounded `ThreadPoolExecutor` or a virtual-thread executor combined with a semaphore when the workload is blocking I/O. Do not use an unbounded queue. Represent each item with an indexed success/failure result, release permits in `finally`, and propagate cancellation by cancelling outstanding futures and interrupting workers. Preserve interrupt status when catching `InterruptedException`. The runner should either own and close its executor or accept an externally managed executor with that contract stated clearly. Test with latches rather than sleeps so saturation and cancellation are deterministic.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["executors","backpressure","cancellation","testing"]},{"id":"practice-concurrency-002","title":"Eliminate a transfer deadlock","summary":"Repair account transfers that deadlock under opposing traffic.","starterCode":"void transfer(Account source, Account target, long cents) {\n    synchronized (source) {\n        synchronized (target) {\n            if (source.balance() < cents) throw new InsufficientFunds();\n            source.debit(cents);\n            target.credit(cents);\n        }\n    }\n}","prompt":"Two threads execute `transfer(a, b)` and `transfer(b, a)`. The implementation locks the source account and then the destination account. Production thread dumps show each thread waiting for the other account lock.\n\nImplement a deadlock-free transfer while preserving atomic balance updates and define behavior for self-transfer and equal lock-order keys.","constraints":["Balances must never expose a partially applied transfer.","Do not serialize all transfers on one global lock unless you justify it.","The design must remain correct if account IDs are user supplied."],"deliverables":["A corrected transfer implementation.","A deterministic concurrency test.","A short analysis of lock granularity and starvation."],"evaluation":["Uses a total lock order with a safe tie-break strategy.","Validates funds and applies both updates inside the critical section.","Demonstrates the issue and fix without timing-dependent sleeps."],"hints":["Sort locks by a stable internal identifier, not a mutable display value.","Use barriers or latches to coordinate the test."],"solution":"Acquire account locks in a single total order based on an immutable, collision-free internal key. Handle self-transfer before taking two locks. If the ordering key can collide, use a private tie lock only for that rare case. Under both account locks, validate the source balance and update source and destination as one critical operation. A deterministic test should coordinate opposing transfers to overlap and assert completion within a deadline, conserved total funds, and valid individual balances.","difficulty":"advanced","estimatedMinutes":45,"tags":["deadlock","locking","invariants","thread-dumps"]},{"id":"practice-concurrency-003","title":"Deduplicate concurrent refreshes","summary":"Prevent a hot cache key from triggering a downstream request storm.","starterCode":"public final class SingleFlightCache<K, V> {\n    private final ConcurrentMap<K, CompletableFuture<V>> inFlight =\n        new ConcurrentHashMap<>();\n\n    public CompletionStage<V> get(K key, Supplier<V> loader) {\n        // Coalesce concurrent loads per key.\n        throw new UnsupportedOperationException();\n    }\n}","prompt":"When a cache entry expires, every request starts the same expensive refresh. Implement single-flight loading so one refresh runs per key while other callers share its result. Failures must not poison the key forever, and stale data may be served for a short grace period.\n\nDiscuss races between refresh, eviction, timeout, and cancellation.","constraints":["Different keys may refresh concurrently.","A failed future must be removable for retry.","Cancelling one waiter must not necessarily cancel shared work."],"deliverables":["A thread-safe implementation sketch using concurrent primitives.","Tests that prove one loader invocation per key.","A stale-while-revalidate policy and observability plan."],"evaluation":["Uses atomic per-key installation such as computeIfAbsent carefully.","Removes completed/failed in-flight state without deleting a newer load.","Separates waiter cancellation from shared refresh ownership."],"hints":["Conditional `remove(key, future)` avoids deleting a replacement.","Keep cached values and in-flight operations as separate concepts."],"solution":"Maintain a `ConcurrentHashMap<K, CompletableFuture<V>>` for in-flight loads. Atomically install a newly created future per key, run the loader outside long map-held work, and complete that future for all waiters. On completion, call conditional `remove(key, sameFuture)` so retries are possible and a newer operation is not removed. A waiter timeout should usually detach that waiter rather than cancel the shared load. Store successful values with freshness and stale-grace timestamps separately, and emit hit, stale-hit, refresh, coalescing, latency, and failure metrics.","difficulty":"deep-dive","estimatedMinutes":55,"tags":["concurrenthashmap","completablefuture","cache","stampede"]},{"id":"practice-concurrency-004","title":"Repair unsafe lazy initialization","summary":"Make a lazily created client safely published without unnecessary contention.","starterCode":"private Client client;\n\npublic Client client() {\n    if (client == null) {\n        synchronized (this) {\n            if (client == null) client = new Client(config);\n        }\n    }\n    return client;\n}","prompt":"Review this double-checked initialization, explain the Java Memory Model failure, and implement two correct alternatives with different lifecycle trade-offs.","requirements":["Explain visibility and safe-publication requirements.","Implement a corrected lazy approach.","Implement a simpler eager or holder-based alternative.","Test single construction under contention."],"constraints":["The client is expensive and must be constructed at most once.","Steady-state reads should not require a contended lock.","Construction failure behavior must be defined."],"evaluation":["Identifies the missing volatile publication edge.","Offers initialization-on-demand holder or explicit lifecycle where appropriate.","Avoids timing-only concurrency tests."],"hints":["Assignment can become visible before all constructed state without safe publication.","A static holder delegates synchronization to class initialization."],"solution":"Declare the field `volatile` to make double-checked locking correct, or prefer an initialization-on-demand holder for a static dependency. Explicit eager construction through dependency injection is often simplest when startup failure should be immediate. Test with coordinated concurrent callers and a construction counter, while recognizing stress tests supplement rather than prove memory-model correctness.","difficulty":"advanced","estimatedMinutes":35,"tags":["java-memory-model","safe-publication","volatile","lazy-initialization"]}]},{"domain":"Backend","topic":"Data & Transactions","icon":"DB","exercises":[{"id":"practice-data-001","title":"Make event publication reliable","summary":"Close the failure window between a database commit and message publication.","starterCode":"@Transactional\npublic Order create(CreateOrder command) {\n    Order order = orders.save(Order.from(command));\n    broker.publish(new OrderCreated(order.id()));\n    return order;\n}","prompt":"An order service commits an order and then publishes `OrderCreated`. A crash between those operations leaves a valid order with no event; publishing first can create an event for a rolled-back order. Design a reliable replacement and explain consumer responsibilities.","constraints":["The database and broker have no shared transaction.","The broker delivers at least once.","Event order matters per aggregate."],"deliverables":["Schema and transaction flow for an outbox.","Publisher retry and ordering behavior.","Consumer idempotency strategy and cleanup policy."],"evaluation":["Writes domain state and outbox record atomically.","Accepts duplicates and makes processing idempotent.","Addresses partitioning, ordering, lag, and retention."],"hints":["Reliable publication is not the same as exactly-once business effects.","Use an event ID and aggregate sequence."],"solution":"Insert the order and an outbox row in one local database transaction. A separate publisher claims rows, sends events keyed by aggregate, and marks or deletes published rows using an idempotent retry strategy. Include a globally unique event ID and per-aggregate sequence. Consumers record processed IDs or apply naturally idempotent state transitions in the same transaction as their side effect. Monitor outbox age and failure rate, partition work without breaking per-aggregate order, and archive or delete rows according to an explicit retention policy.","difficulty":"deep-dive","estimatedMinutes":50,"tags":["outbox","messaging","transactions","idempotency"]},{"id":"practice-data-002","title":"Prevent lost inventory updates","summary":"Choose a concurrency strategy for a hot inventory record.","starterCode":"@Transactional\npublic void reserve(long productId, int quantity) {\n    Inventory item = inventory.findById(productId).orElseThrow();\n    if (item.stock() < quantity) throw new SoldOut();\n    item.setStock(item.stock() - quantity);\n}","prompt":"Two checkout requests read stock 1, both decide inventory is available, and both write stock 0. Compare optimistic locking, a conditional atomic update, and pessimistic locking for this workload, then implement the approach you recommend.","constraints":["Stock must never become negative.","Some products receive intense short-lived contention.","The API must distinguish sold out from transient contention."],"deliverables":["SQL or repository-level implementation.","Retry and error semantics.","Concurrent integration tests and contention metrics."],"evaluation":["Makes the invariant part of the write condition.","Does not rely on an application-level check followed by an unconditional update.","Chooses retry limits based on contention and latency budget."],"hints":["`UPDATE ... SET stock = stock - ? WHERE stock >= ?` can combine check and write.","Rows affected communicates whether the invariant allowed the reservation."],"solution":"For a simple decrement invariant, use one conditional atomic update and inspect the affected-row count. This avoids a read/write race and often has less machinery than entity version retries. Optimistic locking is useful when multiple fields and business checks form the state transition; pessimistic locking may be justified for very hot, short transactions but increases blocking and deadlock risk. Bound retries with jitter, distinguish no stock from retry exhaustion, and test with real database concurrency while asserting total reservations never exceed initial stock.","difficulty":"advanced","estimatedMinutes":40,"tags":["sql","optimistic-locking","invariants","concurrency"]},{"id":"practice-data-003","title":"Plan a zero-downtime schema migration","summary":"Replace a heavily used column while old and new application versions overlap.","starterCode":"-- Current schema\nCREATE TABLE customer (\n    id BIGINT PRIMARY KEY,\n    full_name VARCHAR(300) NOT NULL\n);\n\n-- Design the expand-and-contract migration from here.","prompt":"A large table stores a single `full_name` column. A new model needs `given_name` and `family_name`, but rolling deployments mean old and new application versions will run together. Design an expand-and-contract migration with rollback points and data verification.","constraints":["The table cannot be locked for a long rewrite.","Name parsing is imperfect and requires review for some rows.","Rollback must remain possible during rollout."],"deliverables":["Ordered database and application deployment phases.","Backfill and dual-read/write strategy.","Verification, monitoring, and cleanup gates."],"evaluation":["Adds compatible schema before changing readers or writers.","Backfills in bounded resumable batches.","Delays destructive cleanup until old versions and rollback windows are gone."],"hints":["Separate schema compatibility from semantic correctness.","Record ambiguous parses instead of fabricating certainty."],"solution":"First add nullable new columns using an online-safe operation. Deploy code capable of reading either representation and dual-writing both, with telemetry for divergence. Backfill in small resumable batches, recording ambiguous names for manual or rule-based resolution. Verify counts, null rates, samples, and dual-write consistency. Switch reads to the new fields behind a reversible flag, then stop old writes only after all old instances are gone. Enforce final constraints and remove `full_name` in a later release after the rollback window closes.","difficulty":"advanced","estimatedMinutes":45,"tags":["schema-migration","deployments","backfill","compatibility"]},{"id":"practice-data-004","title":"Reproduce and prevent write skew","summary":"Use transaction isolation deliberately to protect a cross-row invariant.","starterCode":"@Transactional\npublic void goOffCall(long doctorId) {\n    long onCall = doctors.countByOnCallTrue();\n    if (onCall <= 1) throw new CoverageRequired();\n    doctors.setOnCall(doctorId, false);\n}","prompt":"Two doctors concurrently go off call. Each transaction sees two available doctors and both commit, violating the invariant that at least one remains. Reproduce the anomaly and compare fixes.","requirements":["Create a concurrent integration test against the real database.","Protect the invariant under all supported deployments.","Define retry behavior for serialization conflicts."],"constraints":["The invariant spans multiple rows.","Database isolation defaults differ.","A process-local lock is insufficient in a multi-instance service."],"evaluation":["Recognizes write skew rather than a simple lost update.","Considers serializable isolation, explicit locking, or invariant materialization.","Tests actual database behavior with coordinated transactions."],"hints":["Locking only the row being modified does not lock the predicate.","A single coverage row can materialize the invariant."],"solution":"Reproduce with two separately coordinated transactions that read before either writes. Fix with database serializable isolation plus bounded retries, explicit locking of a shared coverage row, or a schema that materializes and atomically guards the invariant. Choose based on contention and database guarantees. Document transient serialization failures and verify the invariant repeatedly under concurrent integration tests.","difficulty":"deep-dive","estimatedMinutes":50,"tags":["transactions","isolation","write-skew","integration-testing"]}]},{"domain":"JVM","topic":"JVM & Performance","icon":"PF","exercises":[{"id":"practice-performance-001","title":"Investigate a rising heap after deployment","summary":"Build an evidence-led plan for a suspected memory leak.","starterCode":"// The release introduced this process-wide registry.\nfinal class RequestRegistry {\n    static final Map<String, RequestContext> contexts =\n        new ConcurrentHashMap<>();\n\n    static void record(RequestContext context) {\n        contexts.put(context.requestId(), context);\n    }\n}","prompt":"After a release, old-generation occupancy grows for six hours until pods restart. Request volume and payload size are unchanged. Design an investigation that distinguishes a leak from legitimate cache growth, allocation pressure, and GC misconfiguration.\n\nState what evidence you collect first and how each result changes the next step.","constraints":["Production overhead must remain low.","Heap dumps may contain sensitive data.","Restarting immediately destroys useful evidence."],"deliverables":["An ordered diagnostic runbook.","Expected signals in GC logs, JFR, and heap analysis.","A validation plan for the eventual fix."],"evaluation":["Starts from trends and post-GC occupancy rather than one heap snapshot.","Uses dominator/retained-size and path-to-GC-root analysis correctly.","Handles dump security and validates under representative duration."],"hints":["Compare object growth by class between two points in time.","Allocation rate and retention are different problems."],"solution":"Correlate deployment time with post-GC old-gen occupancy, allocation rate, pause behavior, traffic, and cache metrics. Record low-overhead JFR and inspect allocation hot spots and object statistics. If retention continues after full collection, capture secured heap evidence according to policy, compare histograms, inspect dominators, retained size, and paths to GC roots. Verify whether growth is bounded cache warm-up or unbounded retention. Reproduce with a long soak test, implement the ownership/eviction fix, and compare the same post-GC slope and retained-object evidence before declaring success.","difficulty":"advanced","estimatedMinutes":45,"tags":["memory-leak","jfr","heap-dump","gc"]},{"id":"practice-performance-002","title":"Explain a p99 latency cliff","summary":"Diagnose tail-latency spikes with low average CPU usage.","starterCode":"record LatencySnapshot(\n    Duration queueTime,\n    Duration serviceTime,\n    int activeThreads,\n    int queuedTasks,\n    int availableConnections) {}\n\n// Define the evidence collection and correlation plan.","prompt":"A Java API has 25 ms median latency but p99 jumps above two seconds every few minutes. CPU averages 35%, no errors are logged, and autoscaling does not help. Create a hypothesis tree and a concrete evidence plan spanning the JVM, application, host, and dependencies.","constraints":["Do not assume GC is the cause.","Metrics have one-minute resolution but traces are sampled.","The issue must be diagnosed while the service remains live."],"deliverables":["Ranked hypotheses and discriminating evidence.","A JFR and tracing capture plan.","One experiment that can falsify the leading hypothesis."],"evaluation":["Considers pauses, queueing, locks, connection pools, DNS, and downstream latency.","Correlates events on a shared timeline.","Avoids optimizing averages when the symptom is tail latency."],"hints":["Low average CPU can coexist with short saturation or blocked work.","Look at queue time separately from service time."],"solution":"Create a timeline that aligns latency histograms with GC/safepoint events, thread states, executor and connection-pool queues, host scheduling, and downstream spans. Use continuous low-overhead JFR to inspect pauses, monitor contention, socket I/O, thread parking, and CPU samples around spikes. Increase trace sampling selectively for slow requests and preserve queue-time dimensions. Rank hypotheses by fit and choose a falsifiable experiment, such as temporarily increasing a saturated connection pool only after confirming wait time there. Do not tune GC unless pauses actually align with the cliff.","difficulty":"deep-dive","estimatedMinutes":50,"tags":["latency","jfr","contention","observability"]},{"id":"practice-performance-003","title":"Benchmark a serialization optimization","summary":"Design a benchmark that survives JVM optimization and produces useful evidence.","starterCode":"@State(Scope.Thread)\npublic class SerializerBenchmark {\n    private Payload payload;\n\n    @Benchmark\n    public byte[] candidate() {\n        return HandWrittenSerializer.encode(payload);\n    }\n}","prompt":"A pull request replaces a readable serializer with a hand-written byte encoder and claims a 4x speedup from a loop timed with `System.nanoTime()`. Design a trustworthy benchmark and decide what evidence is needed before accepting the complexity.","constraints":["Inputs vary in size and character distribution.","Allocation and throughput both matter.","Correctness must be compared with the existing implementation."],"deliverables":["A JMH benchmark outline.","A correctness and workload matrix.","Acceptance criteria tied to production impact."],"evaluation":["Uses warmup, forks, parameterization, and result consumption.","Measures allocation and avoids constant folding/dead-code elimination.","Connects microbenchmark gains to an end-to-end bottleneck."],"hints":["Include realistic object construction boundaries.","A faster operation that consumes 1% of request time may not matter."],"solution":"Use JMH with multiple warmup and measurement iterations, separate forks, representative parameterized payloads, and a `Blackhole` or returned result. Benchmark throughput and sample/allocation metrics while controlling setup scope. Verify byte-for-byte or semantic equivalence over edge cases and fuzzed inputs. Profile production first to establish that serialization is material, then run an end-to-end load test because cache, I/O, and batching effects may dominate. Accept the complexity only if the gain is stable, significant to service objectives, and covered by maintainable correctness tests.","difficulty":"advanced","estimatedMinutes":40,"tags":["jmh","benchmarking","optimization","profiling"]},{"id":"practice-performance-004","title":"Find a CPU regression after a release","summary":"Correlate profiles and code changes instead of guessing from aggregate CPU.","starterCode":"public List<Order> eligible(List<Order> orders, Rules rules) {\n    return orders.stream()\n        .filter(order -> rules.loadFor(order.customerId()).matches(order))\n        .sorted(comparing(order -> enrich(order).priority()))\n        .toList();\n}","prompt":"CPU per request doubled after a release while traffic stayed flat. Build a diagnosis plan, identify suspicious work in the snippet, and propose fixes that preserve semantics.","requirements":["Capture comparable before/after profiles or a controlled reproduction.","Separate CPU, allocation, lock, and I/O evidence.","Validate the fix with service-level and focused measurements."],"constraints":["Do not optimize from source inspection alone.","Sorting must preserve the same business order.","Rule and enrichment calls may be remote or cached."],"evaluation":["Notices repeated comparator enrichment and per-order rule loading.","Uses JFR or async-profiler evidence and request-normalized metrics.","Hoists or batches work without hiding failure semantics."],"hints":["Comparators can run many times per element.","Profile stacks and allocation together around the regression window."],"solution":"Compare request-normalized profiles from equivalent workloads and align hot stacks with the release diff. Preload or batch rules, compute enrichment once per order into a decorated value, then sort those values. Preserve error and caching semantics explicitly. Confirm reduced CPU and allocation with JFR/profile data and an end-to-end load test, not only a microbenchmark.","difficulty":"advanced","estimatedMinutes":45,"tags":["cpu","profiling","sorting","performance"]}]},{"domain":"Architecture","topic":"API Design","icon":"SD","exercises":[{"id":"practice-design-001","title":"Design an idempotent payment endpoint","summary":"Design a payment API that remains correct through retries and partial failure.","starterCode":"POST /payments\nIdempotency-Key: <client-generated-key>\n\n{\n  \"accountId\": \"acct-123\",\n  \"amount\": { \"value\": \"49.90\", \"currency\": \"EUR\" }\n}\n\n// Define response states, persistence, and retry semantics.","prompt":"Clients may retry `POST /payments` after a timeout, while the service may crash after charging the provider but before responding. Design the API, persistence model, and request flow so a client-visible operation is idempotent.\n\nCover concurrent requests with the same key, payload mismatches, provider timeouts, and how operators reconcile uncertain outcomes.","constraints":["The payment provider does not participate in your database transaction.","Clients can generate a stable idempotency key.","At-least-once message delivery is used internally."],"deliverables":["API and database schema sketch.","State machine for payment attempts.","Failure matrix and reconciliation strategy."],"evaluation":["Enforces key uniqueness atomically and binds the key to a request fingerprint.","Distinguishes failed, succeeded, and unknown outcomes.","Uses provider idempotency or reconciliation rather than claiming distributed exactly-once."],"hints":["Persist intent before making the external call.","A repeated key with a different payload should be rejected."],"solution":"Require an idempotency key and atomically insert an operation row with a unique key, request fingerprint, and explicit state. Replays with the same fingerprint return or await the stored outcome; mismatched payloads are rejected. Persist intent before calling the provider and pass a stable provider idempotency key where supported. Model timeouts as unknown rather than failed, then reconcile by querying the provider or consuming provider events. Publish internal events through an outbox in the same transaction as state changes. Retain keys for a documented window and secure responses so one principal cannot replay another's key.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["idempotency","payments","distributed-systems","api-design"]},{"id":"practice-design-002","title":"Evolve a public Java client without breaking users","summary":"Plan a backwards-compatible evolution of a heavily used library API.","starterCode":"public interface OrdersClient {\n    List<Order> listOrders(String customerId);\n}\n\n// Add pagination, request metadata, and structured errors\n// without breaking existing binaries for one major release.","prompt":"A public client method currently returns `List<Order>` and throws broad runtime exceptions. You need pagination, structured errors, and request metadata, but hundreds of services compile against the old API.\n\nDesign an evolution path that improves the contract without forcing a flag-day migration.","constraints":["Binary compatibility matters for one major release.","The old method cannot change its return type.","Telemetry must reveal migration progress."],"deliverables":["Proposed old and new Java signatures.","Deprecation and release timeline.","Compatibility tests and migration telemetry."],"evaluation":["Adds a parallel API rather than changing an existing descriptor.","Defines exception translation and pagination semantics.","Treats source, binary, and behavioral compatibility separately."],"hints":["A new request/response type creates room for future evolution.","Default interface methods have compatibility caveats too."],"solution":"Introduce a new method with request and page response types, for example `OrderPage listOrders(ListOrdersRequest request)`, while retaining the old method as a deprecated adapter with unchanged bytecode signature and legacy behavior. Define typed error categories without leaking transport details. Add contract and binary-compatibility checks, document pagination stability, and instrument old versus new calls. Deprecate in one release, provide migration examples and tooling, and remove only at the next announced major version after usage reaches an agreed threshold.","difficulty":"advanced","estimatedMinutes":40,"tags":["api-evolution","compatibility","libraries","versioning"]},{"id":"practice-design-003","title":"Design overload protection for a fan-out service","summary":"Keep one slow dependency from exhausting an entire request path.","starterCode":"public CompletionStage<Dashboard> loadDashboard(UserId userId) {\n    return CompletableFuture.allOf(\n        profile.load(userId), orders.load(userId), offers.load(userId),\n        loyalty.load(userId), messages.load(userId), activity.load(userId)\n    ).thenApply(ignored -> assemble(userId));\n}","prompt":"An aggregator calls six downstream services per request. One dependency becomes slow, request threads accumulate, retries multiply traffic, and healthy dependencies are eventually affected. Design a resilience strategy that protects the process while returning the best useful response possible.","constraints":["The endpoint has a 700 ms total latency budget.","Two downstream responses are optional.","Traffic can spike to five times normal load."],"deliverables":["A latency-budget and concurrency allocation.","Timeout, retry, bulkhead, and fallback policies.","Load-test scenarios and operational signals."],"evaluation":["Uses end-to-end deadlines rather than independent generous timeouts.","Bounds queues and concurrent calls per dependency.","Applies retries selectively with jitter and a retry budget."],"hints":["A timeout releases patience, not necessarily underlying resources.","Optional data can be represented as degraded, not failed."],"solution":"Propagate an end-to-end deadline and allocate smaller per-hop budgets with room for aggregation. Isolate dependencies using bounded concurrency and queues, reject early when capacity is gone, and define fallbacks for optional data. Retry only safe transient failures when enough deadline remains, using jitter and a global retry budget. Use circuit breaking as a state-management aid, not a substitute for limits. Load test slow, failing, and recovering dependencies plus traffic spikes; monitor in-flight calls, queue wait, rejection, timeout, retry amplification, fallback rate, and tail latency.","difficulty":"deep-dive","estimatedMinutes":55,"tags":["resilience","timeouts","bulkheads","load-shedding"]},{"id":"practice-api-design-004","title":"Design stable cursor pagination","summary":"Create pagination semantics that remain correct while records are inserted and updated.","starterCode":"GET /orders?customerId=42&limit=50&cursor=<opaque>\n\n{\n  \"items\": [],\n  \"nextCursor\": null\n}\n\n// Define ordering, cursor contents, validation, and consistency.","prompt":"Design cursor pagination for an orders API with concurrent inserts and status updates. Clients must not see accidental duplicates or skip stable records while traversing a result set.","requirements":["Define a total deterministic order.","Make cursors opaque, versioned, and tamper-resistant.","Specify filtering consistency and end-of-results behavior.","Handle deleted cursor-boundary records."],"constraints":["Offset pagination is too expensive at depth.","Order creation timestamps can collide.","The API will evolve with new filters."],"evaluation":["Uses keyset pagination with a unique tie-breaker.","Binds cursor state to query/filter semantics.","States whether traversal is live or snapshot-consistent."],"hints":["Order by `(created_at, id)` rather than timestamp alone.","Encode direction, boundary keys, filter hash, and version."],"solution":"Use keyset pagination over a stable total order such as `(created_at DESC, id DESC)`. Encode the last keys, direction, cursor version, and a hash of immutable query filters in a signed opaque token. Query strictly beyond the boundary, so deletion of the boundary record is harmless. Document live-view behavior or introduce snapshot/version semantics when stable traversal is required.","difficulty":"advanced","estimatedMinutes":40,"tags":["api-design","pagination","keyset","compatibility"]}]},{"domain":"Architecture","topic":"System Design","icon":"SY","exercises":[{"id":"practice-system-design-001","title":"Design a multi-channel notification platform","summary":"Design reliable email, SMS, and push delivery with user preferences and provider failures.","starterCode":"POST /notifications\n{\n  \"recipientId\": \"user-42\",\n  \"template\": \"ORDER_SHIPPED\",\n  \"channels\": [\"EMAIL\", \"PUSH\"],\n  \"parameters\": { \"orderId\": \"A123\" }\n}\n\n// Design the service boundaries and delivery state model.","prompt":"Design a notification platform used by multiple product teams. It must respect preferences, render versioned templates, isolate providers, retry transient failures, and expose delivery status without sending duplicates.","requirements":["Support email, SMS, and push with independent providers.","Apply user preferences and mandatory-message policy.","Track per-channel delivery state and attempts.","Allow scheduled and immediate delivery."],"constraints":["Providers have different rate limits and failure semantics.","Message delivery is at least once internally.","Personally identifiable data requires controlled retention."],"evaluation":["Defines idempotency and per-channel state machines.","Uses queues and provider-specific bulkheads/backpressure.","Addresses templates, preferences, observability, and compliance."],"hints":["Separate notification intent from channel attempts.","A provider acceptance response is not always final delivery."],"solution":"Persist a notification intent with idempotency key, recipients, policy, and immutable template version. Fan out eligible channel attempts through partitioned queues to provider adapters with rate limits, bounded retries, and dead-letter handling. Track accepted, delivered, failed, and unknown states per channel, ingest provider callbacks idempotently, and expose aggregate status. Encrypt sensitive data, minimize payloads in queues, and expire content separately from operational metrics.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["system-design","messaging","idempotency","rate-limits"]},{"id":"practice-system-design-002","title":"Design a distributed job scheduler","summary":"Schedule millions of delayed and recurring jobs without duplicate business effects.","starterCode":"POST /jobs\n{\n  \"type\": \"GENERATE_INVOICE\",\n  \"runAt\": \"2026-07-01T09:00:00Z\",\n  \"payloadRef\": \"payload-991\",\n  \"recurrence\": null\n}\n\n// Define storage, claiming, execution, and recovery.","prompt":"Design a scheduler for delayed and recurring jobs. Workers may crash after executing a job but before acknowledging it, clocks differ, and customers need cancellation, retries, and execution history.","requirements":["Schedule, cancel, pause, and inspect jobs.","Scale to millions of pending jobs and bursty due times.","Support bounded retry policies and dead-letter outcomes.","Preserve execution history and operator controls."],"constraints":["Exactly-once execution cannot be assumed.","Jobs range from seconds to hours.","A tenant must not monopolize all workers."],"evaluation":["Separates scheduling/claiming from execution.","Uses leases and idempotent handlers to recover abandoned work.","Addresses time, recurrence, fairness, partitioning, and observability."],"hints":["Claim due work with a lease and fencing token.","Store recurrence intent separately from generated executions."],"solution":"Persist job definitions and materialized executions, partitioned by due-time bucket and tenant. Schedulers claim due executions with leases/fencing and publish them to fair execution queues. Workers heartbeat long jobs and handlers use execution IDs for idempotency. Expired leases make work eligible again. Model cancellation races explicitly, calculate recurrence from a documented timezone policy, and expose queue delay, attempts, stuck leases, tenant saturation, and outcome metrics.","difficulty":"deep-dive","estimatedMinutes":65,"tags":["system-design","scheduler","leases","fairness"]},{"id":"practice-system-design-003","title":"Design an immutable audit trail","summary":"Capture searchable security events while preserving integrity and controlled access.","starterCode":"public record AuditEvent(\n    String eventId,\n    Instant occurredAt,\n    String actorId,\n    String action,\n    String resourceId,\n    Map<String, String> attributes) {}\n\n// Design ingestion, integrity, storage tiers, and querying.","prompt":"Design a company-wide audit platform. Product services emit events, security teams query by actor/resource/time, regulators require retention, and administrators must not be able to silently alter history.","requirements":["Accept high-volume events from many services.","Support bounded-latency search over recent data.","Detect missing, duplicated, or altered events.","Apply tenant, role, retention, and legal-hold policies."],"constraints":["Producer clocks and schemas evolve.","Audit payloads can contain sensitive metadata.","Long-term storage must remain affordable."],"evaluation":["Defines event identity, schema evolution, and producer authentication.","Separates immutable archive from search projections.","Addresses integrity evidence, access auditing, retention, and replay."],"hints":["A searchable index does not need to be the immutable source of truth.","Hash chaining or signed batches can make tampering evident."],"solution":"Authenticate producers and ingest uniquely identified, versioned events into a durable append-only log. Archive immutable partitioned batches in retention-locked object storage and build replayable search projections for recent queries. Use sequence/gap monitoring and signed manifests or hash chains for tamper evidence. Redact or tokenize sensitive fields, enforce scoped query authorization, audit access to the audit system, and make retention/legal holds policy-driven per tenant and event class.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["system-design","audit","security","event-streaming"]},{"id":"practice-system-design-004","title":"Design a globally distributed feature-flag service","summary":"Serve low-latency flag decisions while keeping configuration changes controlled and explainable.","starterCode":"boolean enabled = flags.evaluate(\n    \"new-checkout\",\n    EvaluationContext.of(userId, region, attributes),\n    false);\n\n// Design configuration, propagation, evaluation, and failure behavior.","prompt":"Design a feature-flag platform used on critical request paths in several regions. Teams need percentage rollout, targeting, audit history, emergency disable, and deterministic decisions.","requirements":["Evaluate locally with very low latency.","Support targeting, stable percentage rollout, and prerequisites.","Audit and approve sensitive configuration changes.","Expose propagation state and decision explanations."],"constraints":["The control plane may be unavailable during evaluation.","Configuration can contain targeting-sensitive attributes.","A bad global rule can affect every service quickly."],"evaluation":["Separates control plane from local data-plane evaluation.","Defines deterministic hashing and versioned snapshots.","Addresses safe rollout, stale configuration, defaults, and emergency controls."],"hints":["Distribute immutable snapshots rather than calling a central service per request.","Propagation speed and blast radius pull in opposite directions."],"solution":"Use a strongly controlled configuration service that produces signed, versioned immutable snapshots. Stream snapshots to regional relays and in-process SDK caches; evaluation is local and deterministic using stable subject hashing. Keep last-known-good state, explicit typed defaults, freshness metrics, and decision reasons. Apply schema validation, staged rollout, approvals, simulation, and rapid rollback before global propagation. Minimize sensitive attributes and avoid logging raw evaluation context.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["system-design","feature-flags","distribution","safe-rollout"]}]},{"domain":"Engineering","topic":"Testing","icon":"TR","exercises":[{"id":"practice-testing-001","title":"Make an asynchronous test deterministic","summary":"Replace a flaky sleep-based test with controlled coordination.","starterCode":"@Test\nvoid invokesCallback() throws Exception {\n    service.startAsync(callback);\n    Thread.sleep(500);\n    verify(callback).completed();\n}\n\npublic void startAsync(Callback callback) {\n    executor.submit(() -> callback.completed());\n}","prompt":"A test submits work to an executor, sleeps 500 ms, and asserts a callback ran. It passes locally and fails in CI. Refactor the production boundary and test so scheduling is deterministic, failures are observable, and the test cannot hang indefinitely.","constraints":["Do not increase the sleep duration.","The production method must retain asynchronous behavior.","Executor threads must be cleaned up after each test."],"deliverables":["Refactored production API and test.","Timeout and failure-propagation behavior.","An explanation of which concurrency property the test proves."],"evaluation":["Returns or exposes a completion handle such as CompletionStage.","Uses latches/barriers/fakes for coordination rather than timing guesses.","Ensures cleanup in finally/afterEach and preserves the original exception."],"hints":["A fire-and-forget `void` API hides both completion and failure.","Wait for an event with a deadline, not for an assumed duration."],"solution":"Have the asynchronous boundary return a `CompletionStage` or accept an injected executor and observable callback. In the test, use a controllable executor or latches to decide when work proceeds, then await the returned stage with a short explicit deadline. Assert the callback result and exceptional completion directly. Shut down owned executors in cleanup and fail with diagnostic state if the deadline expires. The test should prove ordering or completion semantics, not that a particular machine schedules work within 500 ms.","difficulty":"advanced","estimatedMinutes":35,"tags":["testing","async","determinism","executors"]},{"id":"practice-testing-002","title":"Refactor a transactional god service","summary":"Create useful boundaries without breaking transaction semantics.","starterCode":"@Transactional\npublic Receipt checkout(Cart cart, Card card) {\n    validate(cart);\n    Money total = price(cart);\n    inventory.reserve(cart.items());\n    payment.charge(card, total);\n    Order order = orders.save(new Order(cart, total));\n    email.sendConfirmation(order);\n    return Receipt.from(order);\n}","prompt":"`CheckoutService.checkout()` validates a cart, prices items, reserves stock, charges a card, writes an order, sends email, and catches every exception as `CheckoutFailedException`. The method is difficult to test and retry safely. Propose and implement an incremental refactor.","constraints":["The external payment call cannot join the database transaction.","Existing API clients must keep working during migration.","Retries must not double charge or double reserve."],"deliverables":["New component boundaries and orchestration flow.","Failure and compensation model.","Characterization, contract, and component test strategy."],"evaluation":["Separates pure decision logic from side effects.","Models workflow state and idempotency explicitly.","Preserves diagnostic causes instead of flattening all failures."],"hints":["Begin with characterization tests around observable behavior.","A workflow state machine can make retries explicit."],"solution":"First capture current external behavior with characterization tests. Extract pure cart validation and pricing, then place inventory, payment, persistence, and notification behind explicit ports. Make checkout an idempotent workflow with persisted states and stable operation IDs; use local transactions plus outbox events where appropriate, and define compensation or reconciliation for external effects. Preserve the old facade while routing it through the new orchestration. Use typed failures with original causes and test pure rules heavily, adapters with integration tests, and a smaller number of workflow contract tests.","difficulty":"deep-dive","estimatedMinutes":60,"tags":["refactoring","transactions","hexagonal-architecture","idempotency"]},{"id":"practice-testing-003","title":"Design contract tests for an HTTP client","summary":"Protect a Java client from subtle provider changes without over-mocking.","starterCode":"@Test\nvoid loadsCustomer() {\n    HttpTransport transport = mock(HttpTransport.class);\n    when(transport.get(anyString())).thenReturn(new CustomerDto());\n\n    assertNotNull(new CustomerClient(transport).get(\"42\"));\n}","prompt":"A Java HTTP client is tested only with mocked method calls. A provider changes a JSON field from absent to null and starts returning `429` with `Retry-After`; unit tests stay green while production fails. Build a layered test strategy for serialization, HTTP behavior, compatibility, and retries.","constraints":["Tests must run reliably in CI without the real provider.","Retry tests must not wait in real time.","Captured payloads may contain sensitive values."],"deliverables":["Test layers and ownership boundaries.","Representative contract cases.","A fake-clock retry test and fixture governance policy."],"evaluation":["Tests at the wire boundary rather than mocking the client internals.","Covers absent/null/unknown fields, error bodies, headers, and malformed responses.","Uses deterministic time and sanitized versioned fixtures."],"hints":["A local stub HTTP server exercises more real behavior than a mocked transport method.","Inject clock/sleeper or a retry scheduler."],"solution":"Keep focused mapper tests, then run the real client against a local stub server to verify method, path, headers, encoding, status handling, null/absent/unknown fields, and malformed bodies. Add provider-consumer contract fixtures or a schema check owned jointly with the provider. Inject a clock and sleeper/scheduler so `Retry-After`, backoff, jitter bounds, and deadline exhaustion are tested without wall-clock waits. Sanitize and version fixtures, review changes like code, and keep a small optional staging smoke test separate from deterministic CI.","difficulty":"advanced","estimatedMinutes":40,"tags":["contract-testing","http","retries","test-design"]},{"id":"practice-testing-004","title":"Use properties to test a money allocator","summary":"Test invariants across a broad input space instead of accumulating examples.","starterCode":"public List<Money> allocate(Money total, List<Integer> ratios) {\n    // Split total proportionally while preserving every minor unit.\n    throw new UnsupportedOperationException();\n}","prompt":"Implement proportional allocation and design property-based tests that expose rounding, overflow, zero, and invalid-ratio defects.","requirements":["Allocated values must sum exactly to the input total.","Results must be deterministic and have the same currency.","Remainders must be distributed according to a documented policy.","Generate and shrink valid and invalid cases."],"constraints":["Use integer minor units or exact decimal arithmetic.","Ratios may be large and can overflow naive sums.","Negative totals and ratios require an explicit policy."],"evaluation":["Tests conservation, size, determinism, and bounds as properties.","Includes targeted examples for policy readability.","Designs generators that respect and challenge domain constraints."],"hints":["Compute base shares, then distribute remaining minor units.","Property tests complement rather than replace example tests."],"solution":"Perform allocation in minor units using overflow-aware arithmetic, calculate base shares and remainders, then distribute residual units by a deterministic policy. Property tests should generate totals and non-empty positive ratios and assert conservation, result count, currency, repeatability, and bounded deviation from exact proportion. Add explicit invalid-input tests and named examples that document remainder ordering.","difficulty":"advanced","estimatedMinutes":45,"tags":["property-based-testing","money","invariants","rounding"]}]}]};
</script>

<script>
/* ── State ─────────────────────────────────────────── */
let allQuestions = [];
let allTopics    = [];
let activeTopic  = 'all';
let topicsOpen   = false;
let query        = '';
let shuffled     = false;
let hideDone     = false;
let progress     = {};
const CONTENT_FILES = {
  questions: [
    'java-core-1.json',
    'java-strings.json',
    'java-collections-core.json',
    'java-collections-maps.json',
    'java-collections-concurrent.json',
    'java-collections-algorithms.json',
    'java-collections-modern.json',
    'java-iterators.json',
    'java-concurrenthashmap.json',
    'java-copyonwritearraylist.json',
    'java-weakhashmap.json',
    'java-generics.json',
    'java-concurrency-core.json',
    'java-thread-pools.json',
    'java-futures-completablefuture.json',
    'java-streams-api.json',
    'java-jvm-memory-gc.json',
    'java-reflection-modules.json',
    'senior-system-design.json',
    'senior-engineering-judgment.json'
  ],
  practice: [
    'java-coding-refactoring.json',
    'java-code-review-debugging.json',
    'java-concurrency-labs.json',
    'java-concurrency-2.json',
    'java-service-design.json',
    'java-system-design-practice.json',
    'java-jvm-performance.json',
    'java-data-consistency.json',
    'java-testing-refactoring.json'
  ]
};
const CONTENT_MODES = Object.keys(CONTENT_FILES);
let activeMode = CONTENT_MODES.includes(localStorage.getItem('iqh_mode'))
  ? localStorage.getItem('iqh_mode')
  : 'questions';

/* ── Persistence ────────────────────────────────────── */
function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem('iqh_progress') || '{}'); }
  catch { progress = {}; }
}
function saveProgress() {
  localStorage.setItem('iqh_progress', JSON.stringify(progress));
}

/* ── Helpers ────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function topicEncode(id) { return encodeURIComponent(id); }
function topicDecode(enc) { return decodeURIComponent(enc); }

/* ── Boot ───────────────────────────────────────────── */
async function boot() {
  loadProgress();
  applyMode();
  await loadContent();
}

async function loadContent() {
  try {
    const embeddedContent = window.IQH_EMBEDDED_CONTENT?.[activeMode];
    const datasets = embeddedContent || await Promise.all(
      CONTENT_FILES[activeMode].map(file =>
        fetch(`content/${activeMode}/${file}`).then(response => {
          if (!response.ok) throw new Error(`Could not load ${file}`);
          return response.json();
        })
      )
    );

    allTopics = [];
    allQuestions = [];

    datasets.forEach(ds => {
      const id = `${ds.domain}::${ds.topic}`;
      const entries = activeMode === 'questions' ? ds.questions : ds.exercises;
      if (!Array.isArray(entries)) throw new Error(`Invalid ${activeMode} dataset: ${ds.topic}`);
      allTopics.push({ id, domain: ds.domain, topic: ds.topic, icon: ds.icon || 'ST' });
      entries.forEach(q =>
        allQuestions.push({
          ...q,
          _topicId:    id,
          _topicLabel: `${ds.domain} · ${ds.topic}`,
          _topicIcon:  ds.icon || 'ST',
          _kind:       activeMode === 'questions' ? 'question' : 'practice'
        })
      );
    });

    render();
  } catch (error) {
    renderError(error);
  }
}

function applyMode() {
  const practice = activeMode === 'practice';
  document.querySelectorAll('.mode-btn').forEach(button => {
    const selected = button.dataset.mode === activeMode;
    button.classList.toggle('active', selected);
    button.setAttribute('aria-pressed', String(selected));
  });
  document.getElementById('searchInput').placeholder = practice
    ? 'Search capabilities, exercises, and starter code…'
    : 'Search senior questions and tags…';
  document.getElementById('doneLabel').textContent = practice ? 'completed' : 'mastered';
  document.getElementById('reviewLabel').textContent = practice ? 'revisit' : 'revisit';
  document.getElementById('hideBtn').title = practice ? 'Hide completed exercises (H)' : 'Hide mastered questions (H)';
  document.getElementById('shuffleBtn').title = practice ? 'Shuffle exercises (S)' : 'Shuffle questions (S)';
}

async function switchMode(mode) {
  if (!CONTENT_MODES.includes(mode) || mode === activeMode) return;
  activeMode = mode;
  localStorage.setItem('iqh_mode', activeMode);
  activeTopic = 'all';
  topicsOpen = false;
  query = '';
  document.getElementById('searchInput').value = '';
  applyMode();

  document.getElementById('main').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">&#9203;</div>
      <p class="empty-title">Loading ${activeMode === 'practice' ? 'hands-on practice' : 'interview questions'}…</p>
    </div>`;

  await loadContent();
}

/* ── Filter & sort ──────────────────────────────────── */
function visibleQuestions() {
  let qs = activeTopic === 'all'
    ? [...allQuestions]
    : allQuestions.filter(q => q._topicId === activeTopic);

  if (query) {
    const lc = query.toLowerCase();
    qs = qs.filter(q => [
      q.question, q.answer, q.title, q.summary, q.prompt, q.starterCode, q.solution,
      ...(q.tags || []), ...(q.constraints || []), ...(q.deliverables || [])
    ].filter(Boolean).join(' ').toLowerCase().includes(lc));
  }

  if (hideDone) qs = qs.filter(q => progress[q.id] !== 'done');

  if (shuffled) {
    for (let i = qs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [qs[i], qs[j]] = [qs[j], qs[i]];
    }
  }
  return qs;
}

/* ── Render: topics bar ─────────────────────────────── */
function renderTopics() {
  const bar = document.getElementById('topicsBar');
  const itemNoun = activeMode === 'practice' ? 'exercises' : 'questions';
  const options = [
    { id: 'all', label: activeMode === 'practice' ? 'All capabilities' : 'All Topics', count: allQuestions.length },
    ...allTopics.map(t => ({
      id: t.id,
      label: `${t.icon || ''} ${t.domain} - ${t.topic}`.trim(),
      count: allQuestions.filter(q => q._topicId === t.id).length
    }))
  ];

  if (activeMode === 'practice') {
    bar.innerHTML = `<div class="capability-tabs" aria-label="Practice capabilities">
      ${options.map(option => {
        const encoded = option.id === 'all' ? 'all' : topicEncode(option.id);
        return `<button class="capability-tab ${activeTopic === option.id ? 'active' : ''}"
                        aria-pressed="${activeTopic === option.id}"
                        onclick="setTopic('${encoded}')">${esc(option.label)} · ${option.count}</button>`;
      }).join('')}
    </div>`;
    return;
  }

  const active = options.find(t => t.id === activeTopic) || options[0];
  const optionHTML = options.map(t => {
    const encoded = t.id === 'all' ? 'all' : topicEncode(t.id);
    return `<button class="topic-option ${activeTopic === t.id ? 'active' : ''}"
                    onclick="setTopic('${encoded}')">
              <span class="topic-option-title">${esc(t.label)}</span>
              <span class="chip-count">${t.count}</span>
            </button>`;
  }).join('');

  bar.innerHTML =
    `<div class="topic-selector">
      <button class="topic-toggle" id="topicToggle" aria-expanded="${topicsOpen}" onclick="toggleTopics(event)">
        <span class="topic-toggle-main">
          <span class="topic-kicker">Current topic</span>
          <span class="topic-current">${esc(active.label)}</span>
        </span>
        <span class="topic-toggle-side">
          <span>${active.count} ${itemNoun}</span>
          <svg class="topic-chevron" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </span>
      </button>
      <div class="topic-menu ${topicsOpen ? 'open' : ''}" id="topicMenu">
        ${optionHTML}
      </div>
    </div>`;
}

/* ── Render: stats ──────────────────────────────────── */
function renderStats() {
  const scope = activeTopic === 'all'
    ? allQuestions
    : allQuestions.filter(q => q._topicId === activeTopic);

  const total  = scope.length;
  const done   = scope.filter(q => progress[q.id] === 'done').length;
  const review = scope.filter(q => progress[q.id] === 'review').length;
  const pct    = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('sTotal').textContent  = total;
  document.getElementById('sDone').textContent   = done;
  document.getElementById('sReview').textContent = review;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent  = pct + '%';
}

/* ── Render: full page ──────────────────────────────── */
function render() {
  renderTopics();
  renderStats();

  const qs   = visibleQuestions();
  const main = document.getElementById('main');

  if (qs.length === 0) {
    const itemNoun = activeMode === 'practice' ? 'exercises' : 'questions';
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${query ? '🔍' : '✓'}</div>
        <p class="empty-title">${query ? `No ${itemNoun} match` : 'Nothing here!'}</p>
        <p class="empty-desc">${
          query
            ? 'Try a different search term or clear the filter.'
            : `All ${itemNoun} are hidden or complete. Try turning off "Hide done".`
        }</p>
      </div>`;
    return;
  }

  main.innerHTML = qs.map((q, i) => cardHTML(q, i + 1)).join('');
}

/* ── Card HTML ──────────────────────────────────────── */
const EYE_OPEN = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>`;
const EYE_OFF  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/><line x1="2" y1="14" x2="14" y2="2"/></svg>`;

function cardHTML(q, num) {
  const state = progress[q.id] || 'none';
  const diff  = seniorDifficulty(q.difficulty);
  const tags  = (q.tags || []).map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
  const enc   = encodeURIComponent(q.id);
  const practice = q._kind === 'practice';
  const title = practice ? q.title : q.question;
  const revealLabel = practice ? 'Show Walkthrough' : 'Show Answer';
  const positiveLabel = practice ? 'Completed' : 'Mastered';
  const timeBadge = practice && q.estimatedMinutes
    ? `<span class="tag-pill">${esc(q.estimatedMinutes)} min</span>`
    : '';

  const stateIcon = state === 'done'
    ? `<div class="card-state-icon done">✓</div>`
    : state === 'review'
      ? `<div class="card-state-icon review">✗</div>`
      : '';

  return `
  <div class="q-card state-${state}" id="card-${enc}" style="animation-delay:${Math.min(num * 0.03, 0.3)}s">
    <div class="card-top">
      <span class="card-num">#${num}</span>
      <div class="card-content">
        <div class="card-meta">
          <span class="topic-badge">${esc(q._topicIcon)} ${esc(q._topicLabel)}</span>
          <span class="diff-badge diff-${esc(diff.id)}">${esc(diff.label)}</span>
          ${timeBadge}
          ${tags}
        </div>
        <div class="q-text">${esc(title)}</div>
        ${practice && q.summary ? `<div class="q-summary">${esc(q.summary)}</div>` : ''}
      </div>
      ${stateIcon}
    </div>

    ${practice ? practiceWorkspace(q) : ''}

    <div class="answer-wrap" id="aw-${enc}">
      <div class="answer-inner">
        <div class="answer-divider"></div>
        <div class="answer-body">${practice ? practiceWalkthrough(q) : formatAnswer(q.answer || '')}</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn-reveal" id="rb-${enc}" data-open-label="Hide ${practice ? 'Walkthrough' : 'Answer'}" data-closed-label="${revealLabel}" onclick="toggleAnswer('${enc}')">
        ${EYE_OPEN} ${revealLabel}
      </button>
      <div class="feedback-group">
        <button class="btn-fb btn-got ${state === 'done' ? 'active' : ''}"
                onclick="mark('${enc}', 'done')">✓ ${positiveLabel}</button>
        <button class="btn-fb btn-not ${state === 'review' ? 'active' : ''}"
                onclick="mark('${enc}', 'review')">✗ Revisit</button>
      </div>
    </div>
  </div>`;
}

function seniorDifficulty(raw) {
  const levels = {
    easy:        { id: 'core', label: 'Senior core' },
    core:        { id: 'core', label: 'Senior core' },
    medium:      { id: 'advanced', label: 'Advanced' },
    advanced:    { id: 'advanced', label: 'Advanced' },
    hard:        { id: 'deep-dive', label: 'Deep dive' },
    'deep-dive': { id: 'deep-dive', label: 'Deep dive' }
  };
  return levels[raw] || levels.advanced;
}

function practiceList(title, items) {
  if (!Array.isArray(items) || items.length === 0) return '';
  return `<section class="practice-section"><div class="reveal-heading">${esc(title)}</div><ul>${items.map(item => `<li>${inlineFmt(item)}</li>`).join('')}</ul></section>`;
}

function exerciseDetails(title, items) {
  if (!Array.isArray(items) || items.length === 0) return '';
  return `<details class="exercise-details">
    <summary>${esc(title)} <span>${items.length}</span></summary>
    <div class="exercise-details-content"><ul>${items.map(item => `<li>${inlineFmt(item)}</li>`).join('')}</ul></div>
  </details>`;
}

function practiceWorkspace(q) {
  const requirements = q.requirements || q.deliverables || [];
  return `
    <div class="practice-prompt">${formatAnswer(q.prompt || '')}</div>
    <div class="starter-code">
      <div class="starter-code-title">Starter code</div>
      <pre><code>${esc(q.starterCode || '// Define the smallest useful starting point for this exercise.')}</code></pre>
    </div>
    ${exerciseDetails('Requirements', requirements)}
    ${exerciseDetails('Constraints', q.constraints)}`;
}

function practiceWalkthrough(q) {
  return [
    practiceList('Evaluation rubric', q.evaluation),
    practiceList('Hints', q.hints),
    `<section class="practice-section"><div class="reveal-heading">Solution direction</div>${formatAnswer(q.solution || '')}</section>`
  ].join('');
}

/* ── Toggle answer reveal ───────────────────────────── */
function toggleAnswer(enc) {
  const wrap = document.getElementById('aw-' + enc);
  const btn  = document.getElementById('rb-' + enc);
  const open = wrap.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.innerHTML = open
    ? `${EYE_OFF} ${btn.dataset.openLabel}`
    : `${EYE_OPEN} ${btn.dataset.closedLabel}`;
}

/* ── Mark question ──────────────────────────────────── */
function mark(enc, state) {
  const id   = decodeURIComponent(enc);
  const prev = progress[id] || 'none';
  progress[id] = prev === state ? 'none' : state;
  saveProgress();

  const card = document.getElementById('card-' + enc);
  if (!card) return;

  const newState = progress[id];
  card.className = `q-card state-${newState}`;
  card.querySelector('.btn-got').classList.toggle('active', newState === 'done');
  card.querySelector('.btn-not').classList.toggle('active', newState === 'review');

  const existing = card.querySelector('.card-state-icon');
  if (existing) existing.remove();
  if (newState === 'done') {
    card.querySelector('.card-top').insertAdjacentHTML('beforeend', '<div class="card-state-icon done">✓</div>');
  } else if (newState === 'review') {
    card.querySelector('.card-top').insertAdjacentHTML('beforeend', '<div class="card-state-icon review">✗</div>');
  }

  renderStats();

  if (hideDone && newState === 'done') {
    card.style.transition = 'opacity .25s, transform .25s';
    card.style.opacity = '0';
    card.style.transform = 'scale(.98)';
    setTimeout(() => card.remove(), 260);
  }
}

/* ── Topic switch ───────────────────────────────────── */
function setTopic(enc) {
  activeTopic = enc === 'all' ? 'all' : topicDecode(enc);
  topicsOpen = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function toggleTopics(e) {
  if (e) e.stopPropagation();
  topicsOpen = !topicsOpen;
  renderTopics();
}

/* ── Markdown-lite formatter ────────────────────────── */
function formatAnswer(raw) {
  if (!raw) return '<em>No answer provided.</em>';

  const codeBlocks = [];
  let s = raw.replace(/```[^\n]*\n?([\s\S]*?)```/g, (_, code) => {
    codeBlocks.push(code.replace(/\n$/, ''));
    return `\n\n\x00CB${codeBlocks.length - 1}\x00\n\n`;
  });

  const paras = s.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);

  const html = paras.map(para => {
    if (/^\x00CB\d+\x00$/.test(para)) {
      const i = +para.slice(3, -1);
      return `<pre><code>${esc(codeBlocks[i])}</code></pre>`;
    }
    const lines = para.split('\n');
    if (lines.length > 0 && lines.every(l => /^[-*]\s/.test(l.trim()))) {
      return `<ul>${lines.map(l => `<li>${inlineFmt(l.replace(/^[-*]\s+/, '').trim())}</li>`).join('')}</ul>`;
    }
    if (lines.length > 0 && lines.every(l => /^\d+\.\s/.test(l.trim()))) {
      return `<ol>${lines.map(l => `<li>${inlineFmt(l.replace(/^\d+\.\s+/, '').trim())}</li>`).join('')}</ol>`;
    }
    return `<p>${lines.map(inlineFmt).join('<br>')}</p>`;
  }).join('\n');

  return html;
}

function inlineFmt(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

/* ── Toast ──────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── Error state ────────────────────────────────────── */
function renderError(error) {
  console.error(error);
  document.getElementById('main').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">!</div>
      <p class="empty-title">Cannot load interview content</p>
      <p class="empty-desc">
        This app must be served over HTTP — it won't work when opened as a local file.<br><br>
        Run in your terminal:<br>
        <code>python -m http.server 8080</code><br>
        then open <code>http://localhost:8080</code><br><br>
        Or use the VS Code <strong>Live Server</strong> extension.
      </p>
    </div>`;
}

/* ── Toolbar buttons ────────────────────────────────── */
document.getElementById('shuffleBtn').addEventListener('click', () => {
  shuffled = !shuffled;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffled);
  toast(shuffled ? '🔀 Shuffle on' : '↕ Shuffle off');
  render();
});

document.getElementById('hideBtn').addEventListener('click', () => {
  hideDone = !hideDone;
  document.getElementById('hideBtn').classList.toggle('active', hideDone);
  toast(hideDone ? `Hiding ${activeMode === 'practice' ? 'completed exercises' : 'mastered questions'}` : 'Showing all');
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  const scope = activeTopic === 'all'
    ? allQuestions
    : allQuestions.filter(q => q._topicId === activeTopic);
  const hasProgress = scope.some(q => progress[q.id]);
  if (!hasProgress) { toast('Nothing to reset'); return; }
  if (!confirm(`Reset progress for ${activeTopic === 'all' ? 'all topics' : 'this topic'}?`)) return;
  scope.forEach(q => delete progress[q.id]);
  saveProgress();
  render();
  toast('↺ Progress reset');
});

/* ── Topics bar horizontal scroll via mouse wheel ───── */
document.getElementById('topicsBar').addEventListener('wheel', e => {
  const bar = e.currentTarget;
  if (bar.scrollWidth <= bar.clientWidth) return;
  e.preventDefault();
  bar.scrollLeft += e.deltaY;
}, { passive: false });

/* ── Search ─────────────────────────────────────────── */
let searchDebounce;
document.querySelectorAll('.mode-btn').forEach(button => {
  button.addEventListener('click', () => switchMode(button.dataset.mode));
});

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { query = e.target.value.trim(); render(); }, 200);
});

/* ── Keyboard shortcuts ─────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's' || e.key === 'S') document.getElementById('shuffleBtn').click();
  if (e.key === 'h' || e.key === 'H') document.getElementById('hideBtn').click();
  if (e.key === 'd' || e.key === 'D') document.getElementById('darkBtn').click();
  if (e.key === 'Escape' && topicsOpen) { topicsOpen = false; renderTopics(); return; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') { document.getElementById('searchInput').value = ''; query = ''; render(); }
});

document.addEventListener('click', e => {
  if (!topicsOpen) return;
  const bar = document.getElementById('topicsBar');
  if (bar && !bar.contains(e.target)) {
    topicsOpen = false;
    renderTopics();
  }
});

/* ── Dark mode ──────────────────────────────────────── */
const MOON_ICON = `<path d="M8 1a7 7 0 1 0 7 7A5.5 5.5 0 0 1 8 1z"/>`;
const SUN_ICON  = `<circle cx="8" cy="8" r="3.5"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/><line x1="3" y1="3" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="13" y2="13"/><line x1="13" y1="3" x2="11.5" y2="4.5"/><line x1="4.5" y1="11.5" x2="3" y2="13"/>`;

const DISPLAY_ICON = `<rect x="2" y="3" width="12" height="9" rx="1.5"/><path d="M6 15h4M8 12v3"/>`;

const THEMES = [
  { id: 'light', label: 'Light', icon: SUN_ICON },
  { id: 'dark', label: 'Dark', icon: MOON_ICON },
  { id: 'oled-blue', label: 'OLED Blue', icon: DISPLAY_ICON },
  { id: 'oled-green', label: 'OLED Green', icon: DISPLAY_ICON },
  { id: 'oled-amber', label: 'OLED Amber', icon: DISPLAY_ICON }
];

function savedTheme() {
  const theme = localStorage.getItem('iqh_theme');
  if (THEMES.some(item => item.id === theme)) return theme;
  return localStorage.getItem('iqh_dark') === '1' ? 'dark' : 'light';
}

let activeTheme = savedTheme();

function themeIndex(id) {
  return Math.max(0, THEMES.findIndex(item => item.id === id));
}

function nextTheme() {
  return THEMES[(themeIndex(activeTheme) + 1) % THEMES.length];
}

function applyTheme(themeId) {
  activeTheme = THEMES.some(item => item.id === themeId) ? themeId : 'light';
  if (activeTheme === 'light') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', activeTheme);
  }
  const icon  = document.getElementById('darkIcon');
  const label = document.getElementById('darkLabel');
  const upcoming = nextTheme();
  if (icon) icon.innerHTML = upcoming.icon;
  if (label) label.textContent = upcoming.label;
  document.getElementById('darkBtn').classList.toggle('active', activeTheme !== 'light');
  document.getElementById('darkBtn').title = `Switch to ${upcoming.label} theme (D)`;
}

applyTheme(activeTheme);

document.getElementById('darkBtn').addEventListener('click', () => {
  const theme = nextTheme();
  localStorage.setItem('iqh_theme', theme.id);
  localStorage.setItem('iqh_dark', theme.id === 'light' ? '0' : '1');
  applyTheme(theme.id);
  toast(`Theme: ${theme.label}`);
});

/* ── Go ─────────────────────────────────────────────── */
boot();
</script>

</html>
