an write performance.\n\nCommon examples:\n\n- Event listener lists.\n- Observer registries.\n- Rarely changing configuration values.\n- Small read-mostly collections shared between threads.\n\nIt is usually a bad fit for large lists or frequent writes.","difficulty":"easy","tags":["copyonwritearraylist","read-heavy","listeners","configuration"]},{"id":"java-copyonwritearraylist-003","question":"How do CopyOnWriteArrayList iterators work?","answer":"Iterators use a snapshot of the array that existed when the iterator was created. They do not see later changes and do not throw `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nThe iterator does not support mutating operations such as `remove`, `set`, or `add`.","difficulty":"medium","tags":["copyonwritearraylist","iterator","snapshot","concurrentmodificationexception"]},{"id":"java-copyonwritearraylist-004","question":"Why are writes expensive in CopyOnWriteArrayList?","answer":"Every structural change copies the underlying array and publishes the new array. This makes each write O(n) in the number of elements.\n\n```java\nlist.add(listener);    // copies the array\nlist.remove(listener); // copies the array again\n```\n\nThe tradeoff is that readers can traverse stable arrays safely. This is excellent for rare writes, but very costly for write-heavy workloads.","difficulty":"medium","tags":["copyonwritearraylist","performance","writes","allocation"]},{"id":"java-copyonwritearraylist-005","question":"Does CopyOnWriteArrayList make compound actions atomic?","answer":"No. Individual operations are thread-safe, but a sequence of calls is not automatically atomic as a business operation.\n\n```java\nif (!list.contains(x)) {\n    list.add(x); // another thread may add x between the calls\n}\n```\n\nUse provided atomic-style methods such as `addIfAbsent` or `addAllAbsent` when they match the needed operation. Otherwise coordinate externally.","difficulty":"medium","tags":["copyonwritearraylist","atomicity","addifabsent","race-condition"]},{"id":"java-copyonwritearraylist-006","question":"How does CopyOnWriteArrayList compare with Collections.synchronizedList()?","answer":"`Collections.synchronizedList` protects a normal list with a lock. Iteration still requires manually synchronizing on the wrapper.\n\n`CopyOnWriteArrayList` gives snapshot iterators that are safe without external locking, but writes copy the whole array.\n\nChoose synchronized wrappers for balanced or write-heavy synchronized access. Choose copy-on-write for read-heavy, iteration-heavy workloads.","difficulty":"medium","tags":["copyonwritearraylist","synchronizedlist","iteration","performance"]},{"id":"java-copyonwritearraylist-007","question":"Can CopyOnWriteArrayList contain null and duplicates?","answer":"Yes. `CopyOnWriteArrayList` follows list semantics: it permits duplicate elements and permits null elements.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nlist.add(null);\nlist.add(\"A\");\nlist.add(\"A\");\n```\n\nIf uniqueness is required, use `addIfAbsent`, or consider a set-like data structure.","difficulty":"easy","tags":["copyonwritearraylist","null","duplicates","list"]},{"id":"java-copyonwritearraylist-008","question":"What memory tradeoffs does CopyOnWriteArrayList have?","answer":"During writes, both the old and new arrays may exist at the same time. Old arrays can also remain alive while iterators still reference their snapshots.\n\nThis increases allocation pressure and memory retention for large lists or frequent mutations.\n\nThe class trades write cost and memory churn for simple, safe, lock-free-style read traversal.","difficulty":"hard","tags":["copyonwritearraylist","memory","snapshot","allocation"]}]},{"domain":"Java","topic":"Core 1","icon":"☕","questions":[{"id":"java-core-1-001","question":"What is the contract of Object.equals()?","answer":"For non-null references, `equals()` must be:\n\n- **Reflexive:** `x.equals(x)` is `true`.\n- **Symmetric:** `x.equals(y)` has the same result as `y.equals(x)`.\n- **Transitive:** if `x` equals `y` and `y` equals `z`, then `x` equals `z`.\n- **Consistent:** repeated calls return the same result while equality-relevant state is unchanged.\n- **Non-null:** `x.equals(null)` is `false`.\n\nThe default implementation in `Object` uses identity equality. A value-oriented class overrides it to compare the fields that define its logical value.","difficulty":"easy","tags":["equals","object-contract","value-semantics"]},{"id":"java-core-1-002","question":"What is the contract between equals() and hashCode()?","answer":"The essential rule is: **objects that are equal according to `equals()` must return the same hash code**.\n\nThe reverse is not required: two unequal objects may have the same hash code because collisions are valid.\n\nAlso, repeated `hashCode()` calls must return the same value while equality-relevant state is unchanged. Therefore, every field used by `equals()` should normally contribute to `hashCode()` as well.\n\n```java\n@Override\npublic int hashCode() {\n    return Objects.hash(firstName, lastName, birthDate);\n}\n```\n\nBreaking this contract makes hash-based collections behave incorrectly.","difficulty":"easy","tags":["equals","hashcode","object-contract"]},{"id":"java-core-1-003","question":"What can happen when equals() is overridden but hashCode() is not?","answer":"Equal objects can receive different identity-based hash codes. A `HashMap` or `HashSet` may then place them in different buckets and fail to find an object that is logically present.\n\n```java\nSet<Person> people = new HashSet<>();\npeople.add(new Person(\"Ada\"));\n\n// May be false when equals() is overridden but hashCode() is not.\nboolean present = people.contains(new Person(\"Ada\"));\n```\n\nAlways override `hashCode()` when overriding `equals()`.","difficulty":"easy","tags":["equals","hashcode","hashset","hashmap"]},{"id":"java-core-1-004","question":"Why are mutable keys dangerous in HashMap and HashSet?","answer":"A hash-based collection chooses a bucket using the key's hash code. If a field used by `equals()` and `hashCode()` changes after insertion, lookup uses the new hash and may search a different bucket.\n\n```java\nMap<User, String> roles = new HashMap<>();\nUser user = new User(\"alice\");\nroles.put(user, \"admin\");\n\nuser.setUsername(\"bob\");\nroles.get(user); // may return null\n```\n\nKeys should ideally be immutable. At minimum, equality-relevant fields must remain unchanged while the object is used as a key.","difficulty":"medium","tags":["hashcode","hashmap","immutability","collections"]},{"id":"java-core-1-005","question":"Why can using instanceof in equals() cause symmetry problems in an inheritance hierarchy?","answer":"A base class that accepts subclasses via `instanceof` may consider a subclass equal using only base fields, while the subclass considers its additional fields and returns `false` in the reverse comparison.\n\n```java\nclass Point {\n    int x, y;\n    public boolean equals(Object o) {\n        return o instanceof Point p && x == p.x && y == p.y;\n    }\n}\n\nclass ColoredPoint extends Point {\n    Color color; // equality may also compare color\n}\n```\n\nThere is no universally correct inheritance-based value equality. Common approaches are:\n\n- Make value classes final.\n- Use `getClass()` equality when different runtime types must not be equal.\n- Prefer composition over extending value classes.\n- Use a carefully designed protocol only when polymorphic equality is truly required.","difficulty":"hard","tags":["equals","inheritance","symmetry","instanceof"]},{"id":"java-core-1-006","question":"What is the difference between Comparable and Comparator?","answer":"`Comparable<T>` defines a type's **natural ordering** inside the class through `compareTo(T)`.\n\n```java\nclass Version implements Comparable<Version> {\n    public int compareTo(Version other) { /* ... */ }\n}\n```\n\n`Comparator<T>` is an external strategy that defines an ordering through `compare(T, T)`. A type can have many comparators.\n\n```java\nComparator<Employee> bySalary =\n    Comparator.comparing(Employee::salary);\n```\n\nUse `Comparable` when one ordering is intrinsic and broadly expected. Use `Comparator` for alternative orderings, third-party classes, or when ordering should remain separate from the model.","difficulty":"easy","tags":["comparable","comparator","sorting"]},{"id":"java-core-1-007","question":"What rules must compareTo() and Comparator.compare() follow?","answer":"Comparison must provide a consistent ordering:\n\n- The sign is antisymmetric: `sign(compare(x, y)) == -sign(compare(y, x))`.\n- It is transitive: if `x > y` and `y > z`, then `x > z`.\n- If `compare(x, y) == 0`, comparisons of `x` and `y` against any `z` must have the same sign.\n\nFor `Comparable`, it is strongly recommended, but not strictly required, that `x.compareTo(y) == 0` exactly when `x.equals(y)` is `true`. Violations should be documented because sorted sets and maps use comparison, not `equals()`, to determine duplicate keys.","difficulty":"medium","tags":["comparable","comparator","contract","ordering"]},{"id":"java-core-1-008","question":"Why should comparison code avoid subtracting numeric values?","answer":"Returning `a - b` can overflow and produce the wrong sign.\n\n```java\n// Incorrect for extreme values\nreturn left.age - right.age;\n\n// Correct\nreturn Integer.compare(left.age, right.age);\n```\n\nThe same applies to `long`, `double`, and other numeric types. Use methods such as `Integer.compare`, `Long.compare`, and comparator factories.","difficulty":"easy","tags":["comparator","overflow","sorting"]},{"id":"java-core-1-009","question":"How do you compose comparators and handle null values?","answer":"Comparator factory and default methods make ordering explicit and composable.\n\n```java\nComparator<Employee> ordering = Comparator\n    .comparing(Employee::department,\n        Comparator.nullsLast(String.CASE_INSENSITIVE_ORDER))\n    .thenComparing(Employee::lastName)\n    .thenComparing(Employee::firstName)\n    .thenComparingInt(Employee::id);\n```\n\nUseful methods include `comparing`, `comparingInt`, `thenComparing`, `reversed`, `nullsFirst`, and `nullsLast`. Primitive-specialized factories avoid boxing.","difficulty":"medium","tags":["comparator","null-handling","sorting","composition"]},{"id":"java-core-1-010","question":"What happens when a TreeSet comparator is inconsistent with equals()?","answer":"`TreeSet` and `TreeMap` use comparison to determine whether elements or keys are duplicates. If `compare(a, b) == 0`, the collection treats them as the same entry even when `a.equals(b)` is `false`.\n\nConversely, objects that are equal but compare as non-zero may both appear in a sorted set. The collection still follows its own ordering rules, but its behavior no longer matches the general `Set` or `Map` expectation based on `equals()`.\n\nA classic example is `BigDecimal`: `new BigDecimal(\"1.0\")` and `new BigDecimal(\"1.00\")` compare as zero, but are not equal because `equals()` also considers scale.","difficulty":"hard","tags":["comparator","treeset","treemap","equals"]},{"id":"java-core-1-011","question":"What makes a Java class immutable?","answer":"An immutable object's observable state cannot change after construction. Typical design rules are:\n\n- Keep fields `private` and `final`.\n- Fully initialize the object in its constructor or factory.\n- Provide no mutator methods.\n- Prevent subclass-based mutation, often by making the class `final`.\n- Do not expose mutable internal state.\n- Make defensive copies of mutable inputs and outputs.\n- Validate invariants during construction.\n\n`final` fields alone are insufficient because a final reference can still point to a mutable object.","difficulty":"easy","tags":["immutability","class-design","final"]},{"id":"java-core-1-012","question":"Why are defensive copies required for immutable classes?","answer":"Without defensive copies, callers can mutate the object's state through an aliased reference.\n\n```java\npublic final class Schedule {\n    private final List<Instant> times;\n\n    public Schedule(List<Instant> times) {\n        this.times = List.copyOf(times);\n    }\n\n    public List<Instant> times() {\n        return times; // safe: List.copyOf produced an unmodifiable list\n    }\n}\n```\n\nFor mutable element types, a shallow collection copy is not enough; each element may also require copying. Arrays should normally be cloned both when accepted and when returned.","difficulty":"medium","tags":["immutability","defensive-copy","collections"]},{"id":"java-core-1-013","question":"What benefits does immutability provide?","answer":"Immutable objects are easier to reason about because their state does not change after construction. Benefits include:\n\n- Natural thread safety for their own state.\n- Safe sharing and caching.\n- Stable behavior as map keys and set members.\n- Simpler invariants and fewer temporal bugs.\n- Easier testing and debugging.\n- Freedom to reuse instances or memoize derived values.\n\nImmutability does not automatically make referenced external resources or mutable collaborators thread-safe.","difficulty":"easy","tags":["immutability","thread-safety","design"]},{"id":"java-core-1-014","question":"Is an unmodifiable collection the same as an immutable collection?","answer":"No. An **unmodifiable view** prevents mutation through that reference but may still reflect changes to a mutable backing collection.\n\n```java\nList<String> source = new ArrayList<>();\nList<String> view = Collections.unmodifiableList(source);\nsource.add(\"new\"); // view now also contains \"new\"\n```\n\n`List.copyOf(source)` creates an unmodifiable snapshot of the element references. However, if the elements themselves are mutable, changes to those objects remain visible. Deep immutability requires immutable elements or defensive element copies.","difficulty":"medium","tags":["immutability","collections","defensive-copy"]},{"id":"java-core-1-015","question":"How can an immutable object support updates?","answer":"It returns a new object containing the changed value while leaving the original untouched. This is often called a **with-method** or functional update.\n\n```java\npublic final class Money {\n    private final BigDecimal amount;\n    private final Currency currency;\n\n    public Money withAmount(BigDecimal newAmount) {\n        return new Money(newAmount, currency);\n    }\n}\n```\n\nStructural sharing can make this efficient for larger persistent data structures. Builders are also useful when construction has many optional values, but the built object should not retain mutable builder state.","difficulty":"medium","tags":["immutability","with-method","builder","functional-style"]},{"id":"java-core-1-016","question":"What is a Java record, and what does the compiler generate for it?","answer":"A record is a concise declaration for a class whose primary purpose is to model a fixed set of data components.\n\n```java\nrecord Point(int x, int y) {}\n```\n\nThe compiler provides:\n\n- A `private final` field for each component.\n- A public accessor named exactly like each component, such as `x()`.\n- A canonical constructor.\n- Component-based `equals()` and `hashCode()`.\n- A component-based `toString()`.\n\nA record is implicitly final and extends `java.lang.Record`. It may implement interfaces, declare methods, and declare static members.","difficulty":"easy","tags":["records","data-modeling","compiler"]},{"id":"java-core-1-017","question":"Are Java records deeply immutable?","answer":"No. Record component fields are final, so their references cannot be reassigned after construction, but referenced objects may still be mutable.\n\n```java\nrecord Team(List<String> members) {\n    Team {\n        members = List.copyOf(members);\n    }\n}\n```\n\nThe compact constructor above prevents callers from mutating the record through the original list. Deep immutability still depends on the mutability of component values and on whether defensive copies are made.","difficulty":"medium","tags":["records","immutability","defensive-copy"]},{"id":"java-core-1-018","question":"What is a compact record constructor, and how is it used for validation?","answer":"A compact constructor omits the parameter list and explicit component assignments. Its body can validate or normalize constructor parameters before the compiler assigns them to fields.\n\n```java\nrecord Range(int start, int end) {\n    Range {\n        if (start > end) {\n            throw new IllegalArgumentException(\"start must not exceed end\");\n        }\n    }\n}\n```\n\nDo not assign directly to component fields in a compact constructor. Reassigning a parameter, for example `name = name.trim()`, changes the value that is later assigned automatically.","difficulty":"medium","tags":["records","constructor","validation"]},{"id":"java-core-1-019","question":"What restrictions distinguish records from ordinary classes?","answer":"Important restrictions include:\n\n- A record is implicitly final and cannot be extended.\n- It implicitly extends `java.lang.Record`, so it cannot extend another class.\n- Instance fields other than the declared record component fields are not allowed.\n- Component fields are final.\n- A record cannot be abstract.\n- Native methods cannot be declared in a record.\n\nRecords can still implement interfaces, define static fields, add methods and nested types, customize generated methods, and use annotations where applicable.","difficulty":"medium","tags":["records","inheritance","restrictions"]},{"id":"java-core-1-020","question":"When should you avoid using a record?","answer":"Avoid a record when the abstraction is not fundamentally defined by its complete state description, for example when:\n\n- Identity matters independently of component values.\n- The object requires mutable lifecycle state.\n- Framework constraints require a superclass or no-argument mutable bean.\n- You need hidden per-instance state outside the declared components.\n- The API must preserve freedom to change its state representation without changing its public component contract.\n\nRecords are excellent value carriers, but they are not merely shorter syntax for every class.","difficulty":"medium","tags":["records","api-design","value-semantics"]},{"id":"java-core-1-021","question":"What problem do sealed classes and interfaces solve?","answer":"A sealed type restricts which classes or interfaces may directly extend or implement it. This lets an API model a known, controlled set of alternatives.\n\n```java\nsealed interface Result permits Success, Failure {}\nrecord Success(String value) implements Result {}\nrecord Failure(String message) implements Result {}\n```\n\nBenefits include stronger domain modeling, controlled extension, and exhaustive pattern matching. They are useful for algebraic-style hierarchies such as commands, outcomes, syntax-tree nodes, and payment states.","difficulty":"easy","tags":["sealed-classes","inheritance","domain-modeling"]},{"id":"java-core-1-022","question":"What modifiers must a permitted direct subclass of a sealed class use?","answer":"A permitted direct subclass must explicitly declare one of:\n\n- `final`: no further subclasses are allowed.\n- `sealed`: it declares another controlled set of permitted subclasses.\n- `non-sealed`: it reopens that branch to unrestricted subclassing.\n\n```java\nsealed class Shape permits Circle, Polygon, CustomShape {}\nfinal class Circle extends Shape {}\nsealed class Polygon extends Shape permits Triangle {}\nnon-sealed class CustomShape extends Shape {}\nfinal class Triangle extends Polygon {}\n```\n\nThe rule applies to direct subclasses, not necessarily every descendant.","difficulty":"easy","tags":["sealed-classes","final","non-sealed","inheritance"]},{"id":"java-core-1-023","question":"What are the placement rules for permitted subclasses of a sealed type?","answer":"Permitted direct subclasses must be accessible to the sealed type and belong to the same module when the sealed type is in a named module. In an unnamed module, they must be in the same package.\n\nThe `permits` clause may be omitted when all direct subclasses are declared in the same source file; the compiler can infer them.\n\nThese restrictions let the compiler reliably know the closed set of direct alternatives.","difficulty":"medium","tags":["sealed-classes","modules","packages","permits"]},{"id":"java-core-1-024","question":"How do sealed hierarchies enable exhaustive switch expressions?","answer":"Because the compiler knows all permitted alternatives, a switch can cover every subtype without a `default` branch.\n\n```java\nstatic double area(Shape shape) {\n    return switch (shape) {\n        case Circle c -> Math.PI * c.radius() * c.radius();\n        case Rectangle r -> r.width() * r.height();\n    };\n}\n```\n\nIf `Shape` is sealed and those are all permitted alternatives, the switch is exhaustive. This is valuable because adding another permitted subtype can produce compile-time errors at switches that must be reconsidered.","difficulty":"medium","tags":["sealed-classes","switch","exhaustiveness","pattern-matching"]},{"id":"java-core-1-025","question":"What is the effect of a non-sealed subtype on a sealed hierarchy?","answer":"`non-sealed` reopens one branch of the hierarchy. Any class may extend that subtype, subject to normal Java access rules.\n\n```java\nsealed interface Event permits SystemEvent, UserEvent {}\nfinal class SystemEvent implements Event {}\nnon-sealed class UserEvent implements Event {}\n```\n\nThe direct alternatives of `Event` remain known, but `UserEvent` can have unknown descendants. Pattern matching can still cover that branch with a pattern for `UserEvent`; it cannot assume a closed list of its concrete descendants.","difficulty":"medium","tags":["sealed-classes","non-sealed","inheritance","exhaustiveness"]},{"id":"java-core-1-026","question":"How does pattern matching for instanceof improve traditional type checks and casts?","answer":"It combines the type test and cast into one operation by introducing a pattern variable.\n\n```java\n// Traditional form\nif (value instanceof String) {\n    String text = (String) value;\n    System.out.println(text.length());\n}\n\n// Pattern matching\nif (value instanceof String text) {\n    System.out.println(text.length());\n}\n```\n\nThe pattern variable is definitely assigned only where the match is known to have succeeded, reducing boilerplate and eliminating a potentially inconsistent explicit cast.","difficulty":"easy","tags":["instanceof","pattern-matching","casting"]},{"id":"java-core-1-027","question":"What is the scope of an instanceof pattern variable?","answer":"Its scope is flow-sensitive: the variable is available only where the compiler can prove that the pattern matched.\n\n```java\nif (value instanceof String text) {\n    use(text); // in scope\n}\n\nif (!(value instanceof String text)) {\n    return;\n}\nuse(text); // in scope because the non-match path returned\n```\n\nIt is not simply scoped to the nearest braces. Java's flow analysis accounts for branching and abrupt completion such as `return` or `throw`.","difficulty":"medium","tags":["instanceof","pattern-matching","scope","flow-analysis"]},{"id":"java-core-1-028","question":"How do && and || affect the scope of an instanceof pattern variable?","answer":"With `&&`, the right operand runs only when the match succeeded, so the variable is available there.\n\n```java\nif (value instanceof String text && !text.isBlank()) {\n    use(text);\n}\n```\n\nWith `||`, the right operand may run when the pattern did not match, so the variable is not available.\n\n```java\n// Does not compile: text may not exist on the right side.\nif (value instanceof String text || text.isBlank()) { }\n```\n\nThis follows short-circuit evaluation and definite-assignment analysis.","difficulty":"medium","tags":["instanceof","pattern-matching","short-circuit","scope"]},{"id":"java-core-1-029","question":"How does pattern matching for instanceof behave with null?","answer":"A type pattern does not match `null`, so the condition evaluates to `false` and the pattern variable is not introduced.\n\n```java\nObject value = null;\nif (value instanceof String text) {\n    // Not entered\n}\n```\n\nThis makes a separate null check unnecessary when the desired behavior is simply to execute code only for a non-null value of the target type.","difficulty":"easy","tags":["instanceof","pattern-matching","null"]},{"id":"java-core-1-030","question":"What is an unconditional instanceof pattern, and why can it be rejected?","answer":"A pattern is unconditional when the static type of the expression is already a subtype of the pattern type, making the test always succeed for non-null values.\n\n```java\nString text = \"hello\";\n// Compile-time error: expression is already a String.\nif (text instanceof String same) { }\n```\n\nSuch a test provides no useful type refinement and is rejected. This is analogous to Java rejecting some provably redundant or impossible type operations.","difficulty":"hard","tags":["instanceof","pattern-matching","compiler","type-system"]},{"id":"java-core-1-031","question":"What is the difference between a switch statement and a switch expression?","answer":"A traditional switch statement performs control flow and does not itself produce a value. A switch expression evaluates to a value and must be exhaustive.\n\n```java\nString label = switch (status) {\n    case NEW -> \"New\";\n    case RUNNING -> \"In progress\";\n    case DONE -> \"Complete\";\n};\n```\n\nArrow labels avoid accidental fall-through. Switch statements can also use arrow labels, while expression form is useful for direct assignment, return values, and expression composition.","difficulty":"easy","tags":["switch-expression","control-flow","exhaustiveness"]},{"id":"java-core-1-032","question":"When is yield used in a switch expression?","answer":"Use `yield` when a colon-style group or an arrow block needs multiple statements before producing its value.\n\n```java\nint score = switch (grade) {\n    case \"A\" -> 100;\n    case \"B\" -> {\n        audit(grade);\n        yield 80;\n    }\n    default -> 0;\n};\n```\n\n`yield` returns a value from the switch expression; it does not return from the enclosing method. A simple arrow expression supplies its value without `yield`.","difficulty":"easy","tags":["switch-expression","yield","control-flow"]},{"id":"java-core-1-033","question":"What does it mean for a switch expression to be exhaustive?","answer":"Every possible selector value must be handled so the expression always produces a result or completes abruptly by throwing an exception.\n\nExhaustiveness can be achieved with:\n\n- A `default` label.\n- All constants of an enum.\n- All relevant alternatives of a sealed hierarchy when using type patterns.\n- A total type pattern where applicable.\n\nEven when an exhaustive enum switch has no explicit `default`, the compiler protects against an incompatible enum evolution scenario by arranging for an exception if an unknown constant is encountered at runtime.","difficulty":"medium","tags":["switch-expression","exhaustiveness","enum","sealed-classes"]},{"id":"java-core-1-034","question":"How are null selector values handled by modern switch constructs?","answer":"Historically, switching on `null` throws `NullPointerException`. Pattern-matching switch supports an explicit `case null` when null is a meaningful input.\n\n```java\nString describe(Object value) {\n    return switch (value) {\n        case null -> \"missing\";\n        case String text -> \"text: \" + text;\n        default -> \"other\";\n    };\n}\n```\n\nA `default` label does not implicitly match null. Handle null explicitly or reject it before the switch.","difficulty":"medium","tags":["switch-expression","null","pattern-matching"]},{"id":"java-core-1-035","question":"What are guarded patterns and dominance rules in a pattern-matching switch?","answer":"A guarded case adds a boolean condition with `when` after a successful pattern match.\n\n```java\nreturn switch (value) {\n    case String text when text.isBlank() -> \"blank\";\n    case String text -> \"text\";\n    default -> \"other\";\n};\n```\n\nCase order matters. An earlier, broader pattern can **dominate** a later narrower or equivalent pattern, making the later case unreachable and causing a compile-time error.\n\n```java\n// Invalid ordering: Object matches every non-null String first.\ncase Object object -> \"object\";\ncase String text -> \"text\";\n```\n\nPlace specific patterns and guarded cases before broader unguarded patterns.","difficulty":"hard","tags":["switch-expression","pattern-matching","guards","dominance"]}]},{"domain":"Java","topic":"Generics","icon":"🏷️","questions":[{"id":"java-generics-001","question":"What problem do Java generics solve?","answer":"Generics let classes, interfaces, and methods operate on types while preserving compile-time type safety.\n\n```java\nList<String> names = new ArrayList<>();\nnames.add(\"Ada\");\nString first = names.get(0); // no cast needed\n```\n\nThey reduce casts, document API intent, and allow the compiler to catch many type errors before runtime.","difficulty":"easy","tags":["generics","type-safety","collections"]},{"id":"java-generics-002","question":"What is type erasure?","answer":"Java generics are implemented mostly by compile-time checks plus type erasure. The compiler replaces type parameters with their bounds, inserts casts when needed, and generates bridge methods in some inheritance cases.\n\nAt runtime, `List<String>` and `List<Integer>` are both just `List`.\n\n```java\nSystem.out.println(new ArrayList<String>().getClass()\n    == new ArrayList<Integer>().getClass()); // true\n```","difficulty":"medium","tags":["generics","type-erasure","runtime"]},{"id":"java-generics-003","question":"Why is List<String> not a subtype of List<Object>?","answer":"Generic types are invariant. If `List<String>` were assignable to `List<Object>`, code could add a non-string to a list of strings.\n\n```java\nList<String> strings = new ArrayList<>();\n// List<Object> objects = strings; // does not compile\n// objects.add(42);\n```\n\nUse wildcards when you need variance, such as `List<? extends Object>` for reading values as objects.","difficulty":"medium","tags":["generics","invariance","wildcards","type-safety"]},{"id":"java-generics-004","question":"What does PECS mean?","answer":"PECS means **Producer Extends, Consumer Super**.\n\nUse `? extends T` when a structure produces `T` values for you to read. Use `? super T` when a structure consumes `T` values that you write.\n\n```java\nvoid copy(List<? extends Number> source,\n          List<? super Number> target) {\n    for (Number n : source) {\n        target.add(n);\n    }\n}\n```","difficulty":"medium","tags":["generics","pecs","wildcards","extends","super"]},{"id":"java-generics-005","question":"What is the difference between an unbounded wildcard and a raw type?","answer":"`List<?>` means a list of some unknown type, with type safety preserved. You can read elements as `Object`, but you cannot add arbitrary values except `null`.\n\n`List` as a raw type disables generic checks and can lead to heap pollution.\n\n```java\nList<?> safe = List.of(\"a\");\nList raw = new ArrayList<String>();\nraw.add(123); // unchecked and dangerous\n```","difficulty":"medium","tags":["generics","wildcards","raw-types","heap-pollution"]},{"id":"java-generics-006","question":"What are bounded type parameters?","answer":"A bounded type parameter restricts which types may be used and allows the implementation to call methods from the bound.\n\n```java\nclass Box<T extends Number> {\n    private final T value;\n    double asDouble() {\n        return value.doubleValue();\n    }\n}\n```\n\nMultiple bounds are allowed, with at most one class bound first, followed by interfaces: `<T extends Base & Runnable & AutoCloseable>`.","difficulty":"medium","tags":["generics","bounds","type-parameter"]},{"id":"java-generics-007","question":"Why can't you create new T() or new T[] directly?","answer":"Because of type erasure, the runtime does not know the exact type argument for `T`. Java cannot safely instantiate `T` or create an array whose component type is an erased type variable.\n\n```java\nclass Factory<T> {\n    // T value = new T();      // does not compile\n    // T[] values = new T[10]; // does not compile\n}\n```\n\nCommon alternatives are passing a `Class<T>`, an `IntFunction<T[]>`, or a `Supplier<T>`.","difficulty":"hard","tags":["generics","type-erasure","arrays","instantiation"]},{"id":"java-generics-008","question":"What is heap pollution?","answer":"Heap pollution occurs when a variable of a parameterized type refers to an object that is not actually of that parameterized type. It often comes from raw types, unchecked casts, or unsafe varargs.\n\n```java\nList<String> strings = new ArrayList<>();\nList raw = strings;\nraw.add(42);\nString value = strings.get(0); // ClassCastException later\n```\n\nWarnings about unchecked operations are worth investigating because they may hide delayed runtime failures.","difficulty":"hard","tags":["generics","heap-pollution","raw-types","unchecked"]}]},{"domain":"Java","topic":"Fail-Fast vs Fail-Safe Iterators","icon":"🔁","questions":[{"id":"java-iterators-001","question":"What is a fail-fast iterator?","answer":"A fail-fast iterator attempts to detect structural modification of its backing collection outside the iterator and throws `ConcurrentModificationException`.\n\n```java\nfor (String value : list) {\n    list.add(\"new\"); // likely ConcurrentModificationException\n}\n```\n\nIt is a bug-detection mechanism, not a correctness guarantee. The detection is best-effort and should not be used for program control.","difficulty":"easy","tags":["iterator","fail-fast","concurrentmodificationexception"]},{"id":"java-iterators-002","question":"What does fail-safe iterator usually mean in interviews?","answer":"`Fail-safe` is not a formal Java Collections Framework contract. In interviews it usually means an iterator that does not throw `ConcurrentModificationException` when the collection is modified concurrently.\n\nExamples include:\n\n- Snapshot iterators, such as `CopyOnWriteArrayList` iterators.\n- Weakly consistent iterators, such as `ConcurrentHashMap` iterators.\n\nThe important follow-up is **what the iterator sees**: a stable snapshot, or a changing weakly consistent view.","difficulty":"medium","tags":["iterator","fail-safe","snapshot","weakly-consistent"]},{"id":"java-iterators-003","question":"What is the difference between snapshot and weakly consistent iterators?","answer":"A **snapshot iterator** sees the collection state as it was when the iterator was created. Later changes are not visible through that iterator.\n\nA **weakly consistent iterator** may reflect some changes made after iterator creation, but it does not promise a complete, atomic snapshot.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nConcurrentHashMap<String, Integer> map = new ConcurrentHashMap<>();\n```\n\n`CopyOnWriteArrayList` uses snapshot iteration. `ConcurrentHashMap` uses weakly consistent iteration.","difficulty":"medium","tags":["snapshot","weakly-consistent","copyonwritearraylist","concurrenthashmap"]},{"id":"java-iterators-004","question":"Why is ConcurrentModificationException not only about multiple threads?","answer":"`ConcurrentModificationException` can happen in a single thread. `Concurrent` here means the collection was modified while an iteration was in progress, not necessarily that another thread did it.\n\n```java\nIterator<String> it = list.iterator();\nwhile (it.hasNext()) {\n    String value = it.next();\n    list.remove(value); // wrong for most fail-fast iterators\n}\n```\n\nUse `Iterator.remove()` or collection-level helpers such as `removeIf()` when the collection supports them.","difficulty":"easy","tags":["concurrentmodificationexception","iterator","single-thread"]},{"id":"java-iterators-005","question":"How can elements be removed safely during iteration?","answer":"For most mutable collections, remove through the iterator itself or use a bulk operation.\n\n```java\nIterator<String> it = names.iterator();\nwhile (it.hasNext()) {\n    if (it.next().isBlank()) {\n        it.remove();\n    }\n}\n\nnames.removeIf(String::isBlank);\n```\n\nDo not call `collection.remove(...)` inside an enhanced `for` loop unless the collection's iterator semantics explicitly allow it.","difficulty":"easy","tags":["iterator","remove","removeif","iteration"]},{"id":"java-iterators-006","question":"Can fail-fast behavior guarantee thread safety?","answer":"No. Fail-fast iterators are not a synchronization mechanism. They may detect some illegal modifications and throw an exception, but they can also miss them.\n\nCorrect thread safety requires external synchronization, confinement, immutable snapshots, or concurrent collections designed for the access pattern.\n\nFail-fast behavior should be treated as an early warning for bugs, not as protection against races.","difficulty":"medium","tags":["fail-fast","thread-safety","concurrency","iterator"]},{"id":"java-iterators-007","question":"How do CopyOnWriteArrayList iterators behave when the list changes?","answer":"They iterate over an immutable snapshot of the array captured at iterator creation time. Later additions or removals are not visible to that iterator, and the iterator does not throw `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nThe iterator's mutating methods, such as `remove`, are not supported.","difficulty":"medium","tags":["copyonwritearraylist","snapshot","iterator","unsupportedoperationexception"]},{"id":"java-iterators-008","question":"How do ConcurrentHashMap iterators behave during concurrent modification?","answer":"`ConcurrentHashMap` iterators are weakly consistent. They do not throw `ConcurrentModificationException`; they may reflect some updates made after iterator creation, but they do not provide a stable snapshot of the whole map.\n\nThey are useful for monitoring, approximate traversal, and concurrent algorithms that do not require a frozen view. If you need a stable snapshot, copy the entries into another collection first.","difficulty":"hard","tags":["concurrenthashmap","weakly-consistent","iterator","snapshot"]}]},{"domain":"Java","topic":"String Pool & Mutable Strings","icon":"🔤","questions":[{"id":"java-strings-001","question":"What is the Java string pool?","answer":"The string pool is a JVM-managed collection of **canonical `String` instances**. String literals and other compile-time constant strings with the same content refer to the same pooled object.\n\n```java\nString first = \"java\";\nString second = \"java\";\n\nSystem.out.println(first == second); // true\n```\n\nPooling is safe because `String` is immutable. Sharing one instance cannot allow one caller to change the value observed by another.","difficulty":"easy","tags":["string","string-pool","immutability","jvm"]},{"id":"java-strings-002","question":"What is the difference between creating a String with a literal and with new String()?","answer":"A literal uses the canonical pooled instance. `new String(...)` explicitly creates a distinct `String` object, even when its content already exists in the pool.\n\n```java\nString pooled = \"hello\";\nString copied = new String(\"hello\");\n\nSystem.out.println(pooled == copied);      // false\nSystem.out.println(pooled.equals(copied)); // true\n```\n\nThe literal used as the constructor argument is pooled, while `copied` refers to the separately allocated object. Using `new String(existingString)` is rarely useful because strings are immutable.","difficulty":"easy","tags":["string","string-pool","new","identity"]},{"id":"java-strings-003","question":"Why should String values normally be compared with equals() instead of ==?","answer":"`equals()` compares character content, while `==` compares whether two references point to the exact same object.\n\n```java\nString a = new String(\"api\");\nString b = \"api\";\n\nSystem.out.println(a.equals(b)); // true\nSystem.out.println(a == b);      // false\n```\n\nPooling can make some `==` comparisons appear to work, which makes the bug deceptive. Use `==` only when object identity is intentionally being tested.","difficulty":"easy","tags":["string","equals","identity","string-pool"]},{"id":"java-strings-004","question":"What does String.intern() do?","answer":"`intern()` returns the canonical pooled representation of a string. If an equal string is already in the pool, that existing reference is returned; otherwise a canonical representation is added and returned.\n\n```java\nString runtime = new StringBuilder()\n    .append(\"ja\")\n    .append(\"va\")\n    .toString();\n\nString canonical = runtime.intern();\nSystem.out.println(canonical == \"java\"); // true\n```\n\nInterning changes which reference is used; it does not modify the original immutable string.","difficulty":"medium","tags":["string","intern","string-pool","canonicalization"]},{"id":"java-strings-005","question":"Which string concatenations are placed in the pool at compile time?","answer":"A concatenation made entirely from compile-time constant expressions is folded by the compiler and uses the pooled result.\n\n```java\nString a = \"inter\" + \"view\";\nString b = \"interview\";\nSystem.out.println(a == b); // true\n\nString part = \"inter\";\nString c = part + \"view\";\nSystem.out.println(c == b); // false, normally\n```\n\nThe second concatenation depends on a non-constant variable and is evaluated at runtime. Compare results using `equals()`, regardless of how they were created.","difficulty":"medium","tags":["string","string-pool","concatenation","compile-time-constant"]},{"id":"java-strings-006","question":"How does final affect compile-time string concatenation?","answer":"A `final` variable initialized with a constant expression can itself be a compile-time constant. Concatenations that use it may therefore be folded and interned.\n\n```java\nfinal String prefix = \"micro\";\nString a = prefix + \"service\";\nString b = \"microservice\";\nSystem.out.println(a == b); // true\n```\n\nIf the `final` value is initialized by a method call or another runtime expression, it is not a compile-time constant.\n\n```java\nfinal String value = loadValue();\nString result = value + \"suffix\"; // runtime concatenation\n```","difficulty":"medium","tags":["string","final","concatenation","compile-time-constant"]},{"id":"java-strings-007","question":"Are strings loaded by different class loaders guaranteed to share literals?","answer":"The Java Language Specification requires identical string literals to refer to the same `String` instance, including when they appear in different classes or packages. Literal canonicalization is defined across the program rather than as a separate pool per source class.\n\nClass loaders still affect class identity, but they do not make equal string literals distinct. Avoid depending on reference equality anyway; content equality should still use `equals()`.","difficulty":"hard","tags":["string","string-pool","class-loader","jls"]},{"id":"java-strings-008","question":"When can explicit string interning be useful?","answer":"Interning can help when an application holds very many duplicate strings from a small, stable vocabulary, such as repeated protocol tokens or normalized identifiers. Canonical references may reduce duplicate storage and can support identity-based internal optimizations.\n\nHowever, interning has costs:\n\n- Pool lookup and synchronization overhead.\n- Retention pressure from a large canonical set.\n- Hidden global behavior that complicates performance analysis.\n- Little benefit when values are mostly unique.\n\nMeasure realistic workloads before adding explicit `intern()` calls. A bounded application-level canonicalization cache may offer better lifecycle control.","difficulty":"hard","tags":["string","intern","performance","memory"]},{"id":"java-strings-009","question":"Does String.intern() make identity comparison with == a good general practice?","answer":"No. Identity comparison works only if **every value participating in the comparison is guaranteed to have been canonicalized under the same policy**. One non-interned value silently breaks that assumption.\n\n```java\nString expected = \"READY\";\nString actual = readStatus();\n\n// Fragile\nif (actual == expected) { }\n\n// Correct for content\nif (expected.equals(actual)) { }\n```\n\nUse interning as a memory or canonicalization technique, not as a replacement for normal value equality.","difficulty":"medium","tags":["string","intern","equals","identity"]},{"id":"java-strings-010","question":"Where is the string pool stored?","answer":"The Java specification defines observable canonicalization behavior, not a fixed physical memory region. In modern HotSpot JVMs, pooled strings are heap-managed; older JVM versions used different arrangements.\n\nAn interview answer should distinguish **language guarantees** from **JVM implementation details**. Code should not rely on a historical claim such as \"the pool is always in PermGen.\" PermGen was removed from HotSpot in Java 8.","difficulty":"medium","tags":["string","string-pool","heap","jvm"]},{"id":"java-strings-011","question":"What is the main difference between StringBuilder and StringBuffer?","answer":"Both are mutable character sequences with similar APIs. The main difference is synchronization:\n\n- `StringBuilder` is not synchronized and is intended for normal single-threaded or thread-confined use.\n- `StringBuffer` synchronizes its operations and is designed for cases where the same mutable buffer is accessed by multiple threads.\n\n`StringBuilder` is generally preferred because most builders are local variables and do not need synchronization.","difficulty":"easy","tags":["stringbuilder","stringbuffer","synchronization","thread-safety"]},{"id":"java-strings-012","question":"Why is StringBuilder usually better than repeated String concatenation in a loop?","answer":"A `String` is immutable, so repeated concatenation may create many intermediate strings and repeatedly copy accumulated content. A builder mutates one expandable buffer.\n\n```java\nStringBuilder result = new StringBuilder();\nfor (String word : words) {\n    result.append(word).append(' ');\n}\nreturn result.toString();\n```\n\nFor a single, simple expression, `+` is readable and the compiler/runtime can optimize it well. The builder matters most for incremental concatenation, especially inside loops or complex conditional construction.","difficulty":"easy","tags":["stringbuilder","concatenation","performance","loop"]},{"id":"java-strings-013","question":"Is StringBuffer automatically safe for every compound multi-threaded operation?","answer":"No. Individual `StringBuffer` methods are synchronized, but a sequence of calls is not automatically one atomic transaction.\n\n```java\n// Another thread may modify buffer between these calls.\nif (buffer.length() > 0) {\n    buffer.deleteCharAt(buffer.length() - 1);\n}\n```\n\nThe complete check-then-act sequence needs external coordination, such as synchronizing on the same buffer. Also, passing a mutable `StringBuffer` between threads may make the broader design harder to reason about; immutable messages or explicit ownership are often preferable.","difficulty":"hard","tags":["stringbuffer","thread-safety","atomicity","synchronization"]},{"id":"java-strings-014","question":"What are length and capacity in StringBuilder and StringBuffer?","answer":"`length()` is the number of characters currently stored. `capacity()` is the size of the current internal storage before another expansion is needed.\n\n```java\nStringBuilder builder = new StringBuilder(100);\nbuilder.append(\"Java\");\n\nSystem.out.println(builder.length());   // 4\nSystem.out.println(builder.capacity()); // at least 100\n```\n\nCapacity is an implementation-oriented performance concern and does not affect the visible text. The buffer grows automatically when required.","difficulty":"easy","tags":["stringbuilder","stringbuffer","capacity","memory"]},{"id":"java-strings-015","question":"When should you specify an initial StringBuilder capacity?","answer":"Specify capacity when the approximate final size is known and large enough that avoiding repeated buffer growth is worthwhile.\n\n```java\nint estimatedSize = records.size() * 80;\nStringBuilder json = new StringBuilder(estimatedSize);\n```\n\nThis is a performance hint, not a correctness requirement. Avoid speculative oversized capacities because they allocate memory up front. Profile or estimate based on real input sizes.","difficulty":"medium","tags":["stringbuilder","capacity","performance","allocation"]},{"id":"java-strings-016","question":"What do setLength() and ensureCapacity() do on a StringBuilder?","answer":"`ensureCapacity(n)` requests room for at least `n` characters without changing the current length. `setLength(n)` changes the logical length.\n\n- Reducing length truncates the sequence.\n- Increasing length appends null characters (`\\u0000`).\n\n```java\nStringBuilder value = new StringBuilder(\"Java\");\nvalue.ensureCapacity(100); // text remains \"Java\"\nvalue.setLength(2);        // text becomes \"Ja\"\nvalue.setLength(4);        // followed by two null characters\n```\n\nConfusing these methods can introduce invisible null characters into output.","difficulty":"medium","tags":["stringbuilder","capacity","setlength","api"]},{"id":"java-strings-017","question":"Does StringBuilder override equals() and hashCode() to compare text content?","answer":"No. `StringBuilder` and `StringBuffer` inherit identity-based `equals()` and `hashCode()` from `Object`.\n\n```java\nStringBuilder a = new StringBuilder(\"java\");\nStringBuilder b = new StringBuilder(\"java\");\n\nSystem.out.println(a.equals(b)); // false\n```\n\nCompare their produced text with `a.toString().equals(b.toString())`, or use an appropriate `CharSequence` content comparison. Mutable builders are also poor map keys because their text can change.","difficulty":"medium","tags":["stringbuilder","stringbuffer","equals","identity"]},{"id":"java-strings-018","question":"What happens to a String after it is produced by StringBuilder.toString()?","answer":"`toString()` returns a `String` containing the builder's current character sequence. Later builder mutations do not change that string.\n\n```java\nStringBuilder builder = new StringBuilder(\"Java\");\nString snapshot = builder.toString();\nbuilder.append(\" 21\");\n\nSystem.out.println(snapshot); // Java\nSystem.out.println(builder);  // Java 21\n```\n\nThe exact copying or storage-sharing strategy is an implementation detail. The observable guarantee is that the returned `String` remains immutable and independent of later mutations.","difficulty":"medium","tags":["stringbuilder","tostring","immutability","snapshot"]},{"id":"java-strings-019","question":"Why is reusing a shared StringBuilder usually a bad optimization?","answer":"A shared builder introduces mutable global state, requires synchronization, risks leaking old content when reset incorrectly, and can retain an excessively large internal buffer after one unusual request.\n\nA local builder is cheap, clearly owned, and often optimized effectively by the JVM. Reuse should be considered only after measurement and with a carefully bounded ownership strategy, such as controlled pooling or thread-local storage. Even then, memory retention and reentrancy must be considered.","difficulty":"hard","tags":["stringbuilder","reuse","concurrency","performance"]},{"id":"java-strings-020","question":"How should you choose among String, StringBuilder, and StringBuffer?","answer":"Choose based on mutability and ownership:\n\n- Use `String` for completed text, values, API boundaries, keys, and safely shared data.\n- Use `StringBuilder` to construct text incrementally within one thread or a confined scope.\n- Use `StringBuffer` only when the same mutable sequence must be accessed concurrently and its method-level synchronization fits the design.\n\nIn most application code, build locally with `StringBuilder`, then publish the immutable result as a `String`.","difficulty":"easy","tags":["string","stringbuilder","stringbuffer","design"]}]},{"domain":"Java","topic":"WeakHashMap","icon":"🪶","questions":[{"id":"java-weakhashmap-001","question":"What is WeakHashMap?","answer":"`WeakHashMap` is a `Map` implementation whose keys are held through weak references. If a key is no longer strongly reachable outside the map, its entry can be removed by the garbage collector.\n\n```java\nMap<Object, Metadata> metadata = new WeakHashMap<>();\nmetadata.put(object, data);\n```\n\nIt is useful when the map should not extend the lifetime of its keys.","difficulty":"easy","tags":["weakhashmap","weak-reference","gc","map"]},{"id":"java-weakhashmap-002","question":"When are entries removed from a WeakHashMap?","answer":"Entries become eligible for removal when their keys are weakly reachable, meaning no strong references to the key remain outside weak-reference mechanisms.\n\nRemoval is tied to garbage collection and internal cleanup, so it is not deterministic.\n\nYou should not write logic that depends on an entry disappearing at an exact time.","difficulty":"medium","tags":["weakhashmap","gc","weak-reference","lifecycle"]},{"id":"java-weakhashmap-003","question":"Why can WeakHashMap appear to change without direct map operations?","answer":"Because garbage collection can clear weak keys. After cleanup, entries whose keys were cleared are removed from the map.\n\nThat means methods such as `size()`, `isEmpty()`, or iteration can appear to observe changes even when the application did not call `put` or `remove`.\n\nThis behavior is expected and is the reason `WeakHashMap` is useful for lifecycle-sensitive associations.","difficulty":"medium","tags":["weakhashmap","gc","size","iteration"]},{"id":"java-weakhashmap-004","question":"What common bug prevents WeakHashMap entries from being removed?","answer":"The value may strongly reference its key. If the map holds the value strongly and the value points back to the key, the key remains strongly reachable through the map entry.\n\n```java\nclass Metadata {\n    Object key; // can accidentally keep the WeakHashMap key alive\n}\n```\n\nAvoid value-to-key strong references, or use weak references inside the value when that relationship is necessary.","difficulty":"hard","tags":["weakhashmap","memory-leak","strong-reference","gc"]},{"id":"java-weakhashmap-005","question":"Is WeakHashMap a general-purpose cache?","answer":"Not by itself. `WeakHashMap` is useful for automatically discarding entries when keys are no longer strongly reachable, but it does not provide size limits, eviction policies, expiration, statistics, or loading behavior.\n\nFor production caches, a dedicated cache library or explicit eviction policy is usually better.\n\nUse `WeakHashMap` for lifecycle-associated metadata, not as a complete caching solution.","difficulty":"medium","tags":["weakhashmap","cache","eviction","metadata"]},{"id":"java-weakhashmap-006","question":"Why are String keys often a poor choice for WeakHashMap?","answer":"String literals and interned strings can remain strongly reachable for a long time through the string pool or class metadata. If such a string is used as a key, the entry may not disappear as expected.\n\n```java\nMap<String, Object> map = new WeakHashMap<>();\nmap.put(\"USER\", value); // literal is not a good weak key candidate\n```\n\nWeak keys are most useful for ordinary objects whose lifecycle is controlled elsewhere.","difficulty":"hard","tags":["weakhashmap","string","interning","weak-reference"]},{"id":"java-weakhashmap-007","question":"Is WeakHashMap thread-safe?","answer":"No. `WeakHashMap` is not synchronized. If multiple threads access it concurrently and at least one modifies it, external synchronization is required.\n\n```java\nMap<Key, Value> map = Collections.synchronizedMap(new WeakHashMap<>());\n```\n\nEven with synchronization, remember that garbage collection can still affect which entries remain over time.","difficulty":"easy","tags":["weakhashmap","thread-safety","synchronization","map"]},{"id":"java-weakhashmap-008","question":"How does WeakHashMap compare with IdentityHashMap and HashMap?","answer":"`HashMap` holds keys strongly and compares them with `equals()`.\n\n`IdentityHashMap` holds keys strongly but compares them with `==`.\n\n`WeakHashMap` compares keys using normal equality but holds keys weakly, allowing entries to disappear when keys are no longer strongly reachable.\n\nChoose based on lifecycle and equality semantics, not just performance.","difficulty":"medium","tags":["weakhashmap","identityhashmap","hashmap","map"]}]}],"ro":[{"domain":"Java","topic":"Algoritmi pentru colecții și Stream-uri","icon":"⚙️","questions":[{"id":"java-collections-algorithms-001","question":"Care este diferența dintre List.sort() și Collections.sort()?","answer":"Ambele sortează o listă mutabilă folosind ordinea naturală sau un `Comparator`. În Java modern, `Collections.sort(list)` deleagă comportamentului de sortare al listei.\n\n```java\nemployees.sort(Comparator.comparing(Employee::name));\nCollections.sort(numbers);\n```\n\n`List.sort()` este adesea mai clar și se potrivește natural cu compunerea comparatorilor. Sortarea este stabilă: elementele egale își păstrează ordinea relativă.","difficulty":"easy","tags":["sorting","list","collections","comparator"]},{"id":"java-collections-algorithms-002","question":"Ce precondiție are Collections.binarySearch()?","answer":"Lista trebuie să fie deja sortată conform aceleiași ordini folosite la căutare. Altfel, rezultatul este nedefinit.\n\n```java\nCollections.sort(names);\nint index = Collections.binarySearch(names, \"Mara\");\n```\n\nUn rezultat negativ codifică punctul de inserare ca `-(insertionPoint) - 1`. Îl poți recupera cu `-result - 1`.","difficulty":"medium","tags":["binary-search","sorting","collections","insertion-point"]},{"id":"java-collections-algorithms-003","question":"Cum trebuie exprimate mai multe criterii de sortare?","answer":"Compune comparatori în loc să scrii logică de comparație profund imbricată.\n\n```java\nComparator<Employee> order = Comparator\n    .comparing(Employee::department)\n    .thenComparing(Employee::lastName)\n    .thenComparingInt(Employee::id);\n\nemployees.sort(order);\n```\n\nMetode utile includ `reversed`, `nullsFirst`, `nullsLast`, `comparingInt` și `thenComparing`. Comparatorul trebuie să rămână tranzitiv și consecvent.","difficulty":"medium","tags":["comparator","sorting","composition","ordering"]},{"id":"java-collections-algorithms-004","question":"Cum diferă egalitatea pentru List și Set?","answer":"Două liste sunt egale când conțin elemente egale în aceeași ordine. Două seturi sunt egale când conțin aceleași elemente, indiferent de ordinea iterării.\n\n```java\nList.of(1, 2).equals(List.of(2, 1)); // false\nSet.of(1, 2).equals(Set.of(2, 1));   // true\n```\n\nEgalitatea map-urilor compară în mod similar mapările, nu ordinea iterării. Aceste contracte permit implementărilor diferite ale aceleiași abstracții să fie egale.","difficulty":"easy","tags":["list","set","equals","contract"]},{"id":"java-collections-algorithms-005","question":"Ce este un Spliterator?","answer":"Un `Spliterator` traversează elemente ca un iterator, dar își poate și împărți munca rămasă pentru procesare potențial paralelă.\n\nRaportează caracteristici precum `ORDERED`, `DISTINCT`, `SORTED`, `SIZED`, `IMMUTABLE` sau `CONCURRENT`. Stream-urile folosesc spliteratori pentru a înțelege o sursă și a împărți munca.\n\nColecțiile personalizate pot implementa un spliterator specializat când traversarea sau împărțirea implicită este ineficientă.","difficulty":"hard","tags":["spliterator","streams","parallelism","iteration"]},{"id":"java-collections-algorithms-006","question":"Care este diferența dintre o Collection și un Stream?","answer":"O colecție stochează date și poate fi de obicei traversată repetat. Un stream descrie un pipeline de calcul, este lazy până la o operație terminală și poate fi consumat o singură dată.\n\n```java\nList<String> names = users.stream()\n    .filter(User::active)\n    .map(User::name)\n    .toList();\n```\n\nStream-urile nu își modifică în mod normal sursa. Trebuie privite ca operații asupra datelor, nu ca recipiente.","difficulty":"easy","tags":["collection","stream","lazy","pipeline"]},{"id":"java-collections-algorithms-007","question":"Cum diferă Stream.toList() și Collectors.toList()?","answer":"`Stream.toList()` întoarce o listă nemodificabilă. `Collectors.toList()` nu garantează tipul concret, mutabilitatea, serializabilitatea sau siguranța între fire a rezultatului.\n\n```java\nList<String> fixed = stream.toList();\nList<String> unspecified = stream.collect(Collectors.toList());\nList<String> mutable = stream.collect(Collectors.toCollection(ArrayList::new));\n```\n\nSolicită proprietatea exactă de care ai nevoie în loc să presupui că acel collector întoarce un `ArrayList`.","difficulty":"medium","tags":["stream","tolist","collectors","mutability"]},{"id":"java-collections-algorithms-008","question":"Ce se întâmplă când Collectors.toMap() întâlnește chei duplicate?","answer":"Collector-ul `toMap` cu două argumente aruncă `IllegalStateException` când mai multe elemente produc aceeași cheie. Furnizează o funcție de îmbinare când duplicatele sunt posibile.\n\n```java\nMap<String, Integer> longestByDepartment = employees.stream()\n    .collect(Collectors.toMap(\n        Employee::department,\n        Employee::years,\n        Integer::max));\n```\n\nUn al patrulea argument poate selecta implementarea map-ului, de exemplu `LinkedHashMap::new` când ordinea întâlnirii contează.","difficulty":"medium","tags":["collectors","tomap","duplicate-key","merge"]},{"id":"java-collections-algorithms-009","question":"Când trebuie folosite groupingBy() și partitioningBy()?","answer":"`groupingBy` clasifică elementele într-un număr arbitrar de chei. `partitioningBy` împarte elementele în exact două grupuri Boolean.\n\n```java\nMap<Department, List<Employee>> byDepartment = employees.stream()\n    .collect(Collectors.groupingBy(Employee::department));\n\nMap<Boolean, List<Employee>> byActive = employees.stream()\n    .collect(Collectors.partitioningBy(Employee::active));\n```\n\nAmbele suportă collectori downstream pentru numărare, mapare, însumare sau reducerea fiecărui grup.","difficulty":"medium","tags":["collectors","groupingby","partitioningby","streams"]},{"id":"java-collections-algorithms-010","question":"De ce pot fi periculoase efectele secundare în operațiile stream?","answer":"Pipeline-urile stream pot fi lazy, reordonate unde este permis sau executate în paralel. Modificarea stării partajate în `map`, `filter` sau `forEach` poate provoca race condition-uri și poate face rezultatele dependente de ordinea execuției.\n\n```java\n// Preferă această variantă\nList<String> names = users.stream()\n    .map(User::name)\n    .toList();\n```\n\nFolosește collectori și reduceri în loc să modifici manual containere externe. Funcțiile comportamentale trebuie să fie de obicei fără stare și să nu interfereze cu sursa.","difficulty":"hard","tags":["streams","side-effects","parallelism","thread-safety"]},{"id":"java-collections-algorithms-011","question":"Când pot fi stream-urile paralele mai lente sau nesigure?","answer":"Stream-urile paralele adaugă costuri de împărțire, planificare, coordonare și combinare. Pot fi mai lente pentru intrări mici, operații ieftine, surse greu de împărțit, I/O blocant sau muncă foarte disputată.\n\nFolosesc frecvent `ForkJoinPool.commonPool()` partajat, astfel încât operațiile blocante pot afecta alte sarcini paralele. Folosește-le doar când operațiile sunt independente, asociative unde este necesar, CPU-bound, suficient de mari și susținute de măsurători.","difficulty":"hard","tags":["parallel-stream","forkjoinpool","performance","concurrency"]},{"id":"java-collections-algorithms-012","question":"Cum influențează encounter order rezultatele stream-urilor?","answer":"Sursele ordonate precum `List` au o ordine de întâlnire. `HashSet` și `HashMap` nu promit una. Operații precum `findFirst`, `forEachOrdered` și colectarea în containere ordonate pot păstra această ordine.\n\n`forEach` pe un stream paralel poate executa în orice ordine, în timp ce `forEachOrdered` păstrează ordinea de întâlnire cu un posibil cost de performanță. Nu presupune o ordine decât dacă sursa și operațiile o definesc.","difficulty":"medium","tags":["streams","encounter-order","parallel-stream","ordering"]}]},{"domain":"Java","topic":"Colecții concurente","icon":"🔀","questions":[{"id":"java-collections-concurrent-001","question":"Care este diferența dintre un wrapper sincronizat și o colecție concurentă?","answer":"`Collections.synchronizedList(...)` împachetează o colecție obișnuită și serializează accesul printr-un lock comun. Colecțiile concurente folosesc algoritmi specializați care permit mai multor operații să progreseze simultan.\n\n```java\nList<String> synchronizedList =\n    Collections.synchronizedList(new ArrayList<>());\n\nMap<String, Integer> concurrentMap =\n    new ConcurrentHashMap<>();\n```\n\nUn wrapper sincronizat poate fi potrivit pentru acces simplu, cu concurență redusă. Colecțiile concurente scalează de obicei mai bine și oferă adesea operații atomice utile.","difficulty":"medium","tags":["concurrency","synchronized-collection","concurrent-collection","locking"]},{"id":"java-collections-concurrent-002","question":"Cum trebuie iterat un Collections.synchronizedList()?","answer":"Trebuie să sincronizezi manual pe wrapper în timpul iterării. Sincronizarea fiecărui apel individual de metodă nu protejează întreaga traversare.\n\n```java\nList<String> list = Collections.synchronizedList(new ArrayList<>());\n\nsynchronized (list) {\n    for (String item : list) {\n        process(item);\n    }\n}\n```\n\nFără lock-ul extern, alt fir poate modifica structural colecția în timpul iterării.","difficulty":"medium","tags":["synchronized-collection","iteration","locking","thread-safety"]},{"id":"java-collections-concurrent-003","question":"Cum se comportă citirile și iteratorii ConcurrentHashMap în timpul actualizărilor concurente?","answer":"Operațiile `get()` nu se blochează în general și se pot suprapune cu actualizările. Iteratorii sunt **slab consecvenți**: reflectă o stare existentă la sau după crearea iteratorului, nu aruncă `ConcurrentModificationException` și pot observa sau nu actualizările concurente.\n\nMetodele agregate precum `size()` pot reprezenta stări tranzitorii în timpul modificărilor active. Sunt utile pentru monitorizare, dar nu trebuie să controleze logică sensibilă la corectitudine.","difficulty":"hard","tags":["concurrenthashmap","weakly-consistent","iterator","concurrency"]},{"id":"java-collections-concurrent-004","question":"De ce trebuie actualizările compuse ale unui ConcurrentHashMap să folosească metode atomice?","answer":"O secvență de apeluri individual thread-safe nu este automat atomică.\n\n```java\n// Race condition\nif (!map.containsKey(key)) {\n    map.put(key, createValue());\n}\n\n// Operație atomică a map-ului\nmap.computeIfAbsent(key, k -> createValue());\n```\n\nFolosește `putIfAbsent`, `compute`, `computeIfAbsent`, `merge`, `remove` condiționat și `replace` condiționat pentru actualizări compuse legate de o singură cheie.","difficulty":"medium","tags":["concurrenthashmap","atomicity","computeifabsent","race-condition"]},{"id":"java-collections-concurrent-005","question":"Ce precauții se aplică metodelor compute din ConcurrentHashMap?","answer":"Funcțiile de mapare și remapare trebuie să fie scurte, deterministe și să nu execute operații blocante fără legătură. Map-ul poate coordona actualizările cât timp funcția rulează.\n\nEvită modificarea recursivă a aceleiași chei din interiorul calculului. Reține și că returnarea lui `null` înseamnă că nu trebuie stocată o mapare sau că maparea existentă trebuie eliminată, în funcție de metodă.\n\nPentru I/O costisitor, ia în calcul stocarea unui future sau a altei reprezentări a lucrului în desfășurare.","difficulty":"hard","tags":["concurrenthashmap","compute","blocking","atomicity"]},{"id":"java-collections-concurrent-006","question":"Când este CopyOnWriteArrayList o alegere bună?","answer":"`CopyOnWriteArrayList` este util când citirile și iterarea sunt frecvente, scrierile sunt rare, iar iterarea de tip snapshot este dorită. Fiecare modificare copiază array-ul intern.\n\nExemple tipice sunt listele de listeneri și snapshot-urile de configurare.\n\nEste o alegere slabă pentru liste mari cu scrieri frecvente, deoarece copierea este costisitoare. Iteratorii observă snapshot-ul existent la crearea lor și nu suportă modificări.","difficulty":"medium","tags":["copyonwritearraylist","snapshot","read-heavy","concurrency"]},{"id":"java-collections-concurrent-007","question":"Pentru ce este proiectat ConcurrentLinkedQueue?","answer":"`ConcurrentLinkedQueue` este o coadă FIFO nelimitată, thread-safe și neblocantă. Este utilă când producătorii și consumatorii nu trebuie să aștepte capacitatea, iar interogarea unei cozi goale poate întoarce pur și simplu `null`.\n\n```java\nQueue<Task> tasks = new ConcurrentLinkedQueue<>();\ntasks.offer(task);\nTask next = tasks.poll();\n```\n\nDacă consumatorii trebuie să aștepte apariția lucrului sau producătorii trebuie să respecte o capacitate limitată, folosește `BlockingQueue`.","difficulty":"medium","tags":["concurrentlinkedqueue","queue","non-blocking","concurrency"]},{"id":"java-collections-concurrent-008","question":"Ce familii de operații oferă BlockingQueue?","answer":"`BlockingQueue` oferă patru stiluri de inserare și eliminare:\n\n- Aruncă excepție: `add`, `remove`.\n- Întoarce o valoare specială: `offer`, `poll`.\n- Așteaptă nelimitat: `put`, `take`.\n- Așteaptă până la expirarea unui timeout: variantele temporizate `offer`, `poll`.\n\n```java\nqueue.put(task);          // așteaptă spațiu\nTask task = queue.take(); // așteaptă un element\n```\n\nOperația aleasă comunică mecanismul de backpressure și comportamentul dorit la eșec.","difficulty":"medium","tags":["blockingqueue","backpressure","producer-consumer","queue"]},{"id":"java-collections-concurrent-009","question":"Cum diferă ArrayBlockingQueue și LinkedBlockingQueue?","answer":"`ArrayBlockingQueue` este întotdeauna limitată și folosește un array de dimensiune fixă. Memoria sa este predictibilă și poate folosi opțional ordonare echitabilă a lock-ului.\n\n`LinkedBlockingQueue` folosește noduri legate și poate fi limitată explicit; fără un argument de capacitate, limita sa este foarte mare. Coordonarea internă separată poate oferi throughput bun, dar fiecare element necesită alocarea unui nod.\n\nFolosește o coadă limitată când ai nevoie de backpressure explicit și protecție împotriva creșterii nelimitate a memoriei.","difficulty":"hard","tags":["arrayblockingqueue","linkedblockingqueue","backpressure","capacity"]},{"id":"java-collections-concurrent-010","question":"Pentru ce sunt folosite SynchronousQueue și PriorityBlockingQueue?","answer":"`SynchronousQueue` nu are capacitate de stocare. Fiecare inserare așteaptă ca alt fir să primească elementul, fiind un mecanism de predare directă.\n\n`PriorityBlockingQueue` este o coadă blocantă nelimitată, ordonată după prioritate. Citirea așteaptă când este goală, dar inserarea nu se blochează în mod normal din cauza capacității.\n\nFolosește `SynchronousQueue` pentru transfer direct producător-consumator și `PriorityBlockingQueue` când lucrul pregătit trebuie selectat după prioritate.","difficulty":"hard","tags":["synchronousqueue","priorityblockingqueue","handoff","priority"]},{"id":"java-collections-concurrent-011","question":"Când ar trebui să folosești ConcurrentSkipListMap sau ConcurrentSkipListSet?","answer":"Folosește-le când ai nevoie de o colecție concurentă care păstrează și ordinea sortată și suportă operații de navigare sau interval.\n\n```java\nConcurrentNavigableMap<Long, Event> events =\n    new ConcurrentSkipListMap<>();\n\nvar recent = events.tailMap(cutoff, true);\n```\n\nPentru căutare neordonată după cheie, `ConcurrentHashMap` este de obicei mai rapid. Colecțiile skip-list schimbă o parte din performanța căutării pentru navigare concurentă sortată.","difficulty":"medium","tags":["concurrentskiplistmap","concurrentskiplistset","sorted","concurrency"]},{"id":"java-collections-concurrent-012","question":"Cum poți crea un Set concurent?","answer":"Un set concurent scalabil poate fi creat ca proiecție a cheilor unui `ConcurrentHashMap`.\n\n```java\nSet<String> activeUsers = ConcurrentHashMap.newKeySet();\nactiveUsers.add(\"alice\");\n```\n\nAceasta este preferabilă stocării manuale a unor valori Boolean fictive. Pentru un set concurent sortat, folosește `ConcurrentSkipListSet`. Alege în funcție de necesitatea ordonării.","difficulty":"easy","tags":["concurrent-set","concurrenthashmap","newkeyset","concurrency"]}]},{"domain":"Java","topic":"Colecții fundamentale","icon":"🧺","questions":[{"id":"java-collections-core-001","question":"Ce este Java Collections Framework?","answer":"Java Collections Framework este setul standard de interfețe, implementări și algoritmi pentru lucrul cu grupuri de obiecte.\n\nInterfețele principale includ:\n\n- `Collection`: interfața rădăcină pentru majoritatea grupurilor de obiecte.\n- `List`: ordonată, bazată pe index, permite duplicate.\n- `Set`: nu permite elemente duplicate.\n- `Queue` / `Deque`: colecții orientate spre procesare.\n- `Map`: asocieri cheie-valoare, separată de `Collection`.\n\nValoarea framework-ului este că poți scrie cod pe interfețe și poți alege implementarea în funcție de ordonare, costul căutării, memorie, concurență și regulile pentru duplicate.","difficulty":"easy","tags":["collections","collection","list","set","queue","map"]},{"id":"java-collections-core-002","question":"Care este diferența dintre Collection și Collections?","answer":"`Collection` este o interfață care reprezintă un grup de elemente. `Collections` este o clasă utilitară cu metode statice ajutătoare.\n\n```java\nCollection<String> names = new ArrayList<>();\nList<String> orderedNames = new ArrayList<>(names);\nCollections.sort(orderedNames);\n```\n\nExemple din `Collections` includ `sort`, `binarySearch`, `unmodifiableList`, `synchronizedList`, `emptyList` și `frequency`. Întrebarea verifică dacă distingi ierarhia de tipuri de algoritmii utilitari.","difficulty":"easy","tags":["collection","collections","utility-class"]},{"id":"java-collections-core-003","question":"Cum diferă List, Set, Queue și Deque?","answer":"`List` păstrează ordinea pozițională și suportă acces prin index. `Set` respinge duplicatele pe baza regulilor de egalitate sau ordonare. `Queue` modelează elemente care așteaptă să fie procesate, de obicei FIFO, dar nu întotdeauna. `Deque` este o coadă cu două capete, care permite inserare și eliminare la ambele capete.\n\n```java\nList<String> list = new ArrayList<>();\nSet<String> set = new HashSet<>();\nQueue<String> queue = new ArrayDeque<>();\nDeque<String> stack = new ArrayDeque<>();\n```\n\nAlege interfața care descrie comportamentul de care are nevoie apelantul, nu neapărat clasa concretă pe care o instanțiezi.","difficulty":"easy","tags":["list","set","queue","deque","interfaces"]},{"id":"java-collections-core-004","question":"Când ar trebui să alegi ArrayList în loc de LinkedList?","answer":"`ArrayList` este de obicei implementarea implicită pentru `List`. Oferă acces rapid prin index, organizare compactă în memorie și iterare eficientă. Adăugarea la final are cost constant amortizat.\n\n`LinkedList` poate adăuga sau elimina eficient atunci când ai deja poziția nodului, dar codul Java expune rar nodurile direct. Are localitate mai slabă în cache și overhead de memorie mai mare pentru fiecare element.\n\nFolosește `LinkedList` mai ales când ai nevoie specific de comportamentul său de `Deque` și ai măsurat că se potrivește. Pentru liste generale, preferă `ArrayList`.","difficulty":"medium","tags":["arraylist","linkedlist","list","performance"]},{"id":"java-collections-core-005","question":"Cum crește ArrayList și de ce contează capacitatea inițială?","answer":"`ArrayList` stochează elementele într-un array intern. Când rămâne fără spațiu, alocă un array mai mare și copiază elementele existente.\n\n```java\nList<Order> orders = new ArrayList<>(expectedSize);\n```\n\nO capacitate inițială realistă poate reduce realocările pentru volume mari cunoscute. Nu este o cerință de corectitudine, iar supradimensionarea irosește memorie. `size()` este numărul de elemente; capacitatea este stocare internă și nu este expusă de interfața `List`.","difficulty":"medium","tags":["arraylist","capacity","performance","allocation"]},{"id":"java-collections-core-006","question":"Care sunt principalele diferențe dintre HashSet, LinkedHashSet și TreeSet?","answer":"`HashSet` stochează elemente unice fără a garanta ordinea de iterare. `LinkedHashSet` păstrează ordinea inserării, menținând unicitatea bazată pe hash. `TreeSet` păstrează elementele sortate după ordinea naturală sau după un `Comparator`.\n\n```java\nSet<String> fast = new HashSet<>();\nSet<String> ordered = new LinkedHashSet<>();\nSet<String> sorted = new TreeSet<>();\n```\n\nFolosește `HashSet` pentru unicitate obișnuită, `LinkedHashSet` când contează ordinea stabilă a inserării și `TreeSet` când este necesară traversarea sortată sau operațiile pe intervale.","difficulty":"easy","tags":["hashset","linkedhashset","treeset","set","ordering"]},{"id":"java-collections-core-007","question":"Cum decide un Set dacă un element este duplicat?","answer":"Seturile bazate pe hash folosesc `equals()` și `hashCode()`. Seturile sortate, precum `TreeSet`, folosesc comparația: dacă `compare(a, b) == 0`, elementele sunt considerate duplicate pentru apartenența la set.\n\n```java\nSet<BigDecimal> values = new TreeSet<>();\nvalues.add(new BigDecimal(\"1.0\"));\nvalues.add(new BigDecimal(\"1.00\"));\nSystem.out.println(values.size()); // 1\n```\n\nDe aceea comparatorii trebuie proiectați cu grijă, mai ales când sensul egalității lor diferă de `equals()`.","difficulty":"medium","tags":["set","equals","hashcode","treeset","comparator"]},{"id":"java-collections-core-008","question":"Când ar trebui să folosești ArrayDeque în loc de Stack sau LinkedList?","answer":"`ArrayDeque` este implementarea modernă de uz general pentru comportament de stivă și coadă atunci când nu ai nevoie de siguranță între fire.\n\n```java\nDeque<String> stack = new ArrayDeque<>();\nstack.push(\"A\");\nstack.push(\"B\");\nSystem.out.println(stack.pop()); // B\n```\n\n`Stack` este o clasă legacy sincronizată, bazată pe `Vector`. `LinkedList` poate fi folosită ca deque, dar are de obicei overhead mai mare de alocare și localitate mai slabă. Preferă `ArrayDeque` pentru structuri LIFO și FIFO în cod cu un singur fir.","difficulty":"medium","tags":["arraydeque","deque","stack","queue","legacy"]},{"id":"java-collections-core-009","question":"Cum funcționează PriorityQueue?","answer":"`PriorityQueue` ordonează elementele după ordin
