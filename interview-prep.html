<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Prep</title>
  <script>
    (() => {
      const savedTheme = localStorage.getItem('iqh_theme');
      const legacyDark = localStorage.getItem('iqh_dark') === '1';
      const theme = savedTheme || (legacyDark ? 'dark' : 'light');
      if (theme !== 'light') document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0d1117;
      --ink-light:  #374151;
      --ink-muted:  #6b7280;
      --surface:    #ffffff;
      --surface-2:  #f9fafb;
      --surface-3:  #f3f4f6;
      --border:     #e5e7eb;
      --border-2:   #d1d5db;

      --accent:       #5a67f2;
      --accent-dark:  #4451d6;
      --accent-bg:    #eef0ff;
      --accent-mid:   #c7ccff;

      --green:      #16a34a;
      --green-bg:   #f0fdf4;
      --green-brd:  #bbf7d0;
      --red:        #dc2626;
      --red-bg:     #fff1f2;
      --red-brd:    #fecaca;
      --amber:      #d97706;
      --amber-bg:   #fffbeb;

      --radius:    14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);

      --code-color: #c0392b;
      --toast-bg:   #0d1117;
      --toast-color: #fff;
    }

    [data-theme="dark"] {
      --ink:        #f0f6fc;
      --ink-light:  #c9d1d9;
      --ink-muted:  #8b949e;
      --surface:    #161b22;
      --surface-2:  #0d1117;
      --surface-3:  #21262d;
      --border:     #30363d;
      --border-2:   #3d444d;

      --accent:       #7c8af7;
      --accent-dark:  #6370e8;
      --accent-bg:    #1a1f4a;
      --accent-mid:   #3d4699;

      --green:      #3fb950;
      --green-bg:   #0d2115;
      --green-brd:  #1a4731;
      --red:        #f85149;
      --red-bg:     #2d0f0e;
      --red-brd:    #5c1d1a;
      --amber:      #e3b341;
      --amber-bg:   #2d1f00;

      --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
      --shadow:    0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.2);

      --code-color: #ff7b72;
      --toast-bg:   #21262d;
      --toast-color: #f0f6fc;
    }

    [data-theme="oled-blue"] {
      --ink:        #d8e9ff;
      --ink-light:  #a9c6e8;
      --ink-muted:  #6f8cad;
      --surface:    #05080f;
      --surface-2:  #000000;
      --surface-3:  #0a1424;
      --border:     #10213a;
      --border-2:   #1b385c;

      --accent:       #38bdf8;
      --accent-dark:  #0ea5e9;
      --accent-bg:    #061827;
      --accent-mid:   #164463;

      --green:      #34d399;
      --green-bg:   #03160f;
      --green-brd:  #0f3b2b;
      --red:        #fb7185;
      --red-bg:     #1e080d;
      --red-brd:    #4a1621;
      --amber:      #fbbf24;
      --amber-bg:   #1b1200;

      --shadow-sm: none;
      --shadow:    none;
      --shadow-md: none;
      --code-color: #7dd3fc;
      --toast-bg:   #08111f;
      --toast-color: #d8e9ff;
    }

    [data-theme="oled-green"] {
      --ink:        #d8ffe8;
      --ink-light:  #acd8bf;
      --ink-muted:  #77a087;
      --surface:    #040a06;
      --surface-2:  #000000;
      --surface-3:  #07170d;
      --border:     #102a19;
      --border-2:   #1d4a2c;

      --accent:       #4ade80;
      --accent-dark:  #22c55e;
      --accent-bg:    #061a0d;
      --accent-mid:   #195b30;

      --green:      #86efac;
      --green-bg:   #03160a;
      --green-brd:  #164b28;
      --red:        #f87171;
      --red-bg:     #1d0808;
      --red-brd:    #4a1717;
      --amber:      #facc15;
      --amber-bg:   #191300;

      --shadow-sm: none;
      --shadow:    none;
      --shadow-md: none;
      --code-color: #86efac;
      --toast-bg:   #07170d;
      --toast-color: #d8ffe8;
    }

    [data-theme="oled-amber"] {
      --ink:        #fff2cf;
      --ink-light:  #dfc990;
      --ink-muted:  #9d8651;
      --surface:    #0b0702;
      --surface-2:  #000000;
      --surface-3:  #1a1004;
      --border:     #302008;
      --border-2:   #53380e;

      --accent:       #f59e0b;
      --accent-dark:  #d97706;
      --accent-bg:    #1f1203;
      --accent-mid:   #65420d;

      --green:      #84cc16;
      --green-bg:   #0d1602;
      --green-brd:  #334a0a;
      --red:        #fb7185;
      --red-bg:     #1e080d;
      --red-brd:    #4a1621;
      --amber:      #fde68a;
      --amber-bg:   #1c1200;

      --shadow-sm: none;
      --shadow:    none;
      --shadow-md: none;
      --code-color: #fbbf24;
      --toast-bg:   #1a1004;
      --toast-color: #fff2cf;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -.3px;
    }

    .logo-text span { color: var(--accent); }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      height: 36px;
      padding: 0 12px 0 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 13.5px;
      background: var(--surface-2);
      color: var(--ink);
      outline: none;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      background: var(--surface);
      box-shadow: 0 0 0 3px rgba(90,103,242,.12);
    }

    #searchInput::placeholder { color: var(--ink-muted); }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .tool-btn {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--ink-muted);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: all .15s;
      touch-action: manipulation;
    }

    .tool-btn:hover { background: var(--surface-3); color: var(--ink-light); border-color: var(--border-2); }
    .tool-btn.active { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }

    .tool-btn svg { flex-shrink: 0; }

    /* ── Topics Bar ─────────────────────────────────── */
    .topics-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .topics-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 10px 20px;
      position: relative;
    }

    .topic-selector {
      position: relative;
    }

    .topic-toggle {
      width: 100%;
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 9px 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      cursor: pointer;
      transition: all .15s;
      touch-action: manipulation;
    }

    .topic-toggle:hover,
    .topic-toggle[aria-expanded="true"] {
      border-color: var(--accent-mid);
      background: var(--accent-bg);
    }

    .topic-toggle:focus-visible,
    .topic-option:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .topic-toggle-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .topic-kicker {
      color: var(--ink-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .topic-current {
      max-width: 100%;
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topic-toggle-side {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink-muted);
      font-size: 12.5px;
      white-space: nowrap;
    }

    .topic-chevron {
      transition: transform .15s;
    }

    .topic-toggle[aria-expanded="true"] .topic-chevron {
      transform: rotate(180deg);
    }

    .topic-menu {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 8px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-md);
    }

    .topic-menu.open {
      display: grid;
    }

    .topic-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 9px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--ink-light);
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      transition: all .15s;
      touch-action: manipulation;
    }

    .topic-option:hover {
      border-color: var(--accent-mid);
      background: var(--accent-bg);
      color: var(--accent);
    }

    .topic-option.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .topic-option-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 650;
    }

    .chip-count {
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 100px;
      background: rgba(0,0,0,.07);
    }

    .topic-option.active .chip-count { background: rgba(255,255,255,.22); }

    /* ── Stats Bar ──────────────────────────────────── */
    .stats-row {
      max-width: 860px;
      margin: 18px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      color: var(--ink-muted);
    }

    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-dot.all    { background: var(--border-2); }
    .stat-dot.done   { background: var(--green); }
    .stat-dot.review { background: var(--red); }

    .stat-item strong { color: var(--ink); font-weight: 600; }

    .progress-track {
      flex: 1;
      min-width: 80px;
      height: 5px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 100px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    .progress-pct {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      flex-shrink: 0;
    }

    /* ── Main ───────────────────────────────────────── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 20px 80px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Question Card ──────────────────────────────── */
    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: box-shadow .2s, border-color .2s;
    }

    .q-card:hover { box-shadow: var(--shadow-md); }

    .q-card.state-done   { border-left: 3px solid var(--green); }
    .q-card.state-review { border-left: 3px solid var(--red); }

    .card-top {
      padding: 16px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-num {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink-muted);
      padding-top: 1px;
      min-width: 24px;
      flex-shrink: 0;
    }

    .card-content { flex: 1; min-width: 0; }

    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 9px;
    }

    .topic-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 100px;
      background: var(--accent-bg);
      color: var(--accent);
    }

    .diff-badge {
      font-size: 10.5px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .diff-easy   { background: var(--green-bg);  color: var(--green); }
    .diff-medium { background: var(--amber-bg);  color: var(--amber); }
    .diff-hard   { background: var(--red-bg);    color: var(--red);   }

    .tag-pill {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 100px;
      background: var(--surface-3);
      color: var(--ink-muted);
    }

    .q-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
      color: var(--ink);
    }

    .card-state-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      margin-top: 1px;
    }

    .card-state-icon.done   { background: var(--green-bg);  color: var(--green); border: 1.5px solid var(--green-brd); }
    .card-state-icon.review { background: var(--red-bg);    color: var(--red);   border: 1.5px solid var(--red-brd); }

    /* ── Answer section (CSS grid expand trick) ─────── */
    .answer-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .3s cubic-bezier(.4,0,.2,1);
    }

    .answer-wrap.open { grid-template-rows: 1fr; }

    .answer-inner { overflow: hidden; }

    .answer-divider { height: 1px; background: var(--border); margin: 0 20px; }

    .answer-body {
      padding: 16px 20px 18px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--ink-light);
    }

    /* Answer markdown styles */
    .answer-body p { margin-bottom: 10px; }
    .answer-body p:last-child { margin-bottom: 0; }
    .answer-body ul, .answer-body ol { padding-left: 18px; margin-bottom: 10px; }
    .answer-body li { margin-bottom: 4px; }
    .answer-body strong { color: var(--ink); font-weight: 600; }
    .answer-body em { color: var(--ink-light); font-style: italic; }

    .answer-body code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12.5px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 1px 6px;
      color: var(--code-color);
    }

    .answer-body pre {
      background: #0d1117;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      overflow-x: auto;
      margin: 12px 0;
      border: 1px solid #30363d;
    }

    .answer-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #e6edf3;
      font-size: 12.5px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.7;
    }

    /* ── Card Actions ───────────────────────────────── */
    .card-actions {
      padding: 10px 20px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    .btn-reveal {
      height: 32px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      touch-action: manipulation;
    }

    .btn-reveal:hover { background: var(--accent); color: white; }

    .btn-reveal.open {
      background: var(--accent-bg);
      border-color: var(--accent-mid);
      color: var(--accent);
    }

    .btn-reveal.open:hover { background: var(--accent); border-color: var(--accent); color: white; }

    .feedback-group {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .btn-fb {
      height: 32px;
      padding: 0 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
      touch-action: manipulation;
    }

    .btn-got {
      color: var(--green);
    }

    .btn-got:hover, .btn-got.active {
      background: var(--green-bg);
      border-color: var(--green-brd);
    }

    .btn-not {
      color: var(--red);
    }

    .btn-not:hover, .btn-not.active {
      background: var(--red-bg);
      border-color: var(--red-brd);
    }

    /* ── Empty / Error States ───────────────────────── */
    .empty-state {
      text-align: center;
      padding: 70px 20px;
    }

    .empty-icon { font-size: 44px; margin-bottom: 16px; }
    .empty-title { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
    .empty-desc { font-size: 13.5px; color: var(--ink-muted); line-height: 1.6; max-width: 380px; margin: 0 auto; }

    .empty-desc code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }

    /* ── Toast ──────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--toast-bg);
      color: var(--toast-color);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 100px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Card entrance animation ────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-card { animation: cardIn .18s ease both; }

    /* ── Scrollbar ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 100px; }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 760px) {
      .header {
        position: static;
      }

      .header-inner {
        height: auto;
        min-height: 58px;
        padding: 10px 14px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .logo {
        order: 1;
      }

      .toolbar {
        order: 2;
        margin-left: auto;
        max-width: calc(100% - 46px);
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 1px;
      }

      .toolbar::-webkit-scrollbar {
        display: none;
      }

      .search-wrap {
        order: 3;
        flex: 1 0 100%;
      }

      #searchInput,
      .tool-btn,
      .btn-reveal,
      .btn-fb {
        min-height: 40px;
      }

      .tool-btn {
        padding: 0 11px;
      }

      .topics-inner,
      .stats-row,
      .main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topic-toggle {
        align-items: flex-start;
        flex-direction: column;
        min-height: 56px;
      }

      .topic-toggle-side {
        width: 100%;
        justify-content: space-between;
      }

      .topic-menu {
        grid-template-columns: 1fr;
        max-height: min(56vh, 430px);
        overflow-y: auto;
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .stat-item {
        min-width: 0;
      }

      .progress-track {
        grid-column: 1 / -2;
        min-width: 0;
      }

      .progress-pct {
        justify-self: end;
      }

      .main {
        padding-top: 12px;
        padding-bottom: 48px;
      }

      .card-top {
        padding: 14px 14px 12px;
        gap: 10px;
      }

      .card-num {
        min-width: 20px;
      }

      .q-text {
        font-size: 14.5px;
        line-height: 1.55;
      }

      .answer-divider {
        margin: 0 14px;
      }

      .answer-body {
        padding: 14px;
        font-size: 13.5px;
        line-height: 1.75;
      }

      .answer-body pre {
        margin-left: -2px;
        margin-right: -2px;
        padding: 12px;
      }

      .card-actions {
        padding: 10px 14px 12px;
        align-items: stretch;
        flex-direction: column;
      }

      .btn-reveal,
      .feedback-group,
      .btn-fb {
        width: 100%;
      }

      .btn-reveal,
      .btn-fb {
        justify-content: center;
      }

      .feedback-group {
        margin-left: 0;
      }

      .feedback-group .btn-fb {
        flex: 1;
      }
    }

    @media (max-width: 480px) {
      .logo-text {
        display: none;
      }

      .header-inner {
        padding: 9px 10px;
        gap: 8px;
      }

      .logo-mark {
        width: 34px;
        height: 34px;
      }

      .toolbar {
        flex: 1;
        justify-content: flex-end;
      }

      .tool-btn {
        width: 38px;
        min-width: 38px;
        padding: 0;
        justify-content: center;
      }

      .tool-btn .btn-label {
        display: none;
      }

      .topics-inner,
      .stats-row,
      .main {
        padding-left: 10px;
        padding-right: 10px;
      }

      .topic-current {
        font-size: 13.5px;
      }

      .topic-toggle-side {
        font-size: 12px;
      }

      .stats-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .progress-track {
        grid-column: 1 / -1;
      }

      .progress-pct {
        justify-self: start;
      }

      .q-card {
        border-radius: var(--radius-sm);
      }

      .card-top {
        position: relative;
      }

      .card-state-icon {
        position: absolute;
        top: 12px;
        right: 12px;
      }

      .card-meta {
        padding-right: 24px;
      }

      .tag-pill {
        display: none;
      }

      .topic-badge {
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #toast {
        left: 10px;
        right: 10px;
        bottom: 14px;
        transform: translateY(12px);
        text-align: center;
        white-space: normal;
      }

      #toast.show {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">

    <a class="logo" href="#">
      <div class="logo-mark">🧠</div>
      <span class="logo-text">Interview<span>Prep</span></span>
    </a>

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="5"/>
        <path d="m10.5 10.5 4 4"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search questions, tags…" autocomplete="off">

    <div class="toolbar">
      <button class="tool-btn" id="shuffleBtn" title="Shuffle questions (S)">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 3h-5l1.5 1.5L9 8l-3-3-5 5 1.5 1.5L6 8l3 3 3.5-3.5L14 9V4h-1.5L14 3H16z"/>
          <path d="M16 11h-5l1.5-1.5L10 8M16 13v-2"/>
        </svg>
        <span class="btn-label">Shuffle</span>
      </button>
      <button class="tool-btn" id="hideBtn" title="Hide answered questions (H)">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/>
          <circle cx="8" cy="8" r="2"/>
          <line x1="2" y1="14" x2="14" y2="2"/>
        </svg>
        <span class="btn-label">Hide done</span>
      </button>
      <button class="tool-btn" id="resetBtn" title="Reset progress">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.5 9A6.5 6.5 0 1 1 3.5 7"/>
        </svg>
        <span class="btn-label">Reset</span>
      </button>
      <button class="tool-btn" id="languageBtn" title="Switch language (L)">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6.5"/>
          <path d="M1.5 8h13M8 1.5c2 1.8 3 4 3 6.5s-1 4.7-3 6.5M8 1.5c-2 1.8-3 4-3 6.5s1 4.7 3 6.5"/>
        </svg>
        <span class="btn-label" id="languageLabel">Language</span>
      </button>
      <button class="tool-btn" id="darkBtn" title="Switch display theme (D)">
        <svg id="darkIcon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1a7 7 0 1 0 7 7A5.5 5.5 0 0 1 8 1z"/>
        </svg>
        <span class="btn-label" id="darkLabel">Theme</span>
      </button>
    </div>

  </div>
</header>

<script>
window.IQH_EMBEDDED_QUESTIONS = {"en":[{"domain":"Java","topic":"Collection Algorithms & Streams","icon":"⚙️","questions":[{"id":"java-collections-algorithms-001","question":"What is the difference between List.sort() and Collections.sort()?","answer":"Both sort a mutable list using natural order or a `Comparator`. `Collections.sort(list)` delegates to the list's sorting behavior in modern Java.\n\n```java\nemployees.sort(Comparator.comparing(Employee::name));\nCollections.sort(numbers);\n```\n\n`List.sort()` is often clearer and works naturally with comparator composition. Sorting is stable: equal elements retain their relative order.","difficulty":"easy","tags":["sorting","list","collections","comparator"]},{"id":"java-collections-algorithms-002","question":"What precondition does Collections.binarySearch() require?","answer":"The list must already be sorted according to the same ordering used by the search. Otherwise, the result is undefined.\n\n```java\nCollections.sort(names);\nint index = Collections.binarySearch(names, \"Mara\");\n```\n\nA negative result encodes the insertion point as `-(insertionPoint) - 1`. Recover it with `-result - 1`.","difficulty":"medium","tags":["binary-search","sorting","collections","insertion-point"]},{"id":"java-collections-algorithms-003","question":"How should multiple sort criteria be expressed?","answer":"Compose comparators rather than writing deeply nested comparison logic.\n\n```java\nComparator<Employee> order = Comparator\n    .comparing(Employee::department)\n    .thenComparing(Employee::lastName)\n    .thenComparingInt(Employee::id);\n\nemployees.sort(order);\n```\n\nUseful methods include `reversed`, `nullsFirst`, `nullsLast`, `comparingInt`, and `thenComparing`. The comparator must remain transitive and consistent.","difficulty":"medium","tags":["comparator","sorting","composition","ordering"]},{"id":"java-collections-algorithms-004","question":"How do List equality and Set equality differ?","answer":"Two lists are equal when they contain equal elements in the same order. Two sets are equal when they contain the same elements, regardless of iteration order.\n\n```java\nList.of(1, 2).equals(List.of(2, 1)); // false\nSet.of(1, 2).equals(Set.of(2, 1));   // true\n```\n\nMap equality similarly compares mappings, not iteration order. These contracts allow different implementations of the same abstraction to compare equal.","difficulty":"easy","tags":["list","set","equals","contract"]},{"id":"java-collections-algorithms-005","question":"What is a Spliterator?","answer":"A `Spliterator` traverses elements like an iterator but can also split its remaining work for potential parallel processing.\n\nIt reports characteristics such as `ORDERED`, `DISTINCT`, `SORTED`, `SIZED`, `IMMUTABLE`, or `CONCURRENT`. Streams use spliterators to understand a source and divide work.\n\nCustom collections may implement a specialized spliterator when default traversal or splitting is inefficient.","difficulty":"hard","tags":["spliterator","streams","parallelism","iteration"]},{"id":"java-collections-algorithms-006","question":"What is the difference between a Collection and a Stream?","answer":"A collection stores data and can usually be traversed repeatedly. A stream describes a pipeline of computation, is lazy until a terminal operation, and can be consumed only once.\n\n```java\nList<String> names = users.stream()\n    .filter(User::active)\n    .map(User::name)\n    .toList();\n```\n\nStreams do not normally mutate their source. They are best viewed as computations over data, not containers.","difficulty":"easy","tags":["collection","stream","lazy","pipeline"]},{"id":"java-collections-algorithms-007","question":"How do Stream.toList() and Collectors.toList() differ?","answer":"`Stream.toList()` returns an unmodifiable list. `Collectors.toList()` makes no guarantee about the concrete type, mutability, serializability, or thread-safety of its result.\n\n```java\nList<String> fixed = stream.toList();\nList<String> unspecified = stream.collect(Collectors.toList());\nList<String> mutable = stream.collect(Collectors.toCollection(ArrayList::new));\n```\n\nRequest the exact property you need instead of assuming the collector returns an `ArrayList`.","difficulty":"medium","tags":["stream","tolist","collectors","mutability"]},{"id":"java-collections-algorithms-008","question":"What happens when Collectors.toMap() encounters duplicate keys?","answer":"The two-argument `toMap` collector throws `IllegalStateException` when multiple elements produce the same key. Supply a merge function when duplicates are possible.\n\n```java\nMap<String, Integer> longestByDepartment = employees.stream()\n    .collect(Collectors.toMap(\n        Employee::department,\n        Employee::years,\n        Integer::max));\n```\n\nA fourth argument can select the map implementation, such as `LinkedHashMap::new` when encounter order matters.","difficulty":"medium","tags":["collectors","tomap","duplicate-key","merge"]},{"id":"java-collections-algorithms-009","question":"When should groupingBy() and partitioningBy() be used?","answer":"`groupingBy` classifies elements into any number of keys. `partitioningBy` splits elements into exactly two Boolean groups.\n\n```java\nMap<Department, List<Employee>> byDepartment = employees.stream()\n    .collect(Collectors.groupingBy(Employee::department));\n\nMap<Boolean, List<Employee>> byActive = employees.stream()\n    .collect(Collectors.partitioningBy(Employee::active));\n```\n\nBoth support downstream collectors for counting, mapping, summing, or reducing each group.","difficulty":"medium","tags":["collectors","groupingby","partitioningby","streams"]},{"id":"java-collections-algorithms-010","question":"Why can side effects inside stream operations be dangerous?","answer":"Stream pipelines may be lazy, reordered where permitted, or executed in parallel. Mutating shared state inside `map`, `filter`, or `forEach` can cause races and make results depend on execution order.\n\n```java\n// Prefer this\nList<String> names = users.stream()\n    .map(User::name)\n    .toList();\n```\n\nUse collectors and reductions instead of manually mutating external containers. Behavioral functions should usually be stateless and non-interfering.","difficulty":"hard","tags":["streams","side-effects","parallelism","thread-safety"]},{"id":"java-collections-algorithms-011","question":"When can parallel streams be slower or unsafe?","answer":"Parallel streams add splitting, scheduling, coordination, and combining overhead. They may be slower for small inputs, cheap operations, poorly splittable sources, blocking I/O, or heavily contended work.\n\nThey commonly use the shared `ForkJoinPool.commonPool()`, so blocking tasks can affect unrelated parallel work. Use them only when operations are independent, associative where required, CPU-bound, sufficiently large, and supported by measurement.","difficulty":"hard","tags":["parallel-stream","forkjoinpool","performance","concurrency"]},{"id":"java-collections-algorithms-012","question":"How does encounter order affect stream results?","answer":"Ordered sources such as `List` have an encounter order. `HashSet` and `HashMap` do not promise one. Operations such as `findFirst`, `forEachOrdered`, and collection into ordered containers can preserve encounter order.\n\n`forEach` on a parallel stream may execute in any order, while `forEachOrdered` preserves encounter order at a possible performance cost. Do not assume order unless the source and operations define it.","difficulty":"medium","tags":["streams","encounter-order","parallel-stream","ordering"]}]},{"domain":"Java","topic":"Concurrent Collections","icon":"🔀","questions":[{"id":"java-collections-concurrent-001","question":"What is the difference between a synchronized wrapper and a concurrent collection?","answer":"`Collections.synchronizedList(...)` wraps a normal collection and serializes access through a common lock. Concurrent collections are designed with specialized algorithms that allow more operations to proceed concurrently.\n\n```java\nList<String> synchronizedList =\n    Collections.synchronizedList(new ArrayList<>());\n\nMap<String, Integer> concurrentMap =\n    new ConcurrentHashMap<>();\n```\n\nA synchronized wrapper can be appropriate for simple, low-contention access. Concurrent collections usually scale better and often provide useful atomic operations.","difficulty":"medium","tags":["concurrency","synchronized-collection","concurrent-collection","locking"]},{"id":"java-collections-concurrent-002","question":"How must you iterate over a Collections.synchronizedList()?","answer":"You must manually synchronize on the wrapper while iterating. Synchronizing each individual method call is not enough to protect the complete traversal.\n\n```java\nList<String> list = Collections.synchronizedList(new ArrayList<>());\n\nsynchronized (list) {\n    for (String item : list) {\n        process(item);\n    }\n}\n```\n\nWithout the external lock, another thread can structurally modify the collection during iteration.","difficulty":"medium","tags":["synchronized-collection","iteration","locking","thread-safety"]},{"id":"java-collections-concurrent-003","question":"How do ConcurrentHashMap reads and iterators behave during concurrent updates?","answer":"`get()` operations generally do not block and may overlap with updates. Iterators are **weakly consistent**: they reflect some state at or after iterator creation, do not throw `ConcurrentModificationException`, and may or may not observe concurrent updates.\n\nAggregate methods such as `size()` can represent transient states during active mutation. They are useful for monitoring, but should not control correctness-sensitive logic.","difficulty":"hard","tags":["concurrenthashmap","weakly-consistent","iterator","concurrency"]},{"id":"java-collections-concurrent-004","question":"Why should compound ConcurrentHashMap updates use atomic map methods?","answer":"A sequence of individually thread-safe calls is not automatically atomic.\n\n```java\n// Race condition\nif (!map.containsKey(key)) {\n    map.put(key, createValue());\n}\n\n// Atomic map operation\nmap.computeIfAbsent(key, k -> createValue());\n```\n\nUse `putIfAbsent`, `compute`, `computeIfAbsent`, `merge`, conditional `remove`, and conditional `replace` for compound updates tied to one key.","difficulty":"medium","tags":["concurrenthashmap","atomicity","computeifabsent","race-condition"]},{"id":"java-collections-concurrent-005","question":"What precautions apply to ConcurrentHashMap compute methods?","answer":"Mapping and remapping functions should be short, deterministic, and should not perform unrelated blocking work. The map may coordinate updates while the function runs.\n\nAvoid recursively modifying the same key from inside the computation. Also remember that returning `null` means no mapping should be stored, or an existing mapping should be removed, depending on the method.\n\nFor expensive I/O, consider storing a future or another representation of in-progress work rather than performing the I/O directly inside `computeIfAbsent`.","difficulty":"hard","tags":["concurrenthashmap","compute","blocking","atomicity"]},{"id":"java-collections-concurrent-006","question":"When is CopyOnWriteArrayList a good choice?","answer":"`CopyOnWriteArrayList` is useful when reads and iteration are frequent, writes are rare, and snapshot-style iteration is desirable. Each mutation copies the underlying array.\n\nTypical examples include listener lists and configuration snapshots.\n\nIt is a poor choice for large lists with frequent writes because copying is expensive. Its iterators observe the snapshot that existed when they were created and do not support mutation.","difficulty":"medium","tags":["copyonwritearraylist","snapshot","read-heavy","concurrency"]},{"id":"java-collections-concurrent-007","question":"What is ConcurrentLinkedQueue designed for?","answer":"`ConcurrentLinkedQueue` is an unbounded, thread-safe, non-blocking FIFO queue. It is useful when producers and consumers should not wait for capacity and polling an empty queue may simply return `null`.\n\n```java\nQueue<Task> tasks = new ConcurrentLinkedQueue<>();\ntasks.offer(task);\nTask next = tasks.poll();\n```\n\nIf consumers should wait until work arrives, or producers must respect bounded capacity, use a `BlockingQueue` instead.","difficulty":"medium","tags":["concurrentlinkedqueue","queue","non-blocking","concurrency"]},{"id":"java-collections-concurrent-008","question":"What operation families does BlockingQueue provide?","answer":"`BlockingQueue` offers four styles for insertion and removal:\n\n- Throw an exception: `add`, `remove`.\n- Return a special value: `offer`, `poll`.\n- Wait indefinitely: `put`, `take`.\n- Wait up to a timeout: timed `offer`, timed `poll`.\n\n```java\nqueue.put(task);       // waits for space\nTask task = queue.take(); // waits for an element\n```\n\nChoosing the operation communicates the desired backpressure and failure behavior.","difficulty":"medium","tags":["blockingqueue","backpressure","producer-consumer","queue"]},{"id":"java-collections-concurrent-009","question":"How do ArrayBlockingQueue and LinkedBlockingQueue differ?","answer":"`ArrayBlockingQueue` is always bounded and uses a fixed-size array. Its memory footprint is predictable, and it can optionally use fair lock ordering.\n\n`LinkedBlockingQueue` uses linked nodes and may be bounded explicitly; without a capacity argument, its capacity is very large. Separate internal coordination can provide good throughput, but each element requires a node allocation.\n\nUse a bounded queue when you need explicit backpressure and protection against unbounded memory growth.","difficulty":"hard","tags":["arrayblockingqueue","linkedblockingqueue","backpressure","capacity"]},{"id":"java-collections-concurrent-010","question":"What are SynchronousQueue and PriorityBlockingQueue used for?","answer":"`SynchronousQueue` has no storage capacity. Each insertion waits for another thread to receive the element, making it a direct handoff mechanism.\n\n`PriorityBlockingQueue` is an unbounded blocking queue ordered by priority. Retrieval waits when empty, but insertion does not normally block for capacity.\n\nUse `SynchronousQueue` for direct producer-consumer handoff and `PriorityBlockingQueue` when ready work must be selected by priority.","difficulty":"hard","tags":["synchronousqueue","priorityblockingqueue","handoff","priority"]},{"id":"java-collections-concurrent-011","question":"When should you use ConcurrentSkipListMap or ConcurrentSkipListSet?","answer":"Use them when you need a concurrent collection that also maintains sorted order and supports navigational or range operations.\n\n```java\nConcurrentNavigableMap<Long, Event> events =\n    new ConcurrentSkipListMap<>();\n\nvar recent = events.tailMap(cutoff, true);\n```\n\nFor unordered key lookup, `ConcurrentHashMap` is usually faster. Skip-list collections trade some lookup cost for sorted concurrent navigation.","difficulty":"medium","tags":["concurrentskiplistmap","concurrentskiplistset","sorted","concurrency"]},{"id":"java-collections-concurrent-012","question":"How can you create a concurrent Set?","answer":"A scalable concurrent set can be created as a key projection of `ConcurrentHashMap`.\n\n```java\nSet<String> activeUsers = ConcurrentHashMap.newKeySet();\nactiveUsers.add(\"alice\");\n```\n\nThis is preferable to manually storing dummy Boolean values. For a sorted concurrent set, use `ConcurrentSkipListSet`. Choose based on whether ordering is required.","difficulty":"easy","tags":["concurrent-set","concurrenthashmap","newkeyset","concurrency"]}]},{"domain":"Java","topic":"Collections Core","icon":"🧺","questions":[{"id":"java-collections-core-001","question":"What is the Java Collections Framework?","answer":"The Java Collections Framework is the standard set of interfaces, implementations, and algorithms for working with groups of objects.\n\nCore interfaces include:\n\n- `Collection`: root interface for most object groups.\n- `List`: ordered, index-based, allows duplicates.\n- `Set`: no duplicate elements.\n- `Queue` / `Deque`: processing-oriented collections.\n- `Map`: key-value associations, separate from `Collection`.\n\nThe value of the framework is that code can depend on interfaces while choosing implementations based on ordering, lookup cost, memory, concurrency, and duplicate rules.","difficulty":"easy","tags":["collections","collection","list","set","queue","map"]},{"id":"java-collections-core-002","question":"What is the difference between Collection and Collections?","answer":"`Collection` is an interface representing a group of elements. `Collections` is a utility class with static helper methods.\n\n```java\nCollection<String> names = new ArrayList<>();\nList<String> orderedNames = new ArrayList<>(names);\nCollections.sort(orderedNames);\n```\n\nExamples from `Collections` include `sort`, `binarySearch`, `unmodifiableList`, `synchronizedList`, `emptyList`, and `frequency`. Interviewers often ask this to check whether you distinguish the type hierarchy from utility algorithms.","difficulty":"easy","tags":["collection","collections","utility-class"]},{"id":"java-collections-core-003","question":"How do List, Set, Queue, and Deque differ?","answer":"`List` preserves positional order and supports indexed access. `Set` rejects duplicates based on equality or ordering rules. `Queue` models elements waiting to be processed, usually FIFO but not always. `Deque` is a double-ended queue that supports insertion and removal at both ends.\n\n```java\nList<String> list = new ArrayList<>();\nSet<String> set = new HashSet<>();\nQueue<String> queue = new ArrayDeque<>();\nDeque<String> stack = new ArrayDeque<>();\n```\n\nChoose the interface that describes the behavior the caller needs, not necessarily the concrete class you happen to instantiate.","difficulty":"easy","tags":["list","set","queue","deque","interfaces"]},{"id":"java-collections-core-004","question":"When should you choose ArrayList over LinkedList?","answer":"`ArrayList` is usually the default `List` implementation. It provides fast indexed access, compact memory layout, and efficient iteration. Appending is amortized constant time.\n\n`LinkedList` can add or remove efficiently when you already have a node position, but Java code rarely exposes nodes directly. It has poorer cache locality and higher per-element memory overhead.\n\nUse `LinkedList` mainly when you specifically need its `Deque` behavior and have measured that it fits. For general lists, prefer `ArrayList`.","difficulty":"medium","tags":["arraylist","linkedlist","list","performance"]},{"id":"java-collections-core-005","question":"How does ArrayList grow, and why does initial capacity matter?","answer":"`ArrayList` stores elements in an internal array. When it runs out of room, it allocates a larger array and copies existing elements.\n\n```java\nList<Order> orders = new ArrayList<>(expectedSize);\n```\n\nProviding a realistic initial capacity can reduce reallocations for large known workloads. It is not a correctness requirement, and oversizing wastes memory. `size()` is the number of elements; capacity is internal storage and is not exposed by the `List` interface.","difficulty":"medium","tags":["arraylist","capacity","performance","allocation"]},{"id":"java-collections-core-006","question":"What are the main differences between HashSet, LinkedHashSet, and TreeSet?","answer":"`HashSet` stores unique elements with no guaranteed iteration order. `LinkedHashSet` keeps insertion order while preserving hash-based uniqueness. `TreeSet` keeps elements sorted by natural ordering or a `Comparator`.\n\n```java\nSet<String> fast = new HashSet<>();\nSet<String> ordered = new LinkedHashSet<>();\nSet<String> sorted = new TreeSet<>();\n```\n\nUse `HashSet` for normal uniqueness, `LinkedHashSet` when stable insertion order matters, and `TreeSet` when sorted traversal or range operations are required.","difficulty":"easy","tags":["hashset","linkedhashset","treeset","set","ordering"]},{"id":"java-collections-core-007","question":"How does a Set decide whether an element is a duplicate?","answer":"Hash-based sets use `equals()` and `hashCode()`. Sorted sets such as `TreeSet` use comparison: if `compare(a, b) == 0`, the elements are considered duplicates for set membership.\n\n```java\nSet<BigDecimal> values = new TreeSet<>();\nvalues.add(new BigDecimal(\"1.0\"));\nvalues.add(new BigDecimal(\"1.00\"));\nSystem.out.println(values.size()); // 1\n```\n\nThis is why comparators must be designed carefully, especially when their equality meaning differs from `equals()`.","difficulty":"medium","tags":["set","equals","hashcode","treeset","comparator"]},{"id":"java-collections-core-008","question":"When should you use ArrayDeque instead of Stack or LinkedList?","answer":"`ArrayDeque` is the modern general-purpose implementation for stack and queue behavior when you do not need thread safety.\n\n```java\nDeque<String> stack = new ArrayDeque<>();\nstack.push(\"A\");\nstack.push(\"B\");\nSystem.out.println(stack.pop()); // B\n```\n\n`Stack` is a legacy synchronized class based on `Vector`. `LinkedList` can be used as a deque, but usually has more allocation overhead and worse locality. Prefer `ArrayDeque` for LIFO and FIFO structures in single-threaded code.","difficulty":"medium","tags":["arraydeque","deque","stack","queue","legacy"]},{"id":"java-collections-core-009","question":"How does PriorityQueue work?","answer":"`PriorityQueue` orders elements by natural ordering or a `Comparator`, and `poll()` removes the least element according to that ordering. It is not a FIFO queue unless the comparator models FIFO behavior.\n\n```java\nQueue<Integer> queue = new PriorityQueue<>();\nqueue.add(30);\nqueue.add(10);\nqueue.add(20);\nSystem.out.println(queue.poll()); // 10\n```\n\nIts iterator does not guarantee sorted traversal. If you need all elements in priority order, repeatedly call `poll()` or copy and sort.","difficulty":"medium","tags":["priorityqueue","queue","heap","comparator"]},{"id":"java-collections-core-010","question":"What is a fail-fast iterator?","answer":"A fail-fast iterator attempts to detect structural modification of the collection outside the iterator and throws `ConcurrentModificationException`.\n\n```java\nfor (String item : list) {\n    if (item.isBlank()) {\n        list.remove(item); // may throw ConcurrentModificationException\n    }\n}\n```\n\nFail-fast behavior is a bug detector, not a concurrency guarantee. It is best-effort. Correct removal during iteration should use `Iterator.remove()` or collection methods such as `removeIf()`.","difficulty":"medium","tags":["iterator","fail-fast","concurrentmodificationexception","removeif"]},{"id":"java-collections-core-011","question":"How can you safely remove elements while iterating?","answer":"Use the iterator's own `remove()` method, or use `removeIf()` when the condition can be expressed as a predicate.\n\n```java\nIterator<String> it = names.iterator();\nwhile (it.hasNext()) {\n    if (it.next().isBlank()) {\n        it.remove();\n    }\n}\n\nnames.removeIf(String::isBlank);\n```\n\nDo not structurally modify most collections directly while iterating with an enhanced `for` loop. That can invalidate the iterator.","difficulty":"easy","tags":["iterator","remove","removeif","iteration"]},{"id":"java-collections-core-012","question":"What is the difference between an unmodifiable collection and an immutable collection?","answer":"An unmodifiable collection rejects mutation through that reference. It may still be a view over a mutable backing collection.\n\n```java\nList<String> backing = new ArrayList<>();\nList<String> view = Collections.unmodifiableList(backing);\nbacking.add(\"new\");\nSystem.out.println(view); // sees the change\n```\n\nAn immutable collection cannot change at all, assuming its elements are also immutable. `List.copyOf(...)` creates an unmodifiable snapshot, but mutable elements inside it can still change.","difficulty":"medium","tags":["unmodifiable","immutable","collections","copyof"]},{"id":"java-collections-core-013","question":"How do Arrays.asList(), List.of(), and new ArrayList<>() differ?","answer":"`Arrays.asList(array)` returns a fixed-size list backed by the array. You can replace elements, but cannot add or remove.\n\n`List.of(...)` returns an unmodifiable list and rejects null elements.\n\n`new ArrayList<>(...)` creates a mutable, resizable list copy.\n\n```java\nString[] data = {\"a\", \"b\"};\nList<String> fixed = Arrays.asList(data);\nList<String> immutable = List.of(\"a\", \"b\");\nList<String> mutable = new ArrayList<>(fixed);\n```","difficulty":"medium","tags":["arrays","list","listof","arraylist","unmodifiable"]},{"id":"java-collections-core-014","question":"What does PECS mean in Java generics?","answer":"PECS means **Producer Extends, Consumer Super**.\n\nUse `? extends T` when a source produces `T` values that you only read. Use `? super T` when a destination consumes `T` values that you write.\n\n```java\nvoid copy(List<? extends Number> source,\n          List<? super Number> target) {\n    for (Number n : source) {\n        target.add(n);\n    }\n}\n```\n\nThis is why APIs such as `addAll` often accept `Collection<? extends E>`.","difficulty":"hard","tags":["generics","pecs","wildcards","collections"]},{"id":"java-collections-core-015","question":"Are Java collection implementations thread-safe by default?","answer":"Most general-purpose collections such as `ArrayList`, `HashSet`, and `HashMap` are not thread-safe for concurrent mutation. If multiple threads access a collection and at least one mutates it, you need external synchronization or a concurrent collection.\n\nOptions include:\n\n- `Collections.synchronizedList(...)` for simple synchronized wrappers.\n- `CopyOnWriteArrayList` for read-heavy lists with rare writes.\n- `ConcurrentHashMap` for concurrent maps.\n- Blocking queues for producer-consumer workflows.\n\nChoose based on access pattern, not just the word \"thread-safe\".","difficulty":"medium","tags":["collections","thread-safety","concurrency","synchronization"]}]},{"domain":"Java","topic":"Collections Maps & Advanced","icon":"🗺️","questions":[{"id":"java-collections-maps-001","question":"Why is Map not a subtype of Collection?","answer":"`Map` represents associations between keys and values, not a collection of individual elements. It has different core operations such as `put`, `get`, `containsKey`, and `entrySet`.\n\nYou can view parts of a map as collections:\n\n```java\nSet<K> keys = map.keySet();\nCollection<V> values = map.values();\nSet<Map.Entry<K, V>> entries = map.entrySet();\n```\n\nThese are views backed by the map, so changes may be reflected both ways depending on the operation.","difficulty":"easy","tags":["map","collection","views","entryset"]},{"id":"java-collections-maps-002","question":"How does HashMap find a value by key?","answer":"`HashMap` uses the key's `hashCode()` to choose a bucket, then uses `equals()` to find the matching key within that bucket.\n\n```java\nMap<UserId, User> users = new HashMap<>();\nusers.put(id, user);\nUser found = users.get(new UserId(id.value()));\n```\n\nThis requires a correct `equals()` / `hashCode()` contract. Equal keys must have equal hash codes. Unequal keys may share a hash code, but too many collisions hurt performance.","difficulty":"easy","tags":["hashmap","hashcode","equals","lookup"]},{"id":"java-collections-maps-003","question":"Why are mutable keys dangerous in a HashMap?","answer":"If a key changes after insertion in a way that affects `equals()` or `hashCode()`, the map may look in the wrong bucket and fail to find it.\n\n```java\nMap<User, String> roles = new HashMap<>();\nUser user = new User(\"alice\");\nroles.put(user, \"admin\");\n\nuser.setName(\"bob\");\nSystem.out.println(roles.get(user)); // may be null\n```\n\nKeys should be immutable, or at least their equality-relevant fields must not change while they are inside the map.","difficulty":"medium","tags":["hashmap","mutable-key","hashcode","immutability"]},{"id":"java-collections-maps-004","question":"What are capacity and load factor in HashMap?","answer":"Capacity is the number of buckets. Load factor controls how full the map can get before it resizes. The default load factor is commonly `0.75`, which balances memory use and lookup cost.\n\n```java\nMap<String, Integer> counts = new HashMap<>(128, 0.75f);\n```\n\nIf you expect many entries, an appropriate initial capacity can reduce resizing. Oversizing wastes memory. These settings tune performance; they do not change map semantics.","difficulty":"medium","tags":["hashmap","capacity","load-factor","performance"]},{"id":"java-collections-maps-005","question":"Does HashMap preserve insertion order?","answer":"No. `HashMap` does not guarantee iteration order. The order may appear stable in small examples but can change after resizing, implementation changes, or different key distributions.\n\nUse:\n\n- `LinkedHashMap` for insertion order or access order.\n- `TreeMap` for sorted key order.\n\nNever write logic that depends on `HashMap` iteration order.","difficulty":"easy","tags":["hashmap","ordering","linkedhashmap","treemap"]},{"id":"java-collections-maps-006","question":"When should you use LinkedHashMap?","answer":"`LinkedHashMap` maintains predictable iteration order. By default, that order is insertion order. It can also be configured for access order, which is useful for simple LRU-style caches.\n\n```java\nMap<String, Integer> ordered = new LinkedHashMap<>();\n```\n\nIt has slightly more overhead than `HashMap` because it maintains linked entries, but it is ideal when deterministic iteration matters.","difficulty":"medium","tags":["linkedhashmap","ordering","lru","map"]},{"id":"java-collections-maps-007","question":"When should you use TreeMap?","answer":"`TreeMap` stores keys in sorted order using natural ordering or a `Comparator`. It is useful for range queries and ordered navigation.\n\n```java\nNavigableMap<Integer, String> scores = new TreeMap<>();\nscores.subMap(70, true, 90, true);\n```\n\nThe comparator determines key uniqueness: if it returns `0`, the map treats the keys as the same key. That comparator should usually be consistent with `equals()`.","difficulty":"medium","tags":["treemap","sortedmap","navigablemap","comparator"]},{"id":"java-collections-maps-008","question":"What is the difference between HashMap, Hashtable, and ConcurrentHashMap?","answer":"`HashMap` is unsynchronized and is the normal choice for single-threaded or externally synchronized use.\n\n`Hashtable` is legacy, synchronizes most methods, and does not allow null keys or values.\n\n`ConcurrentHashMap` is designed for concurrent access with better scalability than a single synchronized map. It does not allow null keys or values and provides atomic operations such as `compute`, `putIfAbsent`, and `merge`.","difficulty":"medium","tags":["hashmap","hashtable","concurrenthashmap","concurrency"]},{"id":"java-collections-maps-009","question":"Why does ConcurrentHashMap reject null keys and values?","answer":"Concurrent maps need to distinguish absence from a present mapping whose value is null. With concurrent access, `map.get(key) == null` must clearly mean that no mapping was observed.\n\n```java\nConcurrentMap<String, Integer> counts = new ConcurrentHashMap<>();\ncounts.putIfAbsent(\"errors\", 0);\n```\n\nRejecting null removes ambiguity and makes atomic operations such as `putIfAbsent`, `compute`, and `merge` easier to reason about.","difficulty":"medium","tags":["concurrenthashmap","null","concurrency","map"]},{"id":"java-collections-maps-010","question":"How do computeIfAbsent() and merge() help with map updates?","answer":"They express common update patterns atomically for maps that support atomic operations, especially `ConcurrentHashMap`.\n\n```java\nMap<String, List<Order>> byCustomer = new HashMap<>();\nbyCustomer.computeIfAbsent(customerId, id -> new ArrayList<>())\n          .add(order);\n\nMap<String, Integer> counts = new HashMap<>();\ncounts.merge(\"errors\", 1, Integer::sum);\n```\n\n`computeIfAbsent` creates a value only when missing. `merge` combines a new value with an existing one or inserts it when absent.","difficulty":"medium","tags":["map","computeifabsent","merge","updates"]},{"id":"java-collections-maps-011","question":"What are keySet(), values(), and entrySet() views?","answer":"They are backed views of a map's contents. They do not usually copy data.\n\n```java\nSet<String> keys = map.keySet();\nCollection<Integer> values = map.values();\nSet<Map.Entry<String, Integer>> entries = map.entrySet();\n```\n\nRemoving from a supported view removes from the map. Adding directly to these views is generally unsupported because the map would not know the missing key or value. `entrySet()` is the usual choice for efficient key-value iteration.","difficulty":"easy","tags":["map","views","keyset","values","entryset"]},{"id":"java-collections-maps-012","question":"What is WeakHashMap used for?","answer":"`WeakHashMap` stores keys through weak references. If a key is no longer strongly reachable elsewhere, its entry can be removed by garbage collection.\n\nIt is useful for metadata associated with objects whose lifecycle should not be extended by the map.\n\n```java\nMap<Object, Metadata> metadata = new WeakHashMap<>();\n```\n\nIt is not a general-purpose cache by itself. Values can accidentally keep keys alive if they reference them strongly.","difficulty":"hard","tags":["weakhashmap","weak-reference","gc","cache"]},{"id":"java-collections-maps-013","question":"What is IdentityHashMap, and when is it appropriate?","answer":"`IdentityHashMap` compares keys with `==` instead of `equals()` and uses identity-based hashing.\n\n```java\nMap<Object, String> seen = new IdentityHashMap<>();\n```\n\nIt is useful for object graph algorithms, serialization-like traversal, or cycle detection where distinct objects must remain distinct even if they are logically equal. It should not be used as a faster `HashMap`; its equality semantics are different.","difficulty":"hard","tags":["identityhashmap","identity","map","equals"]},{"id":"java-collections-maps-014","question":"Why are EnumMap and EnumSet efficient?","answer":"`EnumMap` and `EnumSet` are specialized for enum keys or elements. They can use compact array or bit-vector-like representations based on enum ordinals.\n\n```java\nEnumMap<DayOfWeek, String> schedule = new EnumMap<>(DayOfWeek.class);\nEnumSet<DayOfWeek> weekend = EnumSet.of(SATURDAY, SUNDAY);\n```\n\nThey are usually faster and more memory-efficient than general-purpose hash-based collections for enum domains. They also preserve enum declaration order.","difficulty":"medium","tags":["enummap","enumset","enum","performance"]},{"id":"java-collections-maps-015","question":"How should you choose between HashMap, LinkedHashMap, TreeMap, and ConcurrentHashMap?","answer":"Choose by required behavior:\n\n- `HashMap`: general-purpose key lookup, no ordering guarantee.\n- `LinkedHashMap`: predictable insertion or access order.\n- `TreeMap`: sorted keys and range/navigation operations.\n- `ConcurrentHashMap`: concurrent access and atomic map updates.\n\nStart from the interface, usually `Map`, and choose the implementation based on ordering, concurrency, memory, null handling, and lookup/update patterns.","difficulty":"easy","tags":["hashmap","linkedhashmap","treemap","concurrenthashmap","design"]}]},{"domain":"Java","topic":"Collections Modern APIs & Edge Cases","icon":"🧭","questions":[{"id":"java-collections-modern-001","question":"What are SequencedCollection, SequencedSet, and SequencedMap?","answer":"Introduced in Java 21, the sequenced interfaces represent collections with a defined encounter order from first to last.\n\n- `SequencedCollection` supports operations at both ends and reverse traversal.\n- `SequencedSet` combines sequencing with set uniqueness.\n- `SequencedMap` defines an encounter order for entries.\n\nExisting types were retrofitted: `List` and `Deque` are sequenced collections, `LinkedHashSet` is a sequenced set, and `LinkedHashMap` is a sequenced map.","difficulty":"medium","tags":["sequencedcollection","sequencedset","sequencedmap","java21"]},{"id":"java-collections-modern-002","question":"Which operations does SequencedCollection provide?","answer":"`SequencedCollection` provides uniform operations for both ends:\n\n- `addFirst` and `addLast`\n- `getFirst` and `getLast`\n- `removeFirst` and `removeLast`\n- `reversed`\n\n```java\nList<String> names = new ArrayList<>(List.of(\"Ada\", \"Linus\"));\nnames.addFirst(\"Grace\");\nString last = names.getLast();\n```\n\nSome modifying operations are optional and may throw `UnsupportedOperationException`, for example on an unmodifiable collection.","difficulty":"easy","tags":["sequencedcollection","getfirst","getlast","java21"]},{"id":"java-collections-modern-003","question":"Does reversed() create a copy of a sequenced collection?","answer":"No. `reversed()` returns a **reverse-ordered view**, not an independent copy.\n\n```java\nList<String> original = new ArrayList<>(List.of(\"A\", \"B\", \"C\"));\nList<String> reversed = original.reversed();\nreversed.removeFirst(); // removes \"C\" from original\n```\n\nWhen mutation is supported, changes through the view write through to the underlying collection. Treat it like other backed views and copy it when an independent snapshot is required.","difficulty":"medium","tags":["sequencedcollection","reversed","view","backed-view"]},{"id":"java-collections-modern-004","question":"How do SequencedSet and SequencedMap handle explicit positioning?","answer":"For insertion-ordered implementations, positioning methods can move existing entries.\n\n```java\nLinkedHashSet<String> set = new LinkedHashSet<>(List.of(\"A\", \"B\"));\nset.addFirst(\"B\"); // encounter order becomes B, A\n```\n\n`LinkedHashMap` similarly supports `putFirst` and `putLast`. Sorted collections determine position through comparison, so operations such as `addFirst` or `putLast` are incompatible with their ordering and may throw `UnsupportedOperationException`.","difficulty":"hard","tags":["sequencedset","sequencedmap","linkedhashset","linkedhashmap"]},{"id":"java-collections-modern-005","question":"What are the important semantics of List.subList()?","answer":"`subList(from, to)` returns a backed view covering `from` inclusively to `to` exclusively. Changes through the view affect the original list and vice versa.\n\n```java\nList<String> list = new ArrayList<>(List.of(\"A\", \"B\", \"C\", \"D\"));\nlist.subList(1, 3).clear();\nSystem.out.println(list); // [A, D]\n```\n\nIf the backing list is structurally modified outside the sublist in an unsupported way, later behavior of the view becomes undefined and commonly results in `ConcurrentModificationException`.","difficulty":"hard","tags":["list","sublist","view","concurrentmodificationexception"]},{"id":"java-collections-modern-006","question":"How does ListIterator differ from Iterator?","answer":"`Iterator` moves forward and supports optional removal. `ListIterator` is specific to lists and additionally supports:\n\n- Forward and backward traversal.\n- `nextIndex()` and `previousIndex()`.\n- Replacing the last returned element with `set()`.\n- Inserting at the cursor with `add()`.\n\n```java\nListIterator<String> it = names.listIterator(names.size());\nwhile (it.hasPrevious()) {\n    System.out.println(it.previous());\n}\n```","difficulty":"medium","tags":["iterator","listiterator","list","iteration"]},{"id":"java-collections-modern-007","question":"Why can List<Integer>.remove() be surprising?","answer":"`List` overloads `remove`: `remove(int)` removes by index, while `remove(Object)` removes a matching value.\n\n```java\nList<Integer> numbers = new ArrayList<>(List.of(10, 20, 30));\nnumbers.remove(1);                  // removes 20 by index\nnumbers.remove(Integer.valueOf(10)); // removes value 10\n```\n\nAutoboxing does not change overload selection when an `int` argument exactly matches `remove(int)`.","difficulty":"easy","tags":["list","remove","overloading","autoboxing"]},{"id":"java-collections-modern-008","question":"What happens when Arrays.asList() receives a primitive array?","answer":"A primitive array is treated as one object because generic element types cannot be primitive.\n\n```java\nint[] values = {1, 2, 3};\nList<int[]> list = Arrays.asList(values);\nSystem.out.println(list.size()); // 1\n```\n\nTo obtain boxed elements, use a primitive stream or loop:\n\n```java\nList<Integer> boxed = Arrays.stream(values).boxed().toList();\n```\n\nObject arrays such as `String[]` behave differently and produce one list element per array element.","difficulty":"medium","tags":["arrays","aslist","primitive-array","boxing"]},{"id":"java-collections-modern-009","question":"Which common collections permit null elements or keys?","answer":"Null support varies by implementation:\n\n- `ArrayList`, `LinkedList`, `HashSet`, `HashMap`, and `LinkedHashMap` permit null, subject to their documented limits.\n- `List.of`, `Set.of`, `Map.of`, and `copyOf` factories reject nulls.\n- `ConcurrentHashMap`, `ArrayDeque`, most blocking queues, and `EnumSet` reject null elements or mappings.\n- `EnumMap` rejects null keys but permits null values.\n- Sorted collections may reject null because comparison cannot handle it unless a suitable comparator explicitly supports it.\n\nCheck the implementation contract instead of assuming all collections behave alike.","difficulty":"medium","tags":["null","collections","map","implementation-contract"]},{"id":"java-collections-modern-010","question":"What restrictions apply to List.of(), Set.of(), Map.of(), and copyOf()?","answer":"These factory methods create unmodifiable collections and reject null elements, keys, and values.\n\n`Set.of(...)` rejects duplicate elements, while `Map.of(...)` and `Map.ofEntries(...)` reject duplicate keys. They throw an exception rather than silently resolving duplicates.\n\n`List.copyOf`, `Set.copyOf`, and `Map.copyOf` create unmodifiable snapshots of the source's references. They are shallow: mutable elements or values remain mutable.","difficulty":"medium","tags":["listof","setof","mapof","copyof","unmodifiable"]},{"id":"java-collections-modern-011","question":"What are optional operations in collection interfaces?","answer":"Collection interfaces define some methods as optional because not every implementation can support every mutation. An unsupported operation throws `UnsupportedOperationException`.\n\nExamples include:\n\n- `add` on an unmodifiable list.\n- `add` or `remove` on a fixed-size `Arrays.asList` view.\n- `add` on a map's `keySet` view.\n- Explicit positioning on a sorted sequenced collection.\n\nProgramming to an interface does not imply that every method is supported by every implementation.","difficulty":"medium","tags":["optional-operation","unsupportedoperationexception","collection","api-contract"]},{"id":"java-collections-modern-012","question":"What do lower, floor, ceiling, and higher mean in NavigableMap and NavigableSet?","answer":"Navigable collections provide nearest-match queries:\n\n- `lower(x)`: greatest element strictly less than `x`.\n- `floor(x)`: greatest element less than or equal to `x`.\n- `ceiling(x)`: least element greater than or equal to `x`.\n- `higher(x)`: least element strictly greater than `x`.\n\nMaps expose corresponding methods such as `floorEntry` and `higherKey`. They also provide descending and range views for ordered navigation.","difficulty":"medium","tags":["navigablemap","navigableset","range-query","ordering"]},{"id":"java-collections-modern-013","question":"What is the RandomAccess marker interface used for?","answer":"`RandomAccess` marks list implementations that support fast, usually constant-time, indexed access. `ArrayList` implements it; `LinkedList` does not.\n\nGeneric algorithms can choose an indexed loop for random-access lists and an iterator for sequential lists.\n\n```java\nif (list instanceof RandomAccess) {\n    // Indexed traversal may be appropriate.\n}\n```\n\nThe marker does not guarantee an exact complexity, but communicates a meaningful performance characteristic.","difficulty":"hard","tags":["randomaccess","list","marker-interface","performance"]},{"id":"java-collections-modern-014","question":"What are the typical time complexities of common collection operations?","answer":"Typical expectations are:\n\n- `ArrayList.get`: O(1); middle insertion/removal: O(n).\n- `LinkedList.get`: O(n); end operations: O(1).\n- `HashMap` / `HashSet` lookup: expected O(1), dependent on hashing and collisions.\n- `TreeMap` / `TreeSet` operations: O(log n).\n- `PriorityQueue.offer` / `poll`: O(log n); `peek`: O(1).\n\nThese are implementation expectations, not universal interface guarantees. Real performance also depends on allocation, cache locality, resizing, and key quality.","difficulty":"medium","tags":["complexity","performance","arraylist","hashmap","treemap"]},{"id":"java-collections-modern-015","question":"Why should APIs return collection interfaces and consider ownership explicitly?","answer":"Returning `List`, `Set`, or `Map` avoids unnecessarily coupling callers to an implementation. Ownership determines whether the method should expose a live mutable collection, an unmodifiable view, or a defensive snapshot.\n\n```java\npublic List<Order> orders() {\n    return List.copyOf(orders);\n}\n```\n\nDocument ordering, mutability, null support, thread-safety, and whether returned views are backed. The interface alone does not communicate all of these behavioral properties.","difficulty":"medium","tags":["api-design","interfaces","ownership","defensive-copy"]}]},{"domain":"Java","topic":"ConcurrentHashMap Internals","icon":"🧩","questions":[{"id":"java-concurrenthashmap-001","question":"What problem does ConcurrentHashMap solve?","answer":"`ConcurrentHashMap` provides thread-safe key-value access with high concurrency. Reads generally do not block, while updates coordinate only where needed.\n\nIt is preferred over `Hashtable` or `Collections.synchronizedMap(...)` when many threads access a map concurrently.\n\nIt does not lock the whole table for normal access, and it provides atomic map operations such as `putIfAbsent`, `compute`, `computeIfAbsent`, `replace`, and `merge`.","difficulty":"easy","tags":["concurrenthashmap","concurrency","thread-safety","map"]},{"id":"java-concurrenthashmap-002","question":"How does ConcurrentHashMap differ from the old segmented implementation?","answer":"Older Java versions used separate segments, each acting like a smaller locked map. Modern `ConcurrentHashMap` uses a table of bins and coordinates updates at a finer level, commonly around individual bins and internal control fields.\n\nThe old `concurrencyLevel` constructor argument remains mostly as a sizing hint for compatibility, not as a fixed number of lock segments.\n\nInterview answer: avoid saying modern `ConcurrentHashMap` is simply segmented.","difficulty":"hard","tags":["concurrenthashmap","internals","segments","java8"]},{"id":"java-concurrenthashmap-003","question":"Why does ConcurrentHashMap reject null keys and values?","answer":"In concurrent code, `map.get(key) == null` must unambiguously mean that no mapping was observed. If null values were allowed, a caller could not distinguish absence from a present mapping to null without a race-prone second check.\n\nRejecting null also supports bulk operations where null can mean \"no result\" or \"filter this value out\".","difficulty":"medium","tags":["concurrenthashmap","null","get","concurrency"]},{"id":"java-concurrenthashmap-004","question":"What does weak consistency mean for ConcurrentHashMap iterators?","answer":"A weakly consistent iterator may reflect the map state at or after iterator creation. It does not throw `ConcurrentModificationException`, but it also does not promise a stable, atomic snapshot.\n\n```java\nfor (Map.Entry<String, Integer> entry : map.entrySet()) {\n    // Concurrent updates may or may not be observed here.\n}\n```\n\nThis is suitable for many concurrent traversals, but not for logic that requires an exact snapshot.","difficulty":"medium","tags":["concurrenthashmap","iterator","weakly-consistent"]},{"id":"java-concurrenthashmap-005","question":"Why are computeIfAbsent(), compute(), and merge() important?","answer":"They express compound updates as atomic operations for a key. A check-then-act sequence can race, even when each individual method call is thread-safe.\n\n```java\nmap.computeIfAbsent(key, k -> new LongAdder()).increment();\nmap.merge(\"errors\", 1, Integer::sum);\n```\n\nKeep remapping functions short and avoid unrelated blocking work. Returning `null` usually means no mapping should be stored, or an existing mapping should be removed.","difficulty":"medium","tags":["concurrenthashmap","computeifabsent","merge","atomicity"]},{"id":"java-concurrenthashmap-006","question":"What happens during resizing in ConcurrentHashMap?","answer":"The table expands when the number of mappings grows too large relative to the table size. Resizing is expensive compared with ordinary reads and updates, so providing a realistic initial capacity can help.\n\nModern implementations allow threads to cooperate with transfer work during resize. The important interview-level point is that resizing is coordinated internally while preserving safe concurrent access.\n\nDo not rely on implementation-specific fields in application code.","difficulty":"hard","tags":["concurrenthashmap","resizing","capacity","internals"]},{"id":"java-concurrenthashmap-007","question":"How does ConcurrentHashMap handle hash collisions?","answer":"Like hash tables generally, keys are placed into bins based on hash. If many distinct keys land in the same bin, lookup and update costs rise.\n\nModern implementations can transform heavily contended collision bins into tree-based structures when conditions are met, improving worst-case behavior. Comparable keys may help break ties.\n\nGood `hashCode()` distribution still matters. A poor key implementation can hurt performance even in a concurrent map.","difficulty":"hard","tags":["concurrenthashmap","hash-collision","tree-bin","hashcode"]},{"id":"java-concurrenthashmap-008","question":"When should LongAdder be used with ConcurrentHashMap?","answer":"`LongAdder` is useful for highly contended counters because it spreads updates internally and combines them when read.\n\n```java\nConcurrentHashMap<String, LongAdder> counts = new ConcurrentHashMap<>();\ncounts.computeIfAbsent(word, k -> new LongAdder()).increment();\n```\n\nThis pattern is excellent for frequency maps and histograms. Use `AtomicLong` or ordinary values when contention is low or when exact single-variable atomic semantics are more important than update throughput.","difficulty":"medium","tags":["concurrenthashmap","longadder","frequency-map","contention"]}]},{"domain":"Java","topic":"CopyOnWriteArrayList","icon":"📋","questions":[{"id":"java-copyonwritearraylist-001","question":"What is CopyOnWriteArrayList?","answer":"`CopyOnWriteArrayList` is a thread-safe `List` implementation where every mutating operation creates a fresh copy of the underlying array.\n\nReads are fast and do not need to lock the array being read. Writes are expensive because they copy the array.\n\nThis design is useful when reads greatly outnumber writes.","difficulty":"easy","tags":["copyonwritearraylist","thread-safety","list","copy-on-write"]},{"id":"java-copyonwritearraylist-002","question":"When is CopyOnWriteArrayList a good choice?","answer":"It is a good fit for mostly-read data where iteration safety and stable snapshots matter more th
