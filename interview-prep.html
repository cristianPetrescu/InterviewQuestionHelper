ea naturală sau după un `Comparator`, iar `poll()` elimină cel mai mic element conform acelei ordini. Nu este o coadă FIFO decât dacă comparatorul modelează comportamentul FIFO.\n\n```java\nQueue<Integer> queue = new PriorityQueue<>();\nqueue.add(30);\nqueue.add(10);\nqueue.add(20);\nSystem.out.println(queue.poll()); // 10\n```\n\nIteratorul său nu garantează traversarea sortată. Dacă ai nevoie de toate elementele în ordinea priorității, apelează repetat `poll()` sau copiază și sortează.","difficulty":"medium","tags":["priorityqueue","queue","heap","comparator"]},{"id":"java-collections-core-010","question":"Ce este un iterator fail-fast?","answer":"Un iterator fail-fast încearcă să detecteze modificarea structurală a colecției în afara iteratorului și aruncă `ConcurrentModificationException`.\n\n```java\nfor (String item : list) {\n    if (item.isBlank()) {\n        list.remove(item); // poate arunca ConcurrentModificationException\n    }\n}\n```\n\nComportamentul fail-fast este un detector de bug-uri, nu o garanție de concurență. Este best-effort. Eliminarea corectă în timpul iterării trebuie făcută cu `Iterator.remove()` sau cu metode precum `removeIf()`.","difficulty":"medium","tags":["iterator","fail-fast","concurrentmodificationexception","removeif"]},{"id":"java-collections-core-011","question":"Cum poți elimina în siguranță elemente în timpul iterării?","answer":"Folosește metoda `remove()` a iteratorului sau `removeIf()` atunci când condiția poate fi exprimată ca predicat.\n\n```java\nIterator<String> it = names.iterator();\nwhile (it.hasNext()) {\n    if (it.next().isBlank()) {\n        it.remove();\n    }\n}\n\nnames.removeIf(String::isBlank);\n```\n\nNu modifica structural majoritatea colecțiilor direct în timpul unui `for` îmbunătățit. Asta poate invalida iteratorul.","difficulty":"easy","tags":["iterator","remove","removeif","iteration"]},{"id":"java-collections-core-012","question":"Care este diferența dintre o colecție nemodificabilă și una imuabilă?","answer":"O colecție nemodificabilă respinge modificarea prin acea referință. Totuși, poate fi o vedere peste o colecție mutabilă de bază.\n\n```java\nList<String> backing = new ArrayList<>();\nList<String> view = Collections.unmodifiableList(backing);\nbacking.add(\"new\");\nSystem.out.println(view); // vede schimbarea\n```\n\nO colecție imuabilă nu se poate schimba deloc, presupunând că și elementele sale sunt imuabile. `List.copyOf(...)` creează un instantaneu nemodificabil, dar elementele mutabile din interior se pot schimba în continuare.","difficulty":"medium","tags":["unmodifiable","immutable","collections","copyof"]},{"id":"java-collections-core-013","question":"Cum diferă Arrays.asList(), List.of() și new ArrayList<>()?","answer":"`Arrays.asList(array)` întoarce o listă cu dimensiune fixă, susținută de array. Poți înlocui elemente, dar nu poți adăuga sau elimina.\n\n`List.of(...)` întoarce o listă nemodificabilă și respinge elementele null.\n\n`new ArrayList<>(...)` creează o copie mutabilă și redimensionabilă.\n\n```java\nString[] data = {\"a\", \"b\"};\nList<String> fixed = Arrays.asList(data);\nList<String> immutable = List.of(\"a\", \"b\");\nList<String> mutable = new ArrayList<>(fixed);\n```","difficulty":"medium","tags":["arrays","list","listof","arraylist","unmodifiable"]},{"id":"java-collections-core-014","question":"Ce înseamnă PECS în genericele Java?","answer":"PECS înseamnă **Producer Extends, Consumer Super**.\n\nFolosește `? extends T` când o sursă produce valori `T` pe care doar le citești. Folosește `? super T` când o destinație consumă valori `T` pe care le scrii.\n\n```java\nvoid copy(List<? extends Number> source,\n          List<? super Number> target) {\n    for (Number n : source) {\n        target.add(n);\n    }\n}\n```\n\nDe aceea API-uri precum `addAll` acceptă adesea `Collection<? extends E>`.","difficulty":"hard","tags":["generics","pecs","wildcards","collections"]},{"id":"java-collections-core-015","question":"Sunt implementările de colecții Java thread-safe în mod implicit?","answer":"Majoritatea colecțiilor generale precum `ArrayList`, `HashSet` și `HashMap` nu sunt thread-safe pentru modificări concurente. Dacă mai multe fire accesează o colecție și cel puțin unul o modifică, ai nevoie de sincronizare externă sau de o colecție concurentă.\n\nOpțiuni:\n\n- `Collections.synchronizedList(...)` pentru wrapper-e sincronizate simple.\n- `CopyOnWriteArrayList` pentru liste citite intens și modificate rar.\n- `ConcurrentHashMap` pentru map-uri concurente.\n- Cozi blocante pentru fluxuri producător-consumator.\n\nAlege în funcție de tiparul de acces, nu doar după expresia „thread-safe”.","difficulty":"medium","tags":["collections","thread-safety","concurrency","synchronization"]}]},{"domain":"Java","topic":"Colecții Map și avansate","icon":"🗺️","questions":[{"id":"java-collections-maps-001","question":"De ce Map nu este un subtip al Collection?","answer":"`Map` reprezintă asocieri între chei și valori, nu o colecție de elemente individuale. Are operații de bază diferite, precum `put`, `get`, `containsKey` și `entrySet`.\n\nPoți vedea părți ale unui map ca pe colecții:\n\n```java\nSet<K> keys = map.keySet();\nCollection<V> values = map.values();\nSet<Map.Entry<K, V>> entries = map.entrySet();\n```\n\nAcestea sunt vederi susținute de map, deci schimbările pot fi reflectate în ambele sensuri, în funcție de operație.","difficulty":"easy","tags":["map","collection","views","entryset"]},{"id":"java-collections-maps-002","question":"Cum găsește HashMap o valoare după cheie?","answer":"`HashMap` folosește `hashCode()` al cheii pentru a alege un bucket, apoi folosește `equals()` pentru a găsi cheia potrivită în acel bucket.\n\n```java\nMap<UserId, User> users = new HashMap<>();\nusers.put(id, user);\nUser found = users.get(new UserId(id.value()));\n```\n\nAcest lucru cere un contract corect `equals()` / `hashCode()`. Cheile egale trebuie să aibă coduri hash egale. Cheile diferite pot împărți un cod hash, dar prea multe coliziuni afectează performanța.","difficulty":"easy","tags":["hashmap","hashcode","equals","lookup"]},{"id":"java-collections-maps-003","question":"De ce sunt periculoase cheile mutabile într-un HashMap?","answer":"Dacă o cheie se schimbă după inserare într-un mod care afectează `equals()` sau `hashCode()`, map-ul poate căuta în bucket-ul greșit și poate să nu o mai găsească.\n\n```java\nMap<User, String> roles = new HashMap<>();\nUser user = new User(\"alice\");\nroles.put(user, \"admin\");\n\nuser.setName(\"bob\");\nSystem.out.println(roles.get(user)); // poate fi null\n```\n\nCheile ar trebui să fie imuabile sau cel puțin câmpurile relevante pentru egalitate nu trebuie să se schimbe cât timp sunt în map.","difficulty":"medium","tags":["hashmap","mutable-key","hashcode","immutability"]},{"id":"java-collections-maps-004","question":"Ce sunt capacitatea și load factor-ul într-un HashMap?","answer":"Capacitatea este numărul de bucket-uri. Load factor-ul controlează cât de plin poate deveni map-ul înainte de redimensionare. Valoarea implicită a load factor-ului este de obicei `0.75`, un compromis între memorie și costul căutării.\n\n```java\nMap<String, Integer> counts = new HashMap<>(128, 0.75f);\n```\n\nDacă te aștepți la multe intrări, o capacitate inițială potrivită poate reduce redimensionările. Supradimensionarea irosește memorie. Aceste setări ajustează performanța; nu schimbă semantica map-ului.","difficulty":"medium","tags":["hashmap","capacity","load-factor","performance"]},{"id":"java-collections-maps-005","question":"Păstrează HashMap ordinea inserării?","answer":"Nu. `HashMap` nu garantează ordinea de iterare. Ordinea poate părea stabilă în exemple mici, dar se poate schimba după redimensionare, schimbări de implementare sau distribuții diferite ale cheilor.\n\nFolosește:\n\n- `LinkedHashMap` pentru ordinea inserării sau ordinea accesării.\n- `TreeMap` pentru ordinea sortată a cheilor.\n\nNu scrie niciodată logică ce depinde de ordinea de iterare a unui `HashMap`.","difficulty":"easy","tags":["hashmap","ordering","linkedhashmap","treemap"]},{"id":"java-collections-maps-006","question":"Când ar trebui să folosești LinkedHashMap?","answer":"`LinkedHashMap` menține o ordine de iterare predictibilă. Implicit, aceasta este ordinea inserării. Poate fi configurat și pentru ordinea accesării, utilă pentru cache-uri simple de tip LRU.\n\n```java\nMap<String, Integer> ordered = new LinkedHashMap<>();\n```\n\nAre puțin mai mult overhead decât `HashMap`, deoarece menține intrări legate între ele, dar este ideal când iterarea deterministă contează.","difficulty":"medium","tags":["linkedhashmap","ordering","lru","map"]},{"id":"java-collections-maps-007","question":"Când ar trebui să folosești TreeMap?","answer":"`TreeMap` stochează cheile în ordine sortată folosind ordinea naturală sau un `Comparator`. Este util pentru interogări pe intervale și navigare ordonată.\n\n```java\nNavigableMap<Integer, String> scores = new TreeMap<>();\nscores.subMap(70, true, 90, true);\n```\n\nComparatorul determină unicitatea cheilor: dacă întoarce `0`, map-ul tratează cheile ca fiind aceeași cheie. De obicei, comparatorul ar trebui să fie consecvent cu `equals()`.","difficulty":"medium","tags":["treemap","sortedmap","navigablemap","comparator"]},{"id":"java-collections-maps-008","question":"Care este diferența dintre HashMap, Hashtable și ConcurrentHashMap?","answer":"`HashMap` este nesincronizat și este alegerea normală pentru utilizare într-un singur fir sau cu sincronizare externă.\n\n`Hashtable` este legacy, sincronizează majoritatea metodelor și nu permite chei sau valori null.\n\n`ConcurrentHashMap` este proiectat pentru acces concurent cu scalabilitate mai bună decât un map sincronizat unic. Nu permite chei sau valori null și oferă operații atomice precum `compute`, `putIfAbsent` și `merge`.","difficulty":"medium","tags":["hashmap","hashtable","concurrenthashmap","concurrency"]},{"id":"java-collections-maps-009","question":"De ce ConcurrentHashMap respinge cheile și valorile null?","answer":"Map-urile concurente trebuie să distingă absența unei intrări de o mapare prezentă cu valoare null. În acces concurent, `map.get(key) == null` trebuie să însemne clar că nu a fost observată nicio mapare.\n\n```java\nConcurrentMap<String, Integer> counts = new ConcurrentHashMap<>();\ncounts.putIfAbsent(\"errors\", 0);\n```\n\nRespingerea lui null elimină ambiguitatea și face operațiile atomice precum `putIfAbsent`, `compute` și `merge` mai ușor de analizat.","difficulty":"medium","tags":["concurrenthashmap","null","concurrency","map"]},{"id":"java-collections-maps-010","question":"Cum ajută computeIfAbsent() și merge() la actualizările din map-uri?","answer":"Ele exprimă tipare comune de actualizare în mod atomic pentru map-urile care suportă operații atomice, în special `ConcurrentHashMap`.\n\n```java\nMap<String, List<Order>> byCustomer = new HashMap<>();\nbyCustomer.computeIfAbsent(customerId, id -> new ArrayList<>())\n          .add(order);\n\nMap<String, Integer> counts = new HashMap<>();\ncounts.merge(\"errors\", 1, Integer::sum);\n```\n\n`computeIfAbsent` creează o valoare doar când lipsește. `merge` combină o valoare nouă cu una existentă sau o inserează când lipsește.","difficulty":"medium","tags":["map","computeifabsent","merge","updates"]},{"id":"java-collections-maps-011","question":"Ce sunt vederile keySet(), values() și entrySet()?","answer":"Sunt vederi susținute de conținutul unui map. De obicei nu copiază datele.\n\n```java\nSet<String> keys = map.keySet();\nCollection<Integer> values = map.values();\nSet<Map.Entry<String, Integer>> entries = map.entrySet();\n```\n\nEliminarea dintr-o vedere care suportă operația elimină și din map. Adăugarea directă în aceste vederi este în general nesuportată, deoarece map-ul nu ar cunoaște cheia sau valoarea lipsă. `entrySet()` este alegerea obișnuită pentru iterare eficientă cheie-valoare.","difficulty":"easy","tags":["map","views","keyset","values","entryset"]},{"id":"java-collections-maps-012","question":"La ce este folosit WeakHashMap?","answer":"`WeakHashMap` stochează cheile prin referințe slabe. Dacă o cheie nu mai este accesibilă puternic din altă parte, intrarea sa poate fi eliminată de garbage collector.\n\nEste util pentru metadate asociate obiectelor al căror ciclu de viață nu trebuie prelungit de map.\n\n```java\nMap<Object, Metadata> metadata = new WeakHashMap<>();\n```\n\nNu este singur un cache general. Valorile pot păstra accidental cheile în viață dacă le referențiază puternic.","difficulty":"hard","tags":["weakhashmap","weak-reference","gc","cache"]},{"id":"java-collections-maps-013","question":"Ce este IdentityHashMap și când este potrivit?","answer":"`IdentityHashMap` compară cheile cu `==` în loc de `equals()` și folosește hashing bazat pe identitate.\n\n```java\nMap<Object, String> seen = new IdentityHashMap<>();\n```\n\nEste util pentru algoritmi pe grafuri de obiecte, traversări asemănătoare serializării sau detectarea ciclurilor, unde obiectele distincte trebuie să rămână distincte chiar dacă sunt logic egale. Nu trebuie folosit ca un `HashMap` mai rapid; semantica egalității este diferită.","difficulty":"hard","tags":["identityhashmap","identity","map","equals"]},{"id":"java-collections-maps-014","question":"De ce sunt eficiente EnumMap și EnumSet?","answer":"`EnumMap` și `EnumSet` sunt specializate pentru chei sau elemente enum. Pot folosi reprezentări compacte de tip array sau vector de biți bazate pe ordinalele enum-ului.\n\n```java\nEnumMap<DayOfWeek, String> schedule = new EnumMap<>(DayOfWeek.class);\nEnumSet<DayOfWeek> weekend = EnumSet.of(SATURDAY, SUNDAY);\n```\n\nPentru domenii enum, sunt de obicei mai rapide și mai eficiente ca memorie decât colecțiile generale bazate pe hash. De asemenea, păstrează ordinea declarării constantelor enum.","difficulty":"medium","tags":["enummap","enumset","enum","performance"]},{"id":"java-collections-maps-015","question":"Cum alegi între HashMap, LinkedHashMap, TreeMap și ConcurrentHashMap?","answer":"Alege după comportamentul necesar:\n\n- `HashMap`: căutare generală după cheie, fără garanție de ordonare.\n- `LinkedHashMap`: ordine predictibilă de inserare sau accesare.\n- `TreeMap`: chei sortate și operații de navigare sau interval.\n- `ConcurrentHashMap`: acces concurent și actualizări atomice ale map-ului.\n\nPornește de la interfață, de obicei `Map`, și alege implementarea după ordonare, concurență, memorie, tratamentul lui null și tiparele de căutare/actualizare.","difficulty":"easy","tags":["hashmap","linkedhashmap","treemap","concurrenthashmap","design"]}]},{"domain":"Java","topic":"Colecții moderne și cazuri-limită","icon":"🧭","questions":[{"id":"java-collections-modern-001","question":"Ce sunt SequencedCollection, SequencedSet și SequencedMap?","answer":"Introduse în Java 21, interfețele sequenced reprezintă colecții cu o ordine de întâlnire definită de la primul la ultimul element.\n\n- `SequencedCollection` suportă operații la ambele capete și traversare inversă.\n- `SequencedSet` combină secvențierea cu unicitatea unui set.\n- `SequencedMap` definește o ordine de întâlnire pentru intrări.\n\nTipurile existente au fost integrate în noua ierarhie: `List` și `Deque` sunt colecții sequenced, `LinkedHashSet` este un sequenced set, iar `LinkedHashMap` este un sequenced map.","difficulty":"medium","tags":["sequencedcollection","sequencedset","sequencedmap","java21"]},{"id":"java-collections-modern-002","question":"Ce operații oferă SequencedCollection?","answer":"`SequencedCollection` oferă operații uniforme pentru ambele capete:\n\n- `addFirst` și `addLast`\n- `getFirst` și `getLast`\n- `removeFirst` și `removeLast`\n- `reversed`\n\n```java\nList<String> names = new ArrayList<>(List.of(\"Ada\", \"Linus\"));\nnames.addFirst(\"Grace\");\nString last = names.getLast();\n```\n\nUnele operații de modificare sunt opționale și pot arunca `UnsupportedOperationException`, de exemplu pe o colecție nemodificabilă.","difficulty":"easy","tags":["sequencedcollection","getfirst","getlast","java21"]},{"id":"java-collections-modern-003","question":"Creează reversed() o copie a unei colecții sequenced?","answer":"Nu. `reversed()` întoarce o **vedere în ordine inversă**, nu o copie independentă.\n\n```java\nList<String> original = new ArrayList<>(List.of(\"A\", \"B\", \"C\"));\nList<String> reversed = original.reversed();\nreversed.removeFirst(); // elimină \"C\" din original\n```\n\nCând modificarea este suportată, schimbările prin vedere sunt propagate în colecția de bază. Trateaz-o ca pe celelalte vederi susținute și copiaz-o când ai nevoie de un snapshot independent.","difficulty":"medium","tags":["sequencedcollection","reversed","view","backed-view"]},{"id":"java-collections-modern-004","question":"Cum tratează SequencedSet și SequencedMap poziționarea explicită?","answer":"Pentru implementările ordonate după inserare, metodele de poziționare pot muta intrări existente.\n\n```java\nLinkedHashSet<String> set = new LinkedHashSet<>(List.of(\"A\", \"B\"));\nset.addFirst(\"B\"); // ordinea devine B, A\n```\n\n`LinkedHashMap` suportă similar `putFirst` și `putLast`. Colecțiile sortate determină poziția prin comparație, astfel că operații precum `addFirst` sau `putLast` sunt incompatibile cu ordonarea lor și pot arunca `UnsupportedOperationException`.","difficulty":"hard","tags":["sequencedset","sequencedmap","linkedhashset","linkedhashmap"]},{"id":"java-collections-modern-005","question":"Care sunt semanticile importante ale List.subList()?","answer":"`subList(from, to)` întoarce o vedere susținută care acoperă intervalul de la `from` inclusiv până la `to` exclusiv. Schimbările prin vedere afectează lista originală și invers.\n\n```java\nList<String> list = new ArrayList<>(List.of(\"A\", \"B\", \"C\", \"D\"));\nlist.subList(1, 3).clear();\nSystem.out.println(list); // [A, D]\n```\n\nDacă lista de bază este modificată structural în afara sublistei într-un mod nesuportat, comportamentul ulterior al vederii devine nedefinit și produce frecvent `ConcurrentModificationException`.","difficulty":"hard","tags":["list","sublist","view","concurrentmodificationexception"]},{"id":"java-collections-modern-006","question":"Cum diferă ListIterator de Iterator?","answer":"`Iterator` se deplasează înainte și suportă opțional eliminarea. `ListIterator` este specific listelor și suportă suplimentar:\n\n- Traversare înainte și înapoi.\n- `nextIndex()` și `previousIndex()`.\n- Înlocuirea ultimului element întors prin `set()`.\n- Inserarea la poziția cursorului prin `add()`.\n\n```java\nListIterator<String> it = names.listIterator(names.size());\nwhile (it.hasPrevious()) {\n    System.out.println(it.previous());\n}\n```","difficulty":"medium","tags":["iterator","listiterator","list","iteration"]},{"id":"java-collections-modern-007","question":"De ce poate fi surprinzător List<Integer>.remove()?","answer":"`List` supraîncarcă `remove`: `remove(int)` elimină după index, iar `remove(Object)` elimină o valoare egală.\n\n```java\nList<Integer> numbers = new ArrayList<>(List.of(10, 20, 30));\nnumbers.remove(1);                   // elimină 20 după index\nnumbers.remove(Integer.valueOf(10)); // elimină valoarea 10\n```\n\nAutoboxing-ul nu schimbă selectarea supraîncărcării când un argument `int` se potrivește exact cu `remove(int)`.","difficulty":"easy","tags":["list","remove","overloading","autoboxing"]},{"id":"java-collections-modern-008","question":"Ce se întâmplă când Arrays.asList() primește un array de primitive?","answer":"Un array de primitive este tratat ca un singur obiect, deoarece tipurile generice ale elementelor nu pot fi primitive.\n\n```java\nint[] values = {1, 2, 3};\nList<int[]> list = Arrays.asList(values);\nSystem.out.println(list.size()); // 1\n```\n\nPentru elemente boxed, folosește un stream de primitive sau o buclă:\n\n```java\nList<Integer> boxed = Arrays.stream(values).boxed().toList();\n```\n\nArray-urile de obiecte precum `String[]` se comportă diferit și produc câte un element în listă pentru fiecare element din array.","difficulty":"medium","tags":["arrays","aslist","primitive-array","boxing"]},{"id":"java-collections-modern-009","question":"Ce colecții uzuale permit elemente sau chei null?","answer":"Suportul pentru null diferă între implementări:\n\n- `ArrayList`, `LinkedList`, `HashSet`, `HashMap` și `LinkedHashMap` permit null, în limitele documentate.\n- Fabricile `List.of`, `Set.of`, `Map.of` și `copyOf` resping null.\n- `ConcurrentHashMap`, `ArrayDeque`, majoritatea cozilor blocante și `EnumSet` resping elementele sau mapările null.\n- `EnumMap` respinge cheile null, dar permite valori null.\n- Colecțiile sortate pot respinge null deoarece comparația nu îl poate trata, dacă nu există un comparator potrivit care îl suportă explicit.\n\nVerifică contractul implementării în loc să presupui că toate colecțiile se comportă la fel.","difficulty":"medium","tags":["null","collections","map","implementation-contract"]},{"id":"java-collections-modern-010","question":"Ce restricții se aplică List.of(), Set.of(), Map.of() și copyOf()?","answer":"Aceste metode fabrică produc colecții nemodificabile și resping elementele, cheile și valorile null.\n\n`Set.of(...)` respinge elementele duplicate, iar `Map.of(...)` și `Map.ofEntries(...)` resping cheile duplicate. Aruncă o excepție în loc să rezolve duplicatele în tăcere.\n\n`List.copyOf`, `Set.copyOf` și `Map.copyOf` creează snapshot-uri nemodificabile ale referințelor din sursă. Copierea este superficială: elementele sau valorile mutabile rămân mutabile.","difficulty":"medium","tags":["listof","setof","mapof","copyof","unmodifiable"]},{"id":"java-collections-modern-011","question":"Ce sunt operațiile opționale în interfețele colecțiilor?","answer":"Interfețele colecțiilor definesc unele metode ca fiind opționale deoarece nu toate implementările pot suporta orice modificare. O operație nesuportată aruncă `UnsupportedOperationException`.\n\nExemple:\n\n- `add` pe o listă nemodificabilă.\n- `add` sau `remove` pe o vedere `Arrays.asList` cu dimensiune fixă.\n- `add` pe vederea `keySet` a unui map.\n- Poziționarea explicită pe o colecție sequenced sortată.\n\nProgramarea pe o interfață nu înseamnă că fiecare metodă este suportată de orice implementare.","difficulty":"medium","tags":["optional-operation","unsupportedoperationexception","collection","api-contract"]},{"id":"java-collections-modern-012","question":"Ce înseamnă lower, floor, ceiling și higher în NavigableMap și NavigableSet?","answer":"Colecțiile navigabile oferă interogări pentru cea mai apropiată potrivire:\n\n- `lower(x)`: cel mai mare element strict mai mic decât `x`.\n- `floor(x)`: cel mai mare element mai mic sau egal cu `x`.\n- `ceiling(x)`: cel mai mic element mai mare sau egal cu `x`.\n- `higher(x)`: cel mai mic element strict mai mare decât `x`.\n\nMap-urile expun metode corespondente precum `floorEntry` și `higherKey`. Oferă și vederi descendente și pe intervale pentru navigare ordonată.","difficulty":"medium","tags":["navigablemap","navigableset","range-query","ordering"]},{"id":"java-collections-modern-013","question":"La ce este folosită interfața marker RandomAccess?","answer":"`RandomAccess` marchează implementările de listă care suportă acces rapid, de obicei în timp constant, prin index. `ArrayList` o implementează; `LinkedList` nu.\n\nAlgoritmii generici pot alege o buclă pe indecși pentru liste random-access și un iterator pentru liste secvențiale.\n\n```java\nif (list instanceof RandomAccess) {\n    // Traversarea prin index poate fi potrivită.\n}\n```\n\nInterfața marker nu garantează o complexitate exactă, dar comunică o caracteristică relevantă de performanță.","difficulty":"hard","tags":["randomaccess","list","marker-interface","performance"]},{"id":"java-collections-modern-014","question":"Care sunt complexitățile temporale tipice ale operațiilor uzuale pe colecții?","answer":"Așteptările tipice sunt:\n\n- `ArrayList.get`: O(1); inserare/eliminare la mijloc: O(n).\n- `LinkedList.get`: O(n); operații la capete: O(1).\n- Căutare în `HashMap` / `HashSet`: O(1) în medie, dependentă de hashing și coliziuni.\n- Operații în `TreeMap` / `TreeSet`: O(log n).\n- `PriorityQueue.offer` / `poll`: O(log n); `peek`: O(1).\n\nAcestea sunt așteptări pentru implementări, nu garanții universale ale interfețelor. Performanța reală depinde și de alocări, localitatea cache-ului, redimensionare și calitatea cheilor.","difficulty":"medium","tags":["complexity","performance","arraylist","hashmap","treemap"]},{"id":"java-collections-modern-015","question":"De ce ar trebui API-urile să întoarcă interfețe de colecții și să trateze explicit proprietatea datelor?","answer":"Returnarea unui `List`, `Set` sau `Map` evită legarea inutilă a apelanților de o implementare. Proprietatea datelor determină dacă metoda trebuie să expună o colecție mutabilă live, o vedere nemodificabilă sau un snapshot defensiv.\n\n```java\npublic List<Order> orders() {\n    return List.copyOf(orders);\n}\n```\n\nDocumentează ordonarea, mutabilitatea, suportul pentru null, siguranța între fire și dacă vederile returnate sunt susținute de colecția originală. Interfața singură nu comunică toate aceste proprietăți.","difficulty":"medium","tags":["api-design","interfaces","ownership","defensive-copy"]}]},{"domain":"Java","topic":"ConcurrentHashMap internals","icon":"🧩","questions":[{"id":"java-concurrenthashmap-001","question":"Ce problemă rezolvă ConcurrentHashMap?","answer":"`ConcurrentHashMap` oferă acces thread-safe la perechi cheie-valoare cu un nivel ridicat de concurență. Citirile nu se blochează în general, iar actualizările se coordonează doar acolo unde este necesar.\n\nEste preferat în locul lui `Hashtable` sau `Collections.synchronizedMap(...)` când multe fire accesează concurent un map.\n\nNu blochează întreaga tabelă pentru acces normal și oferă operații atomice precum `putIfAbsent`, `compute`, `computeIfAbsent`, `replace` și `merge`.","difficulty":"easy","tags":["concurrenthashmap","concurrency","thread-safety","map"]},{"id":"java-concurrenthashmap-002","question":"Cum diferă ConcurrentHashMap de vechea implementare segmentată?","answer":"Versiunile Java mai vechi foloseau segmente separate, fiecare comportându-se ca un map mai mic cu lock propriu. Implementările moderne de `ConcurrentHashMap` folosesc o tabelă de bin-uri și coordonează actualizările mai fin, de obicei în jurul bin-urilor individuale și al câmpurilor interne de control.\n\nArgumentul vechi `concurrencyLevel` din constructor rămâne în mare parte un indiciu de dimensionare pentru compatibilitate, nu un număr fix de segmente cu lock.\n\nRăspuns de interviu: evită să spui că `ConcurrentHashMap` modern este pur și simplu segmentat.","difficulty":"hard","tags":["concurrenthashmap","internals","segments","java8"]},{"id":"java-concurrenthashmap-003","question":"De ce ConcurrentHashMap respinge cheile și valorile null?","answer":"În cod concurent, `map.get(key) == null` trebuie să însemne fără ambiguitate că nu a fost observată nicio mapare. Dacă valorile null ar fi permise, apelantul nu ar putea distinge absența de o mapare prezentă la null fără o a doua verificare expusă la race condition.\n\nRespingerea lui null susține și operațiile bulk, unde null poate însemna „niciun rezultat” sau „filtrează această valoare”.","difficulty":"medium","tags":["concurrenthashmap","null","get","concurrency"]},{"id":"java-concurrenthashmap-004","question":"Ce înseamnă consistență slabă pentru iteratorii ConcurrentHashMap?","answer":"Un iterator slab consecvent poate reflecta starea map-ului la sau după crearea iteratorului. Nu aruncă `ConcurrentModificationException`, dar nici nu promite un snapshot stabil și atomic.\n\n```java\nfor (Map.Entry<String, Integer> entry : map.entrySet()) {\n    // Actualizările concurente pot fi observate sau nu aici.\n}\n```\n\nEste potrivit pentru multe traversări concurente, dar nu pentru logică ce necesită un snapshot exact.","difficulty":"medium","tags":["concurrenthashmap","iterator","weakly-consistent"]},{"id":"java-concurrenthashmap-005","question":"De ce sunt importante computeIfAbsent(), compute() și merge()?","answer":"Ele exprimă actualizări compuse ca operații atomice pentru o cheie. O secvență verifică-apoi-acționează poate avea race condition, chiar dacă fiecare apel individual este thread-safe.\n\n```java\nmap.computeIfAbsent(key, k -> new LongAdder()).increment();\nmap.merge(\"errors\", 1, Integer::sum);\n```\n\nPăstrează funcțiile de remapare scurte și evită operațiile blocante fără legătură. Returnarea lui `null` înseamnă de obicei că nu trebuie stocată o mapare sau că maparea existentă trebuie eliminată.","difficulty":"medium","tags":["concurrenthashmap","computeifabsent","merge","atomicity"]},{"id":"java-concurrenthashmap-006","question":"Ce se întâmplă în timpul redimensionării unui ConcurrentHashMap?","answer":"Tabela se extinde când numărul de mapări crește prea mult raportat la dimensiunea tabelei. Redimensionarea este costisitoare comparativ cu citirile și actualizările obișnuite, deci o capacitate inițială realistă poate ajuta.\n\nImplementările moderne permit firelor să coopereze la transfer în timpul redimensionării. Ideea importantă pentru interviu este că redimensionarea este coordonată intern păstrând accesul concurent sigur.\n\nNu te baza în codul aplicației pe câmpuri specifice implementării.","difficulty":"hard","tags":["concurrenthashmap","resizing","capacity","internals"]},{"id":"java-concurrenthashmap-007","question":"Cum tratează ConcurrentHashMap coliziunile de hash?","answer":"Ca tabelele hash în general, cheile sunt plasate în bin-uri pe baza hash-ului. Dacă multe chei distincte ajung în același bin, costurile de căutare și actualizare cresc.\n\nImplementările moderne pot transforma bin-urile cu multe coliziuni în structuri bazate pe arbori când anumite condiții sunt îndeplinite, îmbunătățind comportamentul în cazuri nefavorabile. Cheile `Comparable` pot ajuta la departajare.\n\nO distribuție bună a lui `hashCode()` rămâne importantă. O implementare slabă a cheii poate afecta performanța chiar și într-un map concurent.","difficulty":"hard","tags":["concurrenthashmap","hash-collision","tree-bin","hashcode"]},{"id":"java-concurrenthashmap-008","question":"Când ar trebui folosit LongAdder cu ConcurrentHashMap?","answer":"`LongAdder` este util pentru contoare foarte disputate, deoarece distribuie actualizările intern și le combină la citire.\n\n```java\nConcurrentHashMap<String, LongAdder> counts = new ConcurrentHashMap<>();\ncounts.computeIfAbsent(word, k -> new LongAdder()).increment();\n```\n\nAcest tipar este excelent pentru hărți de frecvență și histograme. Folosește `AtomicLong` sau valori obișnuite când nivelul de dispută este mic sau când semantica atomică exactă a unei singure variabile este mai importantă decât throughput-ul actualizărilor.","difficulty":"medium","tags":["concurrenthashmap","longadder","frequency-map","contention"]}]},{"domain":"Java","topic":"CopyOnWriteArrayList","icon":"📋","questions":[{"id":"java-copyonwritearraylist-001","question":"Ce este CopyOnWriteArrayList?","answer":"`CopyOnWriteArrayList` este o implementare thread-safe de `List` în care fiecare operație de modificare creează o copie nouă a array-ului intern.\n\nCitirile sunt rapide și nu trebuie să blocheze array-ul citit. Scrierile sunt costisitoare deoarece copiază array-ul.\n\nAcest design este util când citirile sunt mult mai numeroase decât scrierile.","difficulty":"easy","tags":["copyonwritearraylist","thread-safety","list","copy-on-write"]},{"id":"java-copyonwritearraylist-002","question":"Când este CopyOnWriteArrayList o alegere bună?","answer":"Este potrivită pentru date citite predominant, unde siguranța iterării și snapshot-urile stabile contează mai mult decât performanța scrierilor.\n\nExemple comune:\n\n- Liste de listeneri.\n- Registre de observatori.\n- Valori de configurare care se schimbă rar.\n- Colecții mici, partajate între fire și citite intens.\n\nEste de obicei nepotrivită pentru liste mari sau scrieri frecvente.","difficulty":"easy","tags":["copyonwritearraylist","read-heavy","listeners","configuration"]},{"id":"java-copyonwritearraylist-003","question":"Cum funcționează iteratorii CopyOnWriteArrayList?","answer":"Iteratorii folosesc un snapshot al array-ului existent la momentul creării iteratorului. Nu văd schimbările ulterioare și nu aruncă `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nIteratorul nu suportă operații de modificare precum `remove`, `set` sau `add`.","difficulty":"medium","tags":["copyonwritearraylist","iterator","snapshot","concurrentmodificationexception"]},{"id":"java-copyonwritearraylist-004","question":"De ce sunt scrierile costisitoare în CopyOnWriteArrayList?","answer":"Fiecare schimbare structurală copiază array-ul intern și publică noul array. Astfel, fiecare scriere are cost O(n) în numărul de elemente.\n\n```java\nlist.add(listener);    // copiază array-ul\nlist.remove(listener); // copiază din nou array-ul\n```\n\nCompromisul este că cititorii pot traversa array-uri stabile în siguranță. Este excelent pentru scrieri rare, dar foarte costisitor pentru sarcini cu multe scrieri.","difficulty":"medium","tags":["copyonwritearraylist","performance","writes","allocation"]},{"id":"java-copyonwritearraylist-005","question":"Face CopyOnWriteArrayList acțiunile compuse atomice?","answer":"Nu. Operațiile individuale sunt thread-safe, dar o secvență de apeluri nu este automat atomică din punct de vedere al logicii de business.\n\n```java\nif (!list.contains(x)) {\n    list.add(x); // alt fir poate adăuga x între apeluri\n}\n```\n\nFolosește metode precum `addIfAbsent` sau `addAllAbsent` când se potrivesc operației necesare. Altfel, coordonează extern.","difficulty":"medium","tags":["copyonwritearraylist","atomicity","addifabsent","race-condition"]},{"id":"java-copyonwritearraylist-006","question":"Cum se compară CopyOnWriteArrayList cu Collections.synchronizedList()?","answer":"`Collections.synchronizedList` protejează o listă normală cu un lock. Iterarea necesită în continuare sincronizare manuală pe wrapper.\n\n`CopyOnWriteArrayList` oferă iteratori snapshot siguri fără locking extern, dar scrierile copiază întregul array.\n\nAlege wrapper-e sincronizate pentru acces echilibrat sau cu multe scrieri. Alege copy-on-write pentru sarcini cu multe citiri și multă iterare.","difficulty":"medium","tags":["copyonwritearraylist","synchronizedlist","iteration","performance"]},{"id":"java-copyonwritearraylist-007","question":"Poate CopyOnWriteArrayList conține null și duplicate?","answer":"Da. `CopyOnWriteArrayList` respectă semantica listelor: permite elemente duplicate și elemente null.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nlist.add(null);\nlist.add(\"A\");\nlist.add(\"A\");\n```\n\nDacă este necesară unicitatea, folosește `addIfAbsent` sau ia în calcul o structură de date de tip set.","difficulty":"easy","tags":["copyonwritearraylist","null","duplicates","list"]},{"id":"java-copyonwritearraylist-008","question":"Ce compromisuri de memorie are CopyOnWriteArrayList?","answer":"În timpul scrierilor, array-ul vechi și cel nou pot exista simultan. Array-urile vechi pot rămâne în viață cât timp iteratorii încă referențiază snapshot-urile lor.\n\nAcest lucru crește presiunea pe alocări și reținerea memoriei pentru liste mari sau modificări frecvente.\n\nClasa schimbă costul scrierilor și churn-ul de memorie pentru traversări de citire simple, sigure și fără blocare la nivelul array-ului citit.","difficulty":"hard","tags":["copyonwritearraylist","memory","snapshot","allocation"]}]},{"domain":"Java","topic":"Fundamente 1","icon":"☕","questions":[{"id":"java-core-1-001","question":"Care este contractul metodei Object.equals()?","answer":"Pentru referințe nenule, `equals()` trebuie să fie:\n\n- **Reflexivă:** `x.equals(x)` este `true`.\n- **Simetrică:** `x.equals(y)` are același rezultat ca `y.equals(x)`.\n- **Tranzitivă:** dacă `x` este egal cu `y`, iar `y` este egal cu `z`, atunci `x` este egal cu `z`.\n- **Consecventă:** apelurile repetate întorc același rezultat cât timp starea relevantă pentru egalitate nu se schimbă.\n- **Nenulă:** `x.equals(null)` este `false`.\n\nImplementarea implicită din `Object` folosește egalitatea de identitate. O clasă orientată spre valori suprascrie metoda pentru a compara câmpurile care îi definesc valoarea logică.","difficulty":"easy","tags":["equals","object-contract","value-semantics"]},{"id":"java-core-1-002","question":"Care este contractul dintre equals() și hashCode()?","answer":"Regula esențială este: **obiectele egale conform metodei `equals()` trebuie să întoarcă același cod hash**.\n\nReciproca nu este obligatorie: două obiecte diferite pot avea același cod hash, deoarece coliziunile sunt valide.\n\nDe asemenea, apelurile repetate ale metodei `hashCode()` trebuie să întoarcă aceeași valoare cât timp starea relevantă pentru egalitate nu se schimbă. Prin urmare, fiecare câmp folosit de `equals()` ar trebui, în mod normal, să contribuie și la `hashCode()`.\n\n```java\n@Override\npublic int hashCode() {\n    return Objects.hash(firstName, lastName, birthDate);\n}\n```\n\nÎncălcarea acestui contract face colecțiile bazate pe hash să se comporte incorect.","difficulty":"easy","tags":["equals","hashcode","object-contract"]},{"id":"java-core-1-003","question":"Ce se poate întâmpla dacă equals() este suprascrisă, dar hashCode() nu?","answer":"Obiectele egale pot primi coduri hash de identitate diferite. Un `HashMap` sau `HashSet` le poate plasa în compartimente diferite și poate eșua la găsirea unui obiect care, din punct de vedere logic, este prezent.\n\n```java\nSet<Person> people = new HashSet<>();\npeople.add(new Person(\"Ada\"));\n\n// Poate fi false dacă equals() este suprascrisă, dar hashCode() nu.\nboolean present = people.contains(new Person(\"Ada\"));\n```\n\nSuprascrie întotdeauna `hashCode()` atunci când suprascrii `equals()`.","difficulty":"easy","tags":["equals","hashcode","hashset","hashmap"]},{"id":"java-core-1-004","question":"De ce sunt periculoase cheile mutabile în HashMap și HashSet?","answer":"O colecție bazată pe hash alege un compartiment folosind codul hash al cheii. Dacă un câmp folosit de `equals()` și `hashCode()` se modifică după inserare, căutarea folosește noul hash și poate verifica un alt compartiment.\n\n```java\nMap<User, String> roles = new HashMap<>();\nUser user = new User(\"alice\");\nroles.put(user, \"admin\");\n\nuser.setUsername(\"bob\");\nroles.get(user); // poate întoarce null\n```\n\nÎn mod ideal, cheile ar trebui să fie imuabile. Cel puțin, câmpurile relevante pentru egalitate trebuie să rămână neschimbate cât timp obiectul este folosit drept cheie.","difficulty":"medium","tags":["hashcode","hashmap","immutability","collections"]},{"id":"java-core-1-005","question":"De ce poate utilizarea instanceof în equals() să provoace probleme de simetrie într-o ierarhie de moștenire?","answer":"O clasă de bază care acceptă subclase prin `instanceof` poate considera o subclasă egală folosind doar câmpurile de bază, în timp ce subclasa ia în considerare câmpurile sale suplimentare și întoarce `false` la comparația inversă.\n\n```java\nclass Point {\n    int x, y;\n    public boolean equals(Object o) {\n        return o instanceof Point p && x == p.x && y == p.y;\n    }\n}\n\nclass ColoredPoint extends Point {\n    Color color; // egalitatea poate compara și culoarea\n}\n```\n\nNu există o soluție universal corectă pentru egalitatea valorilor bazată pe moștenire. Abordările uzuale sunt:\n\n- Declară clasele de valori ca `final`.\n- Folosește egalitatea prin `getClass()` când tipurile diferite la rulare nu trebuie să fie egale.\n- Preferă compoziția în locul extinderii claselor de valori.\n- Folosește un protocol proiectat cu atenție numai când egalitatea polimorfică este cu adevărat necesară.","difficulty":"hard","tags":["equals","inheritance","symmetry","instanceof"]},{"id":"java-core-1-006","question":"Care este diferența dintre Comparable și Comparator?","answer":"`Comparable<T>` definește **ordinea naturală** a unui tip în interiorul clasei, prin `compareTo(T)`.\n\n```java\nclass Version implements Comparable<Version> {\n    public int compareTo(Version other) { /* ... */ }\n}\n```\n\n`Comparator<T>` este o strategie externă care definește o ordine prin `compare(T, T)`. Un tip poate avea mai mulți comparatori.\n\n```java\nComparator<Employee> bySalary =\n    Comparator.comparing(Employee::salary);\n```\n\nFolosește `Comparable` când o ordine este intrinsecă și general acceptată. Folosește `Comparator` pentru ordini alternative, clase terțe sau când ordonarea trebuie păstrată separat de model.","difficulty":"easy","tags":["comparable","comparator","sorting"]},{"id":"java-core-1-007","question":"Ce reguli trebuie să respecte compareTo() și Comparator.compare()?","answer":"Comparația trebuie să ofere o ordine consecventă:\n\n- Semnul este antisimetric: `sign(compare(x, y)) == -sign(compare(y, x))`.\n- Este tranzitivă: dacă `x > y` și `y > z`, atunci `x > z`.\n- Dacă `compare(x, y) == 0`, comparațiile lui `x` și `y` cu orice `z` trebuie să aibă același semn.\n\nPentru `Comparable`, este recomandat ferm, dar nu obligatoriu, ca `x.compareTo(y) == 0` exact atunci când `x.equals(y)` este `true`. Abaterile trebuie documentate, deoarece seturile și map-urile sortate folosesc comparația, nu `equals()`, pentru a identifica cheile duplicate.","difficulty":"medium","tags":["comparable","comparator","contract","ordering"]},{"id":"java-core-1-008","question":"De ce trebuie evitată scăderea valorilor numerice în codul de comparație?","answer":"Rezultatul expresiei `a - b` poate depăși intervalul tipului și poate produce semnul greșit.\n\n```java\n// Incorect pentru valori extreme\nreturn left.age - right.age;\n\n// Corect\nreturn Integer.compare(left.age, right.age);\n```\n\nAcelași lucru se aplică tipurilor `long`, `double` și altor tipuri numerice. Folosește metode precum `Integer.compare`, `Long.compare` și fabricile de comparatori.","difficulty":"easy","tags":["comparator","overflow","sorting"]},{"id":"java-core-1-009","question":"Cum compui comparatorii și cum tratezi valorile null?","answer":"Metodele fabrică și metodele implicite din `Comparator` fac ordonarea explicită și ușor de compus.\n\n```java\nComparator<Employee> ordering = Comparator\n    .comparing(Employee::department,\n        Comparator.nullsLast(String.CASE_INSENSITIVE_ORDER))\n    .thenComparing(Employee::lastName)\n    .thenComparing(Employee::firstName)\n    .thenComparingInt(Employee::id);\n```\n\nPrintre metodele utile se numără `comparing`, `comparingInt`, `thenComparing`, `reversed`, `nullsFirst` și `nullsLast`. Fabricile specializate pentru tipuri primitive evită boxing-ul.","difficulty":"medium","tags":["comparator","null-handling","sorting","composition"]},{"id":"java-core-1-010","question":"Ce se întâmplă când comparatorul unui TreeSet nu este consecvent cu equals()?","answer":"`TreeSet` și `TreeMap` folosesc comparația pentru a stabili dacă elementele sau cheile sunt duplicate. Dacă `compare(a, b) == 0`, colecția le tratează ca aceeași intrare chiar dacă `a.equals(b)` este `false`.\n\nInvers, obiectele egale care sunt comparate ca fiind diferite de zero pot apărea ambele într-un set sortat. Colecția își respectă în continuare propriile reguli de ordonare, dar comportamentul său nu mai corespunde așteptărilor generale pentru `Set` sau `Map`, bazate pe `equals()`.\n\nUn exemplu clasic este `BigDecimal`: `new BigDecimal(\"1.0\")` și `new BigDecimal(\"1.00\")` sunt comparate ca zero, dar nu sunt egale deoarece `equals()` ia în considerare și scala.","difficulty":"hard","tags":["comparator","treeset","treemap","equals"]},{"id":"java-core-1-011","question":"Ce face ca o clasă Java să fie imuabilă?","answer":"Starea observabilă a unui obiect imuabil nu se poate schimba după construire. Regulile uzuale de proiectare sunt:\n\n- Păstrează câmpurile `private` și `final`.\n- Inițializează complet obiectul în constructor sau în metoda fabrică.\n- Nu oferi metode de modificare.\n- Împiedică modificarea prin subclase, de obicei declarând clasa `final`.\n- Nu expune starea internă mutabilă.\n- Creează copii defensive ale intrărilor și ieșirilor mutabile.\n- Validează invariantele în timpul construirii.\n\nCâmpurile `final` nu sunt suficiente, deoarece o referință finală poate indica în continuare spre un obiect mutabil.","difficulty":"easy","tags":["immutability","class-design","final"]},{"id":"java-core-1-012","question":"De ce sunt necesare copiile defensive pentru clasele imuabile?","answer":"Fără copii defensive, apelantul poate modifica starea obiectului printr-o referință partajată.\n\n```java\npublic final class Schedule {\n    private final List<Instant> times;\n\n    public Schedule(List<Instant> times) {\n        this.times = List.copyOf(times);\n    }\n\n    public List<Instant> times() {\n        return times; // sigur: List.copyOf a produs o listă nemodificabilă\n    }\n}\n```\n\nPentru tipurile de elemente mutabile, o copie superficială a colecției nu este suficientă; poate fi necesară copierea fiecărui element. În mod normal, array-urile trebuie clonate atât la primire, cât și la returnare.","difficulty":"medium","tags":["immutability","defensive-copy","collections"]},{"id":"java-core-1-013","question":"Ce beneficii oferă imuabilitatea?","answer":"Obiectele imuabile sunt mai ușor de analizat, deoarece starea lor nu se schimbă după construire. Beneficiile includ:\n\n- Siguranță naturală între fire de execuție pentru propria stare.\n- Partajare și memorare în cache în condiții de siguranță.\n- Comportament stabil drept chei în map-uri și membri ai seturilor.\n- Invariante mai simple și mai puține erori dependente de succesiunea în timp.\n- Testare și depanare mai ușoare.\n- Posibilitatea reutilizării instanțelor sau memorării valorilor derivate.\n\nImuabilitatea nu face automat sigure între fire resursele externe sau colaboratorii mutabili referențiați.","difficulty":"easy","tags":["immutability","thread-safety","design"]},{"id":"java-core-1-014","question":"Este o colecție nemodificabilă același lucru cu o colecție imuabilă?","answer":"Nu. O **vedere nemodificabilă** împiedică modificarea prin acea referință, dar poate reflecta în continuare schimbările colecției mutabile de bază.\n\n```java\nList<String> source = new ArrayList<>();\nList<String> view = Collections.unmodifiableList(source);\nsource.add(\"new\"); // view conține acum și \"new\"\n```\n\n`List.copyOf(source)` creează un instantaneu nemodificabil al referințelor către elemente. Totuși, dacă elementele în sine sunt mutabile, modificările lor rămân vizibile. Imuabilitatea profundă necesită elemente imuabile sau copii defensive ale acestora.","difficulty":"medium","tags":["immutability","collections","defensive-copy"]},{"id":"java-core-1-015","question":"Cum poate un obiect imuabil să permită actualizări?","answer":"Acesta întoarce un obiect nou care conține valoarea schimbată, fără a modifica originalul. Această abordare este numită adesea **metodă with** sau actualizare funcțională.\n\n```java\npublic final class Money {\n    private final BigDecimal amount;\n    private final Currency currency;\n\n    public Money withAmount(BigDecimal newAmount) {\n        return new Money(newAmount, currency);\n    }\n}\n```\n\nPartajarea structurală poate face abordarea eficientă pentru structuri de date persistente mai mari. Builder-ele sunt utile și când construirea are multe valori opționale, dar obiectul construit nu trebuie să păstreze starea mutabilă a builder-ului.","difficulty":"medium","tags":["immutability","with-method","builder","functional-style"]},{"id":"java-core-1-016","question":"Ce este un record Java și ce generează compilatorul pentru acesta?","answer":"Un record este o declarație concisă pentru o clasă al cărei scop principal este modelarea unui set fix de componente de date.\n\n```java\nrecord Point(int x, int y) {}\n```\n\nCompilatorul oferă:\n\n- Câte un câmp `private final` pentru fiecare componentă.\n- Un accesor public numit exact ca fiecare componentă, de exemplu `x()`.\n- Un constructor canonic.\n- Metode `equals()` și `hashCode()` bazate pe componente.\n- O metodă `toString()` bazată pe componente.\n\nUn record este implicit final și extinde `java.lang.Record`. Poate implementa interfețe și poate declara metode și membri statici.","difficulty":"easy","tags":["records","data-modeling","compiler"]},{"id":"java-core-1-017","question":"Sunt record-urile Java profund imuabile?","answer":"Nu. Câmpurile componentelor unui record sunt finale, deci referințele lor nu pot fi reasignate după construire, dar obiectele referențiate pot fi în continuare mutabile.\n\n```java\nrecord Team(List<String> members) {\n    Team {\n        members = List.copyOf(members);\n    }\n}\n```\n\nConstructorul compact de mai sus împiedică apelanții să modifice record-ul prin lista originală. Imuabilitatea profundă depinde în continuare de mutabilitatea valorilor componentelor și de crearea copiilor defensive.","difficulty":"medium","tags":["records","immutability","defensive-copy"]},{"id":"java-core-1-018","question":"Ce este un constructor compact de record și cum este folosit pentru validare?","answer":"Un constructor compact omite lista de parametri și atribuirile explicite ale componentelor. Corpul său poate valida sau normaliza parametrii constructorului înainte ca aceștia să fie atribuiți câmpurilor de către compilator.\n\n```java\nrecord Range(int start, int end) {\n    Range {\n        if (start > end) {\n            throw new IllegalArgumentException(\"start must not exceed end\");\n        }\n    }\n}\n```\n\nNu atribui direct câmpurile componentelor într-un constructor compact. Reasignarea unui parametru, de exemplu `name = name.trim()`, schimbă valoarea care va fi atribuită automat ulterior.","difficulty":"medium","tags":["records","constructor","validation"]},{"id":"java-core-1-019","question":"Ce restricții diferențiază record-urile de clasele obișnuite?","answer":"Restricțiile importante includ:\n\n- Un record este implicit final și nu poate fi extins.\n- Extinde implicit `java.lang.Record`, deci nu poate extinde altă clasă.\n- Nu sunt permise alte câmpuri de instanță în afara câmpurilor componentelor declarate.\n- Câmpurile componentelor sunt finale.\n- Un record nu poate fi abstract.\n- Un record nu poate declara metode native.\n\nRecord-urile pot totuși implementa interfețe, defini câmpuri statice, adăuga metode și tipuri imbricate, personaliza metodele generate și folosi adnotări acolo unde este permis.","difficulty":"medium","tags":["records","inheritance","restrictions"]},{"id":"java-core-1-020","question":"Când ar trebui să eviți utilizarea unui record?","answer":"Evită un record când abstracția nu este definită fundamental de descrierea completă a stării sale, de exemplu când:\n\n- Identitatea contează independent de valorile componentelor.\n- Obiectul necesită o stare mutabilă pe parcursul ciclului de viață.\n- Constrângerile unui framework impun o superclasă sau un bean mutabil cu constructor fără argumente.\n- Ai nevoie de stare ascunsă per instanță în afara componentelor declarate.\n- API-ul trebuie să păstreze libertatea de a schimba reprezentarea stării fără a modifica contractul public al componentelor.\n\nRecord-urile sunt excelente pentru transportul valorilor, dar nu reprezintă doar o sintaxă mai scurtă pentru orice clasă.","difficulty":"medium","tags":["records","api-design","value-semantics"]},{"id":"java-core-1-021","question":"Ce problemă rezolvă clasele și interfețele sealed?","answer":"Un tip sealed restricționează clasele sau interfețele care îl pot extinde sau implementa direct. Astfel, un API poate modela un set cunoscut și controlat de alternative.\n\n```java\nsealed interface Result permits Success, Failure {}\nrecord Success(String value) implements Result {}\nrecord Failure(String message) implements Result {}\n```\n\nBeneficiile includ o modelare mai puternică a domeniului, extindere controlată și pattern matching exhaustiv. Sunt utile pentru ierarhii în stil algebric, precum comenzi, rezultate, noduri ale arborilor sintactici și stări ale plăților.","difficulty":"easy","tags":["sealed-classes","inheritance","domain-modeling"]},{"id":"java-core-1-022","question":"Ce modificatori trebuie să folosească o subclasă directă permisă a unei clase sealed?","answer":"O subclasă directă permisă trebuie să declare explicit unul dintre următorii modificatori:\n\n- `final`: nu sunt permise alte subclase.\n- `sealed`: declară un alt set controlat de subclase permise.\n- `non-sealed`: redeschide acea ramură pentru extindere fără restricții.\n\n```java\nsealed class Shape permits Circle, Polygon, CustomShape {}\nfinal class Circle extends Shape {}\nsealed class Polygon extends Shape permits Triangle {}\nnon-sealed class CustomShape extends Shape {}\nfinal class Triangle extends Polygon {}\n```\n\nRegula se aplică subclaselor directe, nu neapărat fiecărui descendent.","difficulty":"easy","tags":["sealed-classes","final","non-sealed","inheritance"]},{"id":"java-core-1-023","question":"Care sunt regulile de amplasare pentru subclasele permise ale unui tip sealed?","answer":"Subclasele directe permise trebuie să fie accesibile tipului sealed și să aparțină aceluiași modul atunci când tipul sealed se află într-un modul denumit. Într-un modul fără nume, acestea trebuie să fie în același pachet.\n\nClauza `permits` poate fi omisă când toate subclasele directe sunt declarate în același fișier sursă; compilatorul le poate deduce.\n\nAceste restricții permit compilatorului să cunoască în mod sigur setul închis de alternative directe.","difficulty":"medium","tags":["sealed-classes","modules","packages","permits"]},{"id":"java-core-1-024","question":"Cum permit ierarhiile sealed expresii switch exhaustive?","answer":"Deoarece compilatorul cunoaște toate alternativele permise, un switch poate acoperi fiecare subtip fără o ramură `default`.\n\n```java\nstatic double area(Shape shape) {\n    return switch (shape) {\n        case Circle c -> Math.PI * c.radius() * c.radius();\n        case Rectangle r -> r.width() * r.height();\n    };\n}\n```\n\nDacă `Shape` este sealed, iar acestea sunt toate alternativele permise, switch-ul este exhaustiv. Acest lucru este valoros deoarece adăugarea unui nou subtip permis poate produce erori de compilare în switch-urile care trebuie reevaluate.","difficulty":"medium","tags":["sealed-classes","switch","exhaustiveness","pattern-matching"]},{"id":"java-core-1-025","question":"Ce efect are un subtip non-sealed asupra unei ierarhii sealed?","answer":"`non-sealed` redeschide o ramură a ierarhiei. Orice clasă poate extinde acel subtip, în limitele regulilor Java obișnuite de acces.\n\n```java\nsealed interface Event permits SystemEvent, UserEvent {}\nfinal class SystemEvent implements Event {}\nnon-sealed class UserEvent implements Event {}\n```\n\nAlternativele directe ale lui `Event` rămân cunoscute, dar `UserEvent` poate avea descendenți necunoscuți. Pattern matching poate acoperi în continuare ramura printr-un pattern pentru `UserEvent`, dar nu poate presupune o listă închisă a descendenților săi concreți.","difficulty":"medium","tags":["sealed-classes","non-sealed","inheritance","exhaustiveness"]},{"id":"java-core-1-026","question":"Cum îmbunătățește pattern matching pentru instanceof verificările și conversiile tradiționale de tip?","answer":"Acesta combină testul de tip și conversia într-o singură operație, introducând o variabilă de pattern.\n\n```java\n// Forma tradițională\nif (value instanceof String) {\n    String text = (String) value;\n    System.out.println(text.length());\n}\n\n// Pattern matching\nif (value instanceof String text) {\n    System.out.println(text.length());\n}\n```\n\nVariabila de pattern este atribuită în mod cert numai acolo unde se știe că potrivirea a reușit, reducând codul repetitiv și eliminând o conversie explicită care ar putea fi neconsecventă.","difficulty":"easy","tags":["instanceof","pattern-matching","casting"]},{"id":"java-core-1-027","question":"Care este domeniul de vizibilitate al unei variabile de pattern instanceof?","answer":"Domeniul său este sensibil la fluxul de execuție: variabila este disponibilă numai acolo unde compilatorul poate demonstra că pattern-ul s-a potrivit.\n\n```java\nif (value instanceof String text) {\n    use(text); // în domeniul de vizibilitate\n}\n\nif (!(value instanceof String text)) {\n    return;\n}\nuse(text); // vizibilă deoarece ramura fără potrivire a întors controlul\n```\n\nVariabila nu este limitată pur și simplu la cele mai apropiate acolade. Analiza fluxului din Java ia în calcul ramificațiile și încheierea abruptă prin `return` sau `throw`.","difficulty":"medium","tags":["instanceof","pattern-matching","scope","flow-analysis"]},{"id":"java-core-1-028","question":"Cum afectează && și || domeniul unei variabile de pattern instanceof?","answer":"Cu `&&`, operandul din dreapta este evaluat numai când potrivirea a reușit, deci variabila este disponibilă acolo.\n\n```java\nif (value instanceof String text && !text.isBlank()) {\n    use(text);\n}\n```\n\nCu `||`, operandul din dreapta poate fi evaluat când pattern-ul nu s-a potrivit, deci variabila nu este disponibilă.\n\n```java\n// Nu se compilează: text poate să nu existe în partea dreaptă.\nif (value instanceof String text || text.isBlank()) { }\n```\n\nAcest comportament rezultă din evaluarea cu scurtcircuitare și analiza atribuirii certe.","difficulty":"medium","tags":["instanceof","pattern-matching","short-circuit","scope"]},{"id":"java-core-1-029","question":"Cum se comportă pattern matching pentru instanceof în cazul valorii null?","answer":"Un pattern de tip nu se potrivește cu `null`, astfel condiția este evaluată la `false`, iar variabila de pattern nu este introdusă.\n\n```java\nObject value = null;\nif (value instanceof String text) {\n    // Nu se intră aici\n}\n```\n\nAstfel, nu este necesară o verificare separată pentru null atunci când comportamentul dorit este doar executarea codului pentru o valoare nenulă de tipul țintă.","difficulty":"easy","tags":["instanceof","pattern-matching","null"]},{"id":"java-core-1-030","question":"Ce este un pattern instanceof necondiționat și de ce poate fi respins?","answer":"Un pattern este necondiționat când tipul static al expresiei este deja un subtip al tipului din pattern, ceea ce face ca testul să reușească întotdeauna pentru valori nenule.\n\n```java\nString text = \"hello\";\n// Eroare de compilare: expresia este deja un String.\nif (text instanceof String same) { }\n```\n\nUn asemenea test nu oferă nicio rafinare utilă a tipului și este respins. Situația este asemănătoare cazurilor în care Java respinge operații de tip care sunt demonstrabil redundante sau imposibile.","difficulty":"hard","tags":["instanceof","pattern-matching","compiler","type-system"]},{"id":"java-core-1-031","question":"Care este diferența dintre o instrucțiune switch și o expresie switch?","answer":"O instrucțiune switch tradițională controlează fluxul de execuție și nu produce ea însăși o valoare. O expresie switch este evaluată la o valoare și trebuie să fie exhaustivă.\n\n```java\nString label = switch (status) {\n    case NEW -> \"Nou\";\n    case RUNNING -> \"În desfășurare\";\n    case DONE -> \"Finalizat\";\n};\n```\n\nEtichetele cu săgeată evită trecerea accidentală în cazul următor. Și instrucțiunile switch pot folosi etichete cu săgeată, iar forma de expresie este utilă pentru atribuiri directe, valori returnate și compunerea expresiilor.","difficulty":"easy","tags":["switch-expression","control-flow","exhaustiveness"]},{"id":"java-core-1-032","question":"Când este folosit yield într-o expresie switch?","answer":"Folosește `yield` când un grup cu două puncte sau un bloc cu săgeată necesită mai multe instrucțiuni înainte de a produce valoarea.\n\n```java\nint score = switch (grade) {\n    case \"A\" -> 100;\n    case \"B\" -> {\n        audit(grade);\n        yield 80;\n    }\n    default -> 0;\n};\n```\n\n`yield` furnizează o valoare expresiei switch; nu întoarce controlul din metoda înconjurătoare. O expresie simplă cu săgeată furnizează valoarea fără `yield`.","difficulty":"easy","tags":["switch-expression","yield","control-flow"]},{"id":"java-core-1-033","question":"Ce înseamnă ca o expresie switch să fie exhaustivă?","answer":"Fiecare valoare posibilă a selectorului trebuie tratată, astfel încât expresia să producă întotdeauna un rezultat sau să se încheie abrupt prin aruncarea unei excepții.\n\nExhaustivitatea poate fi obținută prin:\n\n- O etichetă `default`.\n- Toate constantele unui enum.\n- Toate alternativele relevante ale unei ierarhii sealed, când sunt folosite pattern-uri de tip.\n- Un pattern de tip total, unde este aplicabil.\n\nChiar dacă un switch exhaustiv pe enum nu are un `default` explicit, compilatorul protejează împotriva unei evoluții incompatibile a enum-ului, provocând o excepție dacă la rulare este întâlnită o constantă necunoscută.","difficulty":"medium","tags":["switch-expression","exhaustiveness","enum","sealed-classes"]},{"id":"java-core-1-034","question":"Cum sunt tratate valorile null ale selectorului de construcțiile switch moderne?","answer":"În mod tradițional, folosirea lui `null` într-un switch aruncă `NullPointerException`. Un switch cu pattern matching permite un `case null` explicit atunci când null este o valoare relevantă.\n\n```java\nString describe(Object value) {\n    return switch (value) {\n        case null -> \"lipsește\";\n        case String text -> \"text: \" + text;\n        default -> \"altceva\";\n    };\n}\n```\n\nO etichetă `default` nu se potrivește implicit cu null. Tratează null explicit sau respinge-l înainte de switch.","difficulty":"medium","tags":["switch-expression","null","pattern-matching"]},{"id":"java-core-1-035","question":"Ce sunt pattern-urile cu gardă și regulile de dominanță într-un switch cu pattern matching?","answer":"Un caz cu gardă adaugă o condiție booleană prin `when` după potrivirea reușită a unui pattern.\n\n```java\nreturn switch (value) {\n    case String text when text.isBlank() -> \"gol\";\n    case String text -> \"text\";\n    default -> \"altceva\";\n};\n```\n\nOrdinea cazurilor contează. Un pattern anterior și mai general poate **domina** un pattern ulterior, mai specific sau echivalent, făcând cazul ulterior inaccesibil și provocând o eroare de compilare.\n\n```java\n// Ordine invalidă: Object se potrivește primul cu orice String nenul.\ncase Object object -> \"obiect\";\ncase String text -> \"text\";\n```\n\nPlasează pattern-urile specifice și cazurile cu gardă înaintea pattern-urilor generale fără gardă.","difficulty":"hard","tags":["switch-expression","pattern-matching","guards","dominance"]}]},{"domain":"Java","topic":"Generics","icon":"🏷️","questions":[{"id":"java-generics-001","question":"Ce problemă rezolvă genericele în Java?","answer":"Genericele permit claselor, interfețelor și metodelor să opereze cu tipuri, păstrând siguranța la compilare.\n\n```java\nList<String> names = new ArrayList<>();\nnames.add(\"Ada\");\nString first = names.get(0); // nu este necesar cast\n```\n\nReduc cast-urile, documentează intenția API-ului și permit compilatorului să prindă multe erori de tip înainte de rulare.","difficulty":"easy","tags":["generics","type-safety","collections"]},{"id":"java-generics-002","question":"Ce este type erasure?","answer":"Genericele Java sunt implementate în mare parte prin verificări la compilare plus type erasure. Compilatorul înlocuiește parametrii de tip cu limitele lor, inserează cast-uri unde este nevoie și generează metode bridge în unele cazuri de moștenire.\n\nLa rulare, `List<String>` și `List<Integer>` sunt ambele doar `List`.\n\n```java\nSystem.out.println(new ArrayList<String>().getClass()\n    == new ArrayList<Integer>().getClass()); // true\n```","difficulty":"medium","tags":["generics","type-erasure","runtime"]},{"id":"java-generics-003","question":"De ce List<String> nu este subtip al List<Object>?","answer":"Tipurile generice sunt invariante. Dacă `List<String>` ar putea fi atribuită unui `List<Object>`, codul ar putea adăuga un obiect care nu este string într-o listă de string-uri.\n\n```java\nList<String> strings = new ArrayList<>();\n// List<Object> objects = strings; // nu se compilează\n// objects.add(42);\n```\n\nFolosește wildcard-uri când ai nevoie de variație, de exemplu `List<? extends Object>` pentru citirea valorilor ca obiecte.","difficulty":"medium","tags":["generics","invariance","wildcards","type-safety"]},{"id":"java-generics-004","question":"Ce înseamnă PECS?","answer":"PECS înseamnă **Producer Extends, Consumer Super**.\n\nFolosește `? extends T` când o structură produce valori `T` pe care le citești. Folosește `? super T` când o structură consumă valori `T` pe care le scrii.\n\n```java\nvoid copy(List<? extends Number> source,\n          List<? super Number> target) {\n    for (Number n : source) {\n        target.add(n);\n    }\n}\n```","difficulty":"medium","tags":["generics","pecs","wildcards","extends","super"]},{"id":"java-generics-005","question":"Care este diferența dintre un wildcard nebounded și un raw type?","answer":"`List<?>` înseamnă o listă de un tip necunoscut, cu siguranța de tip păstrată. Poți citi elemente ca `Object`, dar nu poți adăuga valori arbitrare, cu excepția lui `null`.\n\n`List` ca raw type dezactivează verificările generice și poate duce la heap pollution.\n\n```java\nList<?> safe = List.of(\"a\");\nList raw = new ArrayList<String>();\nraw.add(123); // unchecked și periculos\n```","difficulty":"medium","tags":["generics","wildcards","raw-types","heap-pollution"]},{"id":"java-generics-006","question":"Ce sunt parametrii de tip bounded?","answer":"Un parametru de tip bounded restricționează tipurile care pot fi folosite și permite implementării să apeleze metode din limită.\n\n```java\nclass Box<T extends Number> {\n    private final T value;\n    double asDouble() {\n        return value.doubleValue();\n    }\n}\n```\n\nSunt permise mai multe limite, cu cel mult o clasă prima, urmată de interfețe: `<T extends Base & Runnable & AutoCloseable>`.","difficulty":"medium","tags":["generics","bounds","type-parameter"]},{"id":"java-generics-007","question":"De ce nu poți crea direct new T() sau new T[]?","answer":"Din cauza type erasure, runtime-ul nu cunoaște argumentul exact de tip pentru `T`. Java nu poate instanția sigur `T` sau crea un array al cărui tip de componentă este o variabilă de tip ștearsă.\n\n```java\nclass Factory<T> {\n    // T value = new T();      // nu se compilează\n    // T[] values = new T[10]; // nu se compilează\n}\n```\n\nAlternative uzuale sunt transmiterea unui `Class<T>`, `IntFunction<T[]>` sau `Supplier<T>`.","difficulty":"hard","tags":["generics","type-erasure","arrays","instantiation"]},{"id":"java-generics-008","question":"Ce este heap pollution?","answer":"Heap pollution apare când o variabilă de tip parametrizat referențiază un obiect care nu este de fapt de acel tip parametrizat. Apare des din raw types, cast-uri unchecked sau varargs nesigure.\n\n```java\nList<String> strings = new ArrayList<>();\nList raw = strings;\nraw.add(42);\nString value = strings.get(0); // ClassCastException mai târziu\n```\n\nAvertismentele despre operații unchecked merită investigate, deoarece pot ascunde eșecuri întârziate la rulare.","difficulty":"hard","tags":["generics","heap-pollution","raw-types","unchecked"]}]},{"domain":"Java","topic":"Iteratori fail-fast vs fail-safe","icon":"🔁","questions":[{"id":"java-iterators-001","question":"Ce este un iterator fail-fast?","answer":"Un iterator fail-fast încearcă să detecteze modificarea structurală a colecției de bază în afara iteratorului și aruncă `ConcurrentModificationException`.\n\n```java\nfor (String value : list) {\n    list.add(\"new\"); // probabil ConcurrentModificationException\n}\n```\n\nEste un mecanism de detectare a bug-urilor, nu o garanție de corectitudine. Detectarea este best-effort și nu trebuie folosită pentru controlul logicii programului.","difficulty":"easy","tags":["iterator","fail-fast","concurrentmodificationexception"]},{"id":"java-iterators-002","question":"Ce înseamnă de obicei iterator fail-safe în interviuri?","answer":"`Fail-safe` nu este un contract formal al Java Collections Framework. În interviuri înseamnă de obicei un iterator care nu aruncă `ConcurrentModificationException` când colecția este modificată concurent.\n\nExemple:\n\n- Iteratori snapshot, precum cei din `CopyOnWriteArrayList`.\n- Iteratori slab consecvenți, precum cei din `ConcurrentHashMap`.\n\nÎntrebarea importantă este **ce vede iteratorul**: un snapshot stabil sau o vedere slab consecventă care se poate schimba.","difficulty":"medium","tags":["iterator","fail-safe","snapshot","weakly-consistent"]},{"id":"java-iterators-003","question":"Care este diferența dintre iteratorii snapshot și cei slab consecvenți?","answer":"Un **iterator snapshot** vede starea colecției din momentul în care iteratorul a fost creat. Schimbările ulterioare nu sunt vizibile prin acel iterator.\n\nUn **iterator slab consecvent** poate reflecta unele schimbări făcute după crearea iteratorului, dar nu promite un snapshot complet și atomic.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>();\nConcurrentHashMap<String, Integer> map = new ConcurrentHashMap<>();\n```\n\n`CopyOnWriteArrayList` folosește iterare snapshot. `ConcurrentHashMap` folosește iterare slab consecventă.","difficulty":"medium","tags":["snapshot","weakly-consistent","copyonwritearraylist","concurrenthashmap"]},{"id":"java-iterators-004","question":"De ce ConcurrentModificationException nu ține doar de mai multe fire?","answer":"`ConcurrentModificationException` poate apărea într-un singur fir. `Concurrent` înseamnă aici că o colecție a fost modificată în timp ce iterarea era în desfășurare, nu neapărat că alt fir a făcut modificarea.\n\n```java\nIterator<String> it = list.iterator();\nwhile (it.hasNext()) {\n    String value = it.next();\n    list.remove(value); // greșit pentru majoritatea iteratorilor fail-fast\n}\n```\n\nFolosește `Iterator.remove()` sau metode la nivel de colecție precum `removeIf()` când colecția le suportă.","difficulty":"easy","tags":["concurrentmodificationexception","iterator","single-thread"]},{"id":"java-iterators-005","question":"Cum pot fi eliminate elemente în siguranță în timpul iterării?","answer":"Pentru majoritatea colecțiilor mutabile, elimină prin iterator sau folosește o operație bulk.\n\n```java\nIterator<String> it = names.iterator();\nwhile (it.hasNext()) {\n    if (it.next().isBlank()) {\n        it.remove();\n    }\n}\n\nnames.removeIf(String::isBlank);\n```\n\nNu apela `collection.remove(...)` într-un `for` îmbunătățit decât dacă semantica iteratorului acelei colecții permite explicit acest lucru.","difficulty":"easy","tags":["iterator","remove","removeif","iteration"]},{"id":"java-iterators-006","question":"Poate comportamentul fail-fast să garanteze thread-safety?","answer":"Nu. Iteratorii fail-fast nu sunt un mecanism de sincronizare. Pot detecta unele modificări ilegale și pot arunca o excepție, dar le pot și rata.\n\nThread-safety corect necesită sincronizare externă, izolare pe fir, snapshot-uri imuabile sau colecții concurente proiectate pentru tiparul de acces.\n\nComportamentul fail-fast trebuie tratat ca avertizare timpurie pentru bug-uri, nu ca protecție împotriva race condition-urilor.","difficulty":"medium","tags":["fail-fast","thread-safety","concurrency","iterator"]},{"id":"java-iterators-007","question":"Cum se comportă iteratorii CopyOnWriteArrayList când lista se schimbă?","answer":"Ei iterează peste un snapshot imuabil al array-ului capturat la crearea iteratorului. Adăugările sau eliminările ulterioare nu sunt vizibile pentru acel iterator, iar iteratorul nu aruncă `ConcurrentModificationException`.\n\n```java\nCopyOnWriteArrayList<String> list = new CopyOnWriteArrayList<>(List.of(\"A\"));\nIterator<String> it = list.iterator();\nlist.add(\"B\");\nSystem.out.println(it.next()); // A\n```\n\nMetodele de modificare ale iteratorului, precum `remove`, nu sunt suportate.","difficulty":"medium","tags":["copyonwritearraylist","snapshot","iterator","unsupportedoperationexception"]},{"id":"java-iterators-008","question":"Cum se comportă iteratorii ConcurrentHashMap în timpul modificărilor concurente?","answer":"Iteratorii `ConcurrentHashMap` sunt slab consecvenți. Nu aruncă `ConcurrentModificationException`; pot reflecta unele actualizări făcute după crearea iteratorului, dar nu oferă un snapshot stabil al întregului map.\n\nSunt utili pentru monitorizare, traversare aproximativă și algoritmi concurenți care nu cer o vedere înghețată. Dacă ai nevoie de un snapshot stabil, copiază mai întâi intrările într-o altă colecție.","difficulty":"hard","tags":["concurrenthashmap","weakly-consistent","iterator","snapshot"]}]},{"domain":"Java","topic":"String Pool și șiruri mutabile","icon":"🔤","questions":[{"id":"java-strings-001","question":"Ce este string pool-ul în Java?","answer":"String pool-ul este o colecție administrată de JVM care conține **instanțe `String` canonice**. Literalele și celelalte șiruri constante la compilare care au același conținut fac referire la același obiect din pool.\n\n```java\nString first = \"java\";\nString second = \"java\";\n\nSystem.out.println(first == second); // true\n```\n\nPartajarea este sigură deoarece `String` este imuabil. Folosirea aceleiași instanțe nu permite unui apelant să schimbe valoarea observată de altul.","difficulty":"easy","tags":["string","string-pool","immutability","jvm"]},{"id":"java-strings-002","question":"Care este diferența dintre crearea unui String prin literal și prin new String()?","answer":"Un literal folosește instanța canonică din pool. `new String(...)` creează explicit un obiect `String` distinct, chiar dacă același conținut există deja în pool.\n\n```java\nString pooled = \"hello\";\nString copied = new String(\"hello\");\n\nSystem.out.println(pooled == copied);      // false\nSystem.out.println(pooled.equals(copied)); // true\n```\n\nLiteralul folosit ca argument al constructorului se află în pool, iar `copied` indică spre obiectul alocat separat. Folosirea lui `new String(existingString)` este rareori utilă deoarece șirurile sunt imuabile.","difficulty":"easy","tags":["string","string-pool","new","identity"]},{"id":"java-strings-003","question":"De ce trebuie comparate în mod normal valorile String cu equals(), nu cu ==?","answer":"`equals()` compară conținutul caracterelor, iar `==` verifică dacă două referințe indică exact același obiect.\n\n```java\nString a = new String(\"api\");\nString b = \"api\";\n\nSystem.out.println(a.equals(b)); // true\nSystem.out.println(a == b);      // false\n```\n\nString pool-ul poate face ca unele comparații cu `==` să pară corecte, ceea ce face eroarea înșelătoare. Folosește `==` numai când verifici intenționat identitatea obiectelor.","difficulty":"easy","tags":["string","equals","identity","string-pool"]},{"id":"java-strings-004","question":"Ce face metoda String.intern()?","answer":"`intern()` întoarce reprezentarea canonică din pool a unui șir. Dacă un șir egal există deja în pool, este întoarsă referința existentă; altfel, o reprezentare canonică este adăugată și întoarsă.\n\n```java\nString runtime = new StringBuilder()\n    .append(\"ja\")\n    .append(\"va\")\n    .toString();\n\nString canonical = runtime.intern();\nSystem.out.println(canonical == \"java\"); // true\n```\n\nInternarea schimbă referința folosită; nu modifică șirul original imuabil.","difficulty":"medium","tags":["string","intern","string-pool","canonicalization"]},{"id":"java-strings-005","question":"Ce concatenări de șiruri sunt introduse în pool la compilare?","answer":"O concatenare alcătuită exclusiv din expresii constante la compilare este evaluată de compilator și folosește rezultatul din pool.\n\n```java\nString a = \"inter\" + \"view\";\nString b = \"interview\";\nSystem.out.println(a == b); // true\n\nString part = \"inter\";\nString c = part + \"view\";\nSystem.out.println(c == b); // false, în mod normal\n```\n\nA doua concatenare depinde de o variabilă neconstantă și este evaluată la rulare. Compară rezultatele cu `equals()`, indiferent de modul în care au fost create.","difficulty":"medium","tags":["string","string-pool","concatenation","compile-time-constant"]},{"id":"java-strings-006","question":"Cum influențează final concatenarea șirurilor la compilare?","answer":"O variabilă `final` inițializată cu o expresie constantă poate fi ea însăși o constantă la compilare. Concatenările care o folosesc pot fi evaluate anticipat și internate.\n\n```java\nfinal String prefix = \"micro\";\nString a = prefix + \"service\";\nString b = \"microservice\";\nSystem.out.println(a == b); // true\n```\n\nDacă valoarea `final` este inițializată printr-un apel de metodă sau altă expresie evaluată la rulare, aceasta nu este o constantă la compilare.\n\n```java\nfinal String value = loadValue();\nString result = value + \"suffix\"; // concatenare la rulare\n```","difficulty":"medium","tags":["string","final","concatenation","compile-time-constant"]},{"id":"java-strings-007","question":"Este garantat că literalele încărcate de class loader-e diferite sunt partajate?","answer":"Java Language Specification impune ca literalele identice să facă referire la aceeași instanță `String`, inclusiv atunci când apar în clase sau pachete diferite. Canonicalizarea literalelor este definită la nivelul programului, nu ca un pool separat pentru fiecare clasă sursă.\n\nClass loader-ele influențează identitatea claselor, dar nu fac distincte literalele egale. Totuși, nu te baza pe egalitatea referințelor; pentru conținut trebuie folosit în continuare `equals()`.","difficulty":"hard","tags":["string","string-pool","class-loader","jls"]},{"id":"java-strings-008","question":"Când poate fi utilă internarea explicită a șirurilor?","answer":"Internarea poate ajuta când o aplicație păstrează foarte multe șiruri duplicate dintr-un vocabular mic și stabil, precum token-uri de protocol repetate sau identificatori normalizați. Referințele canonice pot reduce stocarea duplicată și pot permite optimizări interne bazate pe identitate.\n\nInternarea are însă costuri:\n\n- Costul căutării în pool și al sincronizării.\n- Presiune asupra memoriei prin păstrarea unui set canonic mare.\n- Comportament global ascuns, care complică analiza performanței.\n- Beneficii reduse când majoritatea valorilor sunt unice.\n\nMăsoară sarcini de lucru realiste înainte de a adăuga apeluri explicite `intern()`. Un cache de canonicalizare limitat la nivelul aplicației poate oferi un control mai bun asupra ciclului de viață.","difficulty":"hard","tags":["string","intern","performance","memory"]},{"id":"java-strings-009","question":"Face String.intern() din comparația de identitate cu == o practică generală bună?","answer":"Nu. Comparația identității funcționează numai dacă **fiecare valoare implicată este garantat canonicalizată conform aceleiași politici**. O singură valoare neinternată încalcă în tăcere această presupunere.\n\n```java\nString expected = \"READY\";\nString actual = readStatus();\n\n// Fragil\nif (actual == expected) { }\n\n// Corect pentru conținut\nif (expected.equals(actual)) { }\n```\n\nFolosește internarea ca tehnică de memorie sau canonicalizare, nu ca înlocuitor pentru egalitatea obișnuită a valorilor.","difficulty":"medium","tags":["string","intern","equals","identity"]},{"id":"java-strings-010","question":"Unde este stocat string pool-ul?","answer":
