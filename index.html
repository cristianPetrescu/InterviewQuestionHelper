ion means a public class may be accessible while its package is not open for deep reflection. Frameworks that access private fields or constructors may fail with access errors.\n\nFixes include:\n\n- Adding `opens` or qualified `opens` in `module-info.java`.\n- Using command-line `--add-opens` during migration.\n- Refactoring toward public APIs or framework-supported module configuration.\n\nDo not blindly open everything; keep encapsulation intentional.","difficulty":"hard","tags":["modules","reflection","strong-encapsulation","add-opens"]},{"id":"java-reflection-modules-015","question":"When should reflection be replaced with MethodHandle or normal APIs?","answer":"Normal method calls are best when the target is known at compile time. `MethodHandle` can be useful for dynamic invocation with better JVM optimization potential and more explicit typing than classic reflection.\n\nReflection remains useful for discovery and metadata-driven frameworks.\n\nFor performance-sensitive repeated invocation, avoid repeated reflective lookups. Cache metadata or consider `MethodHandle` when appropriate.","difficulty":"hard","tags":["reflection","methodhandle","performance","dynamic-invocation"]}]},{"domain":"Java","topic":"Streams API","icon":"🌊","questions":[{"id":"java-streams-api-001","question":"What is a Java Stream?","answer":"A `Stream` is a pipeline for aggregate operations over a data source. It does not store elements like a collection; it describes computations over elements.\n\n```java\nint total = orders.stream()\n    .filter(Order::paid)\n    .mapToInt(Order::amount)\n    .sum();\n```\n\nA stream pipeline has a source, zero or more intermediate operations, and one terminal operation. Work is usually lazy until the terminal operation starts.","difficulty":"easy","tags":["streams","pipeline","lazy","terminal-operation"]},{"id":"java-streams-api-002","question":"What is the difference between intermediate and terminal operations?","answer":"Intermediate operations return another stream and are lazy. Terminal operations produce a result or side effect and trigger processing.\n\n```java\nStream<String> pipeline = names.stream()\n    .filter(name -> name.length() > 3)\n    .map(String::toUpperCase); // not executed yet\n\nList<String> result = pipeline.toList(); // terminal operation\n```\n\nExamples of intermediate operations: `map`, `filter`, `flatMap`, `sorted`. Examples of terminal operations: `collect`, `reduce`, `forEach`, `count`, `toList`.","difficulty":"easy","tags":["streams","intermediate-operation","terminal-operation","lazy"]},{"id":"java-streams-api-003","question":"What does map() do in a stream?","answer":"`map()` transforms each input element into one output element.\n\n```java\nList<String> names = users.stream()\n    .map(User::name)\n    .toList();\n```\n\nUse `map()` when the cardinality is one-to-one: each `User` becomes one `String`. If each input can produce zero, one, or many outputs, `flatMap()` is often the better fit.","difficulty":"easy","tags":["streams","map","transformation"]},{"id":"java-streams-api-004","question":"What does flatMap() do?","answer":"`flatMap()` maps each input element to a stream and then flattens those streams into one stream.\n\n```java\nList<String> words = lines.stream()\n    .flatMap(line -> Arrays.stream(line.split(\"\\\\s+\")))\n    .toList();\n```\n\nUse it when each element contains nested data, such as a list of orders per customer or words per line.","difficulty":"medium","tags":["streams","flatmap","flattening","nested-data"]},{"id":"java-streams-api-005","question":"What is the difference between map() and flatMap()?","answer":"`map()` preserves one output per input. `flatMap()` removes one level of nesting by concatenating inner streams.\n\n```java\nStream<List<String>> nested = users.stream().map(User::roles);\nStream<String> flat = users.stream().flatMap(u -> u.roles().stream());\n```\n\nIf you end up with `Stream<List<T>>`, `Stream<Optional<T>>`, or `Stream<Stream<T>>`, it is a sign that `flatMap()` may be needed.","difficulty":"medium","tags":["streams","map","flatmap","nested-data"]},{"id":"java-streams-api-006","question":"What are primitive streams and why use them?","answer":"`IntStream`, `LongStream`, and `DoubleStream` avoid boxing overhead and provide numeric operations such as `sum`, `average`, `min`, and `max`.\n\n```java\nint total = orders.stream()\n    .mapToInt(Order::amount)\n    .sum();\n```\n\nUse primitive streams for numeric pipelines. Convert back with `boxed()` when object stream APIs are needed.","difficulty":"medium","tags":["streams","intstream","boxing","performance"]},{"id":"java-streams-api-007","question":"What is reduce() used for?","answer":"`reduce()` combines stream elements into a single result using an associative accumulator.\n\n```java\nint sum = numbers.stream()\n    .reduce(0, Integer::sum);\n```\n\nIt is best for immutable reductions such as sums, products, maximums, or combining values. For mutable containers like lists or maps, prefer `collect()`.","difficulty":"medium","tags":["streams","reduce","reduction","associativity"]},{"id":"java-streams-api-008","question":"Why must reduce() operations be associative?","answer":"Streams, especially parallel streams, may group and combine elements in different orders. The accumulator and combiner must therefore be associative to produce deterministic results.\n\n```java\n// Good: associative\nnumbers.parallelStream().reduce(0, Integer::sum);\n\n// Risky: order-sensitive subtraction\nnumbers.parallelStream().reduce(0, (a, b) -> a - b);\n```\n\nThe identity value must also be neutral for the operation.","difficulty":"hard","tags":["streams","reduce","parallel-stream","associativity"]},{"id":"java-streams-api-009","question":"What is the difference between reduce() and collect()?","answer":"`reduce()` is for reducing elements into a single value, usually immutable. `collect()` is a mutable reduction that accumulates elements into a container or summary.\n\n```java\nint total = amounts.stream().reduce(0, Integer::sum);\nMap<String, List<User>> byRole = users.stream()\n    .collect(Collectors.groupingBy(User::role));\n```\n\nUse `collect()` for lists, maps, grouping, joining strings, and other container-building operations.","difficulty":"medium","tags":["streams","reduce","collect","collectors"]},{"id":"java-streams-api-010","question":"What are common Collectors?","answer":"Common collectors include:\n\n- `toList`, `toSet`, `toMap`\n- `groupingBy`, `partitioningBy`\n- `joining`\n- `counting`, `summingInt`, `averagingInt`\n- `mapping`, `filtering`, `flatMapping`\n\n```java\nMap<Department, Long> counts = employees.stream()\n    .collect(Collectors.groupingBy(Employee::department, Collectors.counting()));\n```\n\nCollectors let you express aggregation without mutating external state.","difficulty":"easy","tags":["streams","collectors","groupingby","aggregation"]},{"id":"java-streams-api-011","question":"What happens when Collectors.toMap() sees duplicate keys?","answer":"The simplest `toMap` overload throws `IllegalStateException` if two elements produce the same key. Provide a merge function when duplicates are possible.\n\n```java\nMap<String, Integer> maxScoreByUser = scores.stream()\n    .collect(Collectors.toMap(\n        Score::user,\n        Score::value,\n        Integer::max));\n```\n\nA fourth argument can choose the map implementation, such as `LinkedHashMap::new`.","difficulty":"medium","tags":["streams","collectors","tomap","duplicate-key"]},{"id":"java-streams-api-012","question":"Why are side effects dangerous in stream pipelines?","answer":"Stream operations may be lazy, optimized, reordered where allowed, or executed in parallel. Mutating shared state inside lambdas can create races or order-dependent behavior.\n\n```java\n// Prefer this\nList<String> names = users.stream().map(User::name).toList();\n```\n\nBehavioral parameters should generally be non-interfering and stateless. Use collectors or reductions instead of modifying external containers.","difficulty":"hard","tags":["streams","side-effects","stateless","non-interference"]},{"id":"java-streams-api-013","question":"When should parallel streams be used?","answer":"Parallel streams can help when work is CPU-bound, independent, large enough to amortize overhead, and based on a source that splits efficiently.\n\nThey can be worse for small inputs, blocking I/O, shared mutable state, poor spliterators, or operations that require strict ordering.\n\nMeasure before and after. Parallelism is not a free speedup.","difficulty":"medium","tags":["parallel-stream","performance","spliterator","cpu-bound"]},{"id":"java-streams-api-014","question":"How does encounter order affect stream behavior?","answer":"Some sources, such as `List`, have a defined encounter order. Others, such as `HashSet`, do not guarantee one.\n\n`findFirst`, `limit`, `skip`, and `forEachOrdered` can be more expensive on ordered parallel streams because they must respect order.\n\nUse unordered sources or `.unordered()` when order does not matter and parallel performance is important.","difficulty":"medium","tags":["streams","encounter-order","parallel-stream","ordering"]},{"id":"java-streams-api-015","question":"Can a stream be reused?","answer":"No. A stream should have only one terminal operation. Reusing it can throw `IllegalStateException`.\n\n```java\nStream<String> stream = names.stream();\nlong count = stream.count();\n// stream.toList(); // illegal reuse\n```\n\nCreate a new stream from the source when another traversal is needed.","difficulty":"easy","tags":["streams","reuse","terminal-operation","illegalstateexception"]}]},{"domain":"Java","topic":"String Pool & Mutable Strings","icon":"🔤","questions":[{"id":"java-strings-001","question":"What is the Java string pool?","answer":"The string pool is a JVM-managed collection of **canonical `String` instances**. String literals and other compile-time constant strings with the same content refer to the same pooled object.\n\n```java\nString first = \"java\";\nString second = \"java\";\n\nSystem.out.println(first == second); // true\n```\n\nPooling is safe because `String` is immutable. Sharing one instance cannot allow one caller to change the value observed by another.","difficulty":"easy","tags":["string","string-pool","immutability","jvm"]},{"id":"java-strings-002","question":"What is the difference between creating a String with a literal and with new String()?","answer":"A literal uses the canonical pooled instance. `new String(...)` explicitly creates a distinct `String` object, even when its content already exists in the pool.\n\n```java\nString pooled = \"hello\";\nString copied = new String(\"hello\");\n\nSystem.out.println(pooled == copied);      // false\nSystem.out.println(pooled.equals(copied)); // true\n```\n\nThe literal used as the constructor argument is pooled, while `copied` refers to the separately allocated object. Using `new String(existingString)` is rarely useful because strings are immutable.","difficulty":"easy","tags":["string","string-pool","new","identity"]},{"id":"java-strings-003","question":"Why should String values normally be compared with equals() instead of ==?","answer":"`equals()` compares character content, while `==` compares whether two references point to the exact same object.\n\n```java\nString a = new String(\"api\");\nString b = \"api\";\n\nSystem.out.println(a.equals(b)); // true\nSystem.out.println(a == b);      // false\n```\n\nPooling can make some `==` comparisons appear to work, which makes the bug deceptive. Use `==` only when object identity is intentionally being tested.","difficulty":"easy","tags":["string","equals","identity","string-pool"]},{"id":"java-strings-004","question":"What does String.intern() do?","answer":"`intern()` returns the canonical pooled representation of a string. If an equal string is already in the pool, that existing reference is returned; otherwise a canonical representation is added and returned.\n\n```java\nString runtime = new StringBuilder()\n    .append(\"ja\")\n    .append(\"va\")\n    .toString();\n\nString canonical = runtime.intern();\nSystem.out.println(canonical == \"java\"); // true\n```\n\nInterning changes which reference is used; it does not modify the original immutable string.","difficulty":"medium","tags":["string","intern","string-pool","canonicalization"]},{"id":"java-strings-005","question":"Which string concatenations are placed in the pool at compile time?","answer":"A concatenation made entirely from compile-time constant expressions is folded by the compiler and uses the pooled result.\n\n```java\nString a = \"inter\" + \"view\";\nString b = \"interview\";\nSystem.out.println(a == b); // true\n\nString part = \"inter\";\nString c = part + \"view\";\nSystem.out.println(c == b); // false, normally\n```\n\nThe second concatenation depends on a non-constant variable and is evaluated at runtime. Compare results using `equals()`, regardless of how they were created.","difficulty":"medium","tags":["string","string-pool","concatenation","compile-time-constant"]},{"id":"java-strings-006","question":"How does final affect compile-time string concatenation?","answer":"A `final` variable initialized with a constant expression can itself be a compile-time constant. Concatenations that use it may therefore be folded and interned.\n\n```java\nfinal String prefix = \"micro\";\nString a = prefix + \"service\";\nString b = \"microservice\";\nSystem.out.println(a == b); // true\n```\n\nIf the `final` value is initialized by a method call or another runtime expression, it is not a compile-time constant.\n\n```java\nfinal String value = loadValue();\nString result = value + \"suffix\"; // runtime concatenation\n```","difficulty":"medium","tags":["string","final","concatenation","compile-time-constant"]},{"id":"java-strings-007","question":"Are strings loaded by different class loaders guaranteed to share literals?","answer":"The Java Language Specification requires identical string literals to refer to the same `String` instance, including when they appear in different classes or packages. Literal canonicalization is defined across the program rather than as a separate pool per source class.\n\nClass loaders still affect class identity, but they do not make equal string literals distinct. Avoid depending on reference equality anyway; content equality should still use `equals()`.","difficulty":"hard","tags":["string","string-pool","class-loader","jls"]},{"id":"java-strings-008","question":"When can explicit string interning be useful?","answer":"Interning can help when an application holds very many duplicate strings from a small, stable vocabulary, such as repeated protocol tokens or normalized identifiers. Canonical references may reduce duplicate storage and can support identity-based internal optimizations.\n\nHowever, interning has costs:\n\n- Pool lookup and synchronization overhead.\n- Retention pressure from a large canonical set.\n- Hidden global behavior that complicates performance analysis.\n- Little benefit when values are mostly unique.\n\nMeasure realistic workloads before adding explicit `intern()` calls. A bounded application-level canonicalization cache may offer better lifecycle control.","difficulty":"hard","tags":["string","intern","performance","memory"]},{"id":"java-strings-009","question":"Does String.intern() make identity comparison with == a good general practice?","answer":"No. Identity comparison works only if **every value participating in the comparison is guaranteed to have been canonicalized under the same policy**. One non-interned value silently breaks that assumption.\n\n```java\nString expected = \"READY\";\nString actual = readStatus();\n\n// Fragile\nif (actual == expected) { }\n\n// Correct for content\nif (expected.equals(actual)) { }\n```\n\nUse interning as a memory or canonicalization technique, not as a replacement for normal value equality.","difficulty":"medium","tags":["string","intern","equals","identity"]},{"id":"java-strings-010","question":"Where is the string pool stored?","answer":"The Java specification defines observable canonicalization behavior, not a fixed physical memory region. In modern HotSpot JVMs, pooled strings are heap-managed; older JVM versions used different arrangements.\n\nAn interview answer should distinguish **language guarantees** from **JVM implementation details**. Code should not rely on a historical claim such as \"the pool is always in PermGen.\" PermGen was removed from HotSpot in Java 8.","difficulty":"medium","tags":["string","string-pool","heap","jvm"]},{"id":"java-strings-011","question":"What is the main difference between StringBuilder and StringBuffer?","answer":"Both are mutable character sequences with similar APIs. The main difference is synchronization:\n\n- `StringBuilder` is not synchronized and is intended for normal single-threaded or thread-confined use.\n- `StringBuffer` synchronizes its operations and is designed for cases where the same mutable buffer is accessed by multiple threads.\n\n`StringBuilder` is generally preferred because most builders are local variables and do not need synchronization.","difficulty":"easy","tags":["stringbuilder","stringbuffer","synchronization","thread-safety"]},{"id":"java-strings-012","question":"Why is StringBuilder usually better than repeated String concatenation in a loop?","answer":"A `String` is immutable, so repeated concatenation may create many intermediate strings and repeatedly copy accumulated content. A builder mutates one expandable buffer.\n\n```java\nStringBuilder result = new StringBuilder();\nfor (String word : words) {\n    result.append(word).append(' ');\n}\nreturn result.toString();\n```\n\nFor a single, simple expression, `+` is readable and the compiler/runtime can optimize it well. The builder matters most for incremental concatenation, especially inside loops or complex conditional construction.","difficulty":"easy","tags":["stringbuilder","concatenation","performance","loop"]},{"id":"java-strings-013","question":"Is StringBuffer automatically safe for every compound multi-threaded operation?","answer":"No. Individual `StringBuffer` methods are synchronized, but a sequence of calls is not automatically one atomic transaction.\n\n```java\n// Another thread may modify buffer between these calls.\nif (buffer.length() > 0) {\n    buffer.deleteCharAt(buffer.length() - 1);\n}\n```\n\nThe complete check-then-act sequence needs external coordination, such as synchronizing on the same buffer. Also, passing a mutable `StringBuffer` between threads may make the broader design harder to reason about; immutable messages or explicit ownership are often preferable.","difficulty":"hard","tags":["stringbuffer","thread-safety","atomicity","synchronization"]},{"id":"java-strings-014","question":"What are length and capacity in StringBuilder and StringBuffer?","answer":"`length()` is the number of characters currently stored. `capacity()` is the size of the current internal storage before another expansion is needed.\n\n```java\nStringBuilder builder = new StringBuilder(100);\nbuilder.append(\"Java\");\n\nSystem.out.println(builder.length());   // 4\nSystem.out.println(builder.capacity()); // at least 100\n```\n\nCapacity is an implementation-oriented performance concern and does not affect the visible text. The buffer grows automatically when required.","difficulty":"easy","tags":["stringbuilder","stringbuffer","capacity","memory"]},{"id":"java-strings-015","question":"When should you specify an initial StringBuilder capacity?","answer":"Specify capacity when the approximate final size is known and large enough that avoiding repeated buffer growth is worthwhile.\n\n```java\nint estimatedSize = records.size() * 80;\nStringBuilder json = new StringBuilder(estimatedSize);\n```\n\nThis is a performance hint, not a correctness requirement. Avoid speculative oversized capacities because they allocate memory up front. Profile or estimate based on real input sizes.","difficulty":"medium","tags":["stringbuilder","capacity","performance","allocation"]},{"id":"java-strings-016","question":"What do setLength() and ensureCapacity() do on a StringBuilder?","answer":"`ensureCapacity(n)` requests room for at least `n` characters without changing the current length. `setLength(n)` changes the logical length.\n\n- Reducing length truncates the sequence.\n- Increasing length appends null characters (`\\u0000`).\n\n```java\nStringBuilder value = new StringBuilder(\"Java\");\nvalue.ensureCapacity(100); // text remains \"Java\"\nvalue.setLength(2);        // text becomes \"Ja\"\nvalue.setLength(4);        // followed by two null characters\n```\n\nConfusing these methods can introduce invisible null characters into output.","difficulty":"medium","tags":["stringbuilder","capacity","setlength","api"]},{"id":"java-strings-017","question":"Does StringBuilder override equals() and hashCode() to compare text content?","answer":"No. `StringBuilder` and `StringBuffer` inherit identity-based `equals()` and `hashCode()` from `Object`.\n\n```java\nStringBuilder a = new StringBuilder(\"java\");\nStringBuilder b = new StringBuilder(\"java\");\n\nSystem.out.println(a.equals(b)); // false\n```\n\nCompare their produced text with `a.toString().equals(b.toString())`, or use an appropriate `CharSequence` content comparison. Mutable builders are also poor map keys because their text can change.","difficulty":"medium","tags":["stringbuilder","stringbuffer","equals","identity"]},{"id":"java-strings-018","question":"What happens to a String after it is produced by StringBuilder.toString()?","answer":"`toString()` returns a `String` containing the builder's current character sequence. Later builder mutations do not change that string.\n\n```java\nStringBuilder builder = new StringBuilder(\"Java\");\nString snapshot = builder.toString();\nbuilder.append(\" 21\");\n\nSystem.out.println(snapshot); // Java\nSystem.out.println(builder);  // Java 21\n```\n\nThe exact copying or storage-sharing strategy is an implementation detail. The observable guarantee is that the returned `String` remains immutable and independent of later mutations.","difficulty":"medium","tags":["stringbuilder","tostring","immutability","snapshot"]},{"id":"java-strings-019","question":"Why is reusing a shared StringBuilder usually a bad optimization?","answer":"A shared builder introduces mutable global state, requires synchronization, risks leaking old content when reset incorrectly, and can retain an excessively large internal buffer after one unusual request.\n\nA local builder is cheap, clearly owned, and often optimized effectively by the JVM. Reuse should be considered only after measurement and with a carefully bounded ownership strategy, such as controlled pooling or thread-local storage. Even then, memory retention and reentrancy must be considered.","difficulty":"hard","tags":["stringbuilder","reuse","concurrency","performance"]},{"id":"java-strings-020","question":"How should you choose among String, StringBuilder, and StringBuffer?","answer":"Choose based on mutability and ownership:\n\n- Use `String` for completed text, values, API boundaries, keys, and safely shared data.\n- Use `StringBuilder` to construct text incrementally within one thread or a confined scope.\n- Use `StringBuffer` only when the same mutable sequence must be accessed concurrently and its method-level synchronization fits the design.\n\nIn most application code, build locally with `StringBuilder`, then publish the immutable result as a `String`.","difficulty":"easy","tags":["string","stringbuilder","stringbuffer","design"]}]},{"domain":"Java","topic":"Thread Pools","icon":"🏊","questions":[{"id":"java-thread-pools-001","question":"Why use a thread pool instead of creating threads manually?","answer":"Thread pools reuse worker threads and control concurrency. Creating a new thread for every task can exhaust memory, increase scheduling overhead, and make load hard to control.\n\n```java\nExecutorService pool = Executors.newFixedThreadPool(8);\npool.submit(task);\n```\n\nA pool lets you bound parallelism, queue work, centralize shutdown, and apply rejection policies when overloaded.","difficulty":"easy","tags":["thread-pool","executorservice","threads","performance"]},{"id":"java-thread-pools-002","question":"What is ExecutorService?","answer":"`ExecutorService` is a higher-level API for submitting tasks and managing their lifecycle. It extends `Executor` with methods such as `submit`, `invokeAll`, `shutdown`, and `awaitTermination`.\n\n```java\nExecutorService executor = Executors.newSingleThreadExecutor();\nFuture<String> future = executor.submit(() -> \"done\");\n```\n\nIt separates task submission from thread management.","difficulty":"easy","tags":["executorservice","executor","future","thread-pool"]},{"id":"java-thread-pools-003","question":"What is the difference between execute() and submit()?","answer":"`execute(Runnable)` submits a task and returns nothing. Exceptions thrown by the task are handled by the worker thread's uncaught exception mechanism.\n\n`submit(...)` returns a `Future`. Exceptions are captured and rethrown from `Future.get()` as `ExecutionException`.\n\n```java\nexecutor.execute(() -> work());\nFuture<?> future = executor.submit(() -> work());\n```","difficulty":"medium","tags":["executorservice","execute","submit","future","exceptions"]},{"id":"java-thread-pools-004","question":"How should an ExecutorService be shut down?","answer":"Call `shutdown()` to stop accepting new tasks and let submitted tasks finish. Then wait with `awaitTermination`. If necessary, call `shutdownNow()` to attempt interruption.\n\n```java\nexecutor.shutdown();\nif (!executor.awaitTermination(30, TimeUnit.SECONDS)) {\n    executor.shutdownNow();\n}\n```\n\nForgetting shutdown can keep non-daemon worker threads alive and prevent application exit.","difficulty":"medium","tags":["executorservice","shutdown","awaittermination","lifecycle"]},{"id":"java-thread-pools-005","question":"What is ThreadPoolExecutor?","answer":"`ThreadPoolExecutor` is the configurable implementation behind many executor factories. Important settings include:\n\n- Core pool size.\n- Maximum pool size.\n- Keep-alive time.\n- Work queue.\n- Thread factory.\n- Rejection handler.\n\n```java\nExecutorService pool = new ThreadPoolExecutor(\n    4, 16, 60, TimeUnit.SECONDS,\n    new ArrayBlockingQueue<>(100));\n```\n\nUnderstanding the queue is essential because it strongly affects when new threads are created.","difficulty":"medium","tags":["threadpoolexecutor","core-pool-size","queue","rejection"]},{"id":"java-thread-pools-006","question":"How does the work queue affect ThreadPoolExecutor behavior?","answer":"After core threads are busy, tasks usually go to the work queue. If the queue is bounded and fills up, the pool may create more threads up to the maximum size. If it still cannot accept work, the rejection handler runs.\n\nAn unbounded queue can prevent the pool from growing beyond the core size and can risk unbounded memory usage.\n\nChoose the queue based on backpressure and latency requirements.","difficulty":"hard","tags":["threadpoolexecutor","queue","backpressure","capacity"]},{"id":"java-thread-pools-007","question":"Why can Executors.newFixedThreadPool() be risky?","answer":"`newFixedThreadPool` uses a fixed number of worker threads with an unbounded queue. If producers submit tasks faster than workers complete them, memory can grow without an obvious limit.\n\nIt is convenient for demos and controlled workloads, but production systems often need a bounded queue and an explicit rejection policy.\n\nA manually configured `ThreadPoolExecutor` makes overload behavior visible.","difficulty":"medium","tags":["executors","fixed-thread-pool","unbounded-queue","backpressure"]},{"id":"java-thread-pools-008","question":"What are common RejectedExecutionHandler policies?","answer":"A rejection policy runs when the executor cannot accept a task.\n\nCommon policies:\n\n- `AbortPolicy`: throw `RejectedExecutionException`.\n- `CallerRunsPolicy`: run the task in the submitting thread, applying backpressure.\n- `DiscardPolicy`: silently drop the task.\n- `DiscardOldestPolicy`: drop the oldest queued task and retry.\n\nSilent discard policies are dangerous unless losing work is explicitly acceptable.","difficulty":"medium","tags":["rejectedexecutionhandler","threadpoolexecutor","backpressure","rejection"]},{"id":"java-thread-pools-009","question":"How should pool size be chosen for CPU-bound vs I/O-bound work?","answer":"For CPU-bound work, pool size is often near the number of available cores, because extra runnable threads mostly compete for CPU.\n\nFor I/O-bound work, more threads may help because many tasks spend time waiting. The right number depends on blocking ratio, latency goals, memory, and downstream capacity.\n\nThere is no universal formula. Start with a reasoned estimate, load test, and monitor queue length, throughput, latency, and rejection rate.","difficulty":"medium","tags":["thread-pool","cpu-bound","io-bound","sizing"]},{"id":"java-thread-pools-010","question":"What is ScheduledExecutorService used for?","answer":"`ScheduledExecutorService` runs tasks after a delay or periodically.\n\n```java\nScheduledExecutorService scheduler = Executors.newScheduledThreadPool(2);\nscheduler.scheduleAtFixedRate(task, 0, 1, TimeUnit.MINUTES);\n```\n\n`scheduleAtFixedRate` tries to maintain a regular period. `scheduleWithFixedDelay` waits for one execution to finish, then waits the delay before starting the next.","difficulty":"easy","tags":["scheduledexecutorservice","scheduled-task","fixed-rate","fixed-delay"]},{"id":"java-thread-pools-011","question":"How can thread pools cause deadlocks?","answer":"Thread starvation deadlock can happen when tasks in a limited pool wait for other tasks submitted to the same pool, but all workers are already blocked.\n\n```java\n// In a single-thread executor:\nFuture<?> child = executor.submit(childTask);\nchild.get(); // parent blocks the only worker\n```\n\nAvoid blocking inside pool tasks on work queued behind them. Use separate executors, async composition, or enough capacity for the dependency graph.","difficulty":"hard","tags":["thread-pool","deadlock","starvation","future"]},{"id":"java-thread-pools-012","question":"Why use a custom ThreadFactory?","answer":"A `ThreadFactory` controls how worker threads are created. It can set useful names, daemon status, priorities, uncaught exception handlers, or context information.\n\n```java\nThreadFactory factory = r -> {\n    Thread t = new Thread(r);\n    t.setName(\"orders-worker-\" + t.threadId());\n    return t;\n};\n```\n\nGood thread names make production debugging, logs, metrics, and thread dumps much easier.","difficulty":"medium","tags":["threadfactory","thread-pool","debugging","observability"]}]},{"domain":"Java","topic":"WeakHashMap","icon":"🪶","questions":[{"id":"java-weakhashmap-001","question":"What is WeakHashMap?","answer":"`WeakHashMap` is a `Map` implementation whose keys are held through weak references. If a key is no longer strongly reachable outside the map, its entry can be removed by the garbage collector.\n\n```java\nMap<Object, Metadata> metadata = new WeakHashMap<>();\nmetadata.put(object, data);\n```\n\nIt is useful when the map should not extend the lifetime of its keys.","difficulty":"easy","tags":["weakhashmap","weak-reference","gc","map"]},{"id":"java-weakhashmap-002","question":"When are entries removed from a WeakHashMap?","answer":"Entries become eligible for removal when their keys are weakly reachable, meaning no strong references to the key remain outside weak-reference mechanisms.\n\nRemoval is tied to garbage collection and internal cleanup, so it is not deterministic.\n\nYou should not write logic that depends on an entry disappearing at an exact time.","difficulty":"medium","tags":["weakhashmap","gc","weak-reference","lifecycle"]},{"id":"java-weakhashmap-003","question":"Why can WeakHashMap appear to change without direct map operations?","answer":"Because garbage collection can clear weak keys. After cleanup, entries whose keys were cleared are removed from the map.\n\nThat means methods such as `size()`, `isEmpty()`, or iteration can appear to observe changes even when the application did not call `put` or `remove`.\n\nThis behavior is expected and is the reason `WeakHashMap` is useful for lifecycle-sensitive associations.","difficulty":"medium","tags":["weakhashmap","gc","size","iteration"]},{"id":"java-weakhashmap-004","question":"What common bug prevents WeakHashMap entries from being removed?","answer":"The value may strongly reference its key. If the map holds the value strongly and the value points back to the key, the key remains strongly reachable through the map entry.\n\n```java\nclass Metadata {\n    Object key; // can accidentally keep the WeakHashMap key alive\n}\n```\n\nAvoid value-to-key strong references, or use weak references inside the value when that relationship is necessary.","difficulty":"hard","tags":["weakhashmap","memory-leak","strong-reference","gc"]},{"id":"java-weakhashmap-005","question":"Is WeakHashMap a general-purpose cache?","answer":"Not by itself. `WeakHashMap` is useful for automatically discarding entries when keys are no longer strongly reachable, but it does not provide size limits, eviction policies, expiration, statistics, or loading behavior.\n\nFor production caches, a dedicated cache library or explicit eviction policy is usually better.\n\nUse `WeakHashMap` for lifecycle-associated metadata, not as a complete caching solution.","difficulty":"medium","tags":["weakhashmap","cache","eviction","metadata"]},{"id":"java-weakhashmap-006","question":"Why are String keys often a poor choice for WeakHashMap?","answer":"String literals and interned strings can remain strongly reachable for a long time through the string pool or class metadata. If such a string is used as a key, the entry may not disappear as expected.\n\n```java\nMap<String, Object> map = new WeakHashMap<>();\nmap.put(\"USER\", value); // literal is not a good weak key candidate\n```\n\nWeak keys are most useful for ordinary objects whose lifecycle is controlled elsewhere.","difficulty":"hard","tags":["weakhashmap","string","interning","weak-reference"]},{"id":"java-weakhashmap-007","question":"Is WeakHashMap thread-safe?","answer":"No. `WeakHashMap` is not synchronized. If multiple threads access it concurrently and at least one modifies it, external synchronization is required.\n\n```java\nMap<Key, Value> map = Collections.synchronizedMap(new WeakHashMap<>());\n```\n\nEven with synchronization, remember that garbage collection can still affect which entries remain over time.","difficulty":"easy","tags":["weakhashmap","thread-safety","synchronization","map"]},{"id":"java-weakhashmap-008","question":"How does WeakHashMap compare with IdentityHashMap and HashMap?","answer":"`HashMap` holds keys strongly and compares them with `equals()`.\n\n`IdentityHashMap` holds keys strongly but compares them with `==`.\n\n`WeakHashMap` compares keys using normal equality but holds keys weakly, allowing entries to disappear when keys are no longer strongly reachable.\n\nChoose based on lifecycle and equality semantics, not just performance.","difficulty":"medium","tags":["weakhashmap","identityhashmap","hashmap","map"]}]},{"domain":"Engineering","topic":"Leadership & Judgment","icon":"LJ","questions":[{"id":"senior-judgment-001","question":"How should you structure an answer about a production incident you led?","answer":"Establish impact, your role, and the incomplete information available at the time. Explain how you stabilized the system, assigned investigation paths, communicated with stakeholders, and made reversible decisions under pressure. Separate the triggering fault from contributing technical and organizational conditions. Finish with measurable follow-up: prevention, detection, runbook or ownership changes, and how you verified them. Avoid presenting yourself as the lone rescuer; senior leadership creates clarity and enables the team to respond effectively.","difficulty":"medium","tags":["incident-response","communication","ownership","behavioral"]},{"id":"senior-judgment-002","question":"How do you disagree with a technical direction when you are not the final decision-maker?","answer":"First make sure you understand the goal and the strongest version of the proposal. State your concern in terms of evidence, constraints, and consequences, then offer a viable alternative or a cheap experiment that could resolve uncertainty. Record important risks and decision criteria without turning documentation into a political weapon. Once the accountable owner decides, commit to execution unless the choice crosses a serious ethical, security, or safety boundary. Define signals that would trigger revisiting the decision.","difficulty":"medium","tags":["influence","decision-making","disagreement","communication"]},{"id":"senior-judgment-003","question":"How do you decide whether technical debt deserves priority over feature work?","answer":"Translate debt into expected business and engineering cost: incident risk, delivery delay, operational toil, security exposure, or inability to meet a near-term goal. Measure frequency and impact where possible, identify the smallest intervention that changes the curve, and compare it with feature value and opportunity cost. Some debt should be paid opportunistically inside feature work; systemic risks need explicit roadmap capacity. A senior proposal names the consequence of doing nothing and defines how the investment will be judged afterward.","difficulty":"medium","tags":["technical-debt","prioritization","risk","delivery"]},{"id":"senior-judgment-004","question":"What distinguishes effective mentoring from simply giving someone the answer?","answer":"Effective mentoring adapts to the person's context and creates progressively independent judgment. Clarify the desired outcome, ask them to explain their model, expose one useful gap at a time, and let them own the next action. Give direct answers when risk or time demands it, but explain the decision process and follow up later. Use specific feedback based on observable behavior, create opportunities with appropriate support, and measure success by growing autonomy and impact rather than dependence on the mentor.","difficulty":"medium","tags":["mentoring","feedback","growth","leadership"]},{"id":"senior-judgment-005","question":"How do you respond when a project estimate is highly uncertain but stakeholders need a date?","answer":"Do not hide uncertainty inside a precise number. Decompose known work, identify discovery items and external dependencies, give a range with assumptions and confidence, and describe what evidence will narrow it. Offer scope, sequencing, or staffing options while acknowledging that adding people can initially slow work. Establish checkpoints and communicate changes early. The goal is not to defend the original estimate; it is to help stakeholders make decisions with the best current information.","difficulty":"medium","tags":["estimation","uncertainty","stakeholders","planning"]},{"id":"senior-judgment-006","question":"How should a senior engineer balance delivering personally with multiplying the team?","answer":"Stay close enough to implementation to retain technical credibility and unblock critical work, but choose contributions that improve the whole system: clarify architecture, remove recurring friction, improve diagnosis, raise review quality, and create ownership in others. Avoid becoming the mandatory approver or the only person who can operate a component. Use delegation with context and guardrails, then inspect outcomes rather than controlling every step. The balance changes during incidents or deadlines, but sustained heroics are an organizational defect.","difficulty":"hard","tags":["leadership","delegation","team-effectiveness","ownership"]}]},{"domain":"Architecture","topic":"Senior System Design","icon":"SD","questions":[{"id":"senior-system-design-001","question":"How do you turn an ambiguous system-design prompt into explicit requirements and constraints?","answer":"Start by identifying users, core use cases, non-goals, and the most important quality attributes. Quantify scale with rough reads, writes, payload sizes, retention, and traffic shape rather than chasing false precision. Clarify consistency, availability, latency, durability, privacy, and regional constraints. Then state assumptions and choose the two or three risks that should drive the architecture. A senior answer keeps revisiting those constraints as it evaluates alternatives; it does not draw components first and invent requirements afterward.","difficulty":"medium","tags":["requirements","capacity-planning","trade-offs","system-design"]},{"id":"senior-system-design-002","question":"When should a service prefer synchronous calls, asynchronous messaging, or a combination of both?","answer":"Use synchronous calls when the caller needs an immediate result and the dependency fits the end-to-end availability and latency budget. Use messaging when work can be deferred, buffered, retried independently, or fanned out, and when temporal decoupling is valuable. Many systems combine them: synchronously persist an accepted command, then process and publish outcomes asynchronously. Evaluate failure visibility, ordering, idempotency, backpressure, operational complexity, and user expectations. Messaging moves and reshapes failure; it does not remove it.","difficulty":"medium","tags":["messaging","synchronous","asynchronous","coupling"]},{"id":"senior-system-design-003","question":"How should you reason about caching without making the cache the source of correctness?","answer":"Define what is cached, who owns the canonical data, acceptable staleness, key identity, invalidation triggers, and behavior on a miss or cache outage. Choose read-through, cache-aside, write-through, or explicit materialization based on those requirements. Bound memory, protect the origin from stampedes, and measure hit rate by value rather than celebrating a global percentage. Correctness-sensitive operations should validate against authoritative state or use a design whose consistency contract explicitly includes the cache. Always describe warm-up, eviction, hot keys, and failure mode.","difficulty":"hard","tags":["cache","invalidation","stampede","consistency"]},{"id":"senior-system-design-004","question":"What does graceful degradation look like in a distributed request path?","answer":"Classify dependencies and response fields as required or optional, then assign an end-to-end deadline and bounded resources to each path. Required failures should produce a clear error; optional failures may return stale, partial, or explicitly unavailable data. Use timeouts, bulkheads, load shedding, bounded queues, and carefully budgeted retries so a slow dependency cannot consume the process. Preserve observability of degraded responses and avoid returning plausible but semantically invalid data. The degradation contract should be a product decision, not an accidental catch block.","difficulty":"hard","tags":["resilience","degradation","timeouts","load-shedding"]},{"id":"senior-system-design-005","question":"How do you design an API and data model for safe retries?","answer":"Give each logical operation a stable identity and define whether replay returns the prior outcome, resumes work, or is rejected. Atomically bind an idempotency key to a request fingerprint so the same key cannot represent different intent. Persist workflow state before non-transactional side effects where possible, use conditional writes or uniqueness constraints for races, and make downstream operations idempotent too. Model unknown outcomes explicitly and provide reconciliation. Retention, principal scope, response replay, and concurrent duplicate requests are part of the contract.","difficulty":"hard","tags":["idempotency","api-design","retries","consistency"]},{"id":"senior-system-design-006","question":"What should a senior engineer cover when proposing a zero-downtime migration?","answer":"Use expand-and-contract phases: introduce backward-compatible schema or APIs, deploy code that can tolerate both representations, migrate data or traffic incrementally, verify invariants, switch readers, then remove old behavior only after rollback windows close. Bound and resume backfills, rate-limit impact, and expose progress and divergence metrics. Account for mixed application versions, caches, events, and consumers rather than only the database. Every phase should have entry criteria, an observable success condition, and a realistic rollback or roll-forward action.","difficulty":"hard","tags":["migration","compatibility","deployment","rollback"]}]}],"practice":[{"domain":"Java","topic":"Debugging & Code Review","icon":"CR","exercises":[{"id":"practice-code-review-001","title":"Repair a cache with unstable keys","summary":"Review a production cache that intermittently loses entries after customer records are updated.","starterCode":"final class Customer {\n    private final long id;\n    private String email;\n\n    @Override public boolean equals(Object other) {\n        return other instanceof Customer c && email.equals(c.email);\n    }\n    @Override public int hashCode() { return email.hashCode(); }\n}\n\nMap<Customer, Quote> cache = new HashMap<>();","prompt":"A service stores `Customer` objects as keys in a `HashMap<Customer, Quote>`. `Customer.equals()` and `hashCode()` use the mutable `email` field. Another workflow updates that field while the object remains in the cache.\n\nProduce a minimal failing test, explain why lookup can fail even with the original object reference, and refactor the design so cache identity is explicit and stable.","constraints":["Do not solve the issue by scanning the map.","Preserve the ability to update a customer's email.","Define ownership and invalidation behavior for cached values."],"deliverables":["A regression test that demonstrates the failure.","A revised key and cache API.","A short discussion of memory growth and invalidation trade-offs."],"evaluation":["Identifies bucket selection as the root cause.","Uses an immutable identifier rather than a mutable domain object as the key.","Considers concurrency, eviction, and stale data instead of stopping at equals/hashCode."],"hints":["Record the hash before and after the mutation.","A customer ID is identity; an email is an attribute."],"solution":"Use an immutable identifier such as `CustomerId` as the cache key and keep mutable customer state outside key equality. The failing test should insert a customer, mutate the email, and show that `get` and `remove` can search a different bucket. A strong redesign exposes operations such as `get(CustomerId)` and `invalidate(CustomerId)`, documents whether values are snapshots, and uses a bounded cache or explicit eviction policy. If access is concurrent, choose a thread-safe cache and make refresh/invalidation atomic enough for the service's consistency requirements.","difficulty":"advanced","estimatedMinutes":35,"tags":["hashmap","identity","debugging","api-design"]},{"id":"practice-code-review-002","title":"Find the hidden stream regression","summary":"Diagnose a refactor that made a report slower and occasionally incorrect under load.","starterCode":"List<String> warnings = new ArrayList<>();\n\nList<PricedOrder> report = orders.parallelStream()\n    .map(order -> {\n        Price price = pricingClient.fetch(order.id());\n        if (price.isEstimated()) warnings.add(order.id());\n        return new PricedOrder(order, price);\n    })\n    .toList();","prompt":"A report pipeline was changed to `orders.parallelStream()`. Its mapping stage calls a remote pricing service, appends warnings to a shared `ArrayList`, and relies on encounter order. In production, common-pool threads become blocked and warnings disappear or arrive in a different order.\n\nReview the design and propose a measured replacement. Include how you would prove the diagnosis before changing code.","constraints":["The remote service has a concurrency limit of 20 requests.","The final report must retain input order.","Partial pricing failures must be represented, not silently dropped."],"deliverables":["A list of correctness and performance defects.","Instrumentation or profiling evidence you would collect.","A bounded-concurrency implementation outline."],"evaluation":["Explains why blocking I/O and the common ForkJoinPool are a poor combination.","Removes shared mutable accumulation.","Preserves order and models per-item failure explicitly."],"hints":["Parallel streams provide parallelism, not backpressure.","Consider indexed results and a dedicated bounded executor."],"solution":"Capture JFR data, executor saturation, remote latency, and request concurrency to confirm blocked common-pool workers and unsafe mutation. Replace the parallel stream with explicit asynchronous tasks on a dedicated bounded executor or a concurrency-limited client. Return an immutable result per order, including success or failure, then reassemble by input index. Avoid shared warning lists; derive warnings from result objects. Set timeouts and define cancellation behavior. Compare throughput and tail latency under representative load before and after the change.","difficulty":"deep-dive","estimatedMinutes":45,"tags":["streams","profiling","bounded-concurrency","resilience"]},{"id":"practice-code-review-003","title":"Review an unsafe money type","summary":"Turn a deceptively simple value object into a reliable domain primitive.","starterCode":"public class Money {\n    private double amount;\n    private String currency;\n\n    public void add(Money other) { amount += other.amount; }\n\n    @Override public boolean equals(Object other) {\n        return other instanceof Money m && amount == m.amount;\n    }\n}","prompt":"Review a mutable `Money` class that stores a `double amount` and a three-letter currency string. Its `equals()` uses `==`, its arithmetic methods mutate the instance, and callers can combine different currencies.\n\nDesign a replacement suitable for a billing system and explain the compatibility risks of rolling it out.","constraints":["Rounding policy must be explicit.","Serialization compatibility matters.","Currency mismatch must not produce a plausible but incorrect value."],"deliverables":["An immutable Java API sketch.","Tests for equality, scale, rounding, and currency mismatch.","A migration strategy for existing serialized payloads."],"evaluation":["Uses BigDecimal safely and defines scale/rounding boundaries.","Treats currency as part of value equality.","Addresses API and data migration rather than only rewriting the class."],"hints":["`new BigDecimal(double)` preserves binary floating-point artifacts.","Decide whether `10.0` and `10.00` are equal in this domain."],"solution":"Model money as an immutable value, for example a final class or record containing a validated `BigDecimal` and `Currency`. Construct decimal values from strings or `BigDecimal.valueOf`, normalize according to a documented monetary scale, and require an explicit `RoundingMode` at boundaries where rounding is possible. Arithmetic returns new values and rejects currency mismatch. Equality semantics must match the chosen normalization policy. Roll out with versioned serialization or an adapter that reads old payloads, emits the new representation, and measures remaining legacy traffic before removal.","difficulty":"advanced","estimatedMinutes":40,"tags":["value-objects","bigdecimal","immutability","migration"]},{"id":"practice-code-review-004","title":"Diagnose a thread and connection leak","summary":"Investigate a service whose thread count and outbound connections grow after each timeout.","starterCode":"public Customer fetchCustomer(String id) throws Exception {\n    ExecutorService executor = Executors.newSingleThreadExecutor();\n    Future<Customer> result = executor.submit(() -> client.fetch(id));\n    return result.get(500, TimeUnit.MILLISECONDS);\n}","prompt":"Production instances eventually reject new threads and exhaust outbound connections. Review the code, identify lifecycle and cancellation defects, and design the evidence-led fix.","requirements":["Produce a regression test for repeated timeout behavior.","Define executor and HTTP response ownership.","Add metrics that reveal recurrence before exhaustion."],"constraints":["A request timeout must not leak background work.","Shared resources require application lifecycle management.","The downstream call may ignore interruption."],"evaluation":["Finds per-call executor creation and missing shutdown/cancellation.","Distinguishes caller timeout from transport cancellation.","Uses thread dumps, JFR, and pool metrics to verify the diagnosis."],"hints":["Count threads by name across repeated calls.","Close response bodies and configure transport deadlines too."],"solution":"Use an application-owned bounded executor or structured asynchronous client, configure connection and response deadlines at the transport, cancel outstanding work where supported, and close every response/resource deterministically. A timeout wrapper alone does not stop underlying I/O. Verify with repeated deterministic timeout tests, stable thread/connection counts, thread dumps, JFR, and pool utilization metrics.","difficulty":"advanced","estimatedMinutes":45,"tags":["debugging","resource-leak","threads","http-client"]}]},{"domain":"Engineering","topic":"Coding & Refactoring","icon":"RF","exercises":[{"id":"practice-refactoring-001","title":"Refactor a legacy pricing engine","summary":"Create safe boundaries around a large conditional pricing method without changing behavior.","starterCode":"public Money price(Order order, Customer customer) {\n    if (customer.vip()) {\n        if (order.total().isGreaterThan(Money.euros(100))) {\n            return order.total().multiply(0.80);\n        }\n        return order.total().multiply(0.90);\n    }\n    if (order.coupon() != null && order.coupon().startsWith(\"PROMO\")) {\n        return order.total().subtract(Money.euros(10));\n    }\n    return order.total();\n}","prompt":"The pricing method has grown to 400 lines with nested customer, campaign, product, and region rules. Production behavior is only partially documented. Refactor it incrementally into a design that supports new rules and explains conflicting discounts.","requirements":["Preserve existing observable behavior before changing rules.","Make rule priority and applicability explicit.","Return an explanation of applied and rejected discounts."],"constraints":["A flag-day rewrite is not acceptable.","Existing callers must keep the current method during migration.","Money calculations must remain exact and currency-safe."],"evaluation":["Begins with characterization tests and identifies variation points.","Separates rule selection from calculation and orchestration.","Avoids replacing one large method with an opaque framework."],"hints":["Capture golden-master cases from production-safe samples.","A small rule interface and explicit ordering may be enough."],"solution":"Freeze current behavior with characterization and boundary tests, then extract pure predicates and calculations one rule family at a time. Introduce a typed pricing context, ordered rule collection, and result containing final price plus decisions. Keep the old method as an adapter until callers migrate. Validate equivalence against captured cases, then make intentional rule changes separately so refactoring and behavior changes are reviewable.","difficulty":"advanced","estimatedMinutes":55,"tags":["refactoring","characterization-tests","strategy","domain-modeling"]},{"id":"practice-refactoring-002","title":"Implement a bounded LRU cache","summary":"Implement a small cache while making ownership and concurrency semantics explicit.","starterCode":"public interface Cache<K, V> {\n    Optional<V> get(K key);\n    void put(K key, V value);\n    boolean remove(K key);\n    int size();\n}\n\npublic final class LruCache<K, V> implements Cache<K, V> {\n    // Implement a bounded least-recently-used policy.\n}","prompt":"Implement an in-memory cache with a fixed maximum entry count and least-recently-used eviction. Then explain what would need to change for weighted entries, expiration, concurrent loading, and production observability.","requirements":["`get` must update recency.","Insertion beyond capacity must evict exactly one least-recent entry.","Reject invalid capacity and define null behavior.","Provide focused tests for replacement and eviction order."],"constraints":["Target constant-time get and put.","Do not scan all entries to find an eviction candidate.","Choose and document either thread confinement or thread safety."],"evaluation":["Uses an appropriate map/list combination or access-ordered LinkedHashMap.","Tests behavior rather than implementation details.","Recognizes why a production cache needs more than LRU."],"hints":["`LinkedHashMap` supports access order.","Overriding eviction hooks has synchronization implications."],"solution":"For a compact implementation, use an access-ordered `LinkedHashMap` and evict when size exceeds capacity. Encapsulate it and synchronize all recency-mutating operations if thread safety is promised, because even `get` mutates order. Tests should cover access changing eviction, replacing values, capacity one, removal, and invalid input. Production extensions require weight accounting, monotonic time, stampede control, metrics, and careful loader ownership.","difficulty":"advanced","estimatedMinutes":45,"tags":["coding","cache","collections","testing"]},{"id":"practice-refactoring-003","title":"Replace a boolean-flag API","summary":"Refactor an API whose combinations of flags encode several hidden workflows.","starterCode":"public Report generate(\n        Data data,\n        boolean includeSensitive,\n        boolean compact,\n        boolean async,\n        boolean skipValidation) {\n    // Many branches and several invalid combinations.\n}","prompt":"Call sites pass four booleans to configure report generation. Several combinations are invalid, security review cannot tell why sensitive data is enabled, and a fifth flag is planned. Design an incremental replacement with readable, valid-by-construction calls.","requirements":["Make security-sensitive choices explicit at call sites.","Prevent invalid option combinations where practical.","Retain a compatibility path for existing callers."],"constraints":["Do not expose one generic map of options.","Asynchronous execution is a different return contract.","Default behavior must remain backward compatible initially."],"evaluation":["Separates distinct workflows instead of wrapping booleans in an options object blindly.","Uses types or builders where they improve validity.","Provides a deprecation and migration path."],"hints":["Start by naming the behaviors represented by valid combinations.","Sync and async methods may deserve separate signatures."],"solution":"Inventory real combinations and split genuinely different workflows into named methods, especially synchronous versus asynchronous execution. Model cohesive formatting options with enums or immutable request types and require an explicit authorization capability for sensitive output. Keep the old signature as a deprecated translating adapter, add usage telemetry, and migrate call sites gradually. Tests should cover translation parity and invalid-state rejection.","difficulty":"advanced","estimatedMinutes":40,"tags":["api-refactoring","type-design","compatibility","security"]},{"id":"practice-refactoring-004","title":"Process a large import without loading it all","summary":"Refactor a memory-heavy import into a bounded streaming pipeline.","starterCode":"public ImportResult importFile(Path path) throws IOException {\n    List<String> lines = Files.readAllLines(path);\n    List<Customer> customers = lines.stream().map(this::parse).toList();\n    repository.saveAll(customers);\n    return new ImportResult(customers.size());\n}","prompt":"A customer import works for small files but runs out of heap on multi-gigabyte input. Refactor it to process incrementally, batch database writes, report line-specific failures, and support cancellation and restart.","requirements":["Memory usage must remain bounded by configured batch sizes.","Malformed rows must include line number and reason.","Persist progress so a failed import can resume safely.","Return counts for accepted, rejected, and retried rows."],"constraints":["Do not keep every parsed customer or error in memory.","Database batches may partially fail.","Closing files and transactions must be deterministic."],"evaluation":["Uses streaming I/O and explicit batching.","Defines idempotent resume checkpoints.","Separates parse, validation, persistence, and reporting concerns."],"hints":["`Files.lines` is lazy but still needs disciplined resource ownership.","Checkpoint a stable file/import identity plus processed position."],"solution":"Read with a buffered stream inside try-with-resources, parse one record at a time, and accumulate only a bounded persistence batch. Store rejected-row details in a sink rather than an in-memory list. Commit batches with an import ID and stable row key so replay is idempotent, then advance a checkpoint only after successful persistence. Check cancellation between records/batches and return aggregate counters plus a reference to the error report.","difficulty":"advanced","estimatedMinutes":55,"tags":["streaming","batching","memory","resumability"]}]},{"domain":"Java","topic":"Concurrency 2","icon":"C2","exercises":[{"id":"practice-concurrency-2-001","title":"Race Condition","summary":"Explain lost updates and compare several ways to make a shared counter correct.","starterCode":"class Counter {\n    private int value = 0;\n\n    public void increment() {\n        value++;\n    }\n\n    public int get() {\n        return value;\n    }\n}\n\n// Ten threads each call increment() 10,000 times.","prompt":"Ten threads share one `Counter`, and each thread calls `increment()` 10,000 times. Analyze whether the result is guaranteed and implement several correct alternatives.","requirements":["Will the final result always be 100,000?","Explain precisely why or why not.","Show at least three different ways to fix it.","Choose and justify a solution for production."],"constraints":["All ten threads update the same counter instance.","The final value is read only after every worker has completed.","Compare correctness, contention, semantics, and maintainability."],"evaluation":["Expands `value++` into read, add, and write operations and identifies lost updates.","Offers valid alternatives such as synchronized, Lock, AtomicInteger, or LongAdder.","Chooses based on whether an exact instantaneous value or high-throughput statistics are required."],"hints":["`value++` is not one atomic operation.","Visibility alone does not make a compound update atomic."],"solution":"The result is not guaranteed to be 100,000 because threads can read the same old value and overwrite one another's increments. Correct options include synchronizing `increment()` and the corresponding read, protecting the state with a `ReentrantLock`, replacing the field with `AtomicInteger` and using `incrementAndGet()`, or using `LongAdder` for a highly contended metrics counter. `volatile int` is not sufficient because the read-modify-write remains non-atomic. For a simple exact counter, `AtomicInteger` is usually clear and efficient. For high-volume telemetry where `sum()` need not be a linearizable snapshot, `LongAdder` generally scales better.","difficulty":"advanced","estimatedMinutes":35,"tags":["race-condition","atomicity","atomicinteger","longadder"]},{"id":"practice-concurrency-2-002","title":"Deadlock","summary":"Trace a circular wait and repair account transfers using a total lock order.","starterCode":"void transfer(Account source, Account target, long amount) {\n    synchronized (source) {\n        synchronized (target) {\n            // Validate and move funds.\n        }\n    }\n}\n\n// Thread 1: transfer(A, B, 100);\n// Thread 2: transfer(B, A, 100);","prompt":"Two threads perform opposing transfers at the same time. Trace the possible execution and redesign the locking strategy so the transfer remains atomic without circular waiting.","requirements":["Can this implementation deadlock?","Explain exactly how the deadlock occurs.","Implement or describe a correct fix.","Explain whether switching to ReentrantLock automatically solves it."],"constraints":["Debit and credit must remain one atomic business operation.","The solution must handle self-transfer and lock-order key collisions.","Avoid serializing every transfer unless that trade-off is justified."],"evaluation":["Describes hold-and-wait and the A-to-B/B-to-A circular dependency.","Uses a stable total ordering or a carefully designed tryLock strategy.","Recognizes that ReentrantLock changes the API, not the lock ordering automatically."],"hints":["Every transfer must acquire account locks in the same global order.","`tryLock` can avoid waiting forever but requires retry, timeout, and rollback policy."],"solution":"Yes. Thread 1 can hold A while waiting for B, while thread 2 holds B while waiting for A. Neither can proceed. Assign every account an immutable, unique ordering key and always lock the lower key first, regardless of transfer direction. Handle self-transfer before acquiring two locks and use a private tie lock if ordering keys can collide. `ReentrantLock` does not automatically solve deadlock: calling `lock()` in opposite orders has the same problem. It can support `tryLock`, timeouts, and interruptible acquisition, but the algorithm must still prevent or recover from circular waiting.","difficulty":"advanced","estimatedMinutes":35,"tags":["deadlock","lock-ordering","reentrantlock","invariants"]},{"id":"practice-concurrency-2-003","title":"Visibility with volatile","summary":"Explain why a worker may not observe a stop request and establish a happens-before edge.","starterCode":"class Worker {\n    private boolean running = true;\n\n    void work() {\n        while (running) {\n        }\n    }\n\n    void stop() {\n        running = false;\n    }\n}","prompt":"One thread calls `work()` while another later calls `stop()`. Analyze the Java Memory Model guarantees and implement safe termination.","requirements":["Can the worker legally run forever?","Explain why the write may not become visible.","Show an appropriate fix.","Explain whether synchronized would also solve the problem."],"constraints":["The flag has one writer but is read repeatedly by another thread.","The loop body must not rely on accidental synchronization or logging.","Discuss interruption when the real worker may block."],"evaluation":["Explains the data race and absence of a happens-before relationship.","Uses volatile, matching synchronization, or interruption correctly.","Notes that synchronized reads and writes must participate in the same monitor protocol."],"hints":["A compiler or CPU may reuse a previously observed value when no synchronization exists.","For blocking work, interruption is often a better cancellation mechanism than a flag alone."],"solution":"The worker may run forever because there is a data race and no happens-before edge requiring it to observe the other thread's write. Declare `running` as `volatile` for this simple state flag. Synchronization also works when both the write and repeated reads are coordinated through the same monitor, although synchronizing every loop iteration is awkward and expensive. In a real worker that sleeps, waits, or performs interruptible I/O, use interruption and restore or propagate interrupt status appropriately; a volatile flag cannot wake a blocked thread by itself.","difficulty":"advanced","estimatedMinutes":30,"tags":["visibility","volatile","happens-before","interruption"]},{"id":"practice-concurrency-2-004","title":"Producer-Consumer","summary":"Build bounded message handoff without busy waiting using both library and monitor primitives.","starterCode":"public final class MessagePipeline implements AutoCloseable {\n    private final int capacity;\n\n    public MessagePipeline(int capacity, int workers) {\n        this.capacity = capacity;\n    }\n\n    public void receive(Message message) throws InterruptedException {\n        // Enqueue with backpressure.\n    }\n\n    private Message next() throws InterruptedException {\n        // Wait for available work.\n        throw new UnsupportedOperationException();\n    }\n}","prompt":"One thread continuously receives network messages and several workers process them. Producers must wait when capacity is exhausted, consumers must wait when no work exists, and no thread may busy-wait.","requirements":["Choose the appropriate Java classes.","Implement the design using only standard JDK concurrency utilities.","Implement the queue behavior using wait()/notifyAll().","Define shutdown and interruption behavior."],"constraints":["The queue must have a fixed capacity.","Spurious wakeups are permitted by the monitor contract.","Multiple producers and consumers should remain correct."],"evaluation":["Selects a bounded BlockingQueue such as ArrayBlockingQueue.","Uses put/take to express backpressure without polling.","Uses synchronized, while conditions, wait, and notifyAll correctly in the manual version."],"hints":["`put()` waits for capacity and `take()` waits for an element.","Always recheck a monitor condition in a while loop after waking."],"solution":"Use an `ArrayBlockingQueue<Message>` or explicitly bounded `LinkedBlockingQueue`. The receiver calls `put`, and worker tasks call `take`; both operations block interruptibly without busy waiting. Start workers with a deliberately sized `ExecutorService` and define closure using interruption, a poison message per consumer, or an explicit closed state. A manual queue synchronizes every operation on one private monitor. `put` waits in a `while (size == capacity)` loop, `take` waits in `while (isEmpty())`, state changes call `notifyAll`, and interruption is propagated. `notifyAll` is safer than `notify` when different condition predicates share one wait set.","difficulty":"deep-dive","estimatedMinutes":50,"tags":["producer-consumer","blockingqueue","wait-notify","backpressure"]},{"id":"practice-concurrency-2-005","title":"ExecutorService","summary":"Process a large independent workload with bounded resources and deterministic shutdown.","starterCode":"List<Path> files = findFiles(inputDirectory); // 10,000 files\n\nExecutorService executor = /* choose an executor */;\ntry {\n    // Submit processing work and observe every outcome.\n} finally {\n    // Shut down correctly.\n}","prompt":"You have 10,000 independent files to process on a machine with eight CPU cores. Design the executor, submission, completion, error handling, and shutdown strategy.","requirements":["Explain why creating 10,000 platform threads is or is not appropriate.","Choose and justify an executor.","Explain the difference between execute() and submit().","Wait until all files finish and observe failures.","Shut the executor down safely."],"constraints":["State whether processing is CPU-bound, blocking I/O, or mixed.","Submission must not create an unbounded memory backlog.","One failed file must have an explicit outcome."],"evaluation":["Sizes platform-thread pools according to workload rather than task count.","Understands Future, invokeAll, CompletionService, and exception observation.","Uses shutdown, awaitTermination, shutdownNow, and interruption deliberately."],"hints":["Eight cores is relevant for CPU-bound work but not enough information for blocking I/O.","Exceptions from submit are captured by the returned Future."],"solution":"Do not create 10,000 platform threads. For CPU-bound processing, use a fixed pool near the available processor count. For blocking file I/O, measure and permit somewhat more concurrency, or consider virtual threads while still bounding scarce downstream resources. `execute` accepts a Runnable and reports uncaught failures through the worker's handler; `submit` returns a Future and captures task exceptions until `get`. Use `invokeAll`, a list of Futures, or an `ExecutorCompletionService` to observe every result. Avoid an unbounded submission queue for huge or continuing workloads. Stop accepting work with `shutdown`, await a deadline, call `shutdownNow` if policy permits, and preserve interruption when the waiting thread is interrupted.","difficulty":"advanced","estimatedMinutes":45,"tags":["executorservice","thread-pools","future","shutdown"]},{"id":"practice-concurrency-2-006","title":"CompletableFuture","summary":"Compose three independent service calls and define partial-failure behavior.","starterCode":"CompletionStage<UserResponse> loadResponse(String userId) {\n    CompletableFuture<User> user = /* load user */;\n    CompletableFuture<List<Order>> orders = /* load orders */;\n    CompletableFuture<List<Recommendation>> recommendations =\n        /* load recommendations */;\n\n    // Combine all three results without serializing the calls.\n    throw new UnsupportedOperationException();\n}","prompt":"An endpoint independently loads a user, the user's orders, and recommendations. It may respond only after all three operations complete. Compose the workflow and define how failures and timeouts behave.","requirements":["Implement the workflow using CompletableFuture.","Identify the composition methods you would use.","Handle one service failing.","Define executor, timeout, and cancellation behavior."],"constraints":["The three operations should begin concurrently.","Do not block common-pool workers with synchronous network I/O.","Required and optional response data should have explicit policies."],"evaluation":["Uses independent futures plus thenCombine or allOf without accidental serialization.","Uses a suitable executor or genuinely asynchronous client.","Models fail-fast, fallback, and partial response choices intentionally."],"hints":["`allOf` signals completion but does not return typed component values.","`handle`, `exceptionally`, and `whenComplete` serve different failure roles."],"solution":"Start all three operations before composing them. Use a genuinely asynchronous client or `supplyAsync` with a dedicated executor for blocking calls. Combine typed results with two `thenCombine` stages, or use `allOf` and read the already-completed component futures afterward. Apply `orTimeout` or deadline propagation. If all data is required, allow exceptional completion and translate the root cause at the endpoint boundary. If recommendations are optional, recover only that future with an explicit fallback and mark the response degraded. `handle` can transform success or failure; `whenComplete` observes without normally recovering. Cancellation of a wrapper future does not guarantee cancellation of the underlying remote request.","difficulty":"advanced","estimatedMinutes":45,"tags":["completablefuture","composition","timeouts","error-handling"]},{"id":"practice-concurrency-2-007","title":"ConcurrentHashMap","summary":"Compare concurrent map semantics beyond the statement that both alternatives are thread-safe.","starterCode":"Map<UserId, Value> cache = new ConcurrentHashMap<>();\n\ncache.put(userId, value);\nValue current = cache.get(userId);\n\n// Proposal:\nMap<UserId, Value> replacement =\n    Collections.synchronizedMap(new HashMap<>());","prompt":"A developer proposes replacing ConcurrentHashMap with a synchronized HashMap wrapper because both are thread-safe. Review the proposal and explain the behavioral and performance differences.","requirements":["Agree or disagree with the replacement and justify the answer.","Compare locking, iteration, scalability, and atomic compound operations.","Explain why ConcurrentHashMap rejects null keys and values.","Show how to perform a compound update safely."],"constraints":["The cache receives concurrent reads and writes.","Correctness must not depend on a misleading size or iteration snapshot.","Mapping functions may perform expensive work."],"evaluation":["Explains that synchronizedMap serializes operations on one monitor.","Describes weakly consistent iteration and atomic methods on ConcurrentHashMap.","Connects null rejection to ambiguity during concurrent lookup."],"hints":["A sequence of thread-safe calls is not automatically one atomic operation.","With concurrent updates, `get(key) == null` must unambiguously mean no mapping."],"solution":"Both provide thread-safe individual operations, but they are not interchangeable. A synchronized wrapper protects the entire map with one monitor and requires external synchronization during iteration. ConcurrentHashMap allows high read concurrency, coordinates updates more narrowly, offers weakly consistent iterators, and provides atomic per-key operations such as `putIfAbsent`, `compute`, and `merge`. It rejects null so a null return from `get` unambiguously means no observed mapping even while updates occur. Use atomic map methods for check-then-act behavior, and keep compute functions short; expensive I/O is often better represented by an in-flight future than performed inside the computation.","difficulty":"advanced","estimatedMinutes":35,"tags":["concurrenthashmap","synchronizedmap","atomic-updates","iteration"]},{"id":"practice-concurrency-2-008","title":"AtomicInteger and CAS","summary":"Choose between locking and lock-free atomic updates while understanding their limits.","starterCode":"class RequestCounter {\n    private int counter;\n\n    synchronized void increment() {\n        counter++;\n    }\n}\n\n// Alternative:\nAtomicInteger counter = new AtomicInteger();\ncounter.incrementAndGet();","prompt":"A request counter can use a synchronized increment or AtomicInteger. Compare the choices, explain the underlying mechanism, and identify when one atomic variable is not enough.","requirements":["Choose a solution for the request counter and justify it.","Explain how AtomicInteger works internally.","Explain Compare-And-Swap (CAS).","Give examples where AtomicInteger is insufficient."],"constraints":["The counter may be highly contended.","Clarify whether callers require an exact linearizable snapshot.","Consider invariants involving more than one field."],"evaluation":["Describes volatile-like visibility plus atomic CAS retry loops.","Understands CAS expected/current/update semantics and contention costs.","Recognizes compound state, check-then-act, and multi-variable invariants."],"hints":["CAS updates only when the current value still equals an expected value.","A lock can protect a larger invariant; one AtomicInteger cannot."],"solution":"For a straightforward exact request counter, `AtomicInteger.incrementAndGet()` is concise and avoids explicit lock management. AtomicInteger exposes its value with the required visibility and implements updates using a compare-and-swap primitive: compare memory with an expected value and replace it only if unchanged, retrying when another thread wins. Under extreme write contention, repeated CAS failures can waste CPU; `LongAdder` may be better for statistics. AtomicInteger is not enough when an operation must update several values atomically, preserve a relationship with other mutable state, perform a larger conditional transition, or coordinate blocking and waiting. A synchronized block or Lock can protect that broader invariant.","diff
