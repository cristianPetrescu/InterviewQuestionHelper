"Specificația Java definește comportamentul observabil al canonicalizării, nu o regiune fizică fixă de memorie. În JVM-urile HotSpot moderne, șirurile din pool sunt administrate în heap; versiunile JVM mai vechi au folosit alte organizări.\n\nÎntr-un interviu trebuie diferențiate **garanțiile limbajului** de **detaliile de implementare ale JVM-ului**. Codul nu trebuie să se bazeze pe o afirmație istorică precum „pool-ul este întotdeauna în PermGen”. PermGen a fost eliminat din HotSpot în Java 8.","difficulty":"medium","tags":["string","string-pool","heap","jvm"]},{"id":"java-strings-011","question":"Care este diferența principală dintre StringBuilder și StringBuffer?","answer":"Ambele sunt secvențe mutabile de caractere cu API-uri similare. Diferența principală este sincronizarea:\n\n- `StringBuilder` nu este sincronizat și este destinat utilizării obișnuite într-un singur fir sau într-un context izolat unui fir.\n- `StringBuffer` își sincronizează operațiile și este proiectat pentru situațiile în care același buffer mutabil este accesat de mai multe fire.\n\n`StringBuilder` este preferat în general, deoarece majoritatea builder-elor sunt variabile locale și nu au nevoie de sincronizare.","difficulty":"easy","tags":["stringbuilder","stringbuffer","synchronization","thread-safety"]},{"id":"java-strings-012","question":"De ce este StringBuilder de obicei mai potrivit decât concatenarea repetată de String într-o buclă?","answer":"Un `String` este imuabil, astfel încât o concatenare repetată poate crea multe șiruri intermediare și poate copia în mod repetat conținutul acumulat. Un builder modifică un singur buffer extensibil.\n\n```java\nStringBuilder result = new StringBuilder();\nfor (String word : words) {\n    result.append(word).append(' ');\n}\nreturn result.toString();\n```\n\nPentru o singură expresie simplă, `+` este lizibil, iar compilatorul și runtime-ul îl pot optimiza eficient. Builder-ul contează mai ales pentru concatenare incrementală, în special în bucle sau în construcții condiționale complexe.","difficulty":"easy","tags":["stringbuilder","concatenation","performance","loop"]},{"id":"java-strings-013","question":"Este StringBuffer automat sigur pentru orice operație compusă executată din mai multe fire?","answer":"Nu. Metodele individuale din `StringBuffer` sunt sincronizate, dar o secvență de apeluri nu devine automat o singură tranzacție atomică.\n\n```java\n// Alt fir poate modifica buffer-ul între aceste apeluri.\nif (buffer.length() > 0) {\n    buffer.deleteCharAt(buffer.length() - 1);\n}\n```\n\nÎntreaga secvență verifică-apoi-acționează necesită coordonare externă, de exemplu sincronizare pe același buffer. În plus, transmiterea unui `StringBuffer` mutabil între fire poate face proiectarea mai greu de analizat; mesajele imuabile sau proprietatea explicită sunt adesea preferabile.","difficulty":"hard","tags":["stringbuffer","thread-safety","atomicity","synchronization"]},{"id":"java-strings-014","question":"Ce reprezintă length și capacity în StringBuilder și StringBuffer?","answer":"`length()` reprezintă numărul de caractere stocate în prezent. `capacity()` reprezintă dimensiunea spațiului intern curent înainte de a fi necesară o nouă extindere.\n\n```java\nStringBuilder builder = new StringBuilder(100);\nbuilder.append(\"Java\");\n\nSystem.out.println(builder.length());   // 4\nSystem.out.println(builder.capacity()); // cel puțin 100\n```\n\nCapacitatea este un aspect de implementare legat de performanță și nu influențează textul vizibil. Buffer-ul crește automat atunci când este necesar.","difficulty":"easy","tags":["stringbuilder","stringbuffer","capacity","memory"]},{"id":"java-strings-015","question":"Când ar trebui să specifici capacitatea inițială a unui StringBuilder?","answer":"Specifică o capacitate când dimensiunea finală aproximativă este cunoscută și suficient de mare încât evitarea extinderilor repetate să fie utilă.\n\n```java\nint estimatedSize = records.size() * 80;\nStringBuilder json = new StringBuilder(estimatedSize);\n```\n\nAceasta este o sugestie de performanță, nu o cerință de corectitudine. Evită capacitățile supradimensionate alese speculativ, deoarece alocă memorie în avans. Folosește profilarea sau estimări bazate pe dimensiuni reale ale intrărilor.","difficulty":"medium","tags":["stringbuilder","capacity","performance","allocation"]},{"id":"java-strings-016","question":"Ce fac setLength() și ensureCapacity() asupra unui StringBuilder?","answer":"`ensureCapacity(n)` solicită spațiu pentru cel puțin `n` caractere fără a schimba lungimea curentă. `setLength(n)` schimbă lungimea logică.\n\n- Reducerea lungimii trunchiază secvența.\n- Creșterea lungimii adaugă caractere nule (`\\u0000`).\n\n```java\nStringBuilder value = new StringBuilder(\"Java\");\nvalue.ensureCapacity(100); // textul rămâne \"Java\"\nvalue.setLength(2);        // textul devine \"Ja\"\nvalue.setLength(4);        // urmat de două caractere nule\n```\n\nConfundarea acestor metode poate introduce caractere nule invizibile în rezultat.","difficulty":"medium","tags":["stringbuilder","capacity","setlength","api"]},{"id":"java-strings-017","question":"Suprascrie StringBuilder equals() și hashCode() pentru a compara conținutul textului?","answer":"Nu. `StringBuilder` și `StringBuffer` moștenesc implementările bazate pe identitate ale metodelor `equals()` și `hashCode()` din `Object`.\n\n```java\nStringBuilder a = new StringBuilder(\"java\");\nStringBuilder b = new StringBuilder(\"java\");\n\nSystem.out.println(a.equals(b)); // false\n```\n\nCompară textul produs prin `a.toString().equals(b.toString())` sau folosește o comparație de conținut potrivită pentru `CharSequence`. Builder-ele mutabile sunt și chei nepotrivite pentru map-uri, deoarece textul lor se poate schimba.","difficulty":"medium","tags":["stringbuilder","stringbuffer","equals","identity"]},{"id":"java-strings-018","question":"Ce se întâmplă cu un String după ce este produs de StringBuilder.toString()?","answer":"`toString()` întoarce un `String` care conține secvența curentă de caractere a builder-ului. Modificările ulterioare ale builder-ului nu schimbă acel șir.\n\n```java\nStringBuilder builder = new StringBuilder(\"Java\");\nString snapshot = builder.toString();\nbuilder.append(\" 21\");\n\nSystem.out.println(snapshot); // Java\nSystem.out.println(builder);  // Java 21\n```\n\nStrategia exactă de copiere sau partajare a stocării este un detaliu de implementare. Garanția observabilă este că `String`-ul întors rămâne imuabil și independent de modificările ulterioare.","difficulty":"medium","tags":["stringbuilder","tostring","immutability","snapshot"]},{"id":"java-strings-019","question":"De ce este reutilizarea unui StringBuilder partajat de obicei o optimizare nepotrivită?","answer":"Un builder partajat introduce stare globală mutabilă, necesită sincronizare, riscă să păstreze conținut vechi când nu este resetat corect și poate reține un buffer intern excesiv de mare după o singură cerere neobișnuită.\n\nUn builder local este ieftin, are un proprietar clar și este adesea optimizat eficient de JVM. Reutilizarea trebuie luată în considerare numai după măsurători și cu o strategie de proprietate atent limitată, precum un pool controlat sau stocare locală firului. Chiar și atunci trebuie analizate reținerea memoriei și reentranța.","difficulty":"hard","tags":["stringbuilder","reuse","concurrency","performance"]},{"id":"java-strings-020","question":"Cum alegi între String, StringBuilder și StringBuffer?","answer":"Alege în funcție de mutabilitate și proprietate:\n\n- Folosește `String` pentru text finalizat, valori, limite de API, chei și date partajate în siguranță.\n- Folosește `StringBuilder` pentru construirea incrementală a textului într-un singur fir sau într-un context izolat.\n- Folosește `StringBuffer` numai când aceeași secvență mutabilă trebuie accesată concurent, iar sincronizarea la nivel de metodă se potrivește proiectării.\n\nÎn majoritatea aplicațiilor, construiește local cu `StringBuilder`, apoi publică rezultatul imuabil ca `String`.","difficulty":"easy","tags":["string","stringbuilder","stringbuffer","design"]}]},{"domain":"Java","topic":"WeakHashMap","icon":"🪶","questions":[{"id":"java-weakhashmap-001","question":"Ce este WeakHashMap?","answer":"`WeakHashMap` este o implementare de `Map` ale cărei chei sunt păstrate prin referințe slabe. Dacă o cheie nu mai este accesibilă puternic în afara map-ului, intrarea ei poate fi eliminată de garbage collector.\n\n```java\nMap<Object, Metadata> metadata = new WeakHashMap<>();\nmetadata.put(object, data);\n```\n\nEste util când map-ul nu trebuie să prelungească durata de viață a cheilor.","difficulty":"easy","tags":["weakhashmap","weak-reference","gc","map"]},{"id":"java-weakhashmap-002","question":"Când sunt eliminate intrările dintr-un WeakHashMap?","answer":"Intrările devin eligibile pentru eliminare când cheile lor sunt slab accesibile, adică nu mai există referințe puternice către cheie în afara mecanismelor de referințe slabe.\n\nEliminarea este legată de garbage collection și de curățarea internă, deci nu este deterministă.\n\nNu scrie logică ce depinde de dispariția unei intrări la un moment exact.","difficulty":"medium","tags":["weakhashmap","gc","weak-reference","lifecycle"]},{"id":"java-weakhashmap-003","question":"De ce poate părea că WeakHashMap se modifică fără operații directe pe map?","answer":"Pentru că garbage collector-ul poate curăța cheile slabe. După curățare, intrările ale căror chei au fost curățate sunt eliminate din map.\n\nAsta înseamnă că metode precum `size()`, `isEmpty()` sau iterarea pot observa schimbări chiar dacă aplicația nu a apelat `put` sau `remove`.\n\nAcest comportament este așteptat și este motivul pentru care `WeakHashMap` este util pentru asocieri sensibile la ciclul de viață.","difficulty":"medium","tags":["weakhashmap","gc","size","iteration"]},{"id":"java-weakhashmap-004","question":"Ce bug comun împiedică eliminarea intrărilor din WeakHashMap?","answer":"Valoarea poate referenția puternic cheia. Dacă map-ul păstrează valoarea puternic, iar valoarea indică înapoi spre cheie, cheia rămâne accesibilă puternic prin intrarea din map.\n\n```java\nclass Metadata {\n    Object key; // poate ține accidental cheia WeakHashMap în viață\n}\n```\n\nEvită referințele puternice valoare-cheie sau folosește referințe slabe în valoare când această relație este necesară.","difficulty":"hard","tags":["weakhashmap","memory-leak","strong-reference","gc"]},{"id":"java-weakhashmap-005","question":"Este WeakHashMap un cache general?","answer":"Nu de unul singur. `WeakHashMap` este util pentru a elimina automat intrări când cheile nu mai sunt accesibile puternic, dar nu oferă limite de dimensiune, politici de evacuare, expirare, statistici sau încărcare automată.\n\nPentru cache-uri de producție, o bibliotecă dedicată sau o politică explicită de evacuare este de obicei mai potrivită.\n\nFolosește `WeakHashMap` pentru metadate asociate ciclului de viață, nu ca soluție completă de caching.","difficulty":"medium","tags":["weakhashmap","cache","eviction","metadata"]},{"id":"java-weakhashmap-006","question":"De ce sunt cheile String adesea o alegere slabă pentru WeakHashMap?","answer":"Literalele String și șirurile internate pot rămâne accesibile puternic mult timp prin string pool sau metadatele claselor. Dacă un astfel de șir este folosit ca cheie, intrarea poate să nu dispară cum te-ai aștepta.\n\n```java\nMap<String, Object> map = new WeakHashMap<>();\nmap.put(\"USER\", value); // literalul nu este o cheie slabă bună\n```\n\nCheile slabe sunt cele mai utile pentru obiecte obișnuite al căror ciclu de viață este controlat în altă parte.","difficulty":"hard","tags":["weakhashmap","string","interning","weak-reference"]},{"id":"java-weakhashmap-007","question":"Este WeakHashMap thread-safe?","answer":"Nu. `WeakHashMap` nu este sincronizat. Dacă mai multe fire îl accesează concurent și cel puțin unul îl modifică, este necesară sincronizare externă.\n\n```java\nMap<Key, Value> map = Collections.synchronizedMap(new WeakHashMap<>());\n```\n\nChiar și cu sincronizare, reține că garbage collection poate afecta în timp intrările care rămân.","difficulty":"easy","tags":["weakhashmap","thread-safety","synchronization","map"]},{"id":"java-weakhashmap-008","question":"Cum se compară WeakHashMap cu IdentityHashMap și HashMap?","answer":"`HashMap` păstrează cheile puternic și le compară cu `equals()`.\n\n`IdentityHashMap` păstrează cheile puternic, dar le compară cu `==`.\n\n`WeakHashMap` compară cheile folosind egalitatea normală, dar le păstrează slab, permițând intrărilor să dispară când cheile nu mai sunt accesibile puternic.\n\nAlege în funcție de ciclul de viață și semantica egalității, nu doar de performanță.","difficulty":"medium","tags":["weakhashmap","identityhashmap","hashmap","map"]}]}]};
</script>

<script>
/* ── State ─────────────────────────────────────────── */
let allQuestions = [];
let allTopics    = [];
let activeTopic  = 'all';
let topicsOpen   = false;
let query        = '';
let shuffled     = false;
let hideDone     = false;
let progress     = {};
const SUPPORTED_LANGUAGES = ['en', 'ro'];
const QUESTION_FILES = [
  'java-core-1.json',
  'java-strings.json',
  'java-collections-core.json',
  'java-collections-maps.json',
  'java-collections-concurrent.json',
  'java-collections-algorithms.json',
  'java-collections-modern.json',
  'java-iterators.json',
  'java-concurrenthashmap.json',
  'java-copyonwritearraylist.json',
  'java-weakhashmap.json',
  'java-generics.json'
];
let activeLanguage = SUPPORTED_LANGUAGES.includes(localStorage.getItem('iqh_language'))
  ? localStorage.getItem('iqh_language')
  : 'en';

/* ── Persistence ────────────────────────────────────── */
function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem('iqh_progress') || '{}'); }
  catch { progress = {}; }
}
function saveProgress() {
  localStorage.setItem('iqh_progress', JSON.stringify(progress));
}

/* ── Helpers ────────────────────────────────────────── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function topicEncode(id) { return encodeURIComponent(id); }
function topicDecode(enc) { return decodeURIComponent(enc); }

/* ── Boot ───────────────────────────────────────────── */
async function boot() {
  loadProgress();
  applyLanguage();
  await loadQuestions();
}

async function loadQuestions() {
  try {
    const embeddedQuestions = window.IQH_EMBEDDED_QUESTIONS?.[activeLanguage];
    const datasets = embeddedQuestions || await Promise.all(
      QUESTION_FILES.map(file =>
        fetch(`questions/${activeLanguage}/${file}`).then(response => {
          if (!response.ok) throw new Error(`Could not load ${file}`);
          return response.json();
        })
      )
    );

    allTopics = [];
    allQuestions = [];

    datasets.forEach(ds => {
      const id = `${ds.domain}::${ds.topic}`;
      allTopics.push({ id, domain: ds.domain, topic: ds.topic, icon: ds.icon || '📋' });
      ds.questions.forEach(q =>
        allQuestions.push({
          ...q,
          _topicId:    id,
          _topicLabel: `${ds.domain} · ${ds.topic}`,
          _topicIcon:  ds.icon || '📋'
        })
      );
    });

    render();
  } catch {
    renderError();
  }
}

function applyLanguage() {
  const nextLanguage = activeLanguage === 'en' ? 'RO' : 'EN';
  document.documentElement.lang = activeLanguage;
  document.getElementById('languageLabel').textContent = nextLanguage;
  document.getElementById('languageBtn').title =
    activeLanguage === 'en' ? 'Comută în română (L)' : 'Switch to English (L)';
}

async function switchLanguage() {
  activeLanguage = activeLanguage === 'en' ? 'ro' : 'en';
  localStorage.setItem('iqh_language', activeLanguage);
  activeTopic = 'all';
  applyLanguage();

  document.getElementById('main').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">&#9203;</div>
      <p class="empty-title">${activeLanguage === 'ro' ? 'Se încarcă întrebările…' : 'Loading questions…'}</p>
    </div>`;

  await loadQuestions();
}

/* ── Filter & sort ──────────────────────────────────── */
function visibleQuestions() {
  let qs = activeTopic === 'all'
    ? [...allQuestions]
    : allQuestions.filter(q => q._topicId === activeTopic);

  if (query) {
    const lc = query.toLowerCase();
    qs = qs.filter(q =>
      q.question.toLowerCase().includes(lc) ||
      (q.answer && q.answer.toLowerCase().includes(lc)) ||
      (q.tags || []).some(t => t.toLowerCase().includes(lc))
    );
  }

  if (hideDone) qs = qs.filter(q => progress[q.id] !== 'done');

  if (shuffled) {
    for (let i = qs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [qs[i], qs[j]] = [qs[j], qs[i]];
    }
  }
  return qs;
}

/* ── Render: topics bar ─────────────────────────────── */
function renderTopics() {
  const bar = document.getElementById('topicsBar');
  const options = [
    { id: 'all', label: 'All Topics', count: allQuestions.length },
    ...allTopics.map(t => ({
      id: t.id,
      label: `${t.icon || ''} ${t.domain} - ${t.topic}`.trim(),
      count: allQuestions.filter(q => q._topicId === t.id).length
    }))
  ];

  const active = options.find(t => t.id === activeTopic) || options[0];
  const optionHTML = options.map(t => {
    const encoded = t.id === 'all' ? 'all' : topicEncode(t.id);
    return `<button class="topic-option ${activeTopic === t.id ? 'active' : ''}"
                    onclick="setTopic('${encoded}')">
              <span class="topic-option-title">${esc(t.label)}</span>
              <span class="chip-count">${t.count}</span>
            </button>`;
  }).join('');

  bar.innerHTML =
    `<div class="topic-selector">
      <button class="topic-toggle" id="topicToggle" aria-expanded="${topicsOpen}" onclick="toggleTopics(event)">
        <span class="topic-toggle-main">
          <span class="topic-kicker">Current topic</span>
          <span class="topic-current">${esc(active.label)}</span>
        </span>
        <span class="topic-toggle-side">
          <span>${active.count} questions</span>
          <svg class="topic-chevron" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6l4 4 4-4"/>
          </svg>
        </span>
      </button>
      <div class="topic-menu ${topicsOpen ? 'open' : ''}" id="topicMenu">
        ${optionHTML}
      </div>
    </div>`;
}

/* ── Render: stats ──────────────────────────────────── */
function renderStats() {
  const scope = activeTopic === 'all'
    ? allQuestions
    : allQuestions.filter(q => q._topicId === activeTopic);

  const total  = scope.length;
  const done   = scope.filter(q => progress[q.id] === 'done').length;
  const review = scope.filter(q => progress[q.id] === 'review').length;
  const pct    = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('sTotal').textContent  = total;
  document.getElementById('sDone').textContent   = done;
  document.getElementById('sReview').textContent = review;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent  = pct + '%';
}

/* ── Render: full page ──────────────────────────────── */
function render() {
  renderTopics();
  renderStats();

  const qs   = visibleQuestions();
  const main = document.getElementById('main');

  if (qs.length === 0) {
    main.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${query ? '🔍' : '🎉'}</div>
        <p class="empty-title">${query ? 'No questions match' : 'Nothing here!'}</p>
        <p class="empty-desc">${
          query
            ? 'Try a different search term or clear the filter.'
            : 'All questions are hidden or answered. Try turning off "Hide done".'
        }</p>
      </div>`;
    return;
  }

  main.innerHTML = qs.map((q, i) => cardHTML(q, i + 1)).join('');
}

/* ── Card HTML ──────────────────────────────────────── */
const EYE_OPEN = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/></svg>`;
const EYE_OFF  = `<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/><circle cx="8" cy="8" r="2"/><line x1="2" y1="14" x2="14" y2="2"/></svg>`;

function cardHTML(q, num) {
  const state = progress[q.id] || 'none';
  const diff  = q.difficulty || 'medium';
  const tags  = (q.tags || []).map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
  const enc   = encodeURIComponent(q.id);

  const stateIcon = state === 'done'
    ? `<div class="card-state-icon done">✓</div>`
    : state === 'review'
      ? `<div class="card-state-icon review">✗</div>`
      : '';

  return `
  <div class="q-card state-${state}" id="card-${enc}" style="animation-delay:${Math.min(num * 0.03, 0.3)}s">
    <div class="card-top">
      <span class="card-num">#${num}</span>
      <div class="card-content">
        <div class="card-meta">
          <span class="topic-badge">${esc(q._topicIcon)} ${esc(q._topicLabel)}</span>
          <span class="diff-badge diff-${esc(diff)}">${esc(diff)}</span>
          ${tags}
        </div>
        <div class="q-text">${esc(q.question)}</div>
      </div>
      ${stateIcon}
    </div>

    <div class="answer-wrap" id="aw-${enc}">
      <div class="answer-inner">
        <div class="answer-divider"></div>
        <div class="answer-body">${formatAnswer(q.answer || '')}</div>
      </div>
    </div>

    <div class="card-actions">
      <button class="btn-reveal" id="rb-${enc}" onclick="toggleAnswer('${enc}')">
        ${EYE_OPEN} Show Answer
      </button>
      <div class="feedback-group">
        <button class="btn-fb btn-got ${state === 'done' ? 'active' : ''}"
                onclick="mark('${enc}', 'done')">✓ Got it</button>
        <button class="btn-fb btn-not ${state === 'review' ? 'active' : ''}"
                onclick="mark('${enc}', 'review')">✗ Not yet</button>
      </div>
    </div>
  </div>`;
}

/* ── Toggle answer reveal ───────────────────────────── */
function toggleAnswer(enc) {
  const wrap = document.getElementById('aw-' + enc);
  const btn  = document.getElementById('rb-' + enc);
  const open = wrap.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.innerHTML = open ? `${EYE_OFF} Hide Answer` : `${EYE_OPEN} Show Answer`;
}

/* ── Mark question ──────────────────────────────────── */
function mark(enc, state) {
  const id   = decodeURIComponent(enc);
  const prev = progress[id] || 'none';
  progress[id] = prev === state ? 'none' : state;
  saveProgress();

  const card = document.getElementById('card-' + enc);
  if (!card) return;

  const newState = progress[id];
  card.className = `q-card state-${newState}`;
  card.querySelector('.btn-got').classList.toggle('active', newState === 'done');
  card.querySelector('.btn-not').classList.toggle('active', newState === 'review');

  const existing = card.querySelector('.card-state-icon');
  if (existing) existing.remove();
  if (newState === 'done') {
    card.querySelector('.card-top').insertAdjacentHTML('beforeend', '<div class="card-state-icon done">✓</div>');
  } else if (newState === 'review') {
    card.querySelector('.card-top').insertAdjacentHTML('beforeend', '<div class="card-state-icon review">✗</div>');
  }

  renderStats();

  if (hideDone && newState === 'done') {
    card.style.transition = 'opacity .25s, transform .25s';
    card.style.opacity = '0';
    card.style.transform = 'scale(.98)';
    setTimeout(() => card.remove(), 260);
  }
}

/* ── Topic switch ───────────────────────────────────── */
function setTopic(enc) {
  activeTopic = enc === 'all' ? 'all' : topicDecode(enc);
  topicsOpen = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function toggleTopics(e) {
  if (e) e.stopPropagation();
  topicsOpen = !topicsOpen;
  renderTopics();
}

/* ── Markdown-lite formatter ────────────────────────── */
function formatAnswer(raw) {
  if (!raw) return '<em>No answer provided.</em>';

  const codeBlocks = [];
  let s = raw.replace(/```[^\n]*\n?([\s\S]*?)```/g, (_, code) => {
    codeBlocks.push(code.replace(/\n$/, ''));
    return `\n\n\x00CB${codeBlocks.length - 1}\x00\n\n`;
  });

  const paras = s.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);

  const html = paras.map(para => {
    if (/^\x00CB\d+\x00$/.test(para)) {
      const i = +para.slice(3, -1);
      return `<pre><code>${esc(codeBlocks[i])}</code></pre>`;
    }
    const lines = para.split('\n');
    if (lines.length > 0 && lines.every(l => /^[-*]\s/.test(l.trim()))) {
      return `<ul>${lines.map(l => `<li>${inlineFmt(l.replace(/^[-*]\s+/, '').trim())}</li>`).join('')}</ul>`;
    }
    if (lines.length > 0 && lines.every(l => /^\d+\.\s/.test(l.trim()))) {
      return `<ol>${lines.map(l => `<li>${inlineFmt(l.replace(/^\d+\.\s+/, '').trim())}</li>`).join('')}</ol>`;
    }
    return `<p>${lines.map(inlineFmt).join('<br>')}</p>`;
  }).join('\n');

  return html;
}

function inlineFmt(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>');
}

/* ── Toast ──────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

/* ── Error state ────────────────────────────────────── */
function renderError() {
  document.getElementById('main').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📂</div>
      <p class="empty-title">Cannot load questions</p>
      <p class="empty-desc">
        This app must be served over HTTP — it won't work when opened as a local file.<br><br>
        Run in your terminal:<br>
        <code>python -m http.server 8080</code><br>
        then open <code>http://localhost:8080</code><br><br>
        Or use the VS Code <strong>Live Server</strong> extension.
      </p>
    </div>`;
}

/* ── Toolbar buttons ────────────────────────────────── */
document.getElementById('shuffleBtn').addEventListener('click', () => {
  shuffled = !shuffled;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffled);
  toast(shuffled ? '🔀 Shuffle on' : '↕ Shuffle off');
  render();
});

document.getElementById('hideBtn').addEventListener('click', () => {
  hideDone = !hideDone;
  document.getElementById('hideBtn').classList.toggle('active', hideDone);
  toast(hideDone ? '✓ Hiding answered' : '👁 Showing all');
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  const scope = activeTopic === 'all'
    ? allQuestions
    : allQuestions.filter(q => q._topicId === activeTopic);
  const hasProgress = scope.some(q => progress[q.id]);
  if (!hasProgress) { toast('Nothing to reset'); return; }
  if (!confirm(`Reset progress for ${activeTopic === 'all' ? 'all topics' : 'this topic'}?`)) return;
  scope.forEach(q => delete progress[q.id]);
  saveProgress();
  render();
  toast('↺ Progress reset');
});

/* ── Topics bar horizontal scroll via mouse wheel ───── */
document.getElementById('topicsBar').addEventListener('wheel', e => {
  const bar = e.currentTarget;
  if (bar.scrollWidth <= bar.clientWidth) return;
  e.preventDefault();
  bar.scrollLeft += e.deltaY;
}, { passive: false });

/* ── Search ─────────────────────────────────────────── */
let searchDebounce;
document.getElementById('languageBtn').addEventListener('click', switchLanguage);

document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => { query = e.target.value.trim(); render(); }, 200);
});

/* ── Keyboard shortcuts ─────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 's' || e.key === 'S') document.getElementById('shuffleBtn').click();
  if (e.key === 'h' || e.key === 'H') document.getElementById('hideBtn').click();
  if (e.key === 'l' || e.key === 'L') document.getElementById('languageBtn').click();
  if (e.key === 'd' || e.key === 'D') document.getElementById('darkBtn').click();
  if (e.key === 'Escape' && topicsOpen) { topicsOpen = false; renderTopics(); return; }
  if (e.key === '/') { e.preventDefault(); document.getElementById('searchInput').focus(); }
  if (e.key === 'Escape') { document.getElementById('searchInput').value = ''; query = ''; render(); }
});

document.addEventListener('click', e => {
  if (!topicsOpen) return;
  const bar = document.getElementById('topicsBar');
  if (bar && !bar.contains(e.target)) {
    topicsOpen = false;
    renderTopics();
  }
});

/* ── Dark mode ──────────────────────────────────────── */
const MOON_ICON = `<path d="M8 1a7 7 0 1 0 7 7A5.5 5.5 0 0 1 8 1z"/>`;
const SUN_ICON  = `<circle cx="8" cy="8" r="3.5"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/><line x1="3" y1="3" x2="4.5" y2="4.5"/><line x1="11.5" y1="11.5" x2="13" y2="13"/><line x1="13" y1="3" x2="11.5" y2="4.5"/><line x1="4.5" y1="11.5" x2="3" y2="13"/>`;

const DISPLAY_ICON = `<rect x="2" y="3" width="12" height="9" rx="1.5"/><path d="M6 15h4M8 12v3"/>`;

const THEMES = [
  { id: 'light', label: 'Light', icon: SUN_ICON },
  { id: 'dark', label: 'Dark', icon: MOON_ICON },
  { id: 'oled-blue', label: 'OLED Blue', icon: DISPLAY_ICON },
  { id: 'oled-green', label: 'OLED Green', icon: DISPLAY_ICON },
  { id: 'oled-amber', label: 'OLED Amber', icon: DISPLAY_ICON }
];

function savedTheme() {
  const theme = localStorage.getItem('iqh_theme');
  if (THEMES.some(item => item.id === theme)) return theme;
  return localStorage.getItem('iqh_dark') === '1' ? 'dark' : 'light';
}

let activeTheme = savedTheme();

function themeIndex(id) {
  return Math.max(0, THEMES.findIndex(item => item.id === id));
}

function nextTheme() {
  return THEMES[(themeIndex(activeTheme) + 1) % THEMES.length];
}

function applyTheme(themeId) {
  activeTheme = THEMES.some(item => item.id === themeId) ? themeId : 'light';
  if (activeTheme === 'light') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', activeTheme);
  }
  const icon  = document.getElementById('darkIcon');
  const label = document.getElementById('darkLabel');
  const upcoming = nextTheme();
  if (icon) icon.innerHTML = upcoming.icon;
  if (label) label.textContent = upcoming.label;
  document.getElementById('darkBtn').classList.toggle('active', activeTheme !== 'light');
  document.getElementById('darkBtn').title = `Switch to ${upcoming.label} theme (D)`;
}

applyTheme(activeTheme);

document.getElementById('darkBtn').addEventListener('click', () => {
  const theme = nextTheme();
  localStorage.setItem('iqh_theme', theme.id);
  localStorage.setItem('iqh_dark', theme.id === 'light' ? '0' : '1');
  applyTheme(theme.id);
  toast(`Theme: ${theme.label}`);
});

/* ── Go ─────────────────────────────────────────────── */
boot();
</script>
</body>
</html>
